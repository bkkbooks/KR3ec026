甘草水浸一宿焙乾梔子去殼取仁用甘草水浸一宿取出曝乾搗篩為末五錢上九味以水四升先煮八味取升半去滓內阿膠煬消分溫二服梔子栝蔞湯梔子五錢修治同上方栝蔞根取大三圍者去皮搗爛以水澄粉曝乾七錢香豉小半合取如法修事者淡竹葉東流水洗切小半升葛根秋露潤透陰乾銼碎一兩一錢豬苓削去粗皮切片東流水浸一宿取出同升麻麻黃等分水潤拌蒸一炷香勿令泄氣去升麻麻黃曝乾九錢滑石一兩修事如上方牡丹皮銅刀削去骨銼碎同桃仁等分酒潤蒸曝三次去桃仁七錢知母槐砧上銼碎干木臼中搗爛五錢生薑切七錢上十味以水三升五合煮取升半去滓分溫三服牝瘧二方蜀漆散蜀漆臨用去根用甘草末拌蒸一炷香去甘草柳火上炙燥另作細粉雲母燒二日夜研作細粉埋深土過宿龍骨香草湯洗兩度搗粉絹袋盛之另取雲母粉獲袋外蒸兩炷香取出懸井面上過宿上三味取淨末各等分未發前水漿服方寸匕牡蠣湯牡蠣以鹽水煮一伏時再入火中煅赤研粉一兩五錢麻黃去節一兩蜀漆臨用去根湯浸一宿同甘草末潤蒸之俟冷去甘草銼碎再拌甘草水潤過宿曝乾八錢如無蜀漆以常山代之甘草去頭尾酒浸蒸之從巳至午曝乾銼碎五錢上四味以水三升先煮蜀漆麻黃減一升去沫納諸藥煮取一升先飲半升得即吐再飲之冬病一方藿香正氣散此方四時咸宜大腹皮溫湯洗淨曝乾用生薑汁拌蒸一炷香曝乾三兩白芷去皮以黃精汁拌潤蒸一伏時曝乾今市賈者皆用石灰拌蒸更拌石灰收藏服之為害甚深慎之慎之三兩茯苓去皮為末水飛去膜澄曝三兩蘇莖葉東流水洗曝乾三兩真藿香東流水洗曝乾三兩厚朴取厚寸許及色赤氣烈者去粗皮每一兩用薑汁五錢塗炙令盡二兩白朮米泔浸一宿取出拌山黃土蒸曝七次二兩廣橘皮去白銼細以鯉魚皮裹一宿至明取用二兩桔梗去頭上尖硬處四五分並兩畔附枝於槐砧上銼細用生百合搗膏同投水中浸一伏時濾出緩火焙乾每桔梗一兩用百合六錢二兩半夏用白芥子末攪釅醋內令勻投半夏洗三五次再以水漂曝乾二兩上十味搗作極細末每服三錢薑三片棗一枚煎湯服日二服未發一服發後一服春病一方茈朴湯茈胡去頭蘆及黃薄皮少許銼碎二錢獨活銼碎以淫羊藿拌浥二日曝乾去藿二錢前胡削去蒼黑皮及蘆頭銼碎以甜竹瀝浸令潤曝乾二錢黃芩取腐腸者東流水潤透蒸半炷香銼碎曝乾二錢茅山蒼朮去蘆及須糯米泔浸透削去黑皮再用米泔浸一宿取出曝乾銼碎同脂麻拌炒黃色去脂麻二錢厚朴二錢修事同上方廣橘皮二錢修事同上方半夏曲二錢取如法修事者其法用白芥子末入釅醋內攪令勻投半夏洗三五遍水漂過曝乾末之用生薑汁和勻捏作餅上下覆蒼耳葉如造麴法俟黃衣上遍曝乾收用白茯苓二錢修事同上方藿香二錢洗甘草一錢修事同上方生薑三錢切上十二味以水二升煮取一升五更一服未發前一服氣弱人加人參一錢白朮二錢夏病二方白虎湯石膏研碎甘草水飛澄曝四兩甘草去頭尾酒潤炙黃色三錢知母槐砧上銼碎干木臼中搗爛一兩三錢粳米一合淘上四味以水三升五合先煮粳米減半升去滓納諸藥煮取升半去滓分溫三服竹葉石膏湯竹葉一把採東畔枝葉石膏三兩修事如上方半夏半合用白芥子末攪入釅醋內令勻投半夏洗三四次水漂曝乾銼碎甘草三錢修事如上方麥門冬不必去心杵爛二兩人參飯上蒸曝三次七錢粳米一合洗上七味以水四升煮取二升去滓內粳米煮令米熟成湯去米分溫三服病久不愈四方鱉甲煎丸方見陽明蜀漆丸方見牝瘧牛膝湯牛膝取肥大長數尺者去蘆銼碎用黃精銼片同拌蒸一炷香去黃精曝乾四兩上一味以水四升煮取二升分溫二服未發時一服臨發時一服用好酒二升煮取亦善丁香酒丁香勿令犯火竹刀切片一錢檳榔頭圓矮毗者為榔形光紫紋者為檳檳力小榔力大也凡使用檳擇穩正而堅有錦紋者以竹刀削去底細切之勿令經火四錢烏梅取肥大者湯潤去核藏米中蒸熟三枚常山臨用去苗銼片三錢甘草水潤蒸一次取出再用人參三錢拌勻水潤一宿飯上蒸飯熟為度去人參曝乾上四味盛一絹囊內用好酒兩碗浸之從巳至夜露置星月下高潔地橫刀其上臨發日寅卯時徐徐服如無量人作數次服完如胃寒人僅可重湯微溫但不宜熱服恐作嘔逆也服畢溫覆極暖靜室中臥當一日勿澡洗過時不發方進糜粥避風七日設不瘥再作服如前法上録諸方皆古人成案各有深意存焉蓋人之病或有證同而因異或有因同而證異或有因證似是而非或有因證似非而是者故所貴在盡察因證之常變及探索古人所以立方之繩則則我亦可以效法處方矧有古方之可循者乎否則頤懼其操方以希合也合其幸不合且以病試方矣頤竊於此頗三致意
