body:
  text: 水銀別録中品龍從火里得金向水中求不須他方尋覓矣氣味辛寒有毒主治主疥瘻痂瘍白禿殺皮膚中蝨墮胎除熱伏金銀銅錫毒熔化還復為丹久服神仙不死核曰原名澒一名汞汞與澒同綱目名靈液藥性名奼女此丹灶家言也古採符陵平土今採秦州商州道州邵武軍者淮南子言弱土之氣御於白天生白礜白礜生白澒陶弘景言是出硃砂腹中者佳亦有別出沙地色青白者為之生澒或硃砂粗末或山石折裂採其砂石燒煅成者色小白而濁皆不及生澒之能應化無方也陳霆墨談云拂林國當日沒處有澒海周匝七八十里國人取之近海十數里掘坑塹數十方乃使健夫駿馬遍體黏貼金箔行近海隅日光晃耀澒則滾沸如潮湧逐而至若琥珀之遇芥磁石之見鐵蓋澒以金為食也遂回馬疾馳俟湧逐之勢漸緩遇坑塹則凵凵干積於中否則人馬亦為之裹沒矣取得此品合香草煎制便成白金為丹家至寶世用熟澒燒煉經數十百世曾未成丹者以熟澒氣去形存名曰陰符又曰死尸徒消年歲終不可得也一種草澒法用細葉馬齒莧先以槐木槌熟向日東作架曝二三日經久更善乃燒灰存性置瓦甕中封固甕口埋土內四十九日則澒成矣每莧百斤可得澒三兩或十兩胡演丹藥祕訣云取硃砂澒法用瓷瓶盛硃砂不拘多寡以紙封瓶口香草湯煮一伏時先於地上掘一土坑置一鐵盤於坑內次以瓷瓶倒覆盤內遂用鹽泥封固近盤瓶口更築實以土露瓶下節之半於土上圍以栗炭煅二炷香火息氣冷澒自流溢盤中矣每硃砂末一斤可得澒十兩舊坑明透好砂可得澒十五兩雍州溪洞燒取極易以百兩為一銚銚之制似豬脬外糊厚紙數重貯之即不走漏若散失在地以川椒末或茶末收之或真金及鍮石引之即上嘉謨云去澒之砂魄名曰天琉丹灶家用之修事勿用草澒並舊朱漆中燒出者或經別藥制過者或死尸中流者誤服為毒甚深不可不辨必取生澒但不易得唯砂末燒取者乃可用之用紫背天葵夜交藤汁同煮一伏時以去其毒修事十兩二汁各用七鎰宗奭云澒得鉛則凝得硫黃則結銅得之則明灌尸中則後腐以五金置其上則浮得紫背天葵紫河車則伏得川椒則收可以勾金可以湧泉匱蓋藉死澒氣也並棗肉研乳則散別法制之則成膩粉粉霜吐唾研之可死蟲蝨也土宿真君云荷葉松葉松脂穀精草萱草金星草瓦松夏枯草忍冬莨菪子雁來紅馬蹄香獨枝蓮水慈姑萬年青蒼耳草陸六藤白花充蔚皆能制汞參曰水銀似水如銀也原名澒澒從水項聲音為水銀澒俗作水銀汞者謬矣澒者天地鴻洞未分之象也故澒含水而流含風而動含火而熔含地而堅顯諸木而色華青顯諸火而還丹赤顯諸土而峭粉黃顯諸金而凝霜白顯諸水而結砂玄隨合仍分隨分仍合遍周四大攢簇五行神仙不死藥也顧注留九竅死且不朽況餌服者乎故對待生欲速朽者為疹瘻為痂瘍白禿殺皮膚中蝨其功特著有言氣寒為陰金之屬者恐失體用相蕩之為性矣石硫黃本經中品氣味酸溫無毒主治主婦人陰蝕疽痔惡血堅筋骨除頭禿能化金銀銅鐵奇物核曰出東海牧羊山谷及太行河西山今南海諸番嶺外州郡亦有不及崑崙雅州舶上來者此火石之精礬石之液也所在之處必有溫泉作石硫黃氣以顆塊瑩淨光膩色黃嚼之無聲者彌佳夾土及石者不堪入藥一種赤色者曰石亭脂青色者曰冬結石鵝黃色者曰崑崙黃半白半黑者曰神驚石並不堪用又有一種水流黃出廣南及資州從溪澗水中流出以茅收取熬出者曰真珠黃氣極腥臭堪入瘡藥一種土硫黃出閩漳對海有山名雞籠頭刮取山邊砂土日中曝乾和牛脂煎研去砂土漉出清汁干之即土硫黃也入藥亦佳修事先以萊蔔剜空置硫黃於萊蔔空內合定用稻粳火煨熟去其臭氣再以紫背浮萍同煮一日消其火毒更以皂莢煎湯淘之去其黑漿曾青為之使畏細辛飛廉朴硝鐵醋參曰石硫黃偏得山石剽悍之性陽燧為體動流為用者也氣稟火溫味兼木酸蓋木從火得風自火出故爾合入厥陰從乎中治故主陰蝕疽痔及惡血為眚無以奉發美毛正骨柔筋者悉屬陰凝至堅對待治之陽生陰長陽殺陰藏矣化金銀銅鐵奇物此火之精礬之液耳厥陰之上風氣主之中見少陽少陽相火也白馬陰莖本經中品氣味甘鹹平無毒主治主傷中脈絶陰痿不起強志益氣長肌肉肥健生子核曰馬生雲中白者入藥最良雲中今大同府東南者弱劣不堪用耳孕十有二月而生應陰以紀陽也蓋陰合於八八合陽九八九七十二二主地地主月月精為馬月數十二故十有二月而生月度疾故善走也一歲曰𩡧音還二歲曰駒三歲曰駣八歲曰𩡩八歲一變故從八也欲知其歲以齒別耳種類雖多咸以色取如爾雅云小領盜驪絶有力駥膝上皆白惟馵音志四骹交膝下也皆白驓四蹄皆白首前足皆白騱後足皆白𮪄前右足白啓左白踦後右足白驤左白馵駵亞鬣色黑馬白腹騵驪馬白跨跨髀關驈白州驠竅也尾本白騴尾白駺馰顙白顛白達達鼻莖也素縣面顙皆白惟駹音龐回毛在膺宜乘在肘後減陽在干干脅也茀方在背闋黃逆毛居馻騋牝驪牡玄駒裊驂牡曰騭音質牝曰騇駵白駁黃白騜駵馬黃脊騝驪馬黃脊騽青驪駽青驪驎驒青驪繁鬣騥驪白雜毛駂音褒黃白雜毛駓陰陰淺色白雜毛駰蒼白雜毛騅彤白雜毛䭇白馬黑鬣駱白馬黑唇駩黑喙騧一目白瞷二目白魚如宗廟齊毫戎事齊力田獵齊足此言所尚如騊駼野馬駮如倨牙食虎豹騉蹄趼善升甗騉䟻一枝蹄趼善升甗此屬異品凡相馬者先除三羸五駑乃相其餘肝欲得小耳小則肝小肺欲得大鼻大則肺大脾欲得小臁小則脾小心欲得大目大則心大又云眼欲得有紫豔口欲得有紅光上唇欲得緩下唇欲得急上齒欲鉤鉤則壽下齒欲鋸鋸則怒脊欲大而抗額欲方而平喉欲曲而深胸欲直而出免間欲啓虎口欲開升肉欲大而明輔肉欲大而朗耳欲如劈竹睛欲如懸鈴頭欲高如剝兔項欲起如飛龍又云人眼鳥目鹿背麟腹虎胸龜尾擎頭如鷹垂尾如彗又云望之大就之小筋馬也望之小就之大肉馬也前視見目旁視見腹後視見足駿馬也毛束皮皮束筋筋束肉肉束骨五者兼備天下之馬也又云口中紅白間色者壽鼻中紅色如朱點書者壽眼中赤色如字形者壽動則逸靜則殃起先前足臥先後足嘗臥則病嘗立則安有肝無膽者畜生於午稟火氣而生者馬火不能生木故有肝無膽膽者木之精木臟不足故食其肝者死修事取銀色無病白馬春月遊牝時力勢正強者生取陰乾百日用時以銅刀破作七片將生羊血拌蒸半日曬乾粗布拭去皮及乾血銼碎用參曰本經取馬以白為良故五畜以馬為金也蓋十二辰午為馬謂陰始生於午六陽之化太陰之屬也是主手太陰肺足太陰脾藏真濡於脾脾藏肌肉之氣也故主長肌肉而肥健藏真高於肺以行營衛陰陽也故主傷中絶脈而益氣若強志有子為水藏事水以金為母土為制制則化生耳若主陰痿不起正陰始生於午自強而不息應陰以陽紀也牡狗陰莖本經中品氣味鹹平無毒主治主傷中陰痿不起令強熱大生子女子帶下十二疾核曰狗有三守狗獵狗豢狗也在禽為婁卦為艮五行為木十二子為戍鬥精所生也七九六十三陽氣生故狗三月而生也三子曰猣音宗二子曰獅一子曰玂音祈末成曰毫爾雅云狣音沼龐音龐狗也龐犬多毛也鎚音獻犬吠不止也獒犬知人心所使也㹞音興健犬也狄赤犬也耗白犬也狡小犬也獹黑色韓良犬㹱音鵲黑白宋良犬也𤡲音辨逐虎犬也窮奇驅妖神狗也長喙曰獫音斂短喙曰猲音歇去勢曰猗高四尺曰獒狂犬曰猘音折善守者喙長善獵者喙短供饌者體肥入藥者守狗也獵者搏食守者苟食性險而出警吠止御故艮為狗艮陽在上故也豺見之跪虎食之醉食木鱉則死遼東有鷹背狗産必三卵一鷹一雕一犬以禽乳獸類化生也又老木之精狀如狗色黑無尾烹之可食無情化有情精靈之變也荊楚記云雞寒狗𬋖畏杏仁反商陸合蒜食損人同菱食生癲犬不炙食令人消渴妊婦食之其子無聲熱病後食之卒殺人也病犬狂犬自死犬有大毒懸蹄之犬傷人赤股而躁者其氣臊犬目赤者有尸毒不則欲狂而尾垂矣參曰犬象形孔子曰視犬字如畫韓非云蠅營狗苟狗苟故從苟也埤雅云犬獵狗狩狩以守之獵以逐之孔子曰狗叩也叩氣吠以守也其群以時言能守也對待不知持滿以欲竭精致傷中陰痿不起者功能警御嚴守令強𬋖大必持其精氣滿溢而寫則生子矣女子帶下十二疾可默會矣代赭石本經下品帥氣衛外左右二十有四而營隊居中設無血帥誰主司命乎氣味苦寒無毒主治主鬼疰賊風蠱毒殺精物惡鬼腹中毒邪氣女子赤沃漏下核曰出代郡及姑幕北山經云少陽之山中多美赭西山經云石脆之山灌水出焉中有流赭管子云其山有赭其下有鐵處處山中亦有之西北者為良也生山峽中者赤紅青色而有澤上紋如浮漚俗呼丁頭赭修事細研以臘水重重飛過水上有赤色如薄雲者去之澄淨去水再以茗汁煮一伏時取出研萬餘匝用鐵鐺燒赤下白蠟一兩待化投新汲水沖之再煮一二十沸取出曬乾用先人云去浮赤奪其先聲烹白蠟培其根本肝與血大獲保任矣參曰靈樞稱衛氣為帥氣隱居稱大赭為血師則大赭當為營氣之司命矣經云命曰營氣以奉生身莫貴乎此先人云鬼疰三證大為生氣之害然必伏匿陰血中乃肆毒惡赭色丹青承宣君相火為血帥保任仍令就規矩會尺寸以合五十營奉身生氣如嘗營血安堵如故矣戎鹽本經下品氣味鹹寒無毒主治主明目目痛益氣堅筋骨去毒蠱核曰戎鹽即青鹽亦赤鹽也史書言虜中鹽有九種曰白鹽食鹽黑鹽胡鹽柔鹽赤鹽駁鹽臭鹽馬齒鹽而戎鹽即胡鹽日華一名羌鹽唐本一名禿登鹽大明一名陰土鹽生河崖山阪之陰土石間也大小不嘗形作塊片間有方稜或如雞卵或如菱米堅結似石色玄紫白味不甚咸臭若毈雞之氣燒之不鳴烢者是也涼州異物志云薑賴之墟今稱龍城剛滷千里蒺藜之形其下有鹽纍棋而生又云鹽山二嶽二色為質赤者如丹黑者如漆小大從意鏤之為物作獸辟惡佩之為吉或稱戎鹽可以療疾張果玉洞要訣云赤戎鹽生西戎稟自然水土之氣結而成質其地水土之氣黃赤故鹽亦隨土氣而生味淡於石鹽力伏陽精火中燒之汁仍紅赤凝定時色益赤者為真再燒之最久赤轉為青矣故一名絳鹽西涼記云有青鹽池出青鹽正方寸半其形如石味甚甘美真臘記云山間有石味勝於鹽可琢為器梁傑公傳云交河之間掘磧下數尺有紫鹽如紅如紫色鮮而甘其下丈許必有醫珀北戶録云張掖池中生桃花鹽色如桃花隨月盈縮今寧夏近涼州地鹽井所出青鹽四方皎潔如石山丹衛即張掖地有池産鹽紅色此二鹽者即戎鹽之青赤二鹽也今方書但用青鹽不用赤鹽並目赤鹽為異物矣本草云北海産青鹽南海産赤鹽總從西戎來所謂南北者指西海之南北耳嶺南一種紅鹽用色染成非真赤鹽也燒之出白汁凝定仍轉白色矣丹房鑑源云蠻鹽可伏雌雄唯赤鹽為上獨孤滔云戎鹽纍卵干澒制土砂參曰煮海為鹽若戎鹽者鍾海水自然之精氣不假人力為也生海北者黑如漆海南者赤如丹赤則水劣火勢黑則火勢劣水燒之最久黑者赤赤者黑矣以緣水火為性不越水火為色遞以水火為勝劣亦遞以水火為功用也故主精明眼識為緣生於眼識蓋識精緣水為根緣明為塵塵為火用根為火體故爾若益氣堅筋骨去毒蠱此寶明澄湛之休徵耳寶明即火澄湛即水經云寶明生潤水從火出矣貫衆本經下品氣味苦微寒有毒主治主腹中邪熱氣諸毒殺三蟲核曰出玄山山谷及冤句少室山今陝西河東州郡及荊襄間多有之生山陰近水處冬夏不死數根叢生每根必有多莖貫之莖作三稜如蕨狀有黑色汁頗涎滑也其葉兩兩對生如雞翎及鳳尾又似狗脊葉而無鋸齒色青黃面深背淡四月花白七月實黑相聚連卷而旁生其根曲而有尖嘴黑鬚叢族亦似狗脊根狀及伏鴟皮黑肉赤直而多枝若百頭也蘘菌赤小豆為之使伏石鐘乳先人云百頭而以一貫故名貫衆連卷有夏脈如鉤之象是心物無疑矣腹中邪熱是夏氣在臟之病從血脈流入心腹之部者當須此品參曰根具百頭獨莖葉兩兩相對若偶貫群陰也因名貫衆多生山陰近水處故稟苦寒氣味對待陽不貫陰而成邪熱理不貫經而成諸毒生陽不貫四大而成三蟲亦地以陽殺陰藏之象歟既連卷有夏脈如鉤之象則百頭一貫有心主百脈宗主之象矣假以治百合病者頗象形百合病者百脈一宗悉致其病故也白芨本經下品氣味苦平無毒主治主癰腫惡瘡敗疽傷陰死肌胃中邪氣賊風鬼擊痱緩不收核曰出北山山谷及冤句越山江淮河陝漢黔諸州春生苗長尺許葉如初生棕苗及藜蘆兩指許大色青翠三四月葉中出條開紫花宛如草蘭即箬蘭也結黃黑實根色白似菱有三角角頭生芽節間有毛質極黏膩可作糊也紫石英為之使惡理石畏李核仁杏核仁反烏頭參曰白金及至也金至斯堅故主癰腫瘡疽死肌痱緩不但堅形亦可堅臟填肺生葉填脈生血堅固歸金金歸地大故也杭郡獄中有犯大辟者生肺癰膿成欲死得單方服白及末遂獲生全越十年臨刑其肺已損三葉所損處皆白及末填補其間形色猶未變也連翹本經下品氣味苦平無毒主治主寒熱鼠瘻瘰癧癰腫惡瘡癭瘤結熱蠱毒核曰出太山山谷今汴京及河中江寧潤淄澤兗鼎嶽利諸州皆有之獨蜀中者為勝有大翹小翹兩種大翹生下濕地或山岡上葉青翠如榆葉水蘇輩莖高三四尺而色稍赤獨莖梢開花黃色可愛三秋著子似蓮實之房亦若椿實之未開者翹出衆草殼小堅外完無跗萼剖之中解氣甚芳馥實才干振之即落若不著莖根如青蒿之白硬也小翹生岡原之上莖葉花實皆似大翹但細小耳古者莖葉花實並用今惟用實未見莖葉也南方一種莖短葉小惟實黃黑子如粟粒乃旱蓮又一種如菡萏殼柔軟外有附萼抱之且無解脈亦不芳香干之不落久著莖上功用殊別也參曰內經嘗以車蓋喻脈狀曰藹藹如車蓋者陽結也亦陽盛也本經乃以連翹名藥左傳云翹翹車乘連連翹翹如車乘爾此形相似亦病相類也其主熱結儼若陽結陽盛乎一名連軺軺亦小車也蓋車者引重致遠以濟不通周禮云車有天地之象是合陰陽內外而言誠開闔之樞鍵也故主熱結在中為寒熱鼠瘻瘰癧其本在臟其末在頸腋間也若蠱毒此但沉於臟癭瘤癰腫此但浮於脈咸屬寒熱為病因熱結為形證者也其功力與夏枯相等但夏枯偏於從本秉寒水化令故上徹巔頂下及趺踵連翹偏於從末秉容平氣味故外彌膚腠內偏五中至於解從結心理則一矣先人云連翹治鼠瘻癰腫瘡瘤咸從結氣所生取其象形易落而能自散也綱目謂狀似人心故入心以痛癢瘡瘍皆屬心火也東垣謂十二經瘡藥中不可無此何必似人心狀乎顧獨莖赤色及結實在上原具心象又云散血結氣聚此以結治結當用上聲之散不當用去聲之散散則自散而省力散則分散而有為此先人備言所治之證頤但略言能治之因合能所生成則命名之義瞭然矣白蘞本經下品氣味苦平無毒主治主癰腫疽瘍散結氣止痛除熱目中赤小兒驚癇溫瘧女子陰中腫痛帶下赤白核曰生衡山山谷及江淮荊襄懷孟商齊諸州二月生苗多在林中作蔓赤節葉小如桑五月開花七月結實根如雞鴨卵而稍長三五同窠皮黑肉白一種赤蘞花實功用少別表裡都赤也代赭為之使反烏頭參曰斂從欠音酣平聲與斂從攴音廉上聲者迥別有以斂訓聚斂之斂謬矣蓋斂欲也遂也金也潔也堅潔遂欲以功用證名也故與白及相參古方多並用之但白及因風致動而金至斯堅白斂因熱致結而金遂斯解良繇金壞為形證此更堅形堅臟平定陰陽內外上下以及血氣之傾移者也四大地大曰金與五行金行少有異同五行之金在臟歸肺在形歸皮毛四大之金凡屬堅固有形統歸地大合五行中土金而言也烏頭本經下品烏頭功力能生死人非以生氣通之者孰能與此氣味辛溫有大毒主治主中風惡風洗洗汗出除寒濕痹咳逆上氣破積聚寒熱其汁煎之名射罔殺禽獸參曰烏頭與附子同種蓋初化之形物也近取野生者別無釀造之法唯多歷年月則氣力勇悍其毒轉甚處處有之苗葉花實並類川烏根外黑內白皺而枯燥酉陽雜俎云雀芋狀如雀頭置乾地地反濕濕地地反干飛鳥觸之墮走獸遇之僵一曰烏草即烏頭之野生者修事用文武火中炮令皺摺劈破用莽草為之使反半夏栝蔞貝母白蘞白芨惡藜蘆核曰烏日魄也兼天雄附側之陽而首出之命曰烏頭經云陽氣者若天與日是故陽因而上衛外者也故主中風惡風汗出洗洗致衛氣散解者力堪衛外而為固者也寒濕合痹致咳逆上氣積聚寒熱致內閉不通外壅肌肉者力主俾通而起亟之先人云人病有四曰痹風痿厥烏力唯宣痹風陽行有四曰升降出入烏力唯從升出但陽喜獨行而專操殺業在剛愎人所當禁忌又云有家蒔有野生野生無人氣無理法與生人反鳥獸不可與同群一味草烏而已附子本經下品氣味辛溫有大毒主治主風寒咳逆邪氣寒濕踒躄拘攣膝痛不能行步破症堅積聚血瘕金瘡核曰出犍為山谷及少室近以蜀道綿州龍州者良他處雖有力薄不堪用也綿州即故廣漢領縣凡八唯彰明出附子彰明領鄉凡二十唯赤水廉水昌明會昌出附子而赤水為多每歲以上田熟耕作壟取種於龍安龍州齊歸木門青堆小坪諸處十一月播種春月生苗莖類野艾而澤葉類地麻而厚花則瓣紫蕤黃苞長而圓實類桑椹子細且黑七月採根謂之早水拳縮而小蓋未長成耳九月採者佳其品凡七本同而末異也初種之小者為烏頭少有旁尖身長而烏附烏頭而旁生雖相須實不相連者曰附子左右附而偶生者曰鬲子種而獨生無附長三四寸者曰天雄附而尖者曰天錐附而上出者曰側子附而散生者曰漏籃子皆脈絡連實如子附母而附子以貴故專附名也凡種一而子六七以上則皆小種一而子二三則稍大種一而子特生則特大而附子之形以蹲坐正節角少者為上有節多鼠乳者次之形不正而傷缺風皺者為下矣又附子之色花白者為上鐵色者次之青緑者為下天雄烏頭天錐皆以豐實盈握者為勝漏籃側子如園人乞役卑卑不數也漏籃即雷公所謂木鱉子大明所謂虎掌鬲子即烏喙天錐即天雄類方書並無此名功用當相同爾然而易植難成功疏質變或種美而苗不茂或苗秀而根不充或已釀而腐或已曝而攣原屬氣化又復化氣成消若有神物陰為之者故園人嘗禱於神目為藥妖者以此修事入柳木灰火中炮令皺摺竹刀刮去孕子並底劈破於屋下平地掘一土坑安之至明取出焙乾若陰制者生去皮尖及底薄切作片用東流水及黑豆浸五日夜取出日中曬乾地膽為之使惡蜈蚣畏防風黑豆甘草人參黃耆參曰附子天雄側子即烏頭種子奇生無偶者曰天雄偶生旁立者曰附子旁生支出者曰側子側子青陽附子顯明天雄巨陽耳故附子司顯明主潤宗筋束骨而利機關也顯明陽虛則宗筋縱致踒躄拘攣膝痛不能行步矣並司宗氣不會呼吸為咳逆及血失氣詬為症堅積聚者莫不繇風寒寒濕為痹因不能則為病熱之為形證者也設肺熱葉焦發為踒躄者所當避忌先人云咳逆邪深寒濕氣死機關已弛堅凝固結者匪此真火點化未易開通耳青陽少陽也顯明陽明也巨陽太陽也顯明陽虛之踒躄太陰陰虛之踒躄差之毫釐謬則千里天雄本經下品氣味辛溫有大毒主治主大風寒濕痹歷節痛拘攣緩急破積聚邪氣金瘡強筋骨輕身健行核曰不生附側經年獨長而大者天雄也生成已具附子條內修事如附子法遠志為之使惡腐婢忌豉汁先人云合名與形當屬陽中之陽只能助長不能化育命門之用藥也參曰天以體言雄以用言不雜於陰柔不惑於邪亂者也一名白幕幕者軍旅行舍喻天行健自強不息之象也主輕身健行望見其雄武矣若大風寒濕痹證及積聚邪氣金瘡嫌於無陽者乃得行險而不失其正半夏本經下品氣味辛平有毒主治主傷寒寒熱心下堅胸脹咳逆頭眩咽喉腫痛腸鳴下氣止汗核曰出槐里川穀槐里屬扶風今青州齊州吳中漸中亦有之生丘澤田野間二月發苗一莖或三莖高八九寸莖端葉三淺緑色夏至半夏生連綴莖下也形似羊眼圓白者為勝江南一種大徑寸南人特重之乃繇跋誤作半夏也又一種絶似半夏但咬著微酸者名白傍芁子並不入藥用修事每半夏四兩用白芥子末三兩以釅醋先調芥子末次將半夏投入洗之誕盡為度否則令人氣逆怒滿也射干為之使惡皂莢畏雄黃生薑乾薑秦皮龜甲烏頭參曰月令半夏生蓋當夏之半也天地相遇品物咸章之時矣以純干決盡至姤而一陰見故主陰陽開闔之半關鍵之樞如半欲開半欲闔半欲開闔者莫不從令訓釋主治先人詳悉題藥矣從半欲開處居多如傷寒寒熱頭眩少陽之樞半欲開也咽喉腫痛少陰之樞半欲開也心下堅胸滿咳逆身形之半欲開也腸鳴亦身形之半欲開半欲闔也下氣及汗出此則身形之中欲闔外欲闔也虎掌本經下品氣味苦溫有大毒主治主心腹寒熱結氣積聚伏梁傷筋痿拘攣利水道核曰出漢中山谷及冤句安東河北州郡近道亦有之四月生苗高尺余獨莖上有葉如爪一窠生八九莖時出一莖作穗直上如鼠尾中生一葉如匙裹莖作房旁開一口上下尖中有花青褐色結實如麻子熟便白色自落布地一子只一窠九月葉殘取根但初孕之根僅如豆大漸長者似半夏而扁年久者始圓及寸大如雞卵周匝生芽三四枝或五六枝圓如指頂宛若虎掌冀州一種呼天南星二月生苗高一二尺莖似荷梗葉似蒟蒻兩枝相抱五月開花黃色似蛇首七月結實作穗似石榴子二八月採根似芋而扁與蒟蒻相類人多誤採了不可辨但蒟蒻莖斑花紫南星根小肌膩炮之易裂為別然南星即虎掌同類而異種其根大者周匝亦有圓芽但不若虎掌莖葉似爪五出分列也江州一種草虎掌葉大如掌面青背紫三四葉為一本經冬不凋不結花實根之四畔亦有圓芽名象雖同治療迥別修事取重一兩者氣專力倍用治風痰生用須溫湯洗淨再以白礬作湯或皂角煎汁浸二三日每日一換浸足暴乾熟用擇黃土地上掘一小坑深五六寸先以炭火燒紅次用好酒沃之乃安虎掌於坑內上以瓦盆覆定灰泥固濟過夜取用設急用用濕紙包裹埋粳灰火中周匝綻裂便可用矣一法以酒浸一宿用桑柴火蒸之嘗令灑酒入甑內令氣猛一伏時取出竹刀剖開味不麻舌為度一法以生薑杵碎和黃泥包虎掌煨熟去泥焙用若造麴用生薑汁及礬作湯和虎掌末作小餅子安籃內楮葉包蓋俟上有黃衣生取曬收之造膽星法將虎掌研末臘月取黃牯牛膽汁和勻納膽囊內懸繫有風處干之年久彌佳蜀漆為之使惡莽草先人云名色性氣合屬燥金味苦氣溫又得火化為肺金之用藥也與易稱熯萬物令燥者合其德當治風第可平諸疾生風不可平風生諸疾以非真實燥故其治諸暴強直支痛裡急筋縮緛戾平以虎掌風從燥已矣參曰命名虎掌不獨莖葉根荄形相似也虎力在掌故主寒熱氣結積聚伏梁以及心腹若探囊耳蓋掌用在筋且風生從虎故主厥陰風木變生筋主為病以致筋痿攣拘也風行水渙故並利水道厥陰變眚則風木之化不行焉虎嘯風生從其類也風感水受水道乃行故利水道常山本經下品氣味苦寒有毒主治主傷寒寒熱發熱溫瘧鬼毒胸中痰結吐逆蜀漆本經下品氣味辛平有毒主治主瘧及咳逆寒熱腹中症堅積聚邪氣蠱毒鬼疰核曰出益州川穀及漢中今宜都建平海州汴西淮浙湖南並有之生山谷間莖圓有節高三四尺葉似茗兩兩相當二月作白花青萼五月結實青圓三子為房根似荊根色黃而皺苗即蜀漆也採時須連根苗收用氣力始備性頗惡濕採即暴燥青白堪用否則黑爛郁壞矣宜都建平者根形細實宛如雞骨取用最勝海州者葉似楸葉八月開花紅白似山楝而小又天台一種土嘗山苗葉並甘而涼頗適口非同類也修事如用蜀漆臨時去根同甘草相拌水潤蒸之去甘草細銼再以甘草汁拌蒸曬乾取用如用嘗山臨時去苗用酒浸一宿取出曬乾熬搗用嘗山畏玉札蜀漆惡貫衆栝蔞為之使參曰經久不遷之謂嘗宣氣散生之謂山蓋以止行行止為體用故一名互草從治傷寒溫瘧之體似止顯寒熱往來之用似行及鬼毒與胸中結痰吐逆之似止而行似行而止者苗曰蜀漆山獨之謂蜀水瀉欲留之謂漆故功用相同略分內外上下之異耳合石膏參看便知彼此功力差別石膏之止止有凝義行有散義嘗山之止止有停義行有流義芫花本經下品虛中者轉能善開茅塞茅塞者當號毒魚氣味辛溫有小毒主治主咳逆上氣喉鳴喘咽腫短氣蠱毒鬼瘧疝瘕癰腫殺蟲魚核曰出邯鄲及絳州所在亦有莖幹不全類木亦非草本草中木木中草也本高二三尺正二月舊枝抽苗作花有紫赤黃白四種紫赤者多白色者時有黃色者絳州所産也三月花落盡葉乃生葉似白前及柳葉而青漸加厚則轉黑矣根似桑三月採花五月採葉八九月採根有爭鬥者以葉挼擦皮膚輒作赤腫和鹽擦卵則染外若赭色也修事取陳久者佳用米醋煮十餘沸去醋水浸一宿曬乾則毒減決明為之使反甘草參曰芫諧元元首也山海經云首山多芫亦苗首出萼即隨之花落盡葉乃茁也形色氣味具火大虛中之體從內而外以張橫遍之用者也是主蠱毒鬼瘧疝瘕為陰凝之屬滿實在中致令氣短用失橫遍遂上逆而咳氣喉鳴喘及咽腫者對待治之若癰腫亦中氣不達不能橫遍肉理故也若殺蟲魚以功能徹水則魚失所夫矣故一名去水一名毒魚行水之功於此可見大黃本經下品氣味苦寒無毒主治主下瘀血血閉寒熱破癥瘕積聚留飲宿食蕩滌腸胃推陳致新通利水穀調中化食安和五臟核曰出河西山谷及隴西者為勝益州北部汶山西山者次之二月卷生黃赤放葉時四四相當宛似羊蹄葉粗長而厚莖高三尺許味酸而脆頗堪啖也三月花黃五月實黑八月採根根形亦似羊蹄根大者如碗長二尺許切片陰乾理文如錦質色深紫修事切作薄片以文如縠紋緊厚者佳銼細蒸之從巳至未取出曬乾又以臘水潤透蒸之從未至亥凡七遍曬乾更以淡蜜水拌蒸一伏時色如烏膏為度乃曬乾收用黃芩為之使先人云大黃稱將軍將軍者所以行君令戡禍亂拓土地者也味大苦氣大寒似得寒水正化而炎上作苦苦性走下不與炎上者反乎參同云五行相剋更為父母素問云承乃制制則生化是故五行之體以克為用其潤下者正炎上之用乎則凡心用有所不行變生疢難者舍同類之苦巽以入之不能彰其用矣蓋心主夏主熱火主神主血脈主病在五臟主心腹部位若腸胃之間心腹之分夏氣熱火之郁神情血脈之結瘀閉宿留致成癥瘕積聚變生寒熱脹滿者皆心用不行大黃能蕩滌之是謂推陳推陳者正所以行君之令闢土地安人民阜生物是謂致新致新者即所以調中化食安和五臟者也客曰開土地滌腸胃利水穀皆脾所司何為行火用也曰火有用而靈正當生土火無用而息正當瀉土顧其名自得之矣參曰大黃稱將軍轉危為安亡為存故也具地體用大其用黃其體故其動也闢應地無疆含弘光大也其為方也為大方為急方其為劑也為通劑為瀉劑積著留礙者極物之情通乎理而已蚤休本經下品氣味苦微寒有毒主治主驚癇搖頭弄舌熱氣在腹中核曰出山陽川穀及冤句今河中河陽華鳳文州及江淮間亦有之生深山陰濕地即紫河車重樓金線七葉一枝花也一莖獨上莖當葉心似王孫鬼臼芍藥萆麻輩葉凡一莖三層獨王屋山産者至五七層每層七葉葉色碧緑夏月莖頭作花一花七瓣上有金絲下垂蕊長三四寸秋結紅子根如鬼臼及紫參蒼朮菖蒲等狀外紫中白理細質脆有粳糯兩種修治洗切焙用丹家採製三黃砂汞參曰蚤休陽草也以生成功用詮名禮記云發揚蹈厲之已蚤使之休止休息爾一莖獨上莖當葉心葉必七花瓣亦七重臺或一或三或五或七正陽數之生火數之成也味苦氣寒生深山陰濕處是陽以陰為用矣對待陰以陽用致熱在中若風自火出而弄舌搖頭及陽蹈陰中而癇陰越陽中而驚此皆陰陽舛錯越動靜之嘗故爾所謂發揚蹈厲之已蚤使之休止休息也頭為諸陽之首舌乃心火之苗蓋動搖名風若風之自火出也鬼臼本經下品氣味辛溫有毒主治主殺蠱毒鬼疰精物辟惡氣不祥逐邪解百毒核曰出九真山谷及冤句荊州峽州襄州近以錢唐餘杭徑山者為上生深山岩石之陰即獨腳蓮唐婆鏡馬目毒公羞天花八角盤也二三月挺生一莖中空獨上莖當葉心葉居莖上如初生荷葉邊出八角面青背紫叢生細毛揉之作瓜李香旦則東向暮則西傾猶葵之衛足也花開葉下連綴莖間未嘗見日故曰羞天風來不動風去自搖能不為風力所轉矣其葉或二三層疊總一莖當心直上或旁生岐出必另貫葉心不與本莖相連絡也年生一莖莖枯根作一臼新臼次年另生則舊臼中腐此陳新相易九年乃作九臼九臼者有神根形如蒼朮及黃精之岐曲以連生臼竅為別也辟穀伏汞畏垣衣參曰獨莖八角獨根九臼陽以陰為體陰以陽為用也莖生葉心花蔽葉下陰陽互為根蒂也花如鈴鐸風來不動風去自搖見陰陽之體能立用能行也旦則東向暮則西傾與陰陽浮沉於升降也伏汞成丹辟穀不飢操陰陽造化之權衡也此盡陰陽造化之變鬼物唯陰寧不斂掬許氏云望之斂掬曰臼臼音掬與掬同兩手曰掬與下畫相連之去聲者不同巴豆本經下品毒藥攻病不得不下毒手亦不得輕下毒手氣味辛溫有毒主治主傷寒溫瘧寒熱破癥瘕結聚堅積留飲痰癖大腹蕩練五臟六腑開通閉塞利水穀道去惡肉除鬼毒蠱疰邪物殺蟲魚核曰出巴郡川穀今嘉州眉州戎州皆有之木高一二丈葉如櫻桃而厚大初生青色久漸黃赤季冬漸凋仲春漸發仲夏舊葉落盡新葉齊生即開花成穗其色微黃五六月結實作房七八月成熟漸漸自落一房二瓣一瓣一子或三子子仍有殼獨戎州出者殼上有縱文隱起如線或一道或兩道三道土人呼為金線巴豆最為上品他處鮮有修治去殼敲碎每兩用麻油並酒各七合煮乾研膏用芫花為之使畏大黃黃連蘆筍菰筍藜蘆醬豉冷水得火良惡蘘草與牽牛相反中其毒者冷水黃連大豆汁解之參曰巴蛇名許氏云巴蛇吞象捷取巧嗜糜潰有形性之至毒者也謂巴豆之蕩練臟腑開通閉塞毒烈之性相類爾故可對待陰凝至堅結聚留癖先人博議云蕩則齠齔不存練則瑕疵盡淨苟非陽氣消沮形如死灰者未免流毒不辜慎之大戟本經下品氣味苦寒有小毒主治主蠱毒十二水腹滿急痛積聚中風皮膚疼痛吐逆核曰出嘗山近道亦有多生平澤二三月抽芽紅色漸長叢高莖直中空折之有白漿葉狹長似柳梢頭葉攢密而上三四月開黃紫色花如杏及蕪荑根如苦參而細出淮甸者苗似百合而葉黃江南者葉似芍藥而苗短杭州一種色紫而柔為上品江南一種土大戟為下品北方一種綿大戟皮韌如綿而色白氣味峻利弱人誤服吐血修事勿用附生者誤服令人氣泄不禁即煎薺薴湯解之採得即於槐砧上細銼與海芋葉拌蒸從巳至申去芋藥曬乾用反甘草菖蒲能解之先人云雙枝為戟所用為門我軍彼敵咽喉之地疆界之域也出入生死莫不繇之其為用大矣蓋蠱毒唯入十二水唯不出風中欲入吐逆欲出四者之門能無樞要乎然人身樞要主心猶三軍之命在將大戟花苗色味悉屬心象誠急方之宣劑通劑上下表里誰能不繇其門以為出入者今人唯知逐水尚可擴充治痘澄飲以其咸從水類也客曰人身以九竅為門越人別立七沖為衢大戟惟堪下泄何有疆界門戶答曰九竅者身形之門戶七沖者六腑之衢路如五臟十二經及骨空腠理亦莫不有疆界衢路門戶者經云八萬四千毛孔孔孔作大壑流非寓言也大戟苦寒行心之用於時為夏設人身有一毛孔於時不大便非靈活之身唯其莫不夏大乃成至大之用大戟張大夏令為門為衢則邪去有路自外自中而汗而下矣且心之表氣為陽而苦寒又得太陽寒水之化故為心之用宣發太陽之開藥也以太陽經主開開處為衢為門可無惑矣參曰大以用言戟者支兵也周禮掌舍棘門注云以戟為門主持開闔且禦侮也如治吐逆此但從開如治蠱毒十二水以及腹滿急痛積聚與中風皮膚疼痛此但從闔闔者持以開開者持以闔亦若拔戟以逐之以滅不格也第七帙商陸本經下品氣味辛平有毒主治主水腫疝瘕痹尉除癰腫殺鬼精物核曰出咸陽山谷所在亦有春生苗高三四尺莖青赤極柔脆枝枝相值葉葉相當葉如牛舌而長夏秋白花作朵亦有赤花者赤者根赤白者根白白者入藥赤者見鬼神甚有毒也根如萊蔔似人形者有神爾雅謂之蓫䓪廣雅謂之馬尾周易謂之莧陸修事取白花之根銅刀刮去皮薄切作片東流水浸兩宿取出以黑豆葉重重間隔入甑蒸之從午至亥俟冷去豆葉曝乾銼用無豆葉以黑豆代之參曰金音曰商從外知內以內知外也高平曰陸四時日月所行之路也蓋天有四陸人有四街營衛血氣所行之道也故主水停為腫氣痹為疝為瘕失其嘗陸之唯內無外更假火力尉除癰腫之唯外無內也若殺鬼精物以金氣遒徑雕落非其類爾甘遂本經下品氣味苦寒有毒主治主大腹疝瘕腹滿面目浮腫留飲宿食破症堅積聚利水穀道核曰出中山山谷唯太山江東者良比來用京口者為勝江東者稱次矣苗似澤漆莖短小而葉有汁根皮色赤肉色白作連珠狀實重者方堪入藥修治去莖槐砧上銼細用生甘草湯及薺苨自然汁攪浸三日水如黑汁乃漉出用東流水淘六七次水清為度取出曬乾納土器中熬脆用瓜蒂為之使惡遠志反甘草參曰味大苦而名甘遂者左氏所謂請受而甘心快意焉以甘於遂其力用也其為方也為大為急其為劑也為通為泄甘屬中土惟其能遂土欲也故為症堅積聚疝瘕及留飲宿食致無能利水穀道外溢而成大腹滿脹及面目浮腫者皆通之泄之所以從其欲也但氣味苦寒偏於以熱為因寒則非所宜矣狼毒本經下品設所卜非其向恐狼鳴腸斷矣以毒藥攻病者顧言珍重不存諸有即有故而隕不害諸無即亦無隕也氣味辛平有大毒主治主咳逆上氣破積聚飲食寒熱水氣惡瘡鼠瘻疽蝕鬼精蠱毒殺飛鳥走獸核曰出秦亭山谷及奉高宕昌建平諸處今陝西州郡及遼石州亦有之莖葉並似商陸及大黃莖葉之上都有白毛根皮色黃肉色白形似防葵沉重者為貴但蝮蛇喜食其根最為難得今人多以草䕡茹偽之不可不辨大豆為之使宜醋惡麥句薑畏占斯密陀僧參曰取狼為名者謂狼善逐也爾雅翼云狼之將遠逐食必先倒地以卜所向故獵師遇狼輒喜蓋狼之所向即獸之所在也故主殺飛鳥走獸並主水穀積聚而為咳逆上氣以及寒熱蠱毒與水穀無以轉輸皮毛致生惡瘡鼠瘻疽蝕者狼毒逐而輸之此但似狼性之貪叨非若狼腸之直而輒出也先人云非我族類鮮不滅除不存諸有不害諸無葶藶本經下品亭亭能歷歷便非止於亭者氣味辛寒無毒主治主癥瘕積聚結氣飲食寒熱破堅逐邪通利水道核曰出藁城平澤田野間汴東陝西河北州郡亦有之近以彭城曹州者為勝他處者不堪用也春生苗葉高六七寸似薺根而色白枝莖俱青三月開花微黃色遂結角列子亭亭扁小如黍粒微長而黃味苦入頂微甘者狗薺也月令孟夏靡草死注云狗薺葶藶之屬是也一種單莖向上葉端出角其實肥大而短一種葉近根下作奇生如芥葉其角細長者此皆異種不可不辨修事以糯米合置燠上微焙俟米熟去米搗碎用榆皮為之使得酒良惡白殭蠶石龍苪參曰水止曰亭行止曰歷史記云決河亭水而注之海蓋以功用為名故決瀆水道誠急方之泄劑也若氣結為癥瘕為積聚為飲食寒熱皆止固不遷決而泄之十劑云泄可去閉葶藶之屬是矣桔梗本經下品氣味辛微溫有小毒主治主胸脅痛如刀刺腹滿腸鳴幽幽驚恐悸氣核曰出蒿山山谷及冤句今在處有之二三月生苗莖如筆管高尺余紫赤色葉如杏及人參薺苨輩但杏葉圓桔梗葉長人參葉兩兩相對桔梗葉三四相對亦有不對者薺苨葉下光明滑澤無毛桔梗葉下暗澀有毛為異夏開小花紫碧色頗似牽牛花秋後結實根外白中黃有心味苦若無心味甜者薺苨也關中一種莖細色青葉小似菊根黃似蜀葵根者亦可入藥又一種木桔梗根形真相似只是咬之腥澀不堪啖不為藥用修事去頭上硬尖二三分並兩畔附枝槐砧上細銼用生百合搗膏投水中浸一伏時取出緩火熬干每桔梗四兩用百合二兩五錢節皮為之使畏白芨龍膽草忌豬肉得牡蠣遠志療恚怒和硝石石膏解傷寒其蘞味白粥解之但節皮不知為何物也參曰桔梗如桔槔之梗傾則僕滿則立載上載下其馮以樞合入少陽少陰樞藥也雷公制以百合此築梗基玉涵佐以甘草此煉梗已基築已煉上下乃察也胸脅為少陽部署故主胸脅痛如刀刺若腹滿腸鳴幽幽悸氣此上下不察驚則載上不下恐則載下不上皆樞象也千金用治喉痹咽痛此則少陰部署亦少陰樞象耳夏枯草本經下品氣味辛寒無毒主治主寒熱瘰癧鼠瘻頭瘡破症散癭結氣腳腫濕痹輕身核曰出蜀郡川穀所在亦有生平澤原野間冬至後生苗漸高至一二尺許莖微方葉對節生似旋覆葉而長大邊有細齒而背白三四月莖端作穗長一二寸穗中開淡紫碎花似丹參花結子亦作穗一穗四子五月便枯宜四月收採土瓜為之使伏汞砂參曰冬至生夏至枯具三陽之正體寒水之正化故從內達外自下徹上以去寒熱氣結及合濕成痹也瘰癧曰寒熱病經云瘰癧者皆鼠瘻寒熱毒氣留於脈而不去也其本在於臟其末出於頸腋之間浮於脈中而未內與著於肌肉而外為膿血者易去也治之奈何請從其本引其末可使衰去而絶其寒熱審按其道以豫之徐往徐來以去之決其死生反其目視之中有赤脈上下貫瞳子者見一脈一歲死見一脈半歲半死見二脈二歲死見二脈半二歲半死見三脈三歲而死見赤脈不下貫瞳子者可治也若癭則但浮於脈症則但著於臟腳腫唯下頭瘡唯上雖非本末統名寒熱病也樓全善用治目珠疼簡要濟衆方用治目睛痛此得靈樞意旨有赤脈貫瞳子者相宜否則涉寒非對待法也具寒水之正化可從在內之臟本具三陽之正體可從在外脈中之支末瘰癧曰寒熱病者以本於臟其末出於頸腋之間內外相從故名寒熱言針法也浮脈著臟唯上唯下盡寒熱之變旋覆花本經下品氣味鹹溫有小毒主治主結氣脅下滿驚悸除水去五臟間寒熱補中下氣核曰所在有之生平澤川穀及下濕地二月生苗長一二尺莖柔細似紅蘭而無刺葉如大菊及水蘇蒿艾輩花亦如菊六月開黃金色香亦勝菊故別名夏菊盜庚滴滴金金錢花也根細而白極易繁衍修事去蕊並殼皮及蒂子蒸之從巳至午熬乾用參曰旋者周旋旌旗之指麾覆者伏兵奉旌旗之指麾者也故主氣無師帥則搏結不行致形層之脅滿閉從闔矣若驚惶悸動即君主位次有失奠安並可定神臟往來之寒熱與主決瀆水液之向道設非補中氣司命安能使諸氣下伏從令乎顧氣味鹹溫亦可為營血之師帥咸能走血溫行經隧故也青葙本經下品氣味苦微寒無毒主治主邪氣皮膚中熱風瘙身癢殺三蟲核曰出江淮州郡近道亦有之生平谷道旁及田野下濕處二月抽青色苗漸長至三四尺莖色青紅若蒿狀葉闊似柳而軟六七月生花上紅下白作實有角子黑而扁大於莧實而光根似莨菪根而白直下獨莖生根襄人呼為崑崙草近時指雞冠子為青葙者誤矣修事先燒鐵杵臼乃搗用之參曰青東方色也從生從丹木生火象也葙從相相亦木相火行也味苦氣寒逆從以風為因以熱為證不能升出賴宣揚橫遍之令者相宜顧皮膚部署正木火升出授受之境耳故主皮膚中標見邪熱熱氣為因證而作風瘙身癢及伏匿身中而作三蟲與痔蝕𧈟痛者皆木不授火反乘脾土致外見唇口青色者亦相宜也然則青葙功力形氣咸調參合諸家附列形證自得之矣不曰皮膚間而曰皮膚中即此可見木火授受之地木生火象木相火行內經所謂神轉不回乃得其機言四時之序順行之道也如木不授火反乘脾土即所謂回則不轉乃失其機言四時之序逆行之次也而授受之機真莫之為而為莫之致而至瓜蒂本經下品氣味苦寒有毒主治主大水身面四肢浮腫下水殺蠱毒咳逆上氣及食諸果病在胸腹中皆吐下之核曰所在有之生嵩高平澤間即甜瓜之蒂也三月下種延蔓而生葉大數寸五六月開花黃色六七月瓜熟有圓有長有尖有扁大或徑尺小或一捻或有稜或無稜其色或青或緑或黃而斑或糝而斑或白路或黃路其瓤或白或紅其子或黃或赤或白或黑農書云瓜品甚多不可枚舉以狀得名者有龍肝虎掌兔頭貍首羊髓蜜筒之稱以色得名者有烏瓜白團黃㼐白㼐小青大斑之別然其味不出乎濃淡甘香而已廣志云惟以遼東燉煌廬江之瓜為勝然瓜州之大瓜揚州之御瓜西蜀之溫瓜永嘉之寒瓜未可以優劣論也甘肅甜瓜皮瓤皆甘甘勝糖蜜即瓜皮曝乾猶甘美可口浙中一種陰瓜種植陰處熟則色黃如金膚皮稍厚藏至來春食之如新此皆種藝之巧不必拘以土地也修事勿用白瓜蒂取青緑色瓜氣足時其蒂自落在蔓上者採得系屋東角有風處吹乾用參曰瓜象形象實在須蔓間也當曰蒂蒂瓜之綴蔓處也性偏延蔓末繁於本故少延輒腐爾雅云其紹瓞疏云繼本曰紹形小曰瓞故近本之瓜嘗小近末之瓜轉大也凡實之吮抽水液唯瓜稱最而吮抽之樞抵當唯蒂而已是以蒂具徹下炎上之用故蒂味苦而瓜本甘以見中樞之別於上下內外誠湧泄之宣劑通劑也故主大水在胸腹中外溢而為身面四肢浮腫或蠱毒或咳逆上氣或食諸果病在胸腹中者皆可湧而吐之泄而下之湧者近中以上泄者近中以下謂其從樞故湧泄咸宜經云酸苦湧泄為陰故其氣寒其味苦世知瓜蒂作吐劑不知瓜蒂作下劑以吐劑中有瓜蒂散下劑中方書少有用瓜蒂者遂致減卻泄下功力亦並將泄字訓作上泄之湧轉展傳訛而諸書引用泄字者亦無暇分別矣羊蹄本經下品單屬上焦亦是一法氣味苦寒無毒主治主禿瘡疥瘙除熱女子陰蝕核曰出陳留川澤所在亦有秋深始生凌冬不死春生苗高三四尺莖節紫赤葉長尺許狀如牛舌及萵苣葉而青碧入夏起臺花青白成穗結實有三稜夏至而枯根長近尺赤黃色似大黃及牛蒡胡蘿蔔輩參曰秋分始生夏至乃枯以降入為升出升出為降入者也具充金麗澤之用故名羊即以形似表功力也廣八卦云兊為羊為毀折為附決所謂商兌未寧介疾有喜者也味苦氣寒故主火熱刑金為疥瘙禿瘡女子陰蝕經云痛癢瘡瘍皆屬心火浸淫肺金形臟故爾藜蘆本經下品單屬上焦亦是一法氣味辛寒有毒主治主蠱毒咳逆泄利腸澼頭瘍疥瘙惡瘡殺諸蠱毒去死肌核曰出太山山谷高山者乃佳今陝西遼州均州解州亦有之四月生苗高五六寸莖似蔥白色青紫多毛外有黑皮裹莖宛似棕櫚故初生之葉亦若棕心經久漸放與鬱金秦艽蘘荷等葉相類也六七月開花肉紅色立冬便凋根似龍膽及馬腸根長四五寸一本二三十科若百餘科者水藜蘆也水藜蘆生近水溪澗石上莖葉都相同獨不為藥用修事去頭用糯米泔汁煮之從巳至未曬乾用黃連為之使反細辛芍藥人參沙參紫參苦參惡大黃先人云辛生在夏猶金生在巳也故入肺及大腸而治咳逆腸澼蓋腸澼雖屬下焦其因有幹上焦與肺受火鬱者用此辛散可使上焦開發宣五穀味則心肺之陽自舒腸澼之痰自愈矣參曰藜茨屬亦利器也蘆葦屬亦食器也然其形兩相似矣合入太陰肺陽明大腸以互相循屬盤絡而為雌雄腑臟者也故主肺為是動則病咳逆之臟氣與肺為所生則病頭瘍疥瘙惡瘡死肌之藏形若泄利腸澼蠱毒蟲毒此病大腸腑氣之與形也氣味辛寒施之風熱頗相宜耳手太陰肺臟之經脈下絡大腸上膈屬肺手陽明大腸腑之經脈絡肺下膈屬大腸彼此互相盤絡以為腑臟雌雄內外表里則手與手為腑臟之雌雄足與足為腑臟之雌雄非其腑臟雌雄則彼此不相盤絡人多習而不察竟不知手足腑臟雌雄之故射干本經下品氣味苦平無毒主治主咳逆上氣喉痹咽痛不得消息散結氣腹中邪逆食飲大熱核曰出南陽山谷及田野間今在處皆有園圃庭臺多種之冬至後宿根生芽至二三月始抽苗高二三尺近根之莖有節若竹離根三四寸橫鋪翠葉狹長疏整宛如翅羽故名烏羽辛又名鳳翼六七月葉中抽莖似萱而強硬出淡紅萼開紅赭花亦有蜜色者瓣有細文間黃紫黑斑點次蚤互相交紐如結結落作房中子黑褐另有一種名鳶尾者葉闊而短根密而稠花小者即蝴蝶草花大色紫者即紫羅蘭俱春末作花與射干迥別也修事以米泔水浸一宿取出再同䈽竹葉煮之從午至亥日乾用參曰冬至射干生為陽氣始生律名射出也藥對云立春射干木蘭先生為柴胡半夏使合入足少陰少陽樞機之氣分藥也故主咳逆上氣喉痹咽痛及不得消息此少陰不能轉闔與開也主結氣腹中邪逆及食飲大熱此少陽不能轉開與闔也但氣味苦平君相二火為化者莫不相宜以苦待化以平從樞故也立春射干先生為柴胡半夏使謂柴胡生當冬半半夏生當夏半咸從樞象以從其類但射干為始生之首易於興起而為介紹少陰樞化曰君火少陽樞化曰相火平固從樞苦則待化萹蓄本經下品氣味苦平無毒主治主浸淫疥瘙疽痔殺三蟲核曰出東萊山谷所在有之春仲蔓延布地好生道旁苗似瞿麥弱莖促節節紫赤似叉股葉細緑似堇竹節間出花甚細微青黃或淡紅色似蓼藍花狀遂結細實根似蒿爾雅所謂王芻也參曰景福殿賦云爰有禁扁徐云門戶封署也以所治形證詮名耳蓋八萬四千毛孔孔孔應開闔為門戶如浸淫疥瘙諸形證此毛孔唯封萹蓄引蔓促節節節開花若封而闢闢而封雖象形從治法亦象形對待法也火熱刑金成浸淫疥瘙者相宜若痘疹痤痱隱顯欲出者與毛孔閉實欲揚液為汗者亦宜但氣味苦平施之嚴寒為本氣者功力少遜若病反其本得標之陽或已成則為病熱表邪尚未入里仍欲從樞解散者為效頗速雷丸本經下品氣味苦寒有小毒主治主殺三蟲逐毒氣胃中熱利丈夫不利女子核曰出石城山谷及漢中建平宜都房州金州諸處生竹林土中乃竹之餘氣零落所成也無苗蔓不相連狀如粟又如豬苓而圓皮黑肉白甚堅實修事用甘草水浸一宿取出蒸之從巳至未日乾酒拌潤再蒸之日乾用荔實厚朴蒿根芫花為之使惡葛根參曰雷丸竹苓也具節候之靈氣零落復震故名雷丸蓋雷之發聲物無不同時而應故與三蟲毒氣嚮晦者反其味苦其氣寒對待胃熱為因諸熱若伏若匿者亦相宜矣利丈夫不利女子者震為雷長男也所謂方以類聚物以群分剛柔斷而吉凶生矣凡物有質成有氣結如茯苓之本乎松雷丸之因乎竹是也木之耐歲寒實而堅多節者唯松性善隱伏故遺苓名之草之能冬生虛而蒼粟色者唯竹象切震雷故轉丸名之其氣類所感一靜一動一秉大夫貞潔之操一展君子奮楊之力其功用各有致也郁李仁本經下品氣味酸平無毒主治主大腹水腫頭面四肢浮腫利小便水道核曰郁李即棠埭詩云唐埭嘗埭山海經作栯所在有之樹高六七尺花葉枝幹並似李惟子小若櫻桃味甘酸臭香而少澀一種赤郁李葉如刺榆其子正赤而小五月始熟關西天水隴西多有之汴洛一種枝莖作長條花極繁密而多葉亦謂之郁李不堪入藥也修事湯浸去皮尖用生蜜浸一宿取出陰乾研如膏用參曰郁李花極繁文之盛者似之其香頗濃故芬芳之氣通稱馥郁也凡木之花既開不闔此獨不然詩云唐埭之花偏其反而反而從闔也又嘗埭之花鄂不韡韡鄂萼不附也萼附相承最相親爾故又曰彼爾維何維嘗之花其義見矣詩疏云唐埭薁李也一名雀梅一名夫移又云車下李其葉或赤或白六月中熟大如李子花品序云雒陽人不甚惜謂之果子花大略俗情以少貴不足較也郁李味酸氣平其花反而後闔此闔用仍開呈開仍闔之象也當入厥陰肝蓋肝主疏泄前後陰如失疏泄則闔用之開機廢以致水腫大腹及面目四肢浮腫郁李功利水道小便使闔用呈開則疏泄仍如令矣楝實本經下品氣味苦寒有小毒主治主溫病傷寒大熱煩狂殺三蟲疥瘍利小便水道核曰出荊山山谷及蜀中所在有之蜀中者勝木高數丈向長甚速葉密如槐而長三四月開花紅紫色芬芳滿境實如金丸生青熟黃葉可浣衣蛟龍畏之獬豸食之修治熬干酒拌令透蒸之俟實皮軟去皮取肉凡使核不使肉使肉不使核如使核捶碎漿水煮一伏時曬乾用參曰楝可浣衣具清肅之金用氣寒味苦具澄湛之水體獬豸食之火獸也喜其潔蛟龍畏之木蟲也激其怒怒則飛雲弄雨以消溽暑此其功力如三蟲疝瘕從蟄伏中激之殺之反其性耳蜀椒本經下品氣味辛溫有毒主治主邪氣咳逆溫中逐骨節皮膚死肌寒熱痹痛下氣久服頭不白輕身增年核曰出武都山谷及巴郡近以全州西域者稱最江陽及晉康建平者次之木高五六尺似茱萸而小有針刺葉堅滑無花結實但生於枝葉間顆如小豆而圓實子光黑宛如人瞳謂之椒目八月採實肉肥皮皺氣味濃厚芳烈也修事去目及閉口者好酒拌潤蒸之從巳至午以盆覆蓋俟冷無氣乃可取出即入磁器中封固無傷風也杏仁為之使得鹽味佳畏款冬花防風附子雄黃可收水銀有中椒毒者涼水麻仁漿水解之參曰色香氣味精勝在膚獨無花而實所含蓄力幽且深矣故主溫中自下而上從內而外宣達橫遍者也對待寒中致令形氣受病也氣則咳逆上氣之因邪薄形則骨節肌膚之因痹閉久服形氣咸調故頭不白輕身增年耳皂莢本經下品氣味辛鹹溫有小毒主治主風痹死肌邪氣風頭淚出利九竅殺精物核曰出雍州山谷及魯鄒縣近以懷孟者為勝所在有之樹極高大葉似槐瘦長而尖枝間多刺夏作細花黃色結實有三種一種短小形似豬牙一種長大肥厚多脂而黏手一種細長瘦薄枯燥而不黏手入藥肥厚多脂者佳但樹多叢刺難於採取用竹篾箍樹本其莢過夜盡落亦一異也有不結實者將樹本鑿一大孔入生鐵三五斤遂用泥封孔口次年即結實且倍往昔有人以鐵砧捶皂莢砧即自損或以鐵碾之碾即成孔或以鐵鍋爨之鍋即暴片自落豈皂莢與鐵有感召之情耶修事取赤色脂厚不蛀者新汲水浸一宿銅刀刮去粗皮用乳酥反復炙透捶去子弦每莢一兩用酥五錢柏實為之使惡麥門冬畏空青人參苦參參曰皂水色鹹水味當為五木之水矣灌鐵木中皂莢始茂不為金所刑轉以鐵為生者即母令子實遞成生化木藉金為用也獨辛金味勝故主風痹死肌風頭淚出以辛瀉之瀉之者瀉外身之外風也亦以辛補之補之者補內身之風大也若竅閉即風大不及精物即外風太過咸可補之瀉之顧補瀉在病主之苦欲隨病主之苦欲因名藥物之補瀉耳夜明砂本經下品氣味鹹平無毒主治主目瞑癢痛明目夜視有精光久服令人喜樂媚好無憂核曰夜明砂伏翼糞也伏翼形似鼠灰黑色脅間肉翅連合四足及尾伏則倒懸食則蚊蚋多處深山崖穴中及僻暗處乃鼉蝨與鼠所化而復轉化魁蛤冬蟄夏出日伏夜翼避庚申日一種食鍾乳者壽千歲純白如雪首有冠大如鳩鵲此品所遺之糞功力殊勝修事先以大眼篩篩過數次次用水澄去沙土入苧布囊內溪水中提濯約減十之七易細苧囊再濯每鬥可兩許光芒煥耀質圓成粒者乃佳扁薄者蚊蚋膚也若得食鍾乳者亦如前法取光明如寶珠者最佳用緩火隔紙焙燥研極細入藥莧實雲實為之使參曰玄暉不夜因名夜明以蚊蚋為食蚊蚋伏翼夏出冬蟄順時序為浮沉夜翼晝伏互晝夜為吸呼伏則倒懸具陰陽顛倒之象耳食石鐘乳者朱冠雪體即肉芝類故功用與鍾乳六芝等芝以夏現乳以夏溢化相感性相近也唯能順時序為浮沉者乃得互呼吸之出入入出與會陰陽之陽陰陰陽方成顛倒倒顛豬懸蹄甲本經下品氣味鹹平無毒主治主五痔伏熱在腹中腸癰內蝕核曰前後四足各有懸蹄懸蹄之甲尖而小踐蹄之甲大而圓修事酒浸半日柳木火炙鬆脆用參曰觀豕蹄之黑白見豕性之躁甚黑固躁白尤躁之甚者則知豕力在蹄精專在甲矣懸蹄甲者豕蹄似鹿而爪四二踐地二上懸上懸之甲懸蹄甲也有以左蹄後蹄為懸蹄甲者謬矣蓋豕行不舉足而曳踵象水性之趨下為水畜也四足皆垂未見左後懸者玉藻云圈豚行不舉足齊如流端行頤溜如矢辨行剡剡起屨執圭玉舉前曳踵蹜蹜如也埤雅云畜養之間曰圈豕子曰豚端讀端辨之端辨讀辨冕之辨則行不舉足齊如流冕行之容也頤溜如矢端行之容也剡剡起屨辨行之容也禮之以物以服記其行容者互相挾也是故水畜性偏趨下對待伏熱之在腹中為腸癰為內蝕為五痔經云熱氣所聚則為癰膿必擇精專之所在乃得內外敵應爾豚卵本經中品氣味甘溫無毒主治主驚癇癲矣鬼疰蠱毒除寒熱賁豚五癃邪氣攣縮核曰豚卵牡豬之卵子也小豬多犗去卵故曰豚卵陰乾藏之勿令敗參曰豚豕子豕總名易系坎為豕性趨下故俯首喜卑穢天將雨則進涉水波為水畜也詩云有豕白蹄蒸涉波矣月離於畢俾滂沱矣爾雅翼云白蹢者豥豥豕之躁者豕進而涉水波白蹢尤其躁進者故先進焉然則純黑者豕之少馴者矣説文云十二子亥為豕故亥象豕形以一陰生於午至亥而六陰備謂其嫌於無陽也是以豥之在物以從豕在氣以從亥其應水也為能充其類焉牝曰豝曰彘詩云一發五豝牡曰豵曰豭詩云一發五豵禮云釁之以豭豚然則豚卵即豭豚卵囊之卵豭豚去卵斯外肉內好否則顛亂耽群一名豚顛者以此世棄勿用指豕子之豚兒膀胱之脬胞兩腎之腰子外腎之陰莖為豚卵者謬矣卵者陰器厥陰經脈之所聚抵小腹系舌本正腎水之宮位耳設腎躁則從流而上協厥陰厥逆而衝心病名曰賁豚賁豚者腎之積肝之逆也甚則重陰者癲番陰者癇陰陽厥者寒熱或腎不司陰竅肝不泄前陰者五癃或失主潤宗筋而攣失主利關機而縮咸屬腎肝先為是動而後所生猶未離其類者以輔之其唯豚卵乎茗神農食經氣味苦甘微寒無毒主治主悅志有力令人少睡止渴利小便去痰熱治瘻瘡苦茗華他食論苦茗久食益意思茶陸羽茶傳茶之為用味至寒為飲最宜精行儉德之人若熱渴凝悶腦痛目澀四肢煩百節不舒聊四五啜與醍醐甘露抗衡也核曰茗為世所稱尚頤雖未能知味然亦未能忘情每讀治茗諸書不啻數十種俱各載稿集卒難匯考不揣條録核左以備博採云神農氏前有食經遵之為首陸羽茶經例應為傳後代諸書遞相為疏為注矣傳本不妄去取余則採其雋永者人各為政不相沿襲彼創一義而此釋之甲送一難而乙駁之奇奇正正靡所不有政如春秋為經而案之左氏公谷為傳而斷之是非末則間有所評小子不敏奚敢多讓矣然書以筆札簡當為工詞華麗則為尚而器用之精良賞鑑之貴重我則未之或暇也蓋有含英吐花收奇覓祕者在編凡十有六而茶事盡矣一溯源茶者南方之嘉木其樹如瓜蘆葉如卮子花如白薔薇實如棕櫚蕊如丁香根如胡桃其名一曰茶二曰檟三曰蔎四曰茗五曰荈山南以陝州上襄州荊州次衡州下全州梁州又下淮南以光州上義陽郡舒州次壽州下蘄州黃州又下浙西以湖州上常州次宣州睦州歙州下潤州蘇州又下劍南以彭州上綿州蜀州邛州次雅州瀘州下眉州漢州又下浙東以越州上明州𭒀州次台州下黔中生恩州播州費州夷州江南生鄂州袁州吉州嶺南生建州福州韶州象州其恩播費夷鄂袁吉建福韶象十一州未詳往往得之其味極佳茶傳陸羽字鴻漸一名疾字季疵號桑苧翁著按唐時産茶地僅僅如季疵所稱而今之虎丘羅𡵚天池顧渚松蘿龍井雁宕武夷靈山大盤日鑄朱溪諸名茶無一與焉乃知靈草在在有之但培植不嘉或疏採製耳茶解羅廩字高君著吳楚山谷間氣清地靈草木穎挺多孕茶荈大率右於武夷者為白乳甲於吳興者為紫筍産禹穴者以天章顯茂錢唐者以徑山稀至於續盧之岩云衡之麓雅山著於無歙蒙頂傳於岷蜀角立差勝毛舉實繁煮茶泉品葉清臣著唐人首稱陽羡宋人最重建州於今貢茶兩地獨多陽羡僅有其名建州亦非上品唯武夷雨前最勝近日所尚者為長興之羅𡵚疑即古顧渚紫筍然𡵚有數處今唯洞山最重姚伯道云明月之峽厥有佳茗韻致清遠滋味甘香足稱仙品其在顧渚亦有佳者今但以水口茶名之全與𡵚別矣若歙之松蘿吳之虎丘杭之龍井並可與𡵚頡頏郭次甫極稱黃山黃山亦在歙去松蘿遠甚往時士人皆重天池然飲之略多令人脹滿浙之産曰雁宕大盤金華日鑄皆與武夷相伯仲錢唐諸山産茶甚多南山盡佳北山稍劣武夷之外有泉州之清源倘以好手製之亦是武夷亞匹惜多焦枯令人意盡楚之産曰寶慶滇之産曰五華皆表表有名在雁茶之上其他名山所産當不止此或余未知或名未著故不及論茶疏許次杼字然明著評曰昔人以陸羽飲茶比於後稷樹谷然哉及觀韓翃謝賜茶啓云吳主禮賢方聞置茗晉人愛客才有分茶則知開創之功雖不始於桑苧而製茶自出至季疵而始備矣嗣後名山之産靈草漸繁人工之巧佳茗日著皆以季疵為墨守即謂開山之祖可也其蔡君謨而下為傳燈之士又曰茶系生人後天隨身衣報蓋地靈鍾秀或古之所産今無取焉者謂冰土頻移山川性易靈從何來秀從何起生人依報寧復居恆人苦不思本耳以上溯其源也二得地上者生爛石中者生礫壤下者生黃土野者上園者次陰山坡谷者不堪採啜茶傳産茶處山之夕陽勝於朝陽廟後山西向故稱佳總不如洞山南向受陽氣特專稱仙品𡵚山茶記熊明道著茶地南向為佳向陰者遂劣故一山之中美惡相懸茶解茶産平地受土氣多故其質濁𡵚茶産於高山渾是風露清虛之氣故可尚𡵚山茶記茶固不宜雜以惡木唯桂梅辛夷玉蘭玫瑰蒼松翠竹與之間植足以蔽覆霜雪掩映秋陽其下可植芳蘭幽菊清芳之物最忌菜畦相逼不免滲漉滓厥清真茶解評曰疆理天下物其土宜廣谷大川異制人居其間異形瘠土民癯沃土民厚堅土民剛坉土民醜城市民囂而漓山鄉民朴而陋齒居晉而黃項處齊而癭皆象其氣悉效其形知其利害達其志欲定其山川分其圻界條其物産辨其貢賦斯為得地人猶如此奚惟茗乎三乘時採茶在二月三月四月之間茶之筍者生爛石沃土長四五寸若薇蕨始抽凌露採焉茶之芽者發於叢薄之上有三枝四枝五枝者選其中枝穎拔者採焉茶傳清明太早去夏太遲穀雨前後其時適中若再遲一二日待其氣力完足香烈猶倍易於收藏茶疏茶以初出雨前者佳唯羅𡵚立夏開園吳中所貴梗桷葉厚便有蕭箬之氣還是夏前六七日如雀舌者佳𡵚片亦好𡵚茶記𡵚非夏前不摘初試摘者謂之開園採自正夏謂之春茶其地稍寒故須得此又不當以太遲病之往時無秋日摘者近乃有之七八月重摘一番謂之早春其品甚佳不嫌少薄他山射利多摘梅茶梅茶苦澀且傷秋摘佳産戒之茶疏雙徑兩天目茶立夏後小滿前僅摘一次斷不復採唯餐雨露絶禁肥壤故收藏歲久色香味轉勝凌露無雲採候之上霽日融和採候之次積雨重陰不知其可茶説邢士襄字三若著評曰時不可違候不可失桑苧翁時中之聖者歟千載而下採製之期無能逾其時日羅高君少有更變者更體山川之寒暄察草木之含吐待時而興應時而起不妄作勞不傷物力四揆制其日有雨不採晴有云不採晴採之蒸之搗之拍之焙之穿之封之茶之干矣茶傳斷茶以甲不以指以甲則速斷不柔以指則多濕易損東坡試茶録宋子安著其茶初摘香氣未透必借火力以發其香然茶性不耐勞炒不宜久多取入鐺則手力不勻久於鐺中過熱而香散矣炒茶之鐺最嫌新鐵須預取一鐺毋得別作他用炒茶之薪僅可樹皮不用幹葉干則火力猛熾葉則易焰易滅鐺必磨洗瑩潔旋摘旋炒一鐺之內僅用四兩先用文火炒次加武火催之手加木指急急抄轉以半熟為度微俟香發是其候也茶疏茶初摘時須揀去枝梗老葉惟取嫩葉又須去尖與柄與筋恐其易焦此松蘿法也炒時須一人從旁扇之以祛熱氣否則黃色香味俱減余所親試扇者色翠不扇色黃炒起出鐺時置大磁盤中仍須急扇令熱氣消退以手重揉之再散入鐺文火炒乾入焙蓋揉則其津上浮點時香味易出田子萟以生曬不炒不揉者為佳偶試之但作熱湯並日腥草氣殊無佳韻也茶箋聞龍字隱鱗初字仲達著火烈香清鐺寒神倦火烈生焦柴疏失翠久延則過熟速起卻還生熟則犯黃生則著黑帶白點者無妨絶焦點者最勝茶録張源字伯淵著經云焙鑿池深二尺闊一尺五寸長一丈上作短牆高二尺泥之以木構於焙上編木兩層高一尺以焙茶茶之半乾升下棚全乾升上棚愚謂今人不必全用此法豫嘗構小焙室高不逾尋方不及丈縱廣正等四圍及頂綿紙密糊無小罅隙置三四火缸於中安新竹篩於缸內預先洗新麻布一片以親之散所炒茶於篩上闔戶而焙上向不可覆蓋蓋茶葉尚潤一覆則氣悶罨黃須焙二三時俟潤氣盡然覆以竹箕焙極干出缸待冷入器收藏後再焙亦用此法色香與味不致太減茶箋茶之妙在乎始造之精藏之得法點之得宜優劣定乎始鐺清濁系乎末火茶録諸名茶法多用炒唯羅𡵚專於蒸焙味真蘊藉世競珍之即顧渚陽羡密邇洞山不復仿此想此法偏宜於𡵚未可概施他茗而經已云蒸之焙之則所從來遠矣茶箋必得色全唯須用扇必全香味當時焙炒此製茶之準繩傳茶之衣鉢茗芨評曰溯源得地乘時盡物之性矣揆制失節仍同草芥能盡人之性則能盡物之性五藏茗育以木製之以竹編之以紙糊之中有楠上有覆下有床傍有門掩一扇一器貯煻煨火令熅熅然江南梅雨焚之以火茶傳藏茶宜箬葉而畏香茶喜溫燥而忌冷濕收藏時先用青箬以竹絲編之置罌四周焙茶俟冷貯器中以生炭火煅過烈日中曝之令滅亂插茶中封固罌口覆以新磚置高爽近人處黴天雨候切忌發覆取用須于晴明時取少許別貯小瓶空缺處即以箬填滿封置如故方為可久或夏至後一焙或秋分後一焙𡵚山茶記切勿臨風近火臨風易冷近火先黃茶録凡貯茶之器始終貯茶不得移為他用茶解吳人絶重𡵚茶往往雜以黃黑箬大是缺事余每藏茶必令樵青入山採竹箭箬拭淨烘乾護罌四周半用剪碎拌入茶中經年發覆青翠如新茶箋置頓之所須在時時坐臥之處逼近人氣則常溫不寒必在板房不宜土室板房熅燥上室易蒸又要透風勿置幽隱之處尤易蒸濕茶録羅生言茶酒二事至今日可稱精絶前無古人止可與深知者道耳夫茶酒超前代希有之精品羅生創前人未發之玄談吾尤詫夫卮談名酒者十九清談佳茗者十一茗芨評曰治茗如創業藏茗如守業創業易守業難守之難又不如用之者更難如保赤子幾微是防六品泉山水上江水中井水下山水擇乳泉石池漫流者上其瀑湧湍漱勿食久食令人有頸疾又多別流於山谷者澄浸不泄自火天至霜郊以前或潛龍蓄毒於其間飲者可決之以流其惡使新泉涓涓然酌之其江水取去人遠者茶傳山宣氣以養萬物氣宣則脈長故曰山水上泉不難於清而難於寒其瀨峻流駛而清岩奧積陰而寒者亦非佳品煮泉小品田崇衡字子萟著江公也衆水共入其中也水共則味雜故曰江水次之其水取去人遠者蓋去人遠則澄深而無蕩漾之漓耳小品余少得溫氏所著茶説嘗試其水泉之目有二十焉會西走巴峽經蝦蟆窟北憩蕪城汲蜀岡井東遊故都絶楊子江留丹陽酌觀音泉過無錫瑎惠山泉水粉槍末旗蘇蘭薪桂且鼎且缶以飲以啜莫不瀹氣滌慮蠲病析酲祛鄙吝之生心招神明而還觀信乎物類之得宜臭味之所感幽人之嘉尚前賢之精鑑不可及矣煮茶泉品山頂泉清而輕山下泉清而重石中泉清而甘砂中泉清而冽土中泉清而白流於黃石紫石為佳瀉出青石黑石無用流動愈於安靜負陰勝於向陽茶録山厚者泉厚山奇者泉奇山清者泉清山幽者泉幽皆佳品也不厚則薄不奇則蠢不清則濁不幽則喧必無用矣小品泉不甘則損茶味前代之論水品者以此茶譜蔡襄字君謨著吾鄉四陲皆山泉水在在有之然皆淡而不甘獨所謂它泉者其源出自四明潺湲洞歷大蘭小皎諸名岫迥溪百折幽澗千支沿洄漫衍不捨晝夜唐鄞令王公元偉築埭它山以分注江河自洞抵埭不下三數里水色蔚藍素砂白石粼粼見底清寒甘滑甲於郡中余愧不能為浮家泛宅送老於斯每一臨泛浹旬忘返攜茗就烹珍鮮特甚洵源泉之最勝甌犧之上味矣以僻在海陬圖經是漏故又新之記罔聞季疵之杓莫及遂不得與谷簾諸泉齒譬猶飛遁吉人滅影貞士直將逃名世外亦且永托知稀矣茶箋山泉稍遠接竹引之承之以奇石貯之以淨缸其聲琮琮可愛移水取石子雖養其味亦可澄水小品甘泉旋汲用之斯良丙舍在城夫豈易得故宜多汲貯以大甕但忌新器為其火氣未退易於敗水亦易生蟲久用則善最嫌他用水性忌木松杉為甚木桶貯水其害滋甚挈瓶為佳耳茶疏烹茶須甘泉次梅水梅雨如膏萬物賴以滋養其味獨甘梅後便不堪飲大甕滿貯投伏龍肝一塊即灶中心赤土也乘熱收之茶解烹茶水之功居六無泉則用天水秋雨為上梅雨次之秋雨冽而白梅雨醇而白雪水五穀之精也但色不能白養水須置石子於甕不唯益水而白石清泉會心亦不在遠壬寅臘八過南屏僧碧婆煮茶不拘老嫩皆可人口又不在茶具雖飯鑊中亦稱其旨時與之遊遂成茶癖每令長鬚遠汲虎跑泉葛仙翁井或索友人攜來惠山泉水以茶之妙在水發也每值梅雨托布承接或荷葉或磁盤或以錫作板溜積甕中試烹都有霧氣遠不及泉水之清且潔也一日偶取所蓄梅雨見孑孓烏蟲數十百跳躍碗內遂棄之擬傾未果月餘後好水吃盡奴子誤取前水就烹色味俱全氣香特盛乃知天水都好但未可就用須置器日久俟其色變蟲去色香味始妙不似山泉但可留數日久即味變也此後不煩遠役奴子亦不顓取梅雨唯待久雨時向急溜中大缸承貯月餘後另移甕內百日始佳半年更妙四時皆用此法春雨味更鮮厚雪色尤為潔白居滷斥之地闤闠之東日日天泉作供不但自受用亦不但供賓客並及其妻孥真無量快活也芷園日記天氣上為云地氣下為雨雨出天氣云出地氣色變蟲生正所以攘地濁以現天清也諸泉日久作變變則化化則去泥純水本色本味和盤托出毋自傾棄以失性真月樞筆記貯水甕須置陰庭覆以紗帛使承星露則英花不散靈氣常存假令壓以木石封以紙箬暴以日中則外耗其神內閉其氣水神敝矣茶解茶記言養水置石子於甕不惟益水而白石清泉會心不遠然石子須取深溪水中表裡瑩徹者佳要白如截肪赤如雞冠青如螺黛黃如蒸粟黑如重漆錦紋五彩輝映甕中徙倚其側應接不暇非但益水亦且娛神茗笈仁智者性山水樂深載瑎清泚以滌煩襟茗笈評曰得泉尋茗得茗尋泉如選儔覓偶事主相夫兩家仔細萬一失所此身已矣七候火其火用炭曾經燔炙為膩脂所及及膏木敗器不用古人識勞新之味信哉茶傳火必以堅木炭為上然本性未盡尚有餘煙煙氣入湯湯必無用故先燒令紅去其煙焰兼取性力猛識水乃易沸既紅之後方授水器乃急扇之愈速愈妙毋令手停停過之湯寧葉而再烹也茶疏爐火通紅茶銚始上扇起要輕疾待湯有聲稍稍疾重斯則文武火候也若過乎文則水性柔柔則水為茶降若過於武則水性烈烈則茶為水制皆不足於中和非茶家之要旨茶録蘇𠪙仙芽傳載湯十六云調茶在湯之淑慝而湯最忌煙燃柴一枝濃煙滿室安有湯耶又安有茶耶可謂確論田子萟以松實松枝為雅者乃一時興到之語不知大謬茶政茗笈評曰好茶好水固不容易火候一著更是煩難如媒妁一般謀合二姓濟則皆同其利敗則咸受其害李陵傳云媒蘖其短孟康曰媒酒酵也蘖酒麴也謂釀成其罪也師古曰齊人名曲餅亦曰媒妁君子司火有要有倫得心應手存乎其人八定湯其沸如魚目微有聲為一沸緣邊如湧泉連珠為二沸騰波鼓浪為三沸巳上水老不可食也凡酌置諸碗令沫餑沫餑湯之花也花之薄者為沫厚者為餑細輕者為華如棗花漂漂然於環池之上又如回潭曲渚青萍之始生又如晴天爽朗有浮雲鱗然其沫者若緑錢浮於渭水又臺菊英墮於尊俎之中餑者以滓煮之及沸則重華纍沫皓皓然若積雪耳茶傳水入銚便須急煮候有松聲即去蓋以消息其老嫩蟹眼之後水有微濤是為當時大濤鼎沸旋至無聲是為過時過時老湯決不堪用茶疏沸速則鮮嫩風逸沸遲即老熟昏鈍茶疏湯有三大辨一曰形辨二曰聲辨三曰捷辨形為內辨聲為外辨氣為捷辨如蝦眼蟹眼魚目連珠皆為萌湯直至湧沸如騰波鼓浪水氣全消方是純熟如初聲轉聲振聲駭聲皆為萌湯直至無聲方為純熟如氣浮一縷二縷三縷及縷亂不分氤氳亂繞皆為萌湯直至氣直衝貫方是純熟蔡君謨因古人制茶碾磨作餅則見沸而茶神便發此用嫩而不用老也今時製茶不暇羅碾仍俱全體湯須純熟元神始發也茶録余友李南金云茶經以魚目湧泉連珠為煮水之節然近世瀹茶鮮以鼎鍑用瓶煮水難以候視則當以聲辨一沸二沸三沸之節又陸氏之法以未就茶鍑故以第二沸為合量而下未若以令湯就茶甌瀹之則當用背二涉三之際為合量乃為聲辨之詩云砌蟲唧唧萬蟬催忽有千車捆載來聽得松風並澗水急呼縹色緑磁杯其論固已精矣然瀹茶之法湯欲嫩而不欲老蓋湯嫩則茶味甘老則過苦矣若聲如松風澗水而遽瀹之豈不過於老而苦哉惟移瓶去火少待其沸止而瀹之然後湯適中而茶味甘此南金之所以未講者也因補一詩云松風桂雨到來初急引銅瓶離竹爐待得聲聞俱寂後一瓶春雪勝醍醐寉林玉露羅碩字大經著李南金謂當用背二涉三之際為合量此真賞鑑家言而羅寉林懼湯老欲於松風澗水後移瓶去火少待沸止而瀹之此語亦未中窾殊不知湯既老矣去火何救哉茶解評曰茶經定湯三沸茶録酌沸三辨通人尚嫩伯淵貴老寉林別出手眼高君因以駁之各有同異各取當機三沸而往三辨隨之老去嫩來無有終時又評定湯談説似易措制便難急即鼎沸怠則瓦解須具燮陰陽調鼎鼐山心水味始得三至七教待湯建勳誰其秉衡跂石眠雲九點瀹未曾汲水先備茶具必潔必燥瀹時壺蓋必仰置磁盂勿覆案上漆氣食氣皆能敗茶茶疏茶注宜小不宜大小則香氣氤氳大則易於散漫若自斟酌愈小愈佳容水半升者量投茶五分其餘以是增減茶疏投茶有序無失其宜先茶後湯曰下投湯半下茶復以湯滿曰中投先湯後茶曰上投春秋中投夏上投冬下投茶録握茶手中俟湯入壺隨手投茶定其浮沉然後瀉以供客則乳嫩清滑馥郁鼻端病可令起疲可令爽茶疏釃不宜早飲不宜遲釃早則茶神未發飲遲則妙馥先消茶録一壺之茶只堪再巡初巡鮮美再巡甘醇三巡意欲盡矣余嘗與客戲論初巡為婷婷嫋嫋十三餘再巡為碧玉破瓜年三巡以來緑葉成陰矣所以茶注宜小小則再巡已終寧使余芬剩馥尚留葉中猶堪飯後供啜嗽之用茶疏終南僧亮公從天池來餉余佳茗授余烹點法甚細余嘗受法於陽羡士人大率先火候次湯候所謂蟹眼魚目參沸沫浮沉法皆同而僧所烹點絶味清乳是具入清淨味中三昧者要之此一味非眠雲跂石人未易領略余方避俗雅意棲禪安知不因是悟入趙州耶茶寮記陸樹聲字與吉著凡事俱可委人第責成效而已惟瀹茗須躬自執勞瀹茗而不躬執欲湯之良無有是處茗笈評曰法四氣三投度衆寡器宇此點瀹之嘗則因人以節緩急隨時而制適宜此又點瀹之變通還得具有獨聞之聰獨見之斷乃可以盡人之性盡茗之性盡水火之性正不在守已陳之迹而膠不變之柱十辨器鍑以生鐵為之洪州以磁萊州以石瓷與石皆雅器也性非堅實難可持久用銀為之至潔但涉於侈麗雅則雅矣潔亦潔矣若用之恆而卒歸於銀也茶傳山林逸士水銚用銀尚不易得何況鍑乎若用之恆而卒歸於鐵也茶箋貴則金銀賤惡銅鐵則磁瓶有足取焉幽人逸士品色尤宜然慎勿與誇珍炫豪者道仙牙傳蘇𠪙金乃水母錫備剛柔味不咸澀作銚最良制必穿心令火易透茶録茶壺往時尚龔春近日時大彬所制大為時人所重蓋是粗砂正取砂無土氣耳茶疏茶注茶銚茶甌最宜蕩滌燥潔修事甫畢餘瀝殘葉必盡去之如或少存奪香敗味每日晨興必以沸湯滌過用極熱麻布向內拭乾以竹編架覆而庋之燥處烹時取用茶疏茶具滌畢覆於竹架俟其自干為佳其拭巾只宜拭外切忌拭內蓋布帨雖潔一經人手極易作氣縱器不幹亦無大害茶録茶甌以白磁為上藍者次之茶録人各手執一甌毋勞傳送再巡之後清水滌之茶疏茶盒以貯茶用錫為之從大壇中分出若用盡時再取茶録茶爐或瓦或竹大小與湯銚稱茶解鍑宜鐵爐宜銅瓦竹易壞湯銚宜錫與砂甌則但取圓潔白磁而已然宜小必用柴汝宣成貧士何所取辦哉茶笈評曰付授當器區別得宜各稱其用各適其性而已亦不必強以務飾亦不必矯以異俗十一申忌採茶製茶最忌手汙膻氣口臭涕唾及婦女月信癡蠢酒徒蓋酒與茶性不相入故製茶時少有沾染便無用矣茶解茶之性淫易於染著無論腥穢及有氣息之物不宜近即名花異香亦不宜近茶性畏紙紙於水中成受水氣多紙裹一夕隨紙作氣盡矣雖再焙之少頃即潤雁宕諸山首坐此病紙帖貽遠安得復佳茶疏吳興姚叔度言茶葉多焙一次則香味隨減一次余驗之良然但於始焙極燥多用炭箬如法封固即梅雨連旬燥固自若唯開壇頻取所以生潤不得不再焙耳自四五月至八月極宜致謹九月以後天氣漸肅便可解嚴矣雖然能不弛懈尤妙尤妙茶箋不宜用惡木敝器銅匙銅銚木桶柴薪麩炭粗童惡婢不潔巾帨及各色果實香藥茶録不宜近陰室廚房市喧小子啼野性人童奴相哄酷熱齋頭茶疏評曰茗猶人也超然物外者不為習所染否則習於善則善習於惡則惡矣聖人致嚴於習染者有以也墨子悲絲在所染之十二防濫茶性儉不宜廣則其味黯淡且如一滿碗啜半而味寡況其廣乎夫珍鮮馥烈者其碗數三次之者碗數五若坐客數至五行三碗至七行五碗若六人以下不約碗數但闕一人而已其雋永補所闕人茶傳按經云第二沸留熱以貯之以備育華救沸之用者名曰雋永五人則行三碗七人則行五碗若遇六人但闕其一正得五人即行三碗以雋永補所闕人故不必別約碗數也茶箋飲茶以客少為貴客衆則喧喧則雅趣乏矣獨啜曰幽二客曰勝三四曰趣五六曰泛七八曰施茶録煎茶燒香總是清事不妨躬自執勞對客談諧豈能親蒞宜兩童司之器必晨滌手令時盥爪須淨剔火宜嘗宿茶疏三人以上止爇一爐如五六人便當兩鼎爐用一童湯方調適若令兼作恐有參差茶疏煮茶而飲非其人猶汲乳泉以灌蒿蕕飲者一吸而盡不暇辨味俗莫甚焉小品若巨器屢巡滿中瀉飲待停少溫或求濃苦何異農匠作勞但資口腹何論品賞何知風味乎茶疏評曰客有霞氣人如玉姿不泛不施我輩是宜其或客乍傾蓋朋偶消煩賓待解酲則玄賞之外別有攸施此皆排當於閫政請勿辨髦乎茶榜十三戒淆茶有九難一曰造二曰別三曰器四曰火五曰水六曰炙七曰末八曰煮九曰飲陰採夜焙非造也嚼味嗅香非別也膻鼎腥甌非器也膏薪庖炭非火也飛湍壅潦非水也外熟內生非炙也碧粉漂塵非末也操艱擾遽非煮也夏興冬廢非飲也茶傳茶用蔥薑棗橘皮茱萸薄荷等煮之百沸或揚令滑或煮去沫斯溝瀆間棄水耳茶傳茶有真香而入貢者微以龍腦和膏欲助其香建安民間試茶皆不入香恐奪其真若烹點之際又雜珍果香草其奪益甚正當不用更雜蔗霜椒桂牟麳酥酪真不啻一鼓而牛飲矣茶譜茶中著料碗中著果譬如玉貌加脂蛾眉著黛翻纍本色茶説花之拌茶也果之投茗也為纍已久唯其相沿似須斟酌有難概施矣今署約曰不解點茶之儔而缺花果之供者厥咎慳久參玄賞之科而瞶老嫩之沸者厥咎怠慳與怠於汝乎有譴茗笈評曰茗猶目也一些子塵砂著不得即掌中珍果眼底名花終非族伴亟宜屏置敢告司存十四相宜煎茶非漫浪要須人品與茶相得故其法往往傳於高流隱逸有煙霞泉石磊塊胸次者煎茶七類陸樹聲著茶候涼臺淨室曲幾名窗僧寮道院松風竹月晏坐行吟清談把卷七類山堂夜坐汲泉煮茗至水火相戰如聽松濤傾瀉入杯云光灩瀲此時幽趣故難與俗人言矣茶解凡士人登臨山水必命壺觴若茗碗薰爐置而不問是徒豪舉耳余特置遊裝精茗名香同行異室茶罌銚鉒甌洗盆巾附以香奩小爐香囊匙箸茶疏茶熟香清有客到門可喜鳥啼花落無人亦自悠然可想其致茗笈宜寒宜暑既遊既處伴我獨醒為君數舉茗笈評曰人繇意合物以類從同異之門絶偏倚之形化矣大凡攻守依乎區域向背視其盛衰若無畛可分誰附堅瑕之敵無膻可逐誰開去就之場任曲直於飄瓦虛舟藩籬何妨孔道等愛憎於浮煙飛沫渣滓不礙太虛轉從前執滯之樞於人何所不容留尺寸安間之地於力何所不有吾寧降心以循物物或適理以從類矣十五衡鑑茶有千萬狀如胡人靴者蹙縮然幫牛臆者兼襜然浮雲出山者輪菌然輕飈出水者涵淡然有如陶家之子羅膏土以水澄泚之又如新治地者遇暴雨流潦之所經此皆茶之精腴有如竹籜者枝幹堅實艱於蒸搗故其形籭篩然有如霜荷者莖葉凋阻易其狀貌故厥狀萎萃然此皆茶之瘠老者也陽崖陰林紫者上緑者次筍者上芽者次葉卷者上葉舒者次茶傳茶通仙靈然有妙理茶解其旨歸於色香味其道歸於精燥潔茶録茶之色重香重味重者俱非上品松蘿香重六安味苦而香與松蘿同天池亦有草萊氣龍井如之至雲霧則色重而味濃矣嘗啜虎丘茶色白而香似嬰兒肉真精絶𡵚茶記茶色白味甘鮮香氣撲鼻乃為精品茶之精者淡亦白濃亦白久貯亦白味甘色白其香自溢三者得則俱得矣近來好事者或慮其色重一注之水投茶數片味固不足香亦窅然終不免水厄之誚雖然尤貴擇水香似蘭花上蠶豆花次茶解茶色貴白然白亦不難泉清瓶潔葉少水洗旋烹旋啜其色自白然真味抑鬱徒為目食耳若取青緑則天池松蘿及𡵚之最下者雖冬月色亦如苔衣何足為妙莫若余所收洞山茶自穀雨後五日者以湯薄浣貯壺良久其色如玉至冬則嫩緑味甘色淡韻清氣醇亦作嬰兒肉香而芝芬浮蕩則虎丘所無也𡵚山記熊君品茶旨在言外如釋氏所謂水中鹽味非無非有非深於茶者不能道當今非但能言人不可得正索解人亦不可得茗笈肉食者鄙藿食者躁色味香品衡鑑三妙評曰蹙縮者靴牛臆者幫昔之精腴今之瘠老矣寧復能禮明月當空睹芝芬浮蕩者哉十六玄賞其色緗也其馨欽也其味甘檟也啜苦咽甘茶也茶傳試茶歌云木蘭墜露香微似瑤草臨波色不如又云欲知花乳清冷味須是眠雲跂石人謝禹錫飲茶覺爽啜茗忘喧謂非膏梁紈褲可語爰著煮泉小品與枕石漱流者商焉小品茶似翰卿墨客緇衣羽士逸老散人或軒冕中超軼世味者七類茶如佳人此論甚妙但恐不宜山林間耳蘇子瞻詩云從來佳茗是佳人是也若欲稱之山林當如毛女麻姑自然仙豐道骨不浼煙霞若夫桃臉柳腰亟宜屏諸銷金帳中毋令汙我泉石小品竟陵大師積公嗜茶非羽供事不鄉口羽出遊江湖四五載師絶於茶味代宗聞之召入內供奉命宮人善茶者烹以餉師師一啜而罷帝疑其詐私訪羽召入翼日賜師齋密令羽供茶師捧甌喜動顏色且賞且啜曰此茶有若漸兒所為者帝由是嘆師知茶出羽相見薰辵鹵跋陸羽點茶圖建安能仁院有茶生石縫間僧採造得八餅號石岩白以四餅遺蔡君謨以四餅遣人走京師遺王禹玉歲余蔡被召還闕訪禹玉禹玉命子弟於茶笥中選精品餉蔡蔡持杯未嘗輒曰此絶似能仁石岩白公何以得之禹玉未信索貼驗之始服類林東坡云蔡君謨嗜茶老病不能飲日烹而玩之可發來者之一笑也孰知千載之下有同病焉余嘗有詩云年老耽彌甚脾寒量不勝去烹而玩之幾希矣因憶老友周文甫自少至老茗碗薰爐無時暫廢飲茶日有定期旦明晏食禺中餔時下春黃昏凡六舉而客至烹點不與焉壽八十五無疾而卒非宿植清福者烏能畢世安享視好而不能飲者所得不既多乎嘗畜一龔春壺摩挲寶愛不啻掌珠用之既久外類紫玉內如碧雲真奇物也茶箋人知茶葉之香未識茶花之香余往歲過友大雷山中正值花開童子摘以為供幽香馥郁絶自可人惜非瓶中物耳乃余著瓶史月表插茗花為齋頭清供而高廉瓶史亦載茗花足以助吾玄賞茗笈茗花點茶絶有風致人未之試耳茗笈評曰人莫不飲食鮮能知味矣詩云人生幾見月當頭不在愁中即病中明月非無佳茗時有但少間情領此真味公案云吃茶去唯味道者乃能味茗參曰茗諧名名自命也從夕從口夕者冥也冥行無見從口自名失自明矣茗晰而癯與熱腦肥膻反故嘗食令人瘦去人脂倍人力悅人志益人意思開人聾瞽暢人四肢舒人百節消人煩悶使人能誦無忘不寐而惺寂也聊四五啜真堪與醍醐抗衡矣神農氏主瘻瘡瘻瘡本在臟末在頸腋間膏粱味肥膻變也亟返其本逐其末滌其肥膻消其疣贅顧諟其名義克明其茗德明行有見從口自名皆自明也茗譜題辭僕少而習茗亦止謂滌煩止渴醒睡明目非此君不能策勳耳至天台所記乃云服之可生羽翰則又未敢輕信也今讀子繇核參評語而以六義之比體求之則臺記所云與陶弘景輕身換骨之説大相符合蓋人方在大夢中令旁一人沃以佳茗果能清其神魂否故知子繇之意正欲先使人滌淨煩惱蠲除心渴掃卻黑暗遠離顛倒然後如法點瀹領略甌犧兩腋生風豈非羽翰實以形骸中既空一切原是輕身換骨之人茗碗策勳理實可信讀子繇茶譜者當作如是觀丁亥夏五李玄暉漫筆第八帙黃精別録上品黃精一名戊己芝當與黃芝交相匹配充九土之精以御八風之侮氣味甘平無毒主治主補中益氣除風濕安五臟久服輕身延年不飢核曰隋羊公云黃精芝草之精也五符經云黃精獲天地之純精故一名戊己芝南北皆有以嵩山茅山者佳三月生苗高一二尺一根只一莖莖梗柔脆本黃末赤葉如竹不尖而短或兩葉三葉四五六葉俱兩兩相對若偏生不對者偏精也四月開花青白狀如小豆花結子白色如黍粒即名垂珠言象形也根如嫩薑而色黃亦如鬼臼黃連輩一年一節節大不平大者如拳小者如拇指一種莖葉根形俱相似但莖不紫赤葉尖有毛鉤二枚者鉤吻也誤服殺人博物志云黃帝問於天老曰天地所生有食之令人不死者乎對曰太陽之草名黃精食之可以長生太陰之之精名鉤吻不可食令人立死今人但信鉤吻殺人不信黃精益壽不亦惑乎修治以溪水洗淨蒸之從巳至子薄切曝乾可入藥用服食宜生初時只可食一寸半多則刺人咽喉漸漸增之十日不食服止三尺五寸三百日後盡見鬼神久則輕身飛行矣忌梅實參曰無緣自生獨得土大之體用故名黃精一名戊己芝也土位乎中故補中而益中氣為風所侵而土體失濡濕泥濘而土用廢者黃精補土之體充土之用即居中府藏亦藉以咸安矣形骸軀殼悉土所攝輕身延年不飢總屬土事耳升麻別録上品上行即將來之生之升真氣即成功之藏之入氣味苦平微寒無毒主治主解百毒殺百精老物殃鬼闢瘟疫瘴氣邪氣蠱毒入口皆吐出中惡腹痛時氣毒癘頭痛寒熱風腫諸毒喉痛口痛久服不夭輕身長年核曰出蜀漢陝西淮南州郡蜀川者佳春生苗高三尺葉似麻並青色四月著花似粟穗白色六月結實黑色根如蒿多須紫黑色細小極堅削去皮青緑色者謂之雞骨升麻功力殊勝也虛大黃白色者不堪用一種外黑裡白質雖緊實謂之鬼臉升麻嵩高一種純青色質亦堅功力俱不如蜀川青緑色者為重也一種落新婦根形似色非今人呼為小升麻亦能解毒取其葉挼作小兒浴湯主驚忤其他用力則殊大小亦別不可不辨也修事刮去粗皮黃精自然汁浸一宿曝乾銼蒸再曝用先人云人身氣機升出降入謂之一周能升則氣機無不周矣又云生陽之氣發揚邪僻之陰自死入口皆吐出此其外徵又云長升即是長生下者舉之此為要藥從混濁散漫之中拔其精微之妙的是樞機之劑但上行須有真氣在否則是煮沒米粥矣又云雷公炮製用黃精自然汁浸一宿即煉已築基大裨體用上行者有根可據矣參曰升即四氣之先機時令之首兆也經云春三月此謂發陳者是矣設無成功之藏之入亦無將來之生之升矣所謂柔以時升積小以高大實非決驟之比故十籥曰升登合之量也大鼗曰麻群陰之長也是以允升天地俱生萬物以榮生勿殺豫勿奪賞勿罰此春氣之應養生之道也主治百疾以及變遷皆嚮晦入宴息而冥升功能用晦而明仍利於不息之貞世以頓為升此以升為漸頓漸殊途各宜體認升麻稟天地清陽之氣以生故能升陽氣於至陰之下顯明滅暗致新推陳升麻兩得之矣豆蔻別録上品氣味辛溫澀無毒主治主溫中心腹痛嘔吐去口臭氣核曰豆蔻生南海及交址今嶺南八閩亦有生成已詳參內南人採花作果尤貴嫩者並穗入鹽淹治疊疊作朵不散更以木槿花合浸之欲其色紅耳廣中人入梅鹽汁浸令紅曝乾薦酒名紅鹽草果初結小者名鸚哥舌元朝飲膳皆以草果為上供南人用火楊梅偽充豆蔻形圓而粗氣辛而猛山薑也入藥不可不辨修事須去蒂取向裡子及皮用茱萸同於𨫼上緩炒待茱萸色微黃黑即去茱萸取豆蔻皮及子用之參曰草實之中名豆蔻者凡三形色功能各有同異入足太陰陽明腑臟手少陽三焦則一也形似芭蕉葉似杜若高八九尺冬夏不凋開花淺黃色綴實作朵似葡萄初生微青熟則轉白孚圓似白牽牛仁粒似縮砂蔤氣味辛大溫充腎間生陽鼓肺氣呼吸宣五穀味主納主出者白豆蔻也初春抽苗入夏作莖開花結實似豆蔻實圓微長表有皺紋里肉斑纈似檳榔無仁有肉氣味辛溫秉剛燖之用溫中化食宣五穀五畜味為養為充者肉豆蔻也苗似荻蘆葉似杜若根似高良薑二月開花作穗房綴莖下嫩葉卷之初出似芙蓉微紅色穗頭色深其葉漸開花漸出色漸淡矣亦有黃白二色者實似龍眼而鋭皮色黃白表無鱗甲殼薄有稜峭仁粒似縮砂蔤而稍壯氣味辛澀溫宣攝中氣溫中益上焦受納水穀治心腹痛嘔吐去臭氣宣五穀五果五菜味為養為助為益者豆蔻也開寶名草豆蔻草物志名漏蔻金光明經名蘇乞迷羅細鄭樵通志名草果雖非果類用充茶食故有草果之稱豆蔻輔中益上以宣為體以攝為用綴實在莖下亦具有密義雖與縮砂蔤同歸於退藏至體用則迥別矣縮砂粒以攝為體以宣為用順時序之升沉故用舍自繇豆蔻效降肅之聚斂終屬勉強設久服盡劑恐反亟奪其生陽有餘於用不足於體故爾唯白豆蔻三緣合和體用平均堪為匹配但縮砂粒專司於下遍及上中白豆蔻專司於中遍及上下用之者果能各加料簡不唯四種功力判然即五穀糱及飴曲楂蘹之屬亦可比量條分不致溷亂妄投矣忍冬別録上品氣味甘溫無毒主治主寒熱身腫久服輕身長年益壽核曰在處有之藤蔓左纏繞覆草木上或籬落間莖色微紫對節生葉葉似薜荔而青有澀毛三四月開花長寸許垂須倍之一蒂二花兩瓣大小不齊若半朵狀初開蕊瓣俱白經三日漸變金黃新舊交參黃白掩映幽香襲人燥濕不變花名金銀花金叉股老翁須藤名鴛鴦鷺鷥左纏蜜桶統名忍冬通靈草功相併形相肖色相同也夏採花秋採葉冬採藤參曰藤蔓左旋兩花一蒂兩瓣一花效一陽始於二陰下震象也唯能忍冬乃得震虩故主飛尸遁尸風尸沉尸尸疰壞我形臟者振肅而啓若寒熱身腫以及風濕痹氣鬼擊癰瘍失承左道者使之仍須乎天施所謂神轉不回回則不轉乃得其機此蓋益其壽命而強者也芥別録上品芥莖葉氣味辛溫無毒主治主歸鼻除腎經邪氣利九竅明耳目安中久食溫中芥子氣味辛溫無毒主治主歸鼻去一切邪惡疰氣喉痹白芥子氣味辛溫無毒主治主發汗胸膈痰冷上氣面目黃赤醋研敷射工毒核曰南地多芥相傳嶺南無蕪菁土人移種種之盡變為芥地土使然耳今北地亦多芥南地亦有蕪菁矣八月布種冬茂者曰冬芥春茂者曰春芥夏尤可食者曰夏芥春末抽苔謂之芥藍瀹食脆美頃則作花正黃四出莢長一二寸子粒如蘇子色紫褐味極辛研調作漿以侑蔬品香辣爽人白芥子稍肥大色黃白入藥充啖臭味轉勝也種類亦多有青芥似菘而毛色青緑一名刺芥味極辛有大芥葉大而皺色深緑味更辣俱為藥用有馬芥葉如青芥而無毛有花芥葉多缺刻而如菘有紫芥莖葉俱紫而如蘇有石芥莖繁細碎而低小有旋芥葉紋旋繞如大芥有南芥高五六尺子大如雞卵劉恂異物志云出嶺南多此芥此又芥之持異者白芥一名胡芥原從大原河東來今近道亦有但種蒔者少六八月布種冬月可食春末起苔高三四尺葉花有叉如花芥色青白莖中虛質極脆疾風大雪須謹獲之否則易於損折三月黃花香郁可愛角子亦如芥但少肥壯色黃白耳又有一種莖大而中實子粒更大雖屬芥類形色迥別入藥則勝於諸芥也孫思邈曰同兔食發惡疾同鯽魚食發水腫大葉者良細葉有毛者食之有損無益耳參曰農書云氣味辛烈菜中之介然者食之令人剛介故字從介説文云芥者界也發汗散氣畍我者也左傳曰介人之寵楚辭云悲江介之遺風蓋人身一皮二膚三肌四脅五胸六腹七胃各有定界邪氣入經漫然難以分裂者芥義可以界矣顧食芥墮淚望梅生津此五液之自外至也愧而汗發慕而涎垂此五液之自內至也是以芥氣歸鼻涕淚交注經言清陽走上竅濁陰歸下竅芥則兩得之矣主治證形正諸陽之不走上竅致濁陰之不歸下竅耳所謂陽無界然我不立而畛畦失矣激朗清厲隨光之介也牢刺拂戾諸賁之氣也為此春酒以介眉壽神之聽之介爾景福軸轤千里名卒億計運茲威以赫怒清海隅之蒂芥飴糖別録上品氣味甘大溫無毒主治主補虛乏止渴去血核曰飴軟糖也稻粳秫粟蜀秫大麻子枳椇子黃精白朮並堪熬造惟以稻作者入藥秫粟者次之余供食物耳稻即糯粳即粳秫即粟之糯而黃者近世用麥糵穀芽及諸米煎熬而成醫方亦有采用者先人云糵米造飴宛似水穀入胃醞釀作汁出入未定之時也可以澄飲可以成血然甘能緩中投之不當反致濡滯參曰稻粳粟麥秫皆可萌糵造飴釋名云糖之濡弱者飴其形怡怡然餌之怡怡和悅也蓋物之成終而成始者艮帝之所出物即乘氣以出者震繇微而著鮮潔均齊者巽嚮明而治形色並昭者離受前此之火生後此之金致役者坤理氣充足歡然交適者兌也然則稻粳粟麥秫之為艮其始乎震及悅乎兌而怡怡然不唯具土之體復具土之用矣誠土爰稼穡藉離麗之火而稼穡甘成坤之至兌之悅矣緣土以能生為用稼穡即所生之形物耳是以谷入於胃賴土用以宣五行五氣之與味乃得奉火歸赤獨行經隧溉灌形臟以成化育若物戰乎乾慰勞乎坎為形氣寧定歸宿之所也復若至此自有而無從前生意此成其終亦自無而有嗣後生意此成其始此則帝氣之成言乎艮者自震而遞相化育者也設土大頑頽則體用廢致物不能乘帝氣以出而遞相化育者不致役乎坤故爾別録主補虛乏即補土大體用之虛乏也致失於溉灌而消渴失行經隧而血溢谷府上竅不納而咽痛下竅不決而腸鳴與遊溢轉輸無以上注於肺而為嗽為涸者飴糖輔土之體宣土之用且也自震而兌穀味因之以化育何患其不戰乎乾勞乎坎成言乎艮其所以致役者坤亦即土體之與用歟麥糵功力不能成始者始而終之飴糖功力不能成終者終而始之始終終始大須體認沉香別録上品氣味辛微溫無毒主治主風水毒腫去惡氣核曰出天竺及海南諸國今嶺南州郡悉有傍海處尤多奇干連枝岡嶺相接材理虛柔凌冬不凋皮膜作紙沾水易爛小者拱抱大者數圍體如白楊葉如橘柚花如蕤穗實如小檳未經斧斤者雖百歲之本亦不孕香若半老之木其斜枝曲干斫鑿成坎雨露浸漬斯膏脈凝聚漸積成香凡三等其一即斫鑿之坎氣聚色變木端棕透切而取之入水輕浮者為黃熟其二津沫營注木理堅實剝而取之入水或浮或半浮者為棧香棧香速香也其三脂液所鍾醞結成魄或自脫或解取入水沉底者為沉香品亦凡四曰熟結曰生結曰脫落曰蟲漏蟲漏者因蠹隙而結也脫落者因水朽而結也生結者因斫鑿而結也熟結者因自腐而結也故熟結一名死結死結則全體膏脈凝聚成香此等之至上品之至貴者也顧四結總屬一木奇狀甚多凡四十有二如角沉革沉黃沉烏沉水碗承露青桂黃蠟繭栗菌芝金絡葉子麻葉竹脫機梭附子馬蹄牛頭燕口蝟刺龍鱗烏刺虎脛雞骨蓬萊虎班弄水鷓鴣斑仙人杖及為杵為臼為肘為拳為山石為槎枿為鳳雀龜蛇雲氣人物種種肖象既所稟不侔亦復優劣有異各俟其形全氣足而後採取功力始備今嶺南人不耐其成每多趨利伐賊之害唯璚管黎人非時不妄剪鑿故屢獲異香雖纖薄如紙入水亦沉萬安黎母山東洞者更冠絶天下一片嘗值萬錢以東洞日鍾朝陽之氣其香更幽醞於他産耳若舶上來者臭多腥烈尾煙必焦交址海北者更甚故南人不甚重之此皆沉香等品奇狀也而奇南一香原屬同類因樹分牝牡則陰陽形質臭味情性各各差別其成沉之本為牝為陰故味苦厚性通利臭含藏燃之臭轉勝陰體而陽用藏精而起亟也成南之本為牡為陽故味辛辣臭顯發性禁止系之閉二便陽體而陰用衛外而為固也至若等分黃棧品成四結狀肖四十有二則一矣第牝多牡少獨奇南世稱至貴即黃棧二等亦得因之以淪高下沉本黃熟固坎端棕透淺而材白臭亦易散奇本黃熟不唯棕透而黃質邃理猶如熟色遠勝生香𬋖炙經旬尚襲襲難過也棧即奇南液重者曰金絲其熟結生結蟲漏脫落四品雖統稱奇南結而四品之中又各分別油結糖結蜜結緑結金絲結為熟為生為漏為落井然成秩耳大都沉香所重在質故通體作香入水便沉奇南雖結同四品不唯味極辛辣著舌便木顧四結之中每必抱木曰油曰糖曰蜜曰緑曰金絲色相生成亦迥別也凡使沉香須要不枯如觜角硬重沉沒水下者為上用紙裹懷中候暖乳研易於成粉參曰沉質香臭也蓋土爰稼穡稼穡作甘黍甘而香故香從甘黍宜入脾脾味甘脾臭香脾谷黍故也設土失黃中體通理用者咸可奪之誠脾土之陽分藥方劑之對待法也上列證名不待詮釋當判然矣主清入喉益人心即子令母實若上實下虛下寒上熱又當顧名思義如骨節不任便淋腸閉亦屬具體亡用第加一轉語耳其奇南一品本草失載後人僅施房術及佩圍系握之供取其氣臭尚爾希奇用其形味想更特異沉以力行行止為用奇以力行止行為體體中設用用中具體牝牡陰陽互呈先後可默會矣雞舌香別録上品氣味辛溫無毒主治主風水毒腫霍亂心痛去惡熱丁香宋開寶氣味辛溫無毒主治主溫脾胃止霍亂擁脹風毒諸腫齒疳𧈟能發諸香核曰出東海及崑崙國交廣南番亦有其樹並高丈餘凌冬不凋似栗似桂葉似櫟花似梅實似山茱萸者雞舌也一名母丁其實出枝實蓋如丁長三四分者丁香也一名子丁並紫色既實稱母子當遵別録開寶為正安可妄別雌雄不知另有雄樹開花不實花釀成粉香馥之臭經久不散出崑崙交愛以南修事唯母丁力大入藥最勝用子丁須去實蓋乳子否則發人癰背忌火畏鬱金先人云雞舌雖象形然舌乃心苗內藏丁火暗相合也又云辛溫即心火氣味主臭亦心所攝持香即脾之臭也有火土相襲之機丁干就戊之道參曰雞羽禽徵之音丙干也丁位丙次舌者心苗心亦火臟也故丁香曰丁雞舌曰母蓋丙為辛之剛丁為壬之柔是知丙合辛而水潤下丁合壬而木曲直也設木忘水源者應病風水毒腫為悖逆陰陽而霍亂作自反而縮而心卒痛皆惡熱所釀非朝夕之故繇之不早辨也要知辛當歸丙壬當歸丁丙丁植而火炎上火炎上而稼穡甘陰凝至而至堅冰者泮然釋矣開寶主溫脾胃正所謂虛則補其母而土體充宣五穀味而土用足也熏陸香別録上品氣味苦辛微溫無毒主治主風水毒腫去惡氣伏尸癮疹癢毒乳香同功核曰熏陸香西出天竺南出波斯等國生沙磧中樹類古松葉類棠梨盛夏脂溢皮表並皮鱗甲剝之為熏陸溢脂之處垂滴乳頭為乳香斫鑿其樹脂流成塊為揀香用瓶接貯為瓶香淋瀝根底雜砂石為乳塌色黑為黑塌水浸色敗氣變為水濕塌斫削雜屑為雜末播揚成塵為纏末熏陸一種近不易得得原採垂滴乳頭圓明潤澤者為貴故內典謂之天澤香言其溫潤麗澤也天竺國者色黃白波斯國者色紫赤日久者溢脂重疊纍纍然不成乳頭者即揀香也修事置繒囊內挂窗隙良久取研則不黏易碾或同酒研如泥水飛曬乾或糯米數粒或燈心草數莖或人指爪甲二三片並研之亦易細參曰火煙上出日熏四時日月經行之地曰陸合生成功用命名熏陸顧盛夏脂溢皮表效機衡之夏日在膚泛泛乎若萬物之有餘所愛在外也故主逆機衡之自下而上從內而外致交通不表惡氣不發風雨不節菀稿不榮者仍使與萬物順浮沉於生長之門功用頗捷龍腦香別録上品氣味苦微寒無毒主治主婦人産難研末少許新汲水服立下核曰龍腦香取俗稱冰片梅花腦出婆律抹羅短叱諸國南海深山窮谷亦有之樹名波律又名固不婆律高七八丈大六七圍如積年杉木狀但旁挺徑枝葉正圓面青背白作花結實外皮甲錯仁粒如縮砂蔤者其木肥肥者生脂為婆律膏斷其樹脂流根下截其上脂溢木端其枝幹未經損動則有否則氣泄無之矣無花實者其木瘦瘦者生香為龍腦香多歷年歲者風清月朗或噴香若霏雪繽紛木上先其時布帛樹底驚之令墮形如蜂蝶此屬無上乘頃則仍吸香入木理不易得也斷其樹濕時無香干之循理而析狀類雲母瑩若冰霜或解木作板香溢縫間劈而取之大者成片如花瓣小者成粒為米腦為速腦為瑞腦為金腳腦為蒼龍腦因其形色以名總不及成片者氣全力備也濕者為腦油清者為腦漿南唐保大中貢龍腦漿貯之縑囊懸琉璃瓶內少頃滴瀝成水香氣馥烈大有益也近時多用火煏成片更以樟腦升打亂之不可不辨收貯燒杉木炭合養之或糯米炭相思子並貯之則不耗修事入舊瓷鉢輕展徐研務令塵細展急則捶鉢生熱便隨香竄耗欲藉透肌走竅用平底小鐺以青布剪如底式一面噴潤淨水拈貼鐺底置龍腦於布上覆以碗碗沿外余布數分水攪麥面固濟碗布周沿毋使氣泄隔鐺底寸許燃燒文火候麥面色熟略覺焦黃即便住火候冷開視火法合宜龍腦盡升碗上輕盈潔白香馥百倍於昔先人云宋史熙寧九年英州雷震一山梓木盡枯中皆化為龍腦樹王震絶尚有遺馨參曰時乘御天曰龍首出庶物曰腦故資胚胎之首出迅速立下唐本諸家陳列證形亦屬失於飛潛惕躍之宜安望黃中通理應地無疆者哉多服立殂者盈不可久也知進而不知退知存而不知亡知得而不知喪矣枇杷葉別録上品氣味甘苦平無毒主治主卒啘不止下氣煮汁服核曰襄漢吳蜀閩浙江右南北皆産木高丈許四時不凋肥枝長葉陰密青整葉底白毛如茸盛冬作花白色仲夏綴實如彈楊萬里詩云大葉聳長耳一枝堪滿盤荔枝分與核金橘卻無酸頗盡其狀修治每葉濕時重一兩者堪用粗布拭去白毛務令極淨否則射人肺令人咳以甘草湯洗一遍用綿再拭俟干每一兩用酥二錢半塗上炙過用治胃以薑汁塗炙治肺以蜜水塗炙亦良先人云枇杷核下地即生亦易長近十年開花結果性喜高疏最便山土秋英冬花春實夏熟核多於肉葉盛於枝花繁成蓓一叢約三五十枚春半刪除十之七則果大肉肥否則無肉且小矣青時有毛而酸發白轉黃甘滑可口望夏布葉末倍於本雖並列園林同登樽薦而生榮成美迥異時芳處天地閉藏獨露英花值萬物蕃茂陰森肥遁世知葉充藥物未知核仁兩瓣即將成兩葉木之胞閬也然核與葉較尤多醞畜枝莖皮肉各有所施統體專精他果所不及也參曰收麥之器曰枇杷倉廩之官曰胃府象其能入能出也麥冬茂夏實枇杷亦冬花夏果與璣衡冬入夏出反謂其能闔能闢也故入胃府主卒啘嘔噦不止兼走肺療咳唾氣窒者此即啘嘔噦濁之飲從肺脈上至於肺則肺嗔肺脹上下合邪相擊成咳而為唾為窒矣固受盛屬胃其腐化敷布必藉肺氣之吸呼互為關鍵終始故也力主腳氣即飲濁下流瘡瘍即飲濁外溢種種因證咸從胃生至若肅肺金滋腎水益脾土清心鎮肝此即轉出為入解暑暍消熱煩止消渴除溫闢疫此即轉入為出總不出者使之出不入者使之入不開闔者使之開闔形氣咸調之良品也經云陰之五宮生在五味陰之五宮傷在五味然則枇杷不獨入胃與肺併入心肝脾腎五腑矣以胃為五臟六腑經氣之始復為五臟六腑經氣之終故爾琥珀別録上品氣味甘平無毒主治主安五臟定魂魄殺精魅邪鬼消瘀血通五淋核曰出永昌舶上西戎高麗倭國者良即松樹榮盛時流脂入土千歲後淪結所成也一種象物珀內有物形一種血珀殷紅如血色一種赤松脂形如琥珀濁大而脆文理皆橫一種水珀淺黃色多皺文一種石珀深黃色重如砂石一種花珀文如馬尾松而黃白相間者次之別有一種蜜蠟珀臭之作蜜蠟香色黃白即蜂蜜所化一種楓脂珀燒之不作松脂臭即楓脂所化也入藥唯松脂血珀最良修治用水調側柏子末安瓷鍋中置琥珀於內煮之從巳至申當有異光研粉篩用參曰虎魄入土化石松脂入土化珀同成堅固因名琥珀況膏釋脂凝則松脂原具堅固相矣入土淪結自然瑩光特異雖與松脂偕安五臟不若琥珀之能奠安神室也魂遊於天對待治之魄降於地想更親切故定魂魄之功昭著特甚瘀血五淋腐穢所成松脂琥珀精英所聚殺精魅邪鬼者以異光璧照則鬼魅遁形如神明在躬死陰自當潛消默化矣猛虎非壽獸其魄入土化石者嗔業所致也松木耐歲寒其脂入土化珀者淨業所成也真珠別録上品氣味甘溫無毒主治主鎮心安魂魄去膚翳障膜塗面令人潤澤好顏色塗手足去皮膚逆臚綿裹塞耳主聾核曰禹貢淮夷蠙珠後世乃出南北海川蜀西路女瓜河北溏濼江南湖泖間亦時有之嶺表録異云廣州邊海中有洲島島上有大池池水淡潔謂之珠池每歲刺史親監珠戶入池採老蚌剝珠以充貢廣州志云合浦縣海中有梅青嬰三池蜒人每以長繩繫腰攜籃入水拾珠母納其中即振繩令舟人急起之設有線血浮水上其人即葬魚腹矣熊太古冀越集云余嘗見蜒人入海取得珠子樹數擔狀如柳枝蚌生於樹樹生於石鑿石得樹以求蚌甚可異也李珣云南海之珠多産石決明女瓜者則蚌蛤耳録異云北海之蚌種類小別其中一種似江珧者腹亦有珠咸不及海南者奇幻且多也宗奭云河北溏濼中珠圍及寸色微紅其珠母亦與廣州者不相類但清流水處者色光白止濁水處者色黑暗南珠色紅西洋珠色白北海珠色微青各隨方色也格古論云南番珠色白圓耀者為上廣以西者次之北海珠色微青者為上粉白油黃者下矣西番馬價珠為上色青如翠老色夾石粉青油煙者下矣南越志云珠品之上者有九以五分至寸八分者為大品有光彩一邊似度金者名璫珠次則走珠滑珠琭珠肖象珠子母珠浮屠珠北帝子珠等品也埤雅云鱉孚乳以夏蚌孚乳以秋聞雷聲則廣秋其孕珠若懷妊然故謂之珠胎與月盈虧淮南子所謂日至而麋角解月死而螺蚌膲蚌一名蜃墨子云周之靈圭出於上石楚之明月生於蚌蜃由是觀之士之賢不肖豈有種哉蓋物有非其類而化者若牡蠣蚌蛤無陰陽牝牡須雀鴿以化故蚌之久者能生珠焉一於陰也易曰離為蚌為螺蓋螺之形鋭蚌之形剡且皆外剛內柔而性又善麗故也荀子云鳥無胃肺蛤蜃無臟蛭以空中而生蠶以無胃而育陸佃云龍珠在頷蛇珠在口魚珠在眼鮫珠在皮鱉珠在足蚌珠在腹抱朴子云真珠徑寸以上服之令人長生以酪漿漬之皆化如永以浮石蜂巢蛇黃等物合之可引長三四尺為丸以啖之雷斆云凡用以新採未經鑽綴者絹囊盛之置牡蠣四兩於平底鐺中將物四向支穩然後著珠於上乃下地榆五花皮五方草各四兩籠住用漿水不住火煮三日夜取出甘草湯淘淨石桕中搗細重篩復研二萬下時珍云一法用人乳浸三日煮過如上搗研又法貯之繒袋入豆腐腹裡煮一炷香云不傷珠忌用曾作首飾及見尸氣者參曰真者仙化通乎天珠者木一在中胞胎之象指生成功行為名耳故中秋月滿海蚌食其光而孕珠蓋月各有望唯中秋主維四氣之樞鍵處三秋之正中交兩弦之噓口𡭴烹金水之華藏時也食其光而柔麗乎中者此以坎填離神丹金液耳是故神室根身因形而易點餌塗塞咸歸化成所謂神用無方不與覺時同也酥別録上品氣味甘微寒無毒主治主補五臟利大小腸治口瘡核曰酥出外國虜名馬思哥者是也隨地亦可為其法用牛乳生汁一斗入砂鍋內煎五七沸濾去滓傾磁盆內次早汁面有凝衣遂撇取之熬去水氣酥成矣宜臘月造他時者色味易變有用馬羊乳造者功用有別不可不辨也先人云乳分五味從乳生酪從酪生酥鑽搖取者曰生酥經火取者曰熟酥酥中之精曰醍醐乳一斤可得酥一兩酥十斤可得醍醐一兩得醍醐則酪不可食得酥則酪不可食謂精粹已出余皆渣魄耳參曰牛土畜也土緩而和故易坤為牛牛胃也地雖凍能胃而生也詩云爾牛來斯其耳濕濕濕濕言潤澤也蓋牛之為物病則耳燥安則溫潤而澤故古之視牛者以耳乳者胃府之別汁水食之精粹乳而酪酪而酥酥又乳酪之純粹精也故可待腑臟之決而躁形氣之瘁而臞經云腑臟形氣皆稟氣於胃胃者腑臟形氣之本也若客熱咳逆以及諸疾咸從燥生其耳濕濕力能溫潤而澤也坤陰物也牛故蹄拆病陰則陽勝故牛病則立足太陰病有強立一條宜為對證順其性耳牛陰物也故起先後足臥先前足又不獨治強立並可治四肢拘攣膝痛不可屈伸矣顧草本之荄尚假牛膝為名功力較之牛酥若合符節比量推度則得之矣牛嘗臥牛病則立馬嘗立馬病則臥是以牛走喜風順馬走喜風逆則凡形骸氣血經脈支絡逆流而上與不得順流而下者當百倍其力莎草別録中品螻蟈俗名地狗即以狗薑呼之部署形層宮城位次靡不周到諸陽之氣起於胸中𨴗闔則遏逆而不舒氣味甘微寒無毒主治主胸中熱充皮毛久服令人益氣長鬚眉核曰別録莎草不別根苗後世僅用其根名香附子並不知莎草名矣生田野下濕地所在都有唯隴西涪都兩浙最饒苗似草蘭而柔又似細萱而徑葉心有脊似劍又似菖蒲吉祥草輩光澤亦同嫩緑蕭疏小別異耳五六月中抽一莖三稜中空莖端復出數葉開青色花成穗似黍中有細子似葶藶車前子狀根多白鬚須下另結子一二枚轉相延生外裹細黑茸毛大者似羊棗兩頭尖耐水旱雖分劈亦不知死先人云多屬螻蟈化生土人每從沙地荒圃或麥門冬地上鋤得香附半存螻蟈形者兩足為根頭作苗葉身成香附子緣緣而生延蔓可厭土人患之其地即改種絡麻麻盛不得雨露方才悶絶呼為狗薑或麥冬餘氣幻結所成或螻蟈嗜啖麥冬化生所致故香附子氣臭頗似麥冬其非麥冬地者則不可知然的是螻蟈化生為始楞嚴經云化以離應即此類也修事陰乾石臼搗之忌鐵器先人云胸為肺金之部分氣為肺金之所司皮毛為肺金之所主香附子功能解表利水所以泄金之郁經云金鬱則泄之解表利小水也參曰莎品凡三臺薠薃也爾雅載薃埤雅載臺子虛賦載薠爾雅翼載臺薃而兼言薠本草混臺薠薃為一物繇辨之當早辨也薠即青薠一名大莎説文以為青薠似薃但大小有異生江湖為雁所食臺即夫須一名莎草子虛賦所為辥漢書音義所謂藾可以為衣疏而無溫編之若甲狀毿毿而垂使雨順流而下匹夫所須也薃即鎬侯一名侯莎爾雅翼所謂莎廣成頌所謂緑莎顏師古所謂青莎晏元獻公有庭莎記言此草耐水旱樂延蔓雖技心隕葉亦弗之絶莖葉都似三稜圖經所謂水香稜又名水莎水巴戟廣雅所謂地毛記事珠所謂抱靈居士此皆指薃苗莖葉為名也根若附子相附連續周匝有毛大者如羊棗乃子也另有細根如白髮根上結子二三枚或有或無有則轉相延蔓者為牝別録所謂香附子圖經所謂草附子又名莎結續草根金光明經所謂日萃哆唐本所謂雀頭香魏文帝於吳求雀頭香即薃根香附子也用合衆香能發衆香臭是以性專捭闔開發上焦宣五穀味熏膚充身澤毛若霧露之溉中焦亦得藉之以宣化下焦亦得藉之以宣瀆又不獨僅宣五穀味並宣諸藥味而為諸藥之先聘通使如上焦𨴗闔則諸陽之氣逆於胸中致胸中熱嘗日憂愁不樂心忪少氣者捭闔從開既順乃宣矣則胸熱自除憂愁自釋心忪自平少氣自益充皮毛長鬚眉誠若霧若露灌溉之休徵也若食飲積痞滿堅或霍亂嘔逆或月事不以時下者此正中焦失於宣化若膀胱氣妨或崩漏帶下或下血尿血者此正下焦失於宣瀆若肌肉消削或疹癮瘙癢或皮聚毛折者此正上焦失於宣發不熏膚不充身不澤毛不若霧露之溉耳觀天寶方煮汁熏浴令汗出五七度除癮疹止瘙癢則知若霧露熏充灌溉之為用矣頻湖云得鹽入血得青鹽入腎得酒行經絡得苦酒消積聚得薑化痰飲得參術益氣得歸苄補營得木香疏滯得檀香醒脾得沉香升降諸氣得芎術總解六郁得茯苓交心腎得茴香補骨脂引氣歸元得厚朴半夏決癰消脹得蔥蘇發越六淫得稜莪釋磨瘕癖得艾調暖子宮及作種種藥石之聘使捭闔揣摩之為用大矣香薷別録中品玄府毛孔幽門濁道也泣則勢亂難支弛則斫廢無度陰者藏精而起亟陽者衛外而為固陽在外陰之使也陰在內陽之守也肺朝百脈為百脈之使肺者朝使之官治節出焉氣味辛微溫無毒主治主霍亂腹痛吐下散水腫核曰生山野間荊湖南北二川皆有中州人作圃種之呼為香菜用充蔬品四月生苗葉似茵陳穗似荊芥花似水蘇氣味則迥別也一種葉大莖方似牡荊葉而尖小一種葉最細僅高數寸葉似落帚芬芳轉勝乃石香薷也九月開花著穗時採之彌佳去根取莖葉曝乾修事各隨方制勿令犯火服至十兩一生不得食白仙桃矣參曰香臭也薷柔也亦工於區別解釋也以言其臭香其質柔其功力工於區別解釋也世固熟知其功力工於治暑第未暇詰其能治之因所治之證謹守水中頓冷飲法亦未暇詰其飲法之宜忌失卻香薷幾多功績矣蓋暑氣流行曰暑淫肺金受邪曰金鬱暑淫則勝己所勝之金金鬱則必待己所生之水為母復所不勝之暑暑自降心而退舍焉然則香薷功力既屬解釋肺金之助品宜乎全具區別水大之體用者也是故別水之體區水之用其功獨著經云飲入於胃遊溢精氣上輸於肺通調水道下輸膀胱顧精氣之不遊不溢水道之不通不調亦令金受其鬱則鬱金之因不獨暑氣而已香薷功力亦不獨僅逆暑氣而已即遊溢精氣通調水道亦即所以穌金之郁設舍遊溢其精氣上輸於肺亦無繇通調其水道下輸於膀胱香薷功力又屬精氣之助品矣經云金鬱則泄之疏云解表利小水也顧玄府閉則表氣拒幽門闔則膀胱癃亦令金受其鬱即開提玄府啓闢幽門亦即所以穌金之郁設舍開提其玄府亦無繇啓闢其幽門香薷功力又屬玄府之助品矣經云藏真高於肺以行營衛陰陽也顧營泣脈中衛弛脈外陽失衛固陰亡起亟亦令金受其鬱即整營於脈中肅衛於脈外固陽之守起陰之使亦即所以穌金之郁設舍高源之藏真營衛陰陽亦無繇將行其形臟香薷功力又屬藏真之助品矣至於肺主氣氣壅亦令金鬱肺竅鼻鼻窒亦令金鬱肺為開開折亦令金鬱肺司聲聲嘶聲喑亦令金鬱肺通朝使朝使廢亦令金鬱肺行呼吸呼吸賁呼吸弛亦令金鬱肺華皮毛毛落皮聚亦令金鬱乃若悲傷肺憂愁亦傷肺魄失奠安亦傷肺形寒飲冷亦傷肺治節不出亦傷肺與逆秋氣則太陰不收肺氣焦滿均名之曰金鬱以及種種鬱金之因變生種種金鬱之證咸可穌之穌之即所以泄之經言金鬱則泄之泄之之義又不獨疏言解表利小水而已矣別録主治霍亂霍亂者陰陽舛錯固屬藏真失於將行第水穀不泌亦失於區別率爾吐下寧非土鬱乎土鬱則奪之香薷功力又工於奪土之郁矣即治五水暴聚成腫固屬精氣失於遊溢轉輸第水以潤為體溉為用聚則具體無用寧非水鬱乎水鬱則折之香薷功力原工於折水之郁今更昭然顯著矣諦觀致病霍亂五水之因又寧獨暑氣為本本風亦可本寒亦可本濕亦可本虛亦可本實亦可本營衛不調亦可本飲食失節亦可香薷功力不獨僅逆暑氣亦昭然顯著矣簡易方主四時傷寒不正之氣斯足徵矣即局方香薷飲陳列因證治暑月臥濕當風生冷不禁以致真邪相干遂成吐逆或發熱頭痛體痛或心腹痛或轉筋乾嘔或四肢逆冷煩悶欲死者佐以扁豆厚朴銼末作散以酒以水煮之成飲更足徵矣設僅逆暑氣大明亦胡以主療嘔逆冷氣而反從治其本寒與標陰之因證者乎瀕湖有云夏月之用香薷猶若冬月之用麻黃又足徵矣肘後方治舌上出血如鑽孔聖惠方治鼻中衄血不止外臺祕要方治吐血如湧泉永類鈐方治小兒發遲發即血之餘也誦此四方則知藏真高於肺以行營衛陰陽之機彀矣局方煎之以酒以水水中頓冷飲胡洽居土水熬作圓深師方取汁煉膏簡易方搗篩成末酒調熱服取汗此各因其勢而利導之又寧獨水中頓冷飲反佐以取之之一法乎更觀古人稱香薷曰膳膏則得之矣賾偶有所得不避譏嫌推廣如此或藉此尋求五郁之因證比量藥石之功力不致為耳食所束縛則草木疾疚之幸大矣蘖米別録中品帝出乎震莫看呆了萬物各承帝氣以生之為震則無物不豫無時不然此自強不息之機焉能作如是觀轉觀萬物之生曰帝出乎震亦何等活潑舉一該五攝五歸一六根互用敵應不窮穬麥蘖氣味鹹溫無毒主消食和中粟蘖氣味苦溫無毒主寒中下氣除熱核曰諸蘖米各以其谷日用水潤候其芽生曝乾去須取其中米研面用參曰稻黍稷麥菽曰五穀皆可區萌達蘖也蘖者生不以時人力可為耳此從艮而震自癸而甲繇終而始矣經云五穀為養各有專司當別五穀蘖合五藏神物各從其類也別録只列穬麥蘖旁收粟蘖時珍續補稻蘖失採黍蘖稷蘖菽蘖粟即黍類爾雅翼云古不以粟為谷之名但米之有孚殼者皆稱粟今人以谷之最細而圓者為粟孔子曰粟之為言續也為陸種之首此指細圓者之為粟矣既以粟為蘖不若黍為蘖黍承帝氣南火之正令專司心臟故也近世僅用穬麥蘖並黍稷稻菽四蘖而棄置之更稱穬麥蘖曰麥芽穬麥蘖名號世亦不復見聞矣麥者東南木藏之谷也接絶續乏之曰麥雖承帝氣出而達蘖為五行五氣之先蓋即所以成其始亦即所以成其終第各有專司不無各有專向之為性矣然谷府之受盛五穀本具木火土金水之五行升出中降入之五氣乃能敷布化育宣五穀味開發上焦與上焦開發宣五穀味事同而理則異矣然則木水金水當建土為本土者行之長也升出降入當標中為樞中者氣之機也其所以為本為樞主宰陽出陰入者吾身中黃之生氣也與天樞八方之帝氣揆度萬物之出為震入為艮同一機衡耳諸家易釋僅解萬物之生曰帝出乎震未解帝出乎震萬物承帝氣以生之為震也東垣脾胃論僅解胃具木火金水之四行升出降入之四氣未解四行之以土為本四氣之以中為樞及所以為本為樞主宰陽出陰入者即吾身中黃之生氣也是以中黃之生氣出則穀味宣宜則開發上焦熏膚充身澤毛若霧露之溉矣中黃之生氣入則穀味成成則淫氣於五臟而五臟安散精於五形而五形駐斯腑精神明留於四臟氣歸權衡權衡以平氣口成寸矣蓋中黃生氣固為五行五氣之主亦須行氣均平始得承生氣之出以出生氣之入以入互為關鍵爾設行氣有少廢生氣亦即為之少息是必察何行何氣之缺陷而以專司之谷蘖養之充之即以成其所自始亦即以成其所自終也如麥實有孚甲肝之谷也黍莠善舒散心之谷也稷為五穀長脾之谷也稻粒如秋霜肺之谷也菽實孚甲堅腎之谷也故五穀為五臟養五蘖為形氣充充之養之所以承吾身中黃之生氣以出以入效天樞八方之帝氣揆度萬物之出為震入為艮耳至於主療疾疚此其末務詳主治形證則得之矣更能推廣五穀五蘖之功力為用真無盡藏矣設少陽不生肝氣內變者生之逆之則傷肝夏為寒變者順之生之順之宜麥蘖也太陽不長心氣內洞者長之逆之則傷心秋為痎瘧者順之長之順之宜黍蘖也至陰不平張精乃絶者續之逆之則傷脾四維相代者順之續之順之宜稷蘖也太陰不收肺氣焦滿者收之逆之則傷肺冬為飧泄者順之收之順之宜稻蘖也少陰不藏腎氣獨沉者藏之逆之則傷腎春為痿厥者順之藏之順之宜菽蘖也然則五穀功力豈獨快脾健胃消食化積而已別録以粟蘖主寒中寒中即內洞此得五行之火五氣之出之機矣粟即黍類南方火臟之谷故也時珍以稻蘖主下氣氣下即容平此得五行之金五氣之降之機矣稻者西方金臟之谷故也別録以穬麥蘖主和中和中即發陳此得五行之木五氣之升之機矣麥者東方木臟之谷故也蘖菽稷二蘖理可類推若五穀蘖舍充養吾身中黃之生氣亦不能具五行具五氣安望其為本為樞為本之長為樞之機者乎大豆豉別録中品氣味苦寒無毒主治主寒熱傷寒頭痛瘴氣惡毒煩躁滿悶虛勞喘吸兩腳疼冷殺六畜胎子諸毒核曰諸大豆皆可造豉以黑大豆者入藥有咸豉淡豉兩種入藥只宜淡豉其法六月內用黑大豆二三斗水淘淨浸一宿瀝乾蒸熟取出攤席上俟微溫即以蒿覆之每三日一看候黃衣上遍即取曝乾篩簸極淨再以水拌乾溼得所以汁出指間為準即置甕中築極實干桑葉覆蓋厚三寸許泥封甕口勿令泄氣曬七日取出曝一時又以水拌入甕凡七次取出蒸過攤去火氣甕收之封築日久則豉成矣先人云菽者水藏之主谷也用蒸罯黴曬之法使之變水作火故可從治溫暑萬端原從寒本作始者莫不精良參曰腎谷曰菽菽者衆豆之總名色黑者曰大豆稟潤下水大之專精為腎水藏之主谷也嵇康養生論云豆令人重説者以為啖豆三年則身重而行止難故五穀形大而質重者唯豆郁之成豉曰淡豉配鹽者曰鹽豉豉者幽豉幽謂造之幽暗也鹽豉食品淡豉藥物也其質輕揚而臭香美其味濃厚而性爽朗此以潤下沉重之水體轉作炎上輕揚之火用復為腎火藏之主谷也故秉火味之苦水氣之寒從治冬氣傷寒之寒氣轉以火味之苦佐治傷寒標陽之陽化者也以冬氣通於腎腎主冬三月此謂閉藏設冬氣化薄或寒威凜冽以致中傷天氣者如寒本專令則火滅標陽熾盛則水消故必從之以水佐之以火火炎水下本寒自卻標陽自息矣始於氣傷化者藉氣勝之藥物從標以逆本揚心液而為汗後為氣傷形者仗味勝之主谷從本以佐標揚穀精而為汗所謂汗生於穀穀生於精精勝則邪卻矣蓋藏真通於腎腎藏精血之氣也豉者腎之谷大豆郁之以成豉故從佐兩腎水火以堅形乃得驅冬氣之寒風從外而內者還復自內而外若寒本專令與氣傷氣化或標陽熾盛雖氣傷形層而已成痞滿燥實堅者皆當遜而謝之否則轉致陷入變生不測矣讀仲景先生梔子豉湯則知雖涉形層之胸而未成陷入之實其證曰虛煩心中懊憹反復顛倒不得眠身熱不去者主之則得之矣顧俾重從輕重為輕根故也用藥施治全藉使佐之指揮乃可下之上上之下內之外外之內陰之陽陽之陰附諸方之為義亦得之矣天氣為本陰陽為標因標始識本因本始病標也本與標合則互有勝負故有從本而得者有從標而得者有從標本而得者有病反其本得標之病治反其本得標之方者唯太陽少陰從本從標少陽太陰從本陽明厥陰不從標本從乎中治中者標之下中之見也在三陽宜從標而忌本在三陰忌本亦忌標標本之旨難言矣龍眼別録中品氣味甘平無毒主治主五臟邪氣安志厭食除蠱毒去三蟲久服強魂聰明輕身不老通神明核曰龍眼別名益志又名龍目比目驪珠燕卵鮫淚蜜脾川彈子亞荔枝荔枝奴俗名圓眼皆形相似也生海南山谷今閩廣蜀道出荔枝處皆有性畏寒故與荔枝並生暖地蜀都賦云旁挺龍目側生荔枝蘇頌云荔枝才過龍眼即熟木高一二丈似荔枝而枝葉微小凌冬不凋春末夏初開花細白似林檎七月果熟果極繁每枝三四十顆作穗類葡萄殼色青黃文成鱗甲形如彈丸核若木梡子而不堅肉白有漿味甘如蜜白露採摘曬焙令乾黃土拌挹鮮黃可觀也參曰鱗蟲木屬為龍肝木根竅為眼久服強魂魂者肝臟之神識也魂強肝木之體具體具肝木之用行用行升出中降入之五氣行各有次而五志安五邪治三蟲去蠱毒除身輕根淨皆得所欲心藏神脾藏意與志志為脾土之專藏矣四氣調神春三月以使志生夏三月無怒其志秋三月無外其志冬三月使志若伏若匿若有私意若已有得則臟各有志神亦不專心所藏矣柿別録中品氣味甘澀寒無毒主治主安五臟通耳鼻氣治腸胃不足解酒毒壓胃間𭵴止口乾乾者尤良蒂主噦逆久咳核曰南北皆有樹極高大亦有小株者接則易茂本生者果稀味澀唯堪造漆葉圓光澤花小黃白五月綴實八月果熟生時青緑熟則丹紅種類亦多唯紅柿所在皆有黃柿出汴雒朱柿出華山珍椑柿色青可生啖著蓋柿蒂下別有一重如覆瓶之蓋更有鹿心牛奶雞卵猴棗蒸餅鏡面丁香福孫多寶團花及白柿烏柿琭柿莊柿碧柿火柿水柿之別其蒂有方有元有薄有厚有覆有仰其核有正有側有圓有偏有長有短有軟有堅有本尖有末鋭有有稜有無稜有有核有無核核少者佳無核者食之至美而益人者也初採頗澀或灰或米或溫水覆養旬日澀味去甘滑可口矣或置木瓜酥梨橘葉於中更易熟而臭香唯水浸可以久藏謂之醂柿乘半熟去皮先熏後曝或懸有風處俟干納器中久之遍體生霜均名曰柿餅更有柿切柿心及禽魚鳥獸之名此各隨賦形之小大造制之相肖耳事類合璧云柿朱果也大者如楪八稜稍扁其次如拳如卵如心一種小而如折二錢者謂之猴棗其根甚固謂之柿盤世傳柿有七絶一多壽二多陰三無鳥窠四無蟲蠹五霜葉可玩六嘉實七落葉肥滑可以臨書也柿同蟹食令人腹痛飲酒食柿令人易醉先人云多肉多絡具經脈之形味甘性滑有養竅之利晚熟稟秋金之化落葉得肥火之暄又云蒂有主義吸義降義轉輸義順行義故可對待逆上之氣呼出不得自主亦非專主於降力能專主於不逆也參曰柿赤實果也青黑者椑所謂梁侯烏椑之柿是也爾雅翼云柿於經乃復罕見唯內則所加庶羞三十一物中有之其實利以作漆蟹化之成水也蟹以膏勝漆以脂勝膏釋脂凝昭然可徵矣柿本澀而熟則甘蒂則仍含本有之澀而不遷澀者酸收之甚耳宜入太陰肺為肺經之體用藥也如肺所生病為上氣咳逆煩心胸滿其不足則病啘噦諸氣緣體失從革之堅致用失敵應之變澀本從體滑本從用柿則兩得之矣柿本甘而蒂澀如瓜本甘而蒂苦吮抽水液抵當唯蒂所以見中樞之別於開闔也苦則湧泄以待澀自下而上還復自上而下以從開澀則降肅以待脫從上而下更復從下而上以從闔澀開脫闔各宜體會不獨盡二蒂之主治並盡方劑之作用矣楮實別録中品氣味甘寒無毒主治主陰痿水腫益氣充肌明目久服不飢不老輕身核曰生少室山所在亦有之雌雄兩種雄者皮有斑文葉無叉丫三月開花成穗若柳絮狀遂謝不實雌者皮無斑點葉有丫叉四月開花成穗若楊梅半熟時狀初夏色青緑六七月漸深紅乃熟也水澡去子蜜煎充果葉茁花蕤並堪作茹皮膜為冠造紙練布捻氈咸有用也修事水浸三日攪旋投水浮者即揀去之漉出曬乾酒潤一伏時蒸之從巳至亥焙燥用參曰惡木之中有名曰楮曰谷曰構葉無瓣者構有瓣者楮皮白者谷皮斑者楮也相感志云楮漿可以團丹砂語云楮膠作金石之漆者是也江南人績其皮為布搗其皮為紙楮則專精於皮於漿矣故營衛陰陽咸相宜耳何則陽者衛外而為固陰者營精而起亟陰陽者營衛外內之體用故主陰痿水腫者起亟之功用爾不飢不老輕身者衛固之休徵爾明目者亦衛從目出協營上注識精根識爾實則包醞全體葉唯偏向於衛故專司身熱若食不生肌肥肌充腠亦屬衛所司爾大青別録中品氣味苦大寒無毒主治主時氣頭痛大熱口瘡核曰出東境邊道及江東州郡今荊南眉蜀濠州所在亦有之矣春生青紫莖高二三尺對節作葉長三四寸面青背淡放花如蓼色紅紫亦似芫花狀結實青碧大若椒粒霜降則紅三四月採莖葉陰乾用參曰東方生風入通於肝其主木也其色青也言能宣大風木之用因名大青味大苦氣大寒雖待陽為標熱為本亦非陰凝走下之比力使自外而內者仍從自內而外也讀仲景先生大青龍湯兩法一主標陽本風之從化一發標陽本寒之將陷則得之矣高良薑別録中品氣味辛大溫無毒主治主暴冷胃中冷逆霍亂腹痛核曰唐詩云豆蔻稍頭二月初桂海虞衡志云紅豆蔻花叢生葉瘦如碧蘆春末始發未開花時無抽一干有大籜包之籜解花見一穗數十蕊淡紅鮮妍如桃杏蕊重則垂如葡萄又如火齊瓔珞及剪綵鸞枝之狀有花無實不與草豆蔻同種每蕊心有兩瓣相併詞入托興如比目連理云資暇集云豆有圓而紅其首烏者舉世呼為相思子即紅豆蔻之異名其木斜斫之則有文可為彈博局及琵琶槽其樹大株而白枝葉似槐其花與皂莢花無殊其子若扁豆處於甲中通體皆紅李善云其實赤如珊瑚徐氏筆精云嶺南閩中有相思木歲久結子色紅如大豆故名相思子每一樹結子數斛非紅豆也筆叢謂溫廷筠詩玲瓏骰子安紅豆入骨相思知也無相思子即紅豆者亦謬矣方物略記云紅豆花白色實若大豆而紅以似得名葉如冬青參曰高崇也倉舍同良善也薑界也氣味辛大溫對待暴冷為因胃中冷逆霍亂腹痛為證經云脾胃者倉廩之官使道閉塞而不通形乃大傷閔閔之當孰者為良具豆蔻之宣攝肉蔻之剛燖白蔻之開發三皆草實此獨草荄下焦亦得藉此以成決瀆矣冥冥之當舍此孰良黍別録中品氣味甘平無毒主治主補中益氣核曰出荊郢州及汴雒河陝間待暑而種與植谷同時覆土鋤治皆如禾法但早登為別異也月令仲夏之月農既登黍矣天子以雛嘗黍羞與含桃先薦寢廟其晚種而晚熟者庶人始薦故庶人秋乃薦黍若天子之禮自重其所先熟者而嘗薦之耳其苗大體似稷故詩云彼黍離離彼稷之苗其秀成枝而舒散一稃二米兩粒並均雖地有肥瘠歲有凶穰大小輕重略無差等色玄者秬色黃者秠故纍秠定律秬郁成鬯此嘉穀也參曰黍者百穀之精稟天地中和之氣以生故一稃二米均無差等象太極之兩儀是以之定律為陰陽衡量之始他谷所不及也主補中益氣者蓋音始於宮宮土音也其數八十一其聲最大而中聲出於脾合口而通之四體百骸動皆中節稷別録中品氣味甘寒無毒主治主益氣補不足核曰稷與黍同類而異種故其苗俱似粟而低小有毛秀特舒散米粒悅澤一稃一米米粒稍肥者稷也一稃二米米粒稍細者黍也但稷刈欲早植黍欲晚故古者號稷為首種成熟亦早作飰則疏爽而香貴而為五穀之長尊而配大社之神陶唐之世名農官為后稷者以此呂氏春秋云飰之美者有陽山之穄高誘注云關西謂之食制音糜冀州謂之䵖音牽廣雅云䵖穄也禮記云稷曰明粢爾雅云粢稷也故本草有稷不載穄耳參曰稷為脾谷五穀之長也五行土為尊故五穀稷為長遍歷四氣土大季旺故爾是能宜脾利胃安中益氣補諸不足也至若解暑以將來者進成功者退涼血故宜大麥別録中品氣味咸微溫無毒主治主消渴除熱解煩益氣和中久服頭不白核曰詩云貽我來牟牟大麥來小麥也麳生於桃二百四十日秀秀後六十日成牟生杏二百日秀秀後五十日成孟子曰牟麥播種而耰之其地同樹之時又同勃然而生至於日至之時皆熟矣牟有孚甲牟大於麳因名大麥參曰麳牟之始自天降皆以和致和貽我形臟者也麳輔肝體為營血之守牟宣肝用為藏陰之使故和中益氣奉發美毛有諸內而形諸外也至若解厥陰風動之成煩除少陽標盛之為熱從逆反佐兩無異矣小麥別録中品氣味甘微寒無毒主治主除客熱止煩渴咽燥利小便養肝氣止漏血唾血令女子易孕核曰小麥即天所降瑞麥之麳也秋種冬長春秀夏實方夏之時舊谷已絶新谷未登民於時乏食而麥熟最先故春秋他谷不書至麥禾不成則書之以此見聖人於五谷最重麥禾也按武帝勸關中種麥明堂月令亦有仲秋勸種麥文其有失時者行罪無疑凡以接絶所賴懼民不以為意耳每本根科一十有二月閏之歲科增其一麥秋將至根藁一科本黃一節根本皆黃藁則實成矣性惡濕江北地燥天嘗晴皮薄面多為上品江南地濕天嘗雨皮厚面少為下品故久雨水潦即色黑而砂甚則朽敗不實春種者夏亦熟中含有毒萊蔔制之參曰麥先五穀成肝木腑臟之主谷也遍歷四氣者開闔互呈體用始備乃能養育肝氣令女子易孕為接絶之所賴緣厥陰為胚胎之本少陽為甲拆之樞身前身後靡不以肝膽為終始經云留愛為種納想成胎夢有青氣入母腹而母思酸此亦肝木之色與味也至若體失藏血之守為漏為唾用失疏泄之令為約為癃及厥陰風動而煩少陽火熾而燥取效頗捷人莫不飲食鮮能知此功行矣春種夏實者僅歷四氣之半全缺降入之終致樞機促發適所以逢肝之怒耳粱別録中品氣味甘平無毒主治主益氣和中止泄核曰粱似粟大莖葉皆香芽頭色異為別也出荊揚青冀之間其類有三青粱穀穗有毛粒青米亦微青而細於黃白米也夏月食之極為清涼但以味短色惡不如黃白粱故人少種之亦早熟而收少作餳青白則勝余米耳黃粱穗大毛長穀米俱粗於白粱而收子少不耐水旱食之香味逾於諸粱人號竹根黃也白粱穗亦大毛多而長谷粗扁長不似粟圓米亦白而大其香美為黃粱之亞參曰青粱夏月食之極為清涼黃粱香味逾於諸粱白粱香美為黃粱之亞古天子之飰有白粱黃粱者明取黃白二種則青粱當是藥物矣故諸粱比之他谷最為益胃但氣微寒其聲為涼蓋是亦借涼音如黍大暑而種則以黍從暑粱從涼其義一也清涼對待熱惱更為親切暑傷氣氣損中虛中虛洞泄以暑為本者相宜或夏暑未盡秋涼驟斂者在所當忌粟別録中品氣味咸微寒無毒主治主養腎氣去脾胃中熱益氣陳者苦寒治胃熱消渴利小便核曰粟字本義作粟象穗在禾之上春秋題辭云粟乃金所立米為陽之精西葉米而粟成矣古者粟為黍稷粱秫之總稱即今之粟在古但稱為粱粱與粟亦有別穗大毛長粒粗者粱也穗小毛短粒細者粟也南北皆有北田尤多苗都似茅色有青赤黃白黑褐之殊或因姓氏地名或因形似時令隨義賦名不啻十數種矣如早有趕麥黃百日糧之類中有八月黃老軍頭之類晚有雁頭青寒露粟之類齊民要術云粟之成熟有早晚苗稈有高下山澤有宜異收實有息耗質性有強弱氣味有美惡順天時量地利則用力少而成功多任性返道勞而無獲大抵早粟皮薄而米充晚粟皮厚而米稀大而黏者粱細而粳者粟故一名秈粟參曰粱粟不獨大小有別粱之味甘粟之味鹹甘入脾鹹入腎亦自有辨也故粟益腎氣開竅於二陰設腎苦燥致脾胃中熱則消渴引飲以自救矣陳者尤良謂以咸轉苦則自下者上從內者外輔水之體復具水之用矣艾葉別録中品蘄州貢艾葉葉九尖長盈五七寸厚約一分許豈唯力勝堪稱美艾水臺用以為灼謂之一壯氣味苦微溫無毒主治主灸百病作煎止吐血下利下部慝瘡婦人漏血利陰氣生肌肉闢風寒使人有子作煎勿令見風核曰生山谷田野間蘄州者最貴四明者亦佳春時宿根再發布地生苗如蒿作叢莖直上高四五尺葉四布具五尖九尖者勝丫上覆有小尖面青背白八月葉間復出穗細花結實纍纍盈枝中有細子霜後始枯蓍草類也修治揀摘淨葉揚去塵屑入石臼內木杵搗熟羅去渣滓再搗如綿則灸火得力如入丸散將茯苓作片同碾即時可作細末亦一異也苦酒香附為之使參曰蓍艾同類但分老少耳五十曰艾千百曰蓍艾即少艾有生息止息二義霜後始枯所謂大勞已艾言其止也望春再發所謂更歷美艾言其生也蓍則更歷年久氣味和平艾則方生鋭氣氣味宣發灸百病者陷下則灸之火鬱則發之也所陳諸證悉屬火鬱於下而無散大之令及陰氣承陽致血衄妄行也生肌肉者艾以氣勝使有子者亦生息之義也勿令見風恐氣散耳檳榔別録中品右遷環位檳榔兩得之矣歲次玄枵月旅蕤賓五月律也氣味苦辛澀溫無毒主治主消穀逐水除痰澼殺三蟲伏尸寸白核曰出南海交州廣州及崑崙今領外州郡皆有子狀非凡木亦特異初生似筍漸積老成引莖直上旁無枝柯本末若一其中虛其外堅皮似青桐而厚節似菌竹而概大者三圍高者九丈葉生木端似甘蕉棕櫚輩條分岐破三月葉中起房蝟刺若棘遂自折裂擢穗綴實凡數百枚大似桃李至夏乃熟連殼收貯入北者灰煮焙乾否則易於腐敗真羅山疏云一種山檳榔名蒳子生日南木似棕櫚而小與檳榔同狀一叢十餘干一干十餘房一房數百子子長寸許五月採之味近甘苦一種豬檳榔大而味澀核亦大即大腹子也修事用白檳存坐穩正心堅錦文者最佳刮去底細切之經火則無力雷公云生用為良熟使絶無用矣南方草木狀云交廣人凡貴勝族客必先呈此果用扶留藤古賁灰相合嚼之吐去紅水一口方滑美不澀言能洗瘴也先人云無枝直上此從甲而乙從乙而丙生長炎方色白味澀謂有金氣雜之西南偏隅故也故其氣前往有右遷之象焉又云氣勝機速四氣咸宜然於脾土為最親切運用迭行尸蟲何地安立耶又云性與物反上者能使之下下者能使之上又不是徑上亦不是徑下參曰説文云向陽者檳向陰者榔雷公云頭圓矮毗者榔形尖紫文者檳則檳與榔各以其形而為向道矣蓋檳諧賓書云寅賓日出道陽使麗養萬物也志云蕤賓律名道陰使續養萬物也是檳獨為升陽之兆升陰之始矣而榔諧郎郎者亭署言花秀房中子結房外其擢穗似黍其綴實似谷亭亭若署列之猶郎耳顧本大者三圍干高者九丈末不小本不大下不倚上不傾干直概節外徑中空葉叢木上房系葉下步其林則寥朗芘其陰則蕭疏與竟直上行者不同類謂其概節如候漸積而成允升者也故高者抑之如奔豚之上逆腳氣之衝心忽忽眩冒而巔疾也下者舉之如瀉利之後重清氣之下沉胸痛引背下則兩脅胠滿也有餘者平之如水飲之留癖癥瘕之堅積胸腹痞滿燥實也不足者輔之如臟形之勞極三焦之𨴗闔脾土萎黃飲食不能為肌膚也闔者開之如臟腑之壅滯竅節之窒塞五膈反胃水穀不納也開者闔之如飧泄之腸澼吐嘔之湧逆霍亂自汗煩悶欲死也醉者醒之惺然頓釋也醒者醉之熏然頰赤也飢者飽之充然氣盛也飽者飢之豁然氣散也乃若殺三蟲驅伏尸滅寸白逐諸蟲伏匿百骸致病久不瘥變生驚奇形證者道以麗繼萬物之生陽反乎嚮晦幽深之死陰耳乳汁別録中品氣味甘鹹平無毒主治主補五臟令人肥白悅澤療目赤痛多淚解獨肝牛肉毒合濃豉汁服之神效核曰乳者化之信故從孚從化省作七爾方家隱其名謂之仙人酒白硃砂乃陰血所成生於脾胃攝於衝任未妊則下為月水既妊則留以養胎已産則上為乳汁凡入藥用並取首生男兒無病婦之乳色白汁稠無臭者佳有孕之乳謂之忌奶小兒飲之或作吐瀉或成疳魃最為有毒時珍云人乳無定性其人和平食飲有節其乳必純其人躁暴食飲不節其乳必熱凡服食須熱飲曬曝成粉入藥尤佳參曰陽明別汁曰乳水穀之精粹也臟腑傾頽者餌之奠安百骸稿瘁者餌之悅澤蓋臟腑百骸皆稟氣於胃胃者水穀之本也水穀尚有神奇況水穀之純粹精乎虎骨別録中品膽者中正之官決斷生焉肝者將軍之官謀慮出焉氣味辛微熱無毒主治主邪惡氣殺鬼疰毒止驚悸治惡瘡鼠瘻頭骨尤良核曰虎百獸之長山獸之君也陳魏謂之李父江淮南楚謂之李耳或謂之虎蟲音虺或謂之䖚音烏菟音徒自關東西謂之伯都漢書云於檡也淺毛曰虦音潺白曰甝音寒黑曰虪音叔黃黑曰蜼音磊蒼白曰貊似虎而五指曰貙音區似虎而非真曰彪似虎而有角曰虒音斯也形如貓巨如牛黃質黑章鋸牙鉤爪項短鼻齆須健而鋭舌大而刺聲吼若雷風從以生百獸震恐七月始嘯嘯而風生風生而萬籟皆作伏而風止風止而萬籟皆息故止樂用虎爾風木也虎金也木受金制故風從虎虎嘯風生自然之理也今虎所在麂必鳴以告人死於虎則為倀導虎而行也其出有時猶龍見有期也陰物以冬見陽蟲以夏出出應其氣氣動其類參伐以冬出心尾以夏見參伐則虎星心尾則龍象也奮則衝破行則坼地今人畫地觀奇偶者謂之虎卜云性至猛裂雖遭逐猶復徘徊顧步其傷重者輒咆哮作聲而去聽其聲之多少以知去之遠近率鳴一聲者為一里靠岩而坐倚木而死終不僵仆也其搏物不過三躍不中則舍之食物值耳則止以為觸其名名耳故也故嘗傷人者耳輒有缺若鋸夜視以一目放光一目看物宛然燈火獵人候而射之目光墮地得之如白石或曰即其魄也仲冬始交交而月暈七月而乳三九二十七數其主星星主虎故敔為虎形二十七齟齬也三九陽氣成陽主七故首尾長七尺般般文者陰陽雜也子生三日即有食牛之氣其不能搏噬者輒殺之為墮武也一世一乳一乳必雙三則一子豹豹小於虎尾赤而黃花文如錢比比相次而中空質赤文黑曰赤豹質白文黑曰白豹懸其鼻於戶令人生子故古者胎教欲見虎豹勇擊之物耳食狗則醉聞羊角煙則走虎害人獸蝟鼠能制之智無小大也獅駮猶耳黃腰渠搜能食虎勢無強弱也古有貙虎變人貙人變虎海有鯊亦能變虎自有是理矣修事用虎頭及頸骨色黃白者佳前掌腕中之骨形圓扁似棋子者力最勝虎力在掌故也凡虎身數物俱用雄虎者良藥箭毒死者不堪用其毒侵漬骨血間能傷人也並槌碎塗酥或酒或醋各隨方法柳炭火炙黃脆研如飛塵否則黏著腸間為痞積也先人云氣鍾肅殺天地間陰厲之物也吼則撼物動則風生若隨身宮殿然毒死者不可用固各隨法制還須用狗肉包裹一夜法雷公炮製投其所嗜以回其靈又云虎之所在風必從之故主風木不及風大太過咸相宜耳參曰一陽剛長而始交純陰厥盡而始生以言武也武止戈也莫之敢攖而戈止矣客曰主療諸疾若形若臟若腑若經若內所因若外所因轉致變生不測而乃咸從肝膽夫西方金獸而反司東方甲膽乙肝者何也曰此所謂制則化也無制則亢亢則害矣顧其奮衝破畫地卜食爪坼奇偶者不獨專決斷且專謀慮矣是以肝生風其嘯風生肝竅目其目夜光肝藏筋其筋獨異於衆類死猶屹立不僕也肝志怒故養之者不敢以物之生及全者與之為其殺之決之之怒也蓋不處中和勢極則反必然之數耳斯其主肝膽失處中和致勢極則反者仍使之決斷出自中正謀慮出自將軍也客曰無制則亢敬聞命矣乃厥肖惟寅而居艮何也曰天以南為陽北為陰地以北為陽南為陰對待之理也故其垣寅而宮尾若艮則所以象其止也於以表其神武而不殺也夫是之為謀慮是之為決斷客更進曰胎於子而剖於巳固矣乃紀載稗官所傳多屬化生者何也曰此義幽玄備在釋典情想密移總歸業報凡屬有生事殊理一故曰惟心所現誠不可不慎所發也第九帙鯪鯉甲別録下品氣味咸微寒有毒主治主五邪驚啼悲傷燒灰服方寸匕核曰鯪鯉即龍鯉石鯪魚穿山甲也形似鼉而小背似鯉而闊首似鼠而大胸腹有毛口中無齒尖喙長舌四足五爪尾與身等腑臟俱全其胃獨厚穴陵而居以蟻為食日中張甲若死狀漏氣最腥誘蟻入其中函甲沒水出而啖之肉理美好閩人用以供饌永州記云殺之勿近堤岸恐血入土遂令滲漏多能鄙事云凡油籠滲漏剝甲里肉靨投之自至漏處補住修事燒灰或炙以酥以醋以便或煎以油或炒以土以蛤各隨方制取用尾甲尾甲三稜力最勝也參曰皮表甲胄如蓤脊中介道如鯉因名鯪鯉似獸穴居山陵可穿江河可越介甲之有神者別有吞舟之鯪為鱗屬焉肺蟲曰介介者肝之榮筋之餘此木秉金制金互木交是以徑毛堅甲專箸皮表皮表者肺之合也當入手太陰肺足厥陰肝以太陰肺為注經之始厥陰肝為環經之終故可出陰入陽穿經絡入臟腑達病舍之所在閉塞者瀉之滲漏者補之如利如泣如漏如崩中滲漏之為患也如痹如癰如瘻如乳汁不通閉塞之為患也如五邪驚啼悲傷此屬肺輸化薄致金聲妄泄肝無乘制致魂失奠安在形藏歸滲漏在五邪屬閉塞瀉之以補之補之以瀉之有故而施者交互乘制兩無礙矣五靈脂別録下品古者稱糞為遺趨勢附炎暫假冠裳不得不自先喝彩附炎未幾冷落遂至如此自道恰象審時恰象知止餐以柏實何等芳潔遺復可餐何等本分此輩亦有熱腸唯真小人做得假君子氣味甘溫無毒主治主心腹冷氣小兒五疳闢疫氣治腸風通和氣脈療女子血閉核曰五靈脂寒號蟲所遺也寒冬號呼因名寒號説文云有足之謂蟲裸毛羽鱗介之總稱故曰五靈脂則以形舉也一名鶡鴠生北地極寒處五臺山中最多狀似小雞肉翅四足夏月毛羽五采自鳴曰鳳凰不如我初冬毛羽脫落裸形如雛忍冬而號夜鳴曰來朝造個窠旦鳴曰得過且過日出暖和月令云仲冬鶡鴠不鳴夜不號矣故寒號而陰剝號息而陽復夜號以待日出之為旦也餐以柏實先冬噙集穴居南向餐已而遺遺已而餐轉展化道形若凝脂氣甚臊惡修事取中心黑潤者佳雜砂石及未化者不堪入藥用酒研細仍用酒飛去砂土曬乾收用主治功力先人博議甚詳頤不更參謹録於左先人博議云陽出陰入夏長冬藏寒號毛羽似之冬既無表旋歸於內裸不能飛用遺作食出入數數實彼脂膏又云顧毛之有無為鳴之謙傲求明處穢自所不知固候時之物實警世之鑑又云裸形可冬腹心無冷矣疳是食氣所積疫乃天時所致五靈出入化導形與時違唯知通利寧從閉塞乎人尿別録下品氣味鹹寒無毒主治主寒熱頭痛溫氣童男者尤良核曰擇無病潔淨童子先飲米飲數碗去其濁穢俟清白無臭者取用之自溺亦可久服形藏大受其益故一名還元湯一名輪回酒參曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱膀胱者州都之官津液藏焉氣化則能出矣固屬遺物仍可本其所自有益其所自無也必擇陰平陽祕之童乃得必清必靜不則難轉清涼地反作熱腦場矣木瓜別録下品氣味酸溫無毒主治主濕痹腳氣霍亂大吐下轉筋不止核曰木瓜處處有之西雒者最勝宣城者亦佳山陰蘭亭尤多也可種可接可就亦可枝壓木類之易生者狀似奈而材極堅廣志云枝一尺有百二十節可為數號葉厚而光春末開花深紅色入夏綴實如小瓜而有鼻乃花脫處非臍蒂也黃赤薄皮如著脂粉香松津潤甘酸不澀實中之子向里頭鋭而面方者木瓜也形圓而小味木酸澀者木桃也大於木桃似木瓜而無鼻蒂粗味苦澀者木李亦曰木梨即榠楂及和圓子也一種顆小微長味極澀者曰蔓子一種實中之子如大麻味絶苦澀者曰土伏子餌之令人目赤筋痛不可不辨故宣城人種蒔尤謹始成實時剪鏃紙花黏貼其上霜後摘取花紋如生以充土貢因有花木瓜之稱焉修事勿犯鐵器銅刀削去硬皮並子切片曬乾黃牛乳汁拌蒸從巳至未俟如膏煎乃曬用也今唯切片曬乾力少味不全矣按大明會典宣城歲貢烏爛蟲蛀木瓜入御藥局或取其陳久無木氣耳繆仲淳先生云木瓜得春生之氣稟曲直之化味酸氣溫氣薄味厚降多於升陽中之陰為足太陰陽明足厥陰肝經之體用藥也通行互斂有並行不悖之功焉先人云木實曰果草實曰蓏木瓜類蓏稟草木之全氣者也性專甲拆而真氣從之故主諸痹腳氣濕傷於下者取效甚捷參曰木瓜果蓏也綴本之瓜曰蓏蓏小瓜也釋木云葉似奈實似蓏其枝可數一尺百二十節味酢善療筋轉陶隱居云如轉筋時但呼木瓜名或指畫作木瓜字病輒愈爾雅翼云枝堅可作杖策頗利筋膝根莖煎湯淋足脛可以已蹶蓋望説酢梅而蠲渴呼濯木瓜而緩筋理固有相感則心之所向氣即交通矣如磁運鐵珀拾芥雖凌空物障猶互為噓㶸況無情及諸有情者乎經云東方生風風生木木生酸酸生肝肝生筋也木瓜枝節比筋酸津肝木達春升之自下而上行痹閉下腳氣定霍亂止筋轉為象形從治法也系云艮為山為果蓏其於木也為堅多節爾雅名楙郭璞云木實如小瓜酢而可食得木氣之正者故名楙從林從矛諧聲也繼本之瓜亦曰瓞爾雅云其紹瓞郭璞云繼本曰紹形小曰瓞亦曰蓏故近本之瓜嘗小近末之瓜轉大也棕櫚別録下品氣味苦澀平無毒主治主澀腸止瀉痢腸風崩中帶下及養血核曰川廣甚多江南亦有初生時葉如白芨高三四尺干直無枝其端數葉四散岐裂葉色長青不凋每長一節即作一層筋絡絲毛錯綜如織可作索綯及胡床之藉經久不爛然歲必三剝否則不長三月木端出黃色重苞此花之孕也俗曰棕魚亦曰棕筍五月出苞便成花穗色黃白結實纍纍然生青熟黑甚堅韌也參曰棕櫚草木之屬而非草非木亦草亦木草中之木木中之草也主治功力與庵䕡相反菴䕡能使留者泄棕櫚能使泄者留故名櫚櫚門櫚也櫚門以成闔象者也筋絡絲毛錯綜如織何等整密反使留者泄何也以所留之物不能條分縷析錯綜如織耳更觀木端數葉四散岐裂每長一層即作一節界域井然支分得所不與混淆留礙者反乎鉤藤別録下品氣味甘微寒無毒主治主小兒寒熱十二驚癇核曰出建平秦中湖南湖北江南江西山中皆有之狀似葡萄藤長八九尺或一二丈大如拇指而中空折致酒甕中以氣吸之涓涓不斷莖間有刺宛如釣鉤色並紫赤古方多用皮今人多用鉤取其力鋭耳參曰藤棘如鉤中虛而通離明之象借形以指事也經云夏脈如鉤南方火也入通於心心藏血脈之氣也則凡血脈之氣布隊十二經中或左或右或上或下或支別絡屬交循舛錯致十二驚癇為寒熱病者咸可通之整之仍轉如環之無端耳更能以法廣之釋之功力真無盡藏若僅療小兒是系小子失丈夫矣置酒甕中以氣吸之涓涓不斷者俗名過山龍不獨能通十二經氣並行十二經水矣廣之以及支別絡屬肉理筋膜為用真無盡藏馬勃別録下品如泡亦如幻如影亦如電氣味辛平無毒主治主喉痹重舌失聲久嗽頭面卒腫崩淋吐衄除侵淫馬疥療癰疽久敗瘡瘍核曰生濕地及腐木上五六月卒然而發紫褐虛浮宛如丸鞠大者如斗重不過錢許彈之即有塵出一名灰菰修事密室中置筐幃紙如灑金箱式張布襯盤緩緩摩擦俟定收取否則揚塵飛去矣參曰馬勃之生也奇甚宛若野馬塵埃生物之以息相吹也如暗亂晦蒙之眚孛孛有所妨蔽者卒然怒作而旋放之旋放卒旋卷故旋開卒旋闔矣牽牛子別録氣味苦寒有毒主治主下氣療腳滿水腫除風毒利小便核曰處處有之黑白兩種黑多野生白多種蒔二月生苗引蔓纏繞籬落高二三丈黑蔓有白毛斷之出白汁葉作三稜如楓樹葉花不成瓣微紅帶碧如旋覆鼓子花狀日出則開日西則萎實有蒂裹生青枯白核與棠梂子核一樣但色深黑耳白蔓無毛有柔刺微紅色斷之出濃汁葉圓無稜有斜尖如薯蕷何首烏葉花小於黑淺碧帶紅開萎亦同實蒂長寸許生青枯白核大色白耳其實嫩時蜜煎為果呼作天茄謂其蒂如茄也多食損人脾泄人氣修事曬乾淘去枯浮者再曬乾酒潤蒸之從巳至未緩火焙燥舂去皮用繆仲淳先生云黑白牽牛子自宋以後北人嘗以取快李明之著有傳極力闢除若果水氣射肺致喘滿大腹及大腸風祕下焦郁遏者卓有殊功倘屬血分或脾胃薄弱雖有痞積切勿取快一時也參曰牽牛子星名也何鼓謂之牽牛何鼓儋荷也故楚人呼牽牛曰儋鼓又星紀鬥牽牛也牽牛鬥者日月五星之所終始故曰星紀牽牛子者十二子醜為牛牛隱語也蓋天開子地闢醜黑白氣分為兩人生寅而三才具然則牽牛子者以開以闢以生之為功用也故祭星曰布布者取其象之布散也經云陽氣者若天與日失其所則因於氣為腫四維相代形氣乃絶是以氣上則升不布氣下則布不升牽牛子儋荷布散以為功故可待越升以為眚第性偏隕墮但可施於形氣之陽有餘不可加諸藏神之陰不足為用不可不慎也花萼日出開日西萎即日散為星之為象晝呼夜吸之為用四維相代形氣乃絶為水為腫者此以風毒為因水亦風水為水矣仍使之升而布布而升互為制節無偏廢矣昆布別録下品順流而生能使十二水順流而去氣味鹹寒滑無毒主治主十二種水腫癭瘤積聚結氣瘻瘡核曰出南海及高麗新羅順流而生如手大似薄韋紫赤色干之搓如繩索柔軔可食也修事每斤用甑箅十個同銼細以東流水煮之從巳至亥待鹹味去曬乾用參曰昆布即海藻之如綸者故一名綸布氣味功能與海藻無別稍分淺深者隨所生淺深之異爾鼠耳別録下品自看茸母北方去誰識上皇南渡來若道當時臣有禮禁煙今日未曾開轉竊視聽以為視聽矣氣味甘酸平無毒主治主痹寒寒熱止喘咳療耳聾明目核曰鼠耳即茸母黃蒿香茅米曲無心草綿絮頭鼠麴草也生平岡田間熟地二月生苗高尺余莖肥葉厚柔軟如綿表裡白毛茸蒙如鼠耳搗汁蜜和為粉香美可口謂之龍舌粄以壓時氣北方寒食亦用之功勝白茅宋高宗詩云茸母初生認禁煙三月成穗作花碎小黃緑如曲雜攑染衣雖敝猶鮮月令云衣曲黃衣之色四月結子如粟楚人呼為米曲修事採苗葉陰乾花實亦可用款冬花為之使參曰十二子為鼠性多疑而竊視聽出穴每不果故持兩端者曰首鼠耳者肺之候腎之竅也故主腎不司竅為聾或精不貫瞳為瞽或痹閉不通為痹寒或肺先是動為喘咳或後所生為寒熱蓋所生是動肺高腎下猶持兩端間甚不果不獨以形肖並稱功用矣先為是動是動者氣先病也後為所生所生者血後病也肺高象天腎下象水間則乍輕甚則乍重白前別録下品氣味甘微溫無毒主治主胸脅逆氣咳嗽上氣呼吸欲絶核曰生州渚沙磧上苗高尺許葉似柳或似芫根似白薇或似細辛粗長堅直色白微黃折之易斷者白前也細短柔韌色黃微白折之不斷者白薇也修事用生甘草水浸一伏時漉出去頭須了焙乾收用參曰在色為白在臟歸肺矣前者坐而至不行而進也當入手太陰陽明足陽明為治咳之君主藥經云咳嗽上氣厥在胸中過在手太陰陽明又云白脈之至也喘而浮上虛下實驚有積氣在胸中得之酒使內也又云臟真高於肺以行營衛陰陽也不行焉則為厥為積矣大明主奔豚及腎氣亦即下實上虛之象乎然則白薇功力三因並施臟腑鹹入腠理皮毛靡不前至蓋以功用為名也黃帝問曰肺之令人咳何也歧伯對曰五臟六腑皆令人咳非獨肺也帝曰願聞其狀歧伯曰皮毛者肺之合也皮毛先受邪氣邪氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為肺咳五臟各以其時受病非其時各傳以與之人與天地相參故五臟各以時治時感於寒則受病微則為咳甚則為泄為痛乘秋則肺先受之乘春則肝先受之乘夏則心先受之乘至陰則脾先受之乘冬則腎先受之帝曰何以異之歧伯曰肺咳之狀咳而喘息有音甚則唾血心咳之狀咳則心痛喉中介介如梗甚則咽腫喉痹肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿脾咳之狀咳則右胠下痛陰陰引肩背甚則不可以動動則咳劇腎咳之狀咳則腰背相引而痛甚則咳涎帝曰六腑之咳奈何安所受病歧伯曰五臟之久咳乃移於六腑脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出肝咳不已則膽受之膽咳之狀咳嘔膽汁肺咳不已則大腸受之大腸咳狀咳而遺矢心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失腎咳不已則膀胱受之膀胱咳狀咳而遺溺久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也右録咳論以備參考扁豆別録下品夏日在膚脈如鉤冬日在骨脈如營氣味甘微寒無毒主治主和中下氣核曰二月下種延纏籬垣間葉大如杯圓而有尖花具紫白二色狀如小蛾有翅尾莢生花下凡十餘樣或長或圓或如龍爪虎爪或如豬耳刀鐮種種不同皆纍纍成枝白露後實更繁衍秋熱便不易生故一名雪眉同氣一名涼衍豆俗訛為羊眼豆亦形相似也嫩時可充蔬菜茶料老則收子煮食子有黑白赤斑四色入藥只取色白者莢殼雖厚子粒粗圓為勝耳先人云菽水穀也秋成色白臭味甘芳有土金水貫連三臟之義故為和中下氣之品又云右遷而降自然暑息熱消渴除痢止矣參曰藊諧扁門戶之文也若夏日在膚蟄蟲將去壞戶之象也諧禾嘉禾之菽水藏之谷也若冬日在骨蟄蟲墐戶君子居室之象也觀永類鈐方立固將墮將破之胞胎則壞戶墐戶之義真不待言語形容矣至化炎敲成清肅轉摧拉就容平更不待言語形容矣若秋傷於濕此即秋金驟斂致中含濡濕耳仍順以時降從微至著肺氣乃清此秋氣之應養收之道也別録主和中即和中央長夏之土藉火土授受之際斯金火亡刑乃得出而降降而入入復升升復出五行均等運迭不竭又不待言語形容矣轉夏成秋化炎敲成清肅此即點火成金不煩另覓種子稻別録下品氣味苦溫無毒主治主作飯溫中令人多熱大便堅核曰爾雅云稻者太陰之精含水沮茹乃能化也故米粒如霜性尤宜水是以周人別設稻人之官掌稼下地以豬畜水以防止水以溝蕩水以遂均水以列舍水以澮瀉水以涉揚其芟作田而漢世亦置稻田使者以其均水利故也爾雅翼云稻一名稌然有黏有不黏者今人以黏者為糯不黏為粳然在古則通得稻之名説文云稻稌也沛國曰糯粳稻屬或作粳是則直以糯為稻耳若鄭康成注周禮云稌粳也則稻是粳然要之二者皆稻也故蟆勝之云三月種粳稻四月種秫稻字林雲糯黏稻也粳稻不黏者今人亦皆以二谷為稻若詩書之文自依所用而解之如論語食夫稻則稻是粳月令秫稻必齊則稻是糯周禮牛宜稌則稌是粳豐年多黍多稌為酒為醴則稌是糯又稻人之職掌稼下地至澤草所生而種之芒種是明稻有芒不芒者今之粳則有芒至糯則無是通得稱稌稻之明驗也然説文所謂沛國謂稻曰糯至郭氏解雅稌稻乃云今沛國稱稌不知説文亦豈謂此稌訛為糯也將與郭自異義也又有一種曰秈比於粳小而尤不黏其種甚早今人號秈為早稻粳為晚稻蘇氏云粳亦曰秈亦未盡也又今江浙間有稻粒稍細耐水旱而成實早作飯更硬士人謂之占城稻云始自占城有此種宋真宗聞其耐旱遣以珍寶求其種始植於後苑後在處播之按國朝會要大中祥符五年遣使福建取占城禾分給江淮兩浙漕並出種法合擇民田之高者分給種之則又在前矣參曰稻為肺金之主谷生人之後天也顧性尤宜水金胎水母也故五穀外別設稻人之官以掌稼下地漢世亦置稻田使者以其均水利也蓋稻有二曰稌曰秫秫者糯稌者粳粳不黏而糯黏比之粳小而尤不黏者秈耳秫糯為酒粳秈為飯粳益殊多秈少遜之故古者入藥之以秋粳耳是以粳主肺氣至若止煩渴霍亂解毒消暑者蓋粳谷秋成已化炎歊為清肅成功者寧不降心而退舍焉大薊別録下品氣味甘溫無毒主治主女子赤白沃安胎止吐血鼻衄令人肥健核曰生山谷即虎薊也二月生苗高二三尺葉皺中心出花其花如髻小薊別録下品氣味甘溫無毒主治主養精保血核曰生平澤處處有之即貓薊也俗名青刺薊二月生苗僅一二寸作菜甚美四月發高尺余而多刺中心出花如髻亦如紅蘭花色青紫與大薊根苗相似但不若大薊之肥大耳紅蘭花氣味辛溫無毒主治主産後血暈口噤腹內惡血不盡絞痛胎死腹中酒煎服主蠱毒多用破留血少用養新血開寶核曰出漢梁及西域今人家圃種矣冬月雨後布子於熟地至春生苗脆嫩可食二月作葉色青緑形如小薊五月開花色深紅形如大薊花下作梂匯生多刺花出梂上乘露採之採已復出至盡而罷梂中結實如橘核搗煎其汁入醋拌蔬極肥而美修治搗揉片刻入水再揉用布袋絞去黃汁又搗更以酸粟米泔淘絞令乾用青蒿覆一宿陰乾收之洎夫藍同類也而功用別此非別中異乃同中異耳氣味甘平無毒主治主心憂鬱積氣悶不散活血久服令人心喜治驚悸核曰出西番回回國天花國即番紅花也元時入食饌用張騫得種即此今地性異則形質亦異矣參曰大薊與續斷同類續斷生西川大薊生南地形質功用因方土而有差別西方金位入通於肺肺主氣續主益氣以續經脈筋骨臟真高於肺以行營衛陰陽也南方火位入通於心心藏血薊主益血以續經脈肉理臟真通於心心藏血脈之氣也顧續有繼義致新推陳薊有解義推陳致新小薊與大薊同種小主益精保血功惟致新紅蘭花兼氣與血推陳致新氣主噓之血主濡之故爾洎夫藍偏通心臟以續營氣致新推陳故主心憂鬱積氣悶不散以及驚悸久服令人心喜鬱金唐本草氣味辛苦寒無毒主治主血積下氣生肌止血破惡血血淋尿血金瘡核曰原從大秦國及西戎來今蜀地廣南江西州郡亦有不及蜀中者佳四月生苗莖葉都似薑黃末秋復從莖心抽莖黃花紅質不結實根如指頂長寸許體圓無枝芳香色黃橫紋宛如蟬腹也古者合玄秬以釀酒名之曰鬯周禮郁人掌祼器凡祭祀賓客之祼事和郁鬯以實彝而陳之浸水染衣色極鮮麗經久不變炙之微有鬱氣也先人云金本剋木反為木用故名鬱金其輕達有金象其高遠似春暄參曰以郁合秬釀之成鬯則酒色香而黃在器流動詩所謂黃流在中者是矣周人尚臭灌用鬯陰達於九淵陽徹於九天故曰條暢於上下致氣於高遠所以降神也經云臟真高於肺以行營衛陰陽也設遏逆於中則萎暢於四肢為結為積為宿為淋矣與香薷合其德略有異同香薷偏於衛與陽鬱金偏於營與陰將形臟彌玄府敷幽門則一耳秬者百穀之本郁者百草之華合以成鬯上暢於天下暢於地無所不暢故天子以鬯為贄薑黃唐本草氣味苦溫無毒主治主心腹結積疰忤下氣破血除風熱消癰腫功烈於鬱金核曰出西番及海南今江廣川蜀亦有根莖都類鬱金其花春生與苗並出即綴根際色紅白入夏即爛亦不生子葉如紅蕉長一二尺闊三四寸上有斜文色亦青緑枝莖堅硬根盤圓扁似薑而小色黃有節味苦臭重為別異也鬱金根形唯圓無旁枝紋狀蟬腹黃赤轉深浸水並堪染色莪朮色白肉明亦無氣臭言與同種者謬矣參曰花茁並出黃流在中宣木火之用奪土大之郁者也蓋風為土所不勝木乘土中則黃中廢諸眚成薑黃力行升出之機內風宣而外風息土用行而黃中理所謂吐生萬物而土鬱奪矣固功力烈於鬱金鬱金泄金鬱薑黃奪土鬱為別異耳蘹香唐本草右為命門火壬干之陽也氣味辛平無毒主治主諸瘻霍亂及蛇傷核曰深冬宿根再發叢生似蒿細葉整密嫩緑似藻五六月開花花頭如蓋似蛇床花而色黃結子似麥粒粒有細稜質頗輕浮俗呼小茴香所在雖有寧夏者稱第一番舶者子大似柏實裂成八瓣一瓣一核核似豆黃褐色臭轉芳味轉甘俗呼八角茴香廣西左右江洞中亦有之形與中原者迥別第氣味相同北人得之咀嚼薦酒入藥最良修事隔紙焙燥研極細八角者去梗及子修事同先人云深冬生苗有來復義葉絲整密有肌腠義合入心脾為心脾用藥也然以冬藏之生物稟辛溫之氣味並可入腎宜乎偏向於右參曰長至宿根再發效純干剝落至復而一陽始生因名蘹香説文云本有去意回來就已也故主陽消而陰剝者歸乎歸乎盈吾懷乎大海洋洋水所歸高賢愈愈民所懷薄荷唐本草功利咽喉故異名冰喉尉氣味辛溫無毒主治主賊風傷寒發汗惡風心腹脹滿霍亂宿食不消下氣煮汁服之發汗大解勞乏亦堪生食核曰薄荷多栽時亦有野生者莖葉氣味皆相似也經冬根不死二月抽苗清明分株排種方莖赤節緑葉對生初則圓長久則葉端漸鋭似荏蘇薺寧輩夏秋採取日曝令乾先期灌以糞壤雨後方可刈收不爾氣味亦不辛涼矣吳越川湖以之代茗唯吳地者莖小葉細臭勝諸方宛如龍腦即稱龍腦薄荷江右者莖肥蜀漢者更肥入藥俱不及吳地者良陳士良食性本草稱菝𦽅楊雄甘泉賦稱茇葀呂忱字林稱茇䒷孫思邈千金方稱蕃荷名雖廣當遵唐本薄荷為正綱目言薄荷系俗稱此未解釋名之意耳一種葉圓小如錢稱金錢薄荷一種葉微小耐霜雪至冬莖葉純紫生江南山石間稱石薄荷一種胡薄荷形狀與薄荷無異但味小甜多生江浙俗稱新羅薄荷今汴雒僧寺多值之天寶單方稱金錢草者是也同薤作齏清爽可口瘦弱人久食之動消渴新病瘥人勿食之令虛汗不止貓食之醉陸農師云薄荷貓酒也先人云氣溫性涼具轉夏成秋為高爽清明之象則氣有餘自與薄弱虛寒陰營不足者不相類也第氣象燥金儻陽明之上為病並在所忌參曰木曰林草曰薄薄者疾驅荷者負荷而驅也詩言載驅薄薄顧名思義方之奇方急方也味辛氣溫稟辛金用驅賊風表汗出開上焦宣穀味於是宿食消脹滿解霍亂定煩勞之張精續劑之宣劑輕劑也通關格歷關節去憤氣卻腎氣徹風涎療陰陽毒破血止痢利咽喉口齒頭目治瘰癧癮疹瘡瘍皆生於風者取效甚捷更詳奇急宣輕之義靡投不善矣煩勞則張精絶仍使之相續不斷唐本曰勞乏省卻四字矣晉注破句讀之煩勞則張作句精絶作句徒務多聞每有立言之失三白草唐本草氣味甘辛寒有小毒主治主水腫腳氣利大小便消痰破癖除積聚消疔腫核曰出荊襄所在亦有生田澤池畔間高數尺六七月莖間三葉先白後緑一葉白其旁遂開花成穗如蓼花狀色白微香結子細小根長而白虛軟有節根間白鬚宛如蒲根根汁灑搜麥面造麴釀酒已濕消暑色香味殊勝也制雄黃伏南鉛干砂汞參曰弘景雲葉上有三白點因名三白蘇恭云葉上有三黑點非白也古人祕之隱黑為白耳藏器云初生無白入夏葉半白如粉農人候之蒔田三葉皆半白則草便莠故謂之三白時珍云八月生苗四月其巔三葉面白三青變三白變余則仍青而不變也故葉初白食小麥再白食梅杏三白食黍子此皆未識三白形色者也頤家植此草於庭前者二十餘載每見三月生苗葉如薯葉而對生小暑後莖端發葉純白如粉背面一如初小漸大大則葉根先青延至葉尖則盡青矣如是發葉者三不再葉而三莠花穗亦白根鬚亦白為三白也設草未莠而削除之或六七月或八九月雖重生苗葉亦必待時而葉始白月令小暑後逢三庚則三伏所以避火刑以全容平之金德三白草不三伏白而三顯白轉以火金相襲之際化炎歊為清肅此即點火成金不煩另覓種子者是也故主夏傷於暑而出機未盡秋傷於濕而降令過急者兩相宜耳劉寄奴草唐本草氣味苦溫無毒主治主破血下脹止痛治産乳余疾止金瘡出血極效核曰出河中孟州漢中滁州江南越州所在亦有春生苗高二三尺一莖直上葉似蒼朮葉尖長糙澀面青背白九月莖端岐分蕤穗每蕤攢簇小花十數朵黃包白瓣宛如秋菊經三四日花心拆裂如絮隨結實絮實都如苦買也修事揀去莖葉只用子粗布拭去薄殼酒拌蒸從巳至申曝乾用參曰劉寄奴古方罕用唐本草始附隰草部按李延壽南史載宋高祖劉氏小字寄奴少未遇伐荻新州見大蛇射中遂返次朝再往聞榛林中作杵臼聲尋之有青衣童子擁衆搗藥訊其故曰我主為劉寄奴所中搗此以療之曰胡不見殺曰寄奴王者不可殺也叱之盡散遂收其藥每塗金瘡輒愈因稱此草為劉寄奴鄭樵通志云江南人因漢時謂劉為卯金刀乃呼劉為金又稱此草為金寄奴字説云劉誅殺也寄附托也奴執事也顧主治證形似悉假血氣附托以為執事者功能剖裂而入破之即所以誅殺之矣命名之義或取諸此萆麻唐本草氣味甘辛平有小毒主治主治水症以水研二十枚服之吐惡沫加至三十枚三日一服瘥即止風虛寒熱身體瘡癢浮腫尸疰惡氣取油塗之核曰原從胡中來今在處有之北地尤多夏月生苗有赤有白一莖直上高丈餘間節如甘蔗中空如赤箭葉似葎草及瓠葉輩肥厚而大一葉五尖夏秋之間丫中抽穗黃花纍纍每穗作子數十顆柔刺如蝟凡三四子合成一顆枯時劈開狀類巴豆又類牛蔗青黃斑褐間雜可觀殼中有仁嬌白如續隨子仁中之油可調印色每用去殼淨仁五升搗極細以水一斗煮之有沫撇起沫盡乃止遂用文火煮熬其沫水去澄清上無氣升油即成矣傾磁器中冷定則凝結如脂經久不變修事勿用黑夭赤利子顆外無刺兩頭尖子無斑點誤服有大毒凡使萆麻子鹽湯煮半日去殼及衣取中仁研細用有啖萆麻一生不得食炒豆者犯之作脹而死豆為腎谷萆通胎息天真不足者轉致氣泄耳伏丹砂霜粉死鉛汞成金紹隆王先生云萆麻力長收吸故能拔病氣奪有形多從外取不繇餌服良有見也先人云萆麻胚兆先一陰而始生以陰為內氣之主轉陽為形外之固賦形唯二至之間生長在蕃秀之季綴子於來復之初故餌之何處非生陽之地何形非生陽之物內有陽氣人不須入腹磕著撞著生陽遂聚死陰立消迅速敏捷如鼓應桴參曰命名之意亦奇主治功力亦異著囟起痔握掌催生左風頭置之右右風頭置之左摩頂天柱豎傅踵胞孚下至若納舌闢竅解喉疏肌收子腸消腳氣及主剩骨留血物滯水瘕疽瘍䐜腫尸疰丹瘤與夫喎斜偏瘓舛錯關機宜餌宜塗宜熏宜窒者莫不如鼓應桴捷於影響故萆者人臍上從囟囟取通氣會奇脈於巔下從比比取輔氣交偶脈於踵麻者大鼗群陰之長也夏有足鼓置鼓於趺殷有楹鼓貫中於柱周有縣鼓植簨虡而懸之上皆鼗也顧名思義則知聲氣相通左右逢源之為用矣萆者人臍胎兒之息以臍也囟取通氣會奇脈於巔至人之息以囟也比取輔氣交偶脈於踵真人之息以踵也楹鼓以喻萆縣鼓以喻凶足鼓以喻踵三息並行三鼗齊擊是真以鼓應桴捷於影響萊蔔唐本草氣味辛甘平無毒主治主下氣消穀和中去痰癖肥健人根汁尤良核曰萊蔔菘菜也似蔓荊而稍大舊説北種菘萊初年半為蔓荊二年菘種都絶蔓荊南種亦然蓋菘之不宜於北猶橘之不逾於淮今則南北俱有矣爾雅云苞突蘆蔔孫炎注云紫花菘也南人呼秦菘吳人呼楚菘魯人呼菈辵𦵺音拉答秦人呼溫菘北人四呼之春曰破地錐夏曰夏里生秋曰蘿蔔冬曰地酥杜詩曰土酥蒙古曰篤魯馬唐本曰萊蔔萊蔔者麳牟之所服此亦就文取義耳今遵唐本為正性喜燒土隨地可植夏末布種秋末刈苗冬末採根春末抽薹高五七尺開紫碧色花夏初結角子如大麻實圓長不等色黃而赤遂可布種葉大者如蔓荊細者如花芥表裡有茸毛根色有紅白根形有大小長短圓扁粗滑上鋭下尖細腰巨腹岐尾叉頭有須無須之別小者如拇指大者滿一稱重者十百斤或因種變或隨水土大率沙壤者肥甘而脆瘠地者堅苦而辣可生可熟可俎可醬可𫈨可醋可磄可臘可飯可羹蔬菜之最有益者與地黃同食令人發白多啖動氣薑能制之伏硇砂干鉛汞參曰遍歷四時具備五氣有松之操有芥之烈三焦咸輔五液並行氣中之用血中之氣也其根白其味辛其皮革稟從革之金象故力服麳牟前人只説得個有松之操更參出個有芥之烈何等親切唐本只闡得個上焦開發宣五穀味熏膚充身澤毛若霧露之溉更參出個三焦咸輔五液並行氣中之用血中之氣方才盡得個命名氣味主治功能的大意古人用汁今人用實繇此觀之汁勝實矣薰草唐本草氣味甘平無毒主治主明目止淚療泄精去臭惡氣傷寒頭痛上氣核曰薰香草一名蕙與蕕反南越人謂之燕草宋開寶謂之零陵香出零陵山谷湖廣諸州皆有多生下濕地入春宿根再發葉如羅勒又似麻葉兩兩相對七月開花八月收刈可挼可佩可薦可熏雖至枯稿香猶芬馥山海經云浮山有草麻葉而方莖赤華而黑實氣如蘼蕪可以已癘爾雅翼云蓋能去惡臭令身香故古之祓除以此草熏之所以降神也埤雅云凡氣熏則惠和曝則酷烈故於文蕙草為惠近世皆指菅茅一干數花者為蕙一干一花者為蘭即詩書家亦多引用竟不知是為何草徒尚其名而迷其實皆此類也離騷辨證云古之蘭蕙花葉俱香燥濕不變今之蘭蕙花萼雖香干則腐臭蘭唐蕙圃受誣久矣先人云赤華有通神之德黑實具幽隱之情腎藥而得心用者也乃能交精神散寒風達生氣耳參曰天子鬯諸侯薰鬯用灌薰以香自燒故薰諧熏熏者火煙上出也顧藏真之自下而上者肝木春生之氣耳是主春氣者病在頭不能積續以升致上下失於敵應者相宜觀魚涉負水則知下上之為義矣紹隆王先生嘗言少陽之始生如香煙之始發輕虛而浮端直以長故立春初候曰魚涉負冰魚隨陽氣而上涉至背負冰而乃止蘇方木唐本草震蘇蘇震行無眚方其義也義以方外直方大不習無不利氣味甘鹹平無毒主治主破血産後血脹悶絶欲死者水煮五兩取濃汁服核曰出南海崑崙樹似青槐材似赤降中心有橫紋似紫角者號木中尊功力倍嘗百倍也修事去粗皮並節銼極細梅枝搗爛同拌蒸之從巳至申陰乾用用染絳色見鐵器則色黯不鮮先人云蘇有疏暢義方有不動義具厥陰風木之才非分崩離坼之比參曰死而更生曰蘇賦形有嘗曰方東方之行曰木木以色勝當判入肝肝之心藥肝之血分氣藥也肝主色自入為青入心為赤肝藏血心藏血脈之氣也故主血中諸眚悶絶欲死者功能屠絶鬼氣蘇醒人魂一名屠蘇者以此椿樗唐本草氣味苦溫無毒主治主瘡疥風疸疳𧈟煮汁飲之樗木根葉尤良核曰椿樗二樹南北皆有形並相似但椿木皮細肌實而赤嫩葉香甘可茹樗木皮粗肌疏而白莖葉臭惡不可茹二三月木端作葉嫩紅老緑有花無莢者椿有莢無花者樗乾枝端直者椿迂矮者樗莊周所謂其木擁腫不中繩墨其枝拳曲不中規矩者樗也秋深落葉脫處有痕如虎眼樗有小毒椿葉無之修事椿根以不近西頭者為上採出拌生蔥蒸半日銼細盛桂屋角南畔陰乾用參曰椿樗同種材臭異形者牝牡有別耳樗孕莢者牝椿無莢者牡故椿體木性之直樗體木性之曲曲直僕傴木體之全性現矣故始區芽蘖直拆者萌麴生者句枝幹已成曲直僕傴四體始備直無僕傴曲則兼有是以椿木體直精專枝葉樗木體曲精專根皮誠肝木之體用藥也椿益皮膚毛髮正肝以能生為體榮華為用樗益血氣陰竅正肝以藏血為體疏泄為用內而腸風已崩帶除滯痢行癃閉利遺濁清神安志悅外而瘡瘍淨斑疹消丁毒解好顏媚色以及四體百骸不言而喻至若疳𧈟蠱毒傳尸鬼注而與物為春殺厲之氣暖然齊春仁之潔椿樗之為用溥矣山楂唐本草可名赤爪亦可名虎掌功用相符若探囊耳氣味酸苦甘微寒無毒主治主瘻瘡利小便去痰熱止渴令人少睡有力悅志核曰出南山高原所在亦有樹高數尺古拙可愛枝有叢刺葉有五尖三月開花五出碎小色白綴實似林擒而小有黃赤二種霜後乃熟核似牽牛子色褐而堅一種實大而赤甘酸可口名曰棠梂唯供食料修事蒸過曬乾臨用再蒸去核焙燥研細用先人云味酸似甲便能下行故得止痢定疝然去發陳未遠激之立轉生榮參曰宣氣散生曰山虎之不柔虎食剩殘曰楂危氏曰猴楂唐本曰赤爪各以功力形狀為名也瘻瘡疹痘痞滿癥瘕血凝結固皆血中痹乃以柔承剛飲澼食宿狐㿉疝蠱氣壅留僻皆氣中痹乃以剛承柔皆非所據而據之第木實而酸宜輔肝體宣氣散生則偏有餘於用矣用行必氣上而忘返令人不寐而嘗惺經云談説醋梅口中酸出味過於酸肝氣已津需渴倍力則志悅矣訶黎勒唐本草氣味苦溫無毒主治主冷氣心腹脹滿下食核曰出波斯今嶺南廣州亦有之本似木槵開白花作實似卮子橄欖狀色青黃皮與肉相著七八月成熟具六路肉厚者佳修事勿用毗黎勒個個毗頭者是也若訶黎勒實稜只有六路或多或少者並是雜路勒圓而文露或八路至十二三路號榔精勒澀不堪用為害殊甚也凡使酒浸六時蒸六時刀削去路用肉則去核用核則去肉並銼焙用參曰訶譴也黎衆也勒堅柔難斷也味大苦氣大溫對待冷氣在心腹致脹滿食卒不得下變生腸澼喘急腸風崩帶奔豚霍亂痰涎膠固堅柔難斷者譴之斷之少陽膽腑決斷藥也無食子唐本草氣味苦溫無毒主治主赤白痢腸滑生肌肉充血氣安神長鬚發生精長年核曰無食子即沒石子生西戎沙磧間樹似柳波斯國呼為摩澤樹高六七丈圍八九尺葉似桃而長三月開花白色花心微紅子如金彈蟲食成孔者入藥最良但其樹一年生拔屢子大如指長三寸中仁如栗大食國者一年生蒲盧子圓扁亦如栗大寸許中仁俱可食次年生無食子彼國呼為麻荼澤間歲互生一根異産如十干之合化剛柔之往隨也修事毋犯鐵器並被火驚用顆小無杴米者炒以漿水砂盆研令盡焙乾再研如烏犀色為度參曰食宿飲留乃成痢滑無其食滑痢已矣味苦氣溫對待治之推陳致新物也新至氣斯充肌肉滿七神安奉發美毛精生形駐矣所謂有餘而往不足隨之不足而往有餘隨之太過不及於斯見矣蟲食有孔者良具體無竅者所當佩服騏驎竭唐本草氣味鹹平無毒主治主心腹卒痛金瘡血出破積血止痛生肉去五臟邪氣核曰生西胡大倉諸國今廣州亦有樹名渴留高數丈略似沒藥樹婆娑可愛皮木俱赤而堅葉亦略似櫻桃葉而黃赤木中有液流出如松脂久則堅凝成竭色赤如血一名紅竭以火燒之赤汁湧出灰不色變者為真一種海母血形真相似只是味鹹腥臭騏驎味鹹微甘臭似梔子為別也修事另研如塵篩過用若同別藥搗化作塵飛矣先人云血乃精專之物竭為迭運之稱有起亟義有堅固義有更始不窮義河間稱為血中之聖真不虛矣參曰畜生午稟火氣而生者馬其舉負捷驅運迭不竭者騏驎也故良馬之貞比之麒麟麒麟行不越規止不逾矩騏驎之行止肖焉有指白馬而脊黑者曰騏驎是色取而行止失矣此轉釋假喻以詮名表功力耳當入心為心之體藥用藥心乃火臟也經云臟真通於心心藏血脈之氣如環無端終而復始則凡血脈之氣失於捷驅竭於運迭行越規止逾矩者仍使之行循規止蹈距猶夫騏驎之舉負捷驅運迭不竭也木之有脂如人之有血渴留專精惟脂厥色惟赤燒之灰色尤赤可為至死不變矣乃得奉心化赤獨行經隧莫貴乎此紫礦唐本草氣味甘鹹平有小毒主治主五臟邪氣金瘡帶下破積血生肌止痛出痘毒與騏驎竭大同小異核曰假成式酉陽雜俎云紫礦樹出真蠟國彼人呼為渴稟又名勒佉亦生波斯國樹高盈丈枝葉郁茂宛如橘柚木液都赤經冬不凋三四月開花白色不結實天有霧露及雨沾濡則枝條出礦狀如糖霜纍纍紫赤破則鮮紅用造悾赦作婦女面飾先人云色赤味鹹而如液入血分無疑矣還可堅充其類第屬形外物施於痘不作漿或皮薄欲損血溢於外者象形從治之紹隆王先生嘗與頤言男女媾精淫欲之毒遂舍胞胎伏藏兩腎及痘之始發也如春氣之升行漿也如夏氣之出回合也如秋氣之降剝落也如冬氣之入舉世但知始發之欲透未知毒化之成漿猶為切要何也如去滓純水必清必靜全賴此耳否則仍含毒種復歸兩腎生死存亡變生不測矣紫鐵固為解毒之要品但可用於化毒之際不可施於始發之期更有毒未化而漿不行反舍鐵液之橫遍預投保元之降藏雖不顧淫毒之不攘獨不念六淫之未散乎願言珍重珍重參曰紫鐵渴稟木液也承霧露之陰液液溢葉表而鍾鉚若垂枝布葉萬物之所以盛長南方火象耳故渴者盡其所需稟者受命自天紫者木液之赤呈陰而水色間之鐵者金膚效三陽淪膚而至極三陰膚受而容平流於四臟而邪逐五經並行而帶已血積破肌生而痘毒出矣蓋毛膚者金肺之形臟也因於邪使人毫毛畢直皮膚閉而受之以次相傳遞侵四形始必由於膚終必從於膚耳固與麒麟竭大同而小異較其所自始小同而大異鐵屬液溢葉表竭屬液流趺踵為迥別也合騏驎竭參功力始備竭則行中止鐵則止中行行止止行大須料簡阿魏唐本草氣味辛平無毒主治主殺諸小蟲去臭氣破症積下惡氣除邪鬼蠱毒核曰出西番及崑崙今雲南長河中亦有與舶上者氣味雖相似只無黃色耳苗葉根莖酷似白芷或如草或如木此風土不同稟質則異咸屬草類非有草木兩種也同根搗汁暴令乾者次之體氣極臭婆羅門謂之薰渠又謂之哈昔泥故西國持咒人則禁食戎人則嘗啖謂能止臭猶巴人之重負礬也元時用充食料根名穩展用淹羊肉轉更香美盛暑亦不色變修事乳研極細熱酒器上裛過用參曰諺云阿魏無真言多偽也雷公驗法有三一以半銖置熟銅器中經宿著處永如銀色一以一銖入五斗草自然汁內次早盡作鮮血色以一銖致柚子樹上其樹立干驗此三法不唯真偽判然功能亦昭然顯著矣諡法稱克威健行曰魏亦巍然獨立貌也阿倚也衡也上倚下以取平權輕重度長短故主諸疾倚之各取其平偏於幽獨掩昧者功能捷如影響第臭惡特甚巍然獨立而世無偶故君子必慎其獨極臭之物當與極香同旨故得以臭止臭如入五濁惡世轉作香積國土醍醐唐本草氣味甘冷利無毒主治主風邪痹氣通潤骨髓可為摩藥功勝於酥核曰用酥一石煉貯器中待凝定穿中至底久之則津津溢出冬不凝夏不融者是也第性滑易走惟貯壺蘆雞子殼內方不透出但不易得一石僅取十合耳參曰乳出酪酪出酥酥出醍醐醍醐上味也功力與犛酥等用犛酥出醍醐當成無上味醍醐力透貯器犛酥追逐風毒發出毛孔間似同而力更勝蓋坤為牛即此可徵至柔而動也剛主治功力不必更加注腳矣釋典嘗以醍醐喻無上道服食者當成希有功力矣溺白垽唐本草氣味鹹平無毒主治主鼻衄湯火灼瘡傳尸肺痿核曰滓澱為垽人溺澄結所成也歲久之器有厚寸余者取置瓷盤內露高潔處越一二載中外皆白絶無氣臭者乃可用研極細水飛數過再研萬匝如仍有惡臭隨泡隨飛約數百遍以無臭為度煅淬者精粹盡失轉增火毒不堪用也參曰溺白曰垽藉塵埃沒溺所集也故物入陰中色剝為白陰中之陰矣入手太陰肺足太陰脾緣精與氣原從脾肺氣化之中遊溢轉輸是以仍歸脾肺爾力倍於溺者白作潤下咸還可水濟火垽集塵埃土復可土承水亢則害承乃制制則化生矣硇砂唐本草氣味鹹苦辛溫有毒主治主積聚破結血止痛下氣療咳嗽宿冷去惡肉生好肌爛胎亦入驢馬藥用核曰出西戎今西涼夏國及河東陝西近邊州郡亦有然西戎來者顆塊光明大者如拳重三五兩小者如指面入藥最緊邊界者雜碎如麻豆粒頗夾砂石雖可水飛澄去入藥則無力矣修事水飛去塵穢入瓷器中重湯煮乾以殺其毒或用黃丹石灰作匱煅赤使用亦無毒矣斆云硇遇赤須澒留金鼎權云柔五金消八石可作焊藥抱朴子云牡蠣海螵蛸晚蠶砂羊𩩅骨河豚魚膠魚腥草萊蔔獨帚卷柏羊蹄商陸冬瓜羊躑躅蒼耳烏梅皆可伏硇設中硇毒生緑豆研汁飲一二升可立解畏酸及漿水忌羊血繆仲淳先生云硇砂稟陰毒之氣陽毒之精腐人腸胃化人心血其毒之猛烈如此誠可畏也參曰硇從囟石聲取通氣以為量一名氣砂其為性至透濕即水化滲泄而走矣一名透骨將軍張匡鄴行程記云高昌北庭山嘗有煙湧而無雲霧夕則光焰若炬火照見禽鼠盡赤謂之火焰山中有硇砂土人乘屐採之若屐底為皮革者即焦敗矣一名火砂故性秉火毒對待宿冷糜化有形者也時珍云硇砂亦硝石之類乃滷液所結出於青海與月華相射而生附鹽而成質者故可投諸藏陰之屬若止痛下氣療咳嗽謂其氣結則痛積聚則氣不下矣經云咳逆上氣有積氣在胸中也倘屬虛無為害彌篤慎勿以藥試病耳犛牛酥孫思邈天子乘與以犛纛大如斗注車衡之左方氣味甘平無毒主治主去諸風濕痹除熱利大便去宿食核曰製造之法一同牛酥參曰犛酥功勝牛酥者謂犛毛長而尾尤佳用以作纛旌旗奉為指麾也故主氣無師帥致風濕合閉成痹與谷飪滯利之邪留癖腸腹間者非此開闢未易隕滌耳亦可作營血司命整肅經隧以御外侮並可定腑臟之決躁形氣之臞瘁生生編云主腹內塵垢追逐毒氣發出毛孔間此剪滅不格之非我族類也土茯苓藥性論氣味甘淡平無毒主治主食之當谷不飢調中止泄健行不睡健脾胃強筋骨去風濕利關節止泄瀉治拘攣骨痛惡瘡癰腫解汞粉銀硃毒核曰生楚蜀閩浙山箐及海畔山谷中蔓生如蓴莖有細點葉類竹闊大厚滑長五六寸根如菝葜而圓小者似卵大者似拳連綴而生遠不及尺皮似茯苓色有赤白肉似芋薯味兼甘澀亦可生啖入藥以白色者為良東山經云鼓證之山有草焉名曰榮莫其葉如柳如竹其本如卵如拳食之已風恐即此也一名禹餘糧一名石餘糧冷飯塊忌茗及豆參曰土茯苓者九土之精氣所鍾也一名石石以量言一名禹績平水土有如神禹言餘糧者食之當谷不飢耳味甘淡氣平和性無毒故主調中止泄黃中通理之為用乎若健行不睡強筋骨治拘攣利關節此陰以陽為用應地無疆自強不息矣若淫瘡癰腫侵淫筋骨以耽淫人火熾水涸水位之下藉土承之承則化化則腎火歸而腎水溢矣神麯藥性論氣味甘辛溫無毒主治主化水穀宿食癥結積滯健脾暖胃核曰葉氏水云録云五月五日或六月六日或三伏日用白麵百斤青蒿汁三斤蒼耳草汁野蓼汁各三斤赤豆末杏仁泥各三升用汁和麵豆杏末作餅麻葉楮葉包罯如造醬黃法布帛密覆俟冷黃衣生取出日曬燥之陳久者良參曰候八神置會之期集七神司生之物郁之造麴使衣生朽敗塵華青黃色也周禮所謂曲衣月令所謂衣曲桑黃之服也易通卦驗云八神者樹杙於地四維四中引繩以正之故欲置八神者冬至陽生之日樹八尺之表於地中蓋以陽為神陰為鬼亦氣之伸者為神氣之屈者為鬼也人身五臟有七神藉中黃生陽之氣為奠安乃得神與形俱七情發而皆中節斯陰屈遁藏根塵洞徹濟弱扶傾運迭樞機如環之無端耳設生陽少息不惟神失奠安且變生不測矣神麯藉神木所司之谷曰麥謂木即生陽之首兆麥即五氣之先機佐以七神司生之物郁之成鬯伸之暢之鼓中黃之生陽安五臟之七神正所以成其始即所以成其終其所以成其始即所以成其終者以一神而會七神一藏而葉五藏乃得成其始復得成其終否則偏廢而離敗矣諸家陳列功力即藉中黃生陽之氣敷布化育宣五穀味開發上焦成陽出陰入之為體為用耳倪維德以之主療目疾即洞徹六根六塵之一塵一根耳又云生用能發其生氣者即肝得水而沉熟用能斂其暴氣者即肝得煮而浮以麥即肝臟之主谷肝主開竅於目故也顧浮沉互用之樞機即生殺敵應之關鍵耳貽我麳牟帝命率育繼絶續乏之谷也必候八神置會集七神司生誠濟弱扶傾運迭樞機之良劑也藿香宋嘉祐氣味辛微溫無毒主治主風水毒腫去惡氣止霍亂心腹痛核曰藿香出交址九真武平興古諸國吏民多種之今嶺南頗饒所在亦有二月宿根再發亦可子種苗似都梁方莖業生中虛外節葉似荏蘇邊有鋸齒七月擢穗作花似蓼房似假蘇子似茺蔚五六月未擢穗時採莖葉曝乾可著衣中用充香草逾時則性緩無力矣潔古東垣惟用藿葉為能敷布宣發後世因藿葉多偽並枝莖用之今枝莖尤多偽耳唐史云頓遜國出藿香插枝便生葉如都梁范曄云零藿虛燥芬芳之氣經久不變先人云氣亂於腸遂作霍亂致亂止氣者惡氣耳藿虛燥芬馥具不逆不撓入群不亂義乃可立定其亂因名曰藿方之奇方急方劑之宣劑輕劑燥劑也參曰南嶽曰霍假之標方域表功能也本草列釋典名相如楞嚴之兜婁婆香法華之多摩羅跋香金光明之鉢怛羅香涅槃之迦算香皆藿分名木本也即扶南國所言五香共一木根旃檀節沉香膠熏陸花雞舌葉藿香者是矣正旦所須草本也即南方草木狀所載之生成而嶺南尤多有之詩云食我場藿香草也蓋草木至南曰任任化育而於時為夏域其方者功能更忽霍而迅疾矣是主霍疾亂作於俄頃揮霍紛紜其如搖反諸手若去惡氣為對待治風水毒腫為達木止心腹痛及壅腫為發火定吐逆穌脾胃為奪土土鬱奪之火鬱發之木鬱達之正所以任化育而於時為夏為正位四氣主命曰藿香正氣者以此應劭風俗通云南方衡山一名曰霍霍者萬物盛長垂枝布葉霍然而大誠所謂任化育而於時為夏為大草木至南曰任相見乎離也大人以繼明照於四方宜為正位四氣主萱草宋嘉祐氣味甘涼無毒主治煮食治小便赤澀身體煩熱陰熱酒疽核曰萱宜下濕地處處田野有之初春叢生可作薦俎葉如蒲蒜而柔弱新舊相代四時長青五月抽莖開花六出四垂朝放暮蔫秋深乃盡花有紅黃紫三色結實三角子如梧子黑而光澤參曰爾雅翼云詩曰焉得諼草言植之背諼忘也衛之君子行役為王前驅過時不及其婦人思之則心痗首疾思欲暫忘之而不可得故願得忘憂之草而植之庶幾漠然而無所思然世豈有此物也哉蓋亦極言其情耳説者因萱音之與諼同也遂命萱為忘憂之草蓋以萱合其音以忘合其義耳然忘草可也而所謂忘憂憂之一字何從出哉此亦諸儒傅會之語也頤謂憂出於肺情之所鍾志之所悲神之所傷也是以憂悲則魄藏之金鬱經云金鬱則泄之所以忘其憂也而萱諧宣宣布也散也通也遍也風回宣而所以宣陰陽也宣之即所以泄之泄之即所以暢之暢之即所以忘之忘之則既順乃宣而憂可釋矣顧煮食主小便赤澀身體煩熱即疏云金鬱則泄之解表利小水也然則草木之情布在方策人未之思爾木賊宋嘉祐氣味甘微苦無毒主治主目疾退翳膜消積塊癥瘕益肝膽療腸風止痢及婦人月水不斷崩中赤白核曰出秦隴華成諸郡所在近水地亦有之苗長尺許叢生直上一根只一干無花葉狀似鳧茈苗及粽心草寸節中空又似麻黃莖而稍粗凌冬不凋四月採之莖幹糙澀治木骨者以之磋擦參曰木以金為賊金淫則木鬱矣木賊草獨干寸節具積籥以成升中虛凌冬合兩明而作離升木南征之象也蓋火為木子刑所勝之金復母所不勝之仇斯木用行肝膽益根竅開目眚除前陰疏月水調崩帶止後陰泄滯利行腸風已矣至若積塊癥瘕此以堅固歸金正所以驅木賊也然則翳膜之屬亦即堅固之金歟山慈姑宋嘉祐本草言葉如水仙花葉正誤指金燈花老鴉蒜為山慈姑矣鬼臼一名馬目毒公花不見天為羞天山慈姑葉不見花為無義末忘本乎本葉末乎慈憫姑恤何等思憶何等悲心猶言剝人面皮則恩稱怨怨稱恩所厚薄所薄厚信有之矣果是沒良心還是要出醜氣味甘辛微溫有小毒主治主癰腫瘡瘻瘰癧結核醋摩敷之剝人面皮去皯𪒟核曰生山中濕地唯處州遂昌縣者良冬月生苗如秋葉而稍小二月中抽一莖高尺許莖端作花有白色黃色紅色三種瓣上俱有黑點間雜衆萼攢簇成朵如絲絨紐結狀甚可愛也三月綴實子有三稜四月採根形似慈姑而小又似小蒜而毛遲則苗腐難覓矣一種葉如車前草莖幹花實則一也酉陽雜俎云花與葉不相見謂之無義草今人多以金燈花老鴉蒜根偽充之但此根無毛而光山慈姑茸毛固殼為異也採得曝乾修事去毛殼用參曰山慈姑剝人面皮化人疣贅其嚴命威毅而言慈者何然皯顏𪒟色癰瘻㾦瘰之人面目可憎厥形原無生人理矣此以中藏𢟧𢟨乃復現諸形色山慈姑慈憫姑恤亭毒藏陰既欲品成其形色寧惜剝化之勞乎一名無義草爰彼無義啓我哀矜宋玉九辨云廓落兮羈旅而無友生惆悵兮而私自憐燕翩翩其辭歸兮蟬寂寞而無聲胡盧巴宋嘉祐氣味苦大溫無毒主治主元臟虛冷氣得附子石硫黃主腎虛冷腹脅脹滿面色青黑得蘹香子桃核仁主膀胱氣甚效核曰胡盧巴一名腎曹都護生海南諸番今廣州黔州俱有不及舶上者佳春生苗夏結實秋採莢淘淨酒浸曬乾蒸熟炒過用參曰胡者斂互盧者火器巴者曲折三迥閬白水流也言能斂互水火兩腎之元陽蓋以功力為名矣故主元臟虛冷命門火衰不能斂互歸元者對待治之益右腎即所以暖丹田也若腎虛冷面青黧黑不唯火衰更屬卒滅必協附子石硫黃陽毒並行乃克有濟若膀胱氣上只須蘹香子桃核仁之回互引之易於歸納耳具金匱濟生以為體必藉臣使之佐以為用亦可並行亦堪獨往海金砂宋嘉祐氣味甘寒無毒主治主通利小腸得卮子馬牙硝硼砂療傷寒熱狂或丸或散核曰出黔中江浙湖湘川陝皆有生山林下莖細如線引竹而上高尺許葉如園荽花細而薄面背俱青皺紋緊簇紋中有沙狀似蒲黃不作花實根細堅強沙及莖葉皆入藥用七月採其全料日中曝之小干用紙承襯以杖擊之有沙落紙且暴且擊沙盡為度摘葉搗汁煮砂縮汞先人云似金而體輕似沙而質滑草氣之生沙猶水體之成冰合入足少陰腎足太陽膀胱主溺沙石者隙當參曰天池以納百川者海止而不盈尾閭泄之蓋言量也金者色沙者象形似蒲黃蒲黃四布花上黃金經久不變金沙四布葉下垂枝布葉下曲如鉤若夏火吐英之榮極時也第草木綻萼吐英黃布花心獨蒲布花上金沙布葉下者正所以表專精之在黃別百花之隨顯隨滅爾宜入心之府小腸經藥也小腸者泌糟粕傳大腸泌水道輸膀胱止而不盈決瀆以為量也梔子六出之冰花對待熱惱為清涼硼砂蓬轉如輪樞機迅捷牙硝緣水火以為性可從之以水逆之以火亦可逆之以水從之以火所謂奇之不去則偶之偶之不去反佐以取之礞石宋嘉祐氣味甘鹹平無毒主治主食積不消留滯臟腑宿食症塊久不瘥小兒食積羸瘦婦人積年食瘕攻刺心腹核曰出江北諸山有青白赭三色以青色堅細擊開有白星點點者為貴修治以大坩鍋一個用礞石四兩杵碎入硝石等分拌均炭火十五斤簇定煅至消盡星黃如麩金取出研極細水飛數過曬乾再乳萬匝參曰石以量言爾雅云日入為大蒙莊周云鴻蒙元氣相如雲蔑蒙踴躍也蓋水穀入胃受盛轉輸者量也設僅受不輸致陰凝至堅及營衛陰陽血氣津沫咸泣不流矣所謂馨飪之邪從口入者宿食也即驚癇咳喘亦從口受經云咳嗽喘急驚又云白脈之至也喘而浮厥癇有積氣在胸中也礞石功力發蒙腑臟之元氣使之踴躍而出花乳石宋嘉祐氣味酸澀平無毒主治主金瘡出血刮末敷之即合仍不作膿又療婦人血運惡血核曰出陝州閿鄉體堅重色正黃如石硫黃色間有淡白點一名花蕊石採無時大小間出方圓錯雜大者可以為器玉册云陰石也代州山谷有五色者可作丹砂匱室蜀中汶山彭縣亦有修事作釜固濟頂火煅過埋土中過宿取研如塵水飛三五度曬乾用參曰花者山之英乳者山之液石者山之骨也經云水勢劣火結為高山緣水火為因即緣水火為體用矣英即火用液即水體用行而體至之陰因陽為用也故主諸血為眚正體雖至而用失先之花乳先之以用佐之以體巽入自中營周經隧自強不息矣水勢劣火結為高山是故山石擊則成焰融則成水勢劣以少言非下劣也血者少陰君火之所主少陰者因陰以為體緣陽以為用是故君火以明非相火以位水銀粉宋嘉祐氣味辛冷無毒主治主通大腸轉小兒疳痹瘰癧殺疥癬蟲及鼻上酒渣風瘡瘙癢核曰升煉水銀粉法分紅白兩種白者用水銀一兩白礬二兩海鹽一兩皂礬一兩焰硝二兩同研不見星貯罐內先以滑石九兩研極細水飛過曬乾再研更以黑鉛四兩分作數塊打成薄片一層滑石一層鉛片鋪置藥上築極實上余空數寸使藥氣易轉以盞蓋罐口先於灰火中徐煨罐底聽罐里無聲乃扎定之用鹽泥封固罐口先用底火一炷香次用二寸火漸加至三寸火二炷香用火時以涼水嘗擦盞內火足去火冷定藥升盞上及空處矣紅者只用水銀一兩焰硝二兩白礬二兩同研極細升煉之法悉與白同即釜碗之內亦可升取並不必水擦釜頂為甚便也並不必沐浴以損藥力既用滑石黑鉛為匱則鹽礬咸澀之味俱從鉛石拔盡功力轉更神異但火候以緩為貴取藥以少為良此法為丹家不傳之祕頤不自私公之海內粉霜綱目氣味辛溫有毒主治主下痰涎消積滯利水核曰升煉之法用真澒粉一兩入瓦罐內以鐵盞仰蓋罐口鹽泥封固先以小炭火鋪罐底及四圍約香炷半嘗用水擦盞勿令間斷遂漸加火至罐頸約香一炷去火冷定霜即成矣參曰嘉祐所謂水銀粉今之所謂粉霜者是也綱目所謂粉霜今之所謂輕粉者是也第輕粉輕盈如雪膩滑如粉色純白無間不假外物升結釜頂所謂清秋月轉霜輪也蓋龍從火得金向水求正指此耳以澒木也龍丹之化也丹即丹砂火澒為習坎水轉作西白金離沉重化輕盈所謂顯諸金而凝霜白也故可入肺下痰涎消積滯利水道以除肺眚此藉輕盈以化沉重耳近世用點淫瘡致毒入浸骨髓或骨析筋焦肌糜膚剝死不藥救者以淫瘡從骨髓受還從骨髓出是轉沉重為輕盈用作點餌是轉輕盈為沉重仍從外入之內也若水銀粉者合皂白二礬石海鹽火硝而升者嫩色黃老色白取用貴黃不貴白也僅合白礬硝石而升者嫩色赤老色紫取用貴嫩不貴老也顧所升之質即本有能升之澒所顯之色與味之醇烈即緣鹽礬硝石合化以成黃白紫赤耳故味醇則氣清而色黃赤味烈則氣濁而色紫白黃赤點餌咸宜紫白必藉退卻陰符為沐浴不若鉛關寒水為匱之純粹精也所謂鴻洞未分之氣顯諸土而峭粉黃顯諸火而還丹赤從水覓金金從水得也故通肺腑之大腸殺肺形皮毛之瘡疥癬蟲及肩項肺部之瘰癧鼻根肺竅之酒渣風瘡瘙癢也近世以味醇黃嫩者點瘡毒頑肉赤嫩者彌諸瘡毒膚皮捷如影響亦可餌服淨潔淫瘡取效固速第骨髓與形臟之至毒從經氣會歸於胃循胃上口而出多致口爛舌斷人多畏之罔敢輕試蓋毒從口出已達空竅而反口舌斷爛者謂人臥氣歸於臟而會於胃胃氣上熏毒不得泄故併發口舌耳丹家祕訣臥時銜管則毒氣從管外泄斯無糜爛之為患矣婦人月水宋嘉祐氣味鹹平無毒主治主解毒箭並女勞復核曰月水素問謂之月經又謂之天癸丹家謂之月信又謂之紅鉛採取合法成服食上丹否則非徒無益而又害之矣女子二七月事始以時下而有子經行三日時日不移者為經為嘗或先或後或通或塞者為病為變三月一行者謂之居經一年一行者謂之避年一生不行而孕者謂之暗經受孕仍以時下者謂之盛胎受孕數月經忽大下者謂之漏胎每月數至或至無休息或大下崩決者謂之病經十二而孕六十尤乳者謂之變生皆非嘉品採取上藥須擇首經一法即收經水綿帛或紙用童溺漂洗即落烏梅煮汁點之鉛即澄澱於底泌去黃水淡灰裛干此屬下乘一法用黑鉛作偃月橐籥經至系之滿則傾置盤內以上乘秋石少篩經水之上即作薄衣浮結於上輕輕取起隨篩隨結以盡為度此屬中乘其最上乘者俟女子二七天癸將至眉心先有紅氣光豔奪目丹家所謂上應星下應潮者是也其法亦用偃月橐籥先以頭生男乳曬取成粉輕抹橐籥之內次篩上乘秋石於乳粉之上經至則系之經下遂結藥於橐籥之內矣傾去黃水隨篩隨系以竟為度首經者中結枚子或一或二或三次行者僅有散砂即無枚子採得枚子先煉五氣上丹制一金丸徑大九分丸分兩開中作子口上下俱實五氣上丹子口處須令均平次以極圓青豆置於金丸之中上下合成則中有圓竅即藏枚子于丹竅之內以蜂蠟封固子半之後午半之前護系童女臍上午半之後子半之前護系童男臍上滿四十九日枚子遂長滿其竅用時如法服食不則仍如前法護系此得之異授不敢自私用公海內先人云瀕湖未見神奇徒自妄詆若得童女首經內含至藥如不可得即未經殘破女子者亦堪服食以天癸為生身之基兩精相搏便生一人亦奇異矣一法用紅鉛三兩先以陽起石四兩乳細置銀釜之底次置紅鉛於陽起之上封固溫養七日後丹生其中色如桃花僅得百釐每用一釐重綿裹護子寅二時納左鼻孔行數百息即隨息入腦盡此百釐為返老還童長生不死之至實也欲識神異以死人脛骨鏤一小孔置數釐於孔內仍埋土中過宿至明起視枯骨如生或置分許於磁盤內覆磁杯于丹上水和麥面封固其口四圍緩火炙之麥面焦黑俟冷開視其丹盡滲杯內擊碎其砭都成丹色仍以杯砭乳細入釜溫養丹復提出毫末不減此亦異術也參曰服食家擇處子相好端潔生辰在仲秋者稟太陰金水之一氣作鼎甚良俟其蒸變已足黃道已歸上應星下應潮天癸至任脈通太衝脈盛月事以時下矣丹訣云三十時中兩日半二十八九君當算落紅滿地是佳期金水過時空涸亂故必三緣會合採取合宜時中月望乃結枚子如芥粒不假人力為也更煉龍虎兩弦退卻陰符進添陽火候七七光生食之接延壽命即女子未經破殘或生辰在四季余月者如法採取亦可卻病豈小補云乎哉近所尚者先天一氣已失僅取糟粕剩餘不唯無補於形神反致燎炎其焦府既失授受之源亦且擇非其鼎宜乎見者聞者棄之勿顧第十帙金櫻子蜀本草氣味酸澀平無毒主治主脾泄下痢止小便利澀精氣久服令人耐寒輕身核曰叢生郊野山林尤多唯江西劍南嶺外者最勝莖葉都似薔薇而多刺四月開花白膩夏秋結實實亦有刺大似指頂形如石榴而稍長核似大營子核而有毛參曰含桃曰櫻金櫻子色金色而形相肖也氣味酸澀平對待以治之經云澀可去脫開腸洞泄便溺遺失精氣溢瀉以及血液妄行寢汗不禁皆脫也倘澀因澀用亦莫之敢攖滑者澀之脫者收之對待法也澀因澀用為從治從治則反實其實矣雖然澀可待滑收可待脫還須裁其本度其標評其後先定其緩急不獨可以待諸標本亦可以順諸流行矣人胞拾遺身前身後事茫茫欲詁因緣恐斷腸已有著腳處了氣味甘鹹溫無毒主治主血氣羸瘦婦人勞損面皯皮黑腹中諸病漸瘦者治淨以五味和之如鎚餄法與食之勿令婦知核曰古方不分男女近世男用男胞女用女胞物各從其類也又云男病用女女病用男欲其以陽與陰以陰與陽則解也首胎者正中甲拆解孚之胞胞蒂居中次胎者側生旁拆便偏倚不正欲試男女投水頻攪頃之水定男覆女仰仰以象地覆以象天亦陽抱陰者覆陰抱陽者仰誠陰陽自然之形體也修事須擇首胎者佳次則健壯婦人者亦可先以米泔水擺淨貯竹器內注長流水中漂去惡血以近世耽淫胎嘗有毒惡血淨毒乃去也再以乳香酒洗過篾籠盛之烘乾研末蒸搗尤良第蒸時勿令氣走先人云精氣之括囊身形之芻狗同體之別別録之首參曰人胞一名混天母留愛為種納想成胎便裹胞衣範圍神室所謂天地之先陰陽之祖乾坤之橐籥鉛汞之括囊胚胎將兆我則乘而載之胞系系臍中有枚子名曰河車主吸呼胎息轆轤任督所謂龍虎兩弦噓吹盈望位育嬰兒之一氣也合而言之實先天之郛廓主培後天之形臟非草木金石之比蓋本其所自出以從其類也臟器所陳諸證皆屬形臟化薄吳球用治癲癇為表氣逆臟臟氣越表陰陽舛錯形神不俱故爾硼砂日華氣味辛暖無毒主治主消痰止嗽破瘕結喉痹核曰出南番西戎狀甚光瑩有黃白二種南番者其色褐其味和其效速西戎者其色白其味焦其效緩皆是煉結所成如硇砂類柔物去垢制汞啞銅知母鵝不食草蕓薹紫蘇甑帶何首烏皆能伏之同砒石煅過大有變化參曰命名曰蓬借喻以比量也蓬草之不理者遇風輒拔而旋故古者觀轉蓬為車輪之所繇始也而身亦有輪喉即呼吸之輪機廢則為痹咽即水穀之輪機廢則為腫舌即發聲之輪機廢則為木為強目即根識之輪機廢則為暗為障肺即遊溢朝使之輪機廢則為嗽為痿上焦即開發宣味之輪機廢則為噎為膈胃腑即腐化敷布之輪機廢則為吐為嘔為反胃陰器即轉輸決瀆之輪機廢則為癃為閉為諸淋為腫㿉雖氣亦有輪機廢則壅而痰結血亦有輪機廢則濡而瘕結整之以硼砂使旋轉如輪則形骸氣血凡廢弛者無所不運迭而捷行矣運迭捷行即機轉不回回則不轉乃失其機蘆薈宋開寶方言黑為盧書云下土墳盧宜乎狀似黑錫也有不得隱曲晉注謂不得作隱蔽委曲之事謬甚矣氣味苦寒無毒主治主熱風煩悶胸膈間熱氣明目鎮心小兒癲癇驚風療五疳殺三蟲及痔病瘡瘻解巴豆毒核曰出波斯國今惟廣州來生山野滴脂成淚狀似黑錫木脂也採不拘時一統志曰爪哇三佛齊諸國者狀似鱟尾草屬也採得以玉器搗成膏先人云有木草二種或國異形別無定準爾味極苦無出其右者對治以熱為因及熱聚所生之蟲類莫不精良參曰盧飲區也飯器也腹前也會總合也終始大計也宜入足陽明胃胃飲腑也谷委也行身之前也精氣之總合也經脈終始之大計也味大苦氣大寒主濡陽明燥化待標盛二陽隕胃家邪實蟲結者也故治五疳驚風先因於風也經云風為陽邪又云風者百病之始也致陽明失於遊溢遂成谷郁飲留為燥為標為實為結耳經云風中於前陽明受之故逐陽明之風其力轉勝若小兒驚癇多從胎受胎系腹前故也五痔瘡瘻亦生於風經云勞汗當風陷脈為瘻又云風客淫氣精乃亡邪傷肝也因而飽食筋脈橫解腸澼為痔至主鎮心黃汗此屬心脾並可絶其上源經云二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治父執沈啓翁庚申仲春同先人結社紫芝禪院誦華嚴大乘頤往隨喜夜坐與頤曰療小兒諸疳豫家世授疳非疳干也燥也宜從潤劑勿輔心脾否則轉病肺便難治矣越三日讀陰陽別論始解致病之因變生之證遂擬方説數十則呈正啓翁與所藏方強半相合大率諸疳皆本於風內薄心脾心脾不受因轉屬二陽二陽陽明也陽明居中土也無所復轉即病陽明經矣蓋陽明行身之前維蒸持變為形骸臟腑營衛脈絡之本病則蒸休變息黃道不歸女月不下男精不寫喜正坐俯臥有不得隱几而身曲甚則腑轉傳臟而風消氣轉成金而戟肺者死不治也勿輔心脾者當絶其上源宜從潤劑者法主乎中治謂陽明之上燥氣主之不從標本從乎中治中治者中見太陰濕土之化令燥化專令濕化待之寒熱溫涼則逆也至於氣運迭遷臟腑乘變其旨幽玄卒難闡發頤念啓翁一夕之誨永矢勿諼略言大端不敢妄泄其祕耳沒藥宋開寶氣味苦平無毒主治主破血止痛療金瘡杖瘡諸惡瘡痔漏卒下血目中翳暈膚赤痛久服舒筋膜通血脈固齒牙長鬚發核曰出波斯及海南今廣州亦有之其木根株俱似橄欖葉青茂密歲久者脂溢下地凝結成塊色黑而香狀似安息市肆多用松脂瀝清偽造入藥殊為患也參曰沒藥諧聲也水中有所取曰沒屈伸俯仰綴兆舒疾之文出於中散於外曰樂蓋人身精血膏液涕唾汗溺之屬皆歸於水如水中有眚則灌溉之用不行致筋不轉脈不搖齒不生發不長矣亦即屈伸俯仰綴兆舒疾之文不出於中不散於外矣沒藥功力能入水有取若眚翳除而筋轉而脈搖而齒生髮長成合自繇豈復有罔發於中失散於外為癥瘕為瘡瘍為痔漏為惡血為翳膜膚赤之患竹黃宋開寶氣味甘寒無毒主治主小兒驚風天吊去諸風熱鎮心明目療金瘡滋養五臟核曰竹黃生天竺國及南海鏞竹中一名天竹其內有黃如黃土著竹成片𥳍竹亦有之今大竹內往往亦得之矣今人多燒諸骨及葛粉偽造者宜辨也先人云植物之靈凝結在中故可入臟以治其結性本空達風火自平參曰竹具奇偶候節已言乎䈽竹矣六年而成疃周甲而再易若天以六為節因名曰天竹天竹者巨竹也津氣鍾而黃中作復若地以五為制五六相感太過不及於斯見矣故主風木太過致諸風熱熾驚風天吊邪薄癲狂風木不及致肝竅盲瞽失音不語客忤癇痓黃中廢矣竹黃功力使氣適至而陽生適應而揚聲揆度節制無過不及矣荔枝宋開寶氣味甘平無毒主治主止渴益人顏色核曰荔枝一名離枝丹荔始傳於漢世初出嶺南後生巴蜀今稱閩中者為第一廣蜀者早熟而肉薄味甘酸不及閩之下等者閩惟四郡有福州最多興化最奇漳泉次之延亙原野一家甚至萬株大者子盈百斛夏至將中則翕然丹赤可食矣以甘為味雖千百樹莫有同者性稟畏寒偏生暖地易植根浮材堅理密自徑尺至合抱經數百年猶結實纍纍結實時枝弱而蒂牢不可摘採必以刀斧劙取其枝白樂天圖序云形狀團團如帷蓋葉如桂冬青花如橘春榮實如丹夏熟朵如葡桃核如琴軫殼如紅繒膜如紫綃瓤肉潔白如冰雪漿液甘酸如醴酪大略如彼其實過之如離本枝一日色變二日香變三日味變四五日外色香味盡去也歐陽詞云絳紗囊里水晶丸曾吉甫六言二首其一蕉子定成噲伍梅丸應愧盧前金谷危樓魂斷白州舊井名傳其二紅皺解羅襦處清香開玉肌時繡嶺堪憐妃子苧蘿不數西施沐繼軒詩云建水夫何如厥土早而熱蠻花開佛桑候禽罷鶗鴂莽云覆溟濛梅雨滋吟翳接地茂緗枝遮空舒黛葉翠保霞焜煌錦握風掀揭香麝忌經過飛鼺防盜竊徑雛赤膚脫肥奢瓊瓤凸明璫怪可餐冰丸訝許齧真珠堆緑雲玳瑁乘彩纈鳳爪天下奇龍牙衆中傑飽食慚素餐長吟望林樾曾子固荔枝狀有中元紅孟家紅法石白叉頭顆一品紅狀元紅陳紫方紅緑竹丁香牛心虎皮玳瑁龍牙蚶殼真珠雙髻朱柿葡萄十八娘等凡三十四種十八娘深紅而細長以閩王女好食此而得名或云物之少美者為十八娘閩人語也故元人詩有青銅三百一斗酒荔枝十八誰家娘之句蔡君謨荔枝譜陳紫出興化軍祕書省著作佐郎陳琦家於品為第一其樹晚熟其實廣上而圓下大可徑寸有五分香氣清遠色澤鮮紫殼薄而平瓤厚而瑩膜如桃花紅核如丁香母剝之凝如水晶食之消如絳雪其味之至不可得而狀也江緑出福州類陳紫而差大獨香薄而味少淡方紅出興化軍尚書屯田郎方蓁家可徑二寸色味俱美荔枝之大無出此者歲生一二百顆而巳遊家紅種出陳紫實大過之宋公荔枝實如陳紫而小甘美無異出興化軍宋氏世傳其木巳三百歲藍家紅泉州為第一出尚書都官員外郎藍丞家周家紅初於興化軍稱第一及陳紫方紅出而周家紅為次何家紅出漳州何氏家法石白出泉州法石院色青白其大次於藍家紅緑核出福州頗類江緑色紅而小凡荔枝皆紫核此以緑見異圓丁香荔蒂皆旁大而下鋭此獨圓而味尤勝虎皮色紅絶大繞腹有青斑如虎文牛心以狀名長二寸余皮厚肉澀玳瑁實間黑點如玳瑁琉璜色正黃刺微紅朱柿色如柿蒲萄穗生朵集蚶殼形相似也蜜荔枝味過於甘水荔枝漿多而淡雙髻每朵數十枚並蒂而雙實真珠剖之純瓤圓白如珠故莆田荔枝名品皆出天成雖以其核種之終與其本不相肖宋香之後無宋香所存者孫枝耳陳紫之後無陳紫過牆則為小陳紫矣筆談謂焦核荔枝有言取其根火燔令焦復植於土以石壓之令勿生旁根其核自小里人謂不然此果形狀變態不可以理求或似龍牙或似鳳爪叉頭紅之可簪緑珠子之旁綴是豈人力所能為哉方紅之始作也欲重其名以二百顆饋蔡忠惠公詰以嘗歲所産僅此公曰方紅特異宜著於譜此後華實雖極繁逮至成熟所存未嘗越二百遂成定讖宋福清翁昭文先儒亢從子也圃中非時生荔枝其母曰豈有嘉客踵門耶頃之莆田林光朝至因名嘉客紅王十朋為泉州守有荔枝詩八章曰陳紫曰江緑曰皺玉曰大將軍曰玉堂紅曰奪先紅曰七夕紅曰白蜜福州志稱一品紅為極品又有狀元紅顆極大味甘清顆極小肉厚核細味極甘亦稱狀元紅桂林皮粗厚大如雞卵而味甘中冠體圓核小皮光薄味清甘金鐘形如鍾皮略粗厚色如硃砂勝畫皮厚刺尖味甘肉豐雞母引子朵數十枚大小錯生鳳池超實圓味甘駝蹄長大甘柔金棕上鋭下方有金線界錯其中礦玉皮粗厚味甘濃紅繡鞋實小而尖形如角黍味極香美龍牙色紅長二寸許上下俱方滿林香甘香倍於衆品鵝卵皮光無刺色正紅蜜丸味甘肉厚而顆圓白蜜皮色粉紅其甘如蜜雞肝實扁味甘色紅無核緑珠一名結緑俗呼緑荔枝實如山榛其味至清熟時實與葉無辨天柱樹高挺直如柱也其中品有饅頭磨盤醋甕馬先白柏葉薷將軍帽星球紅近時徐興公譜覆載有洞中紅淨江瓶陳山栗玉勝江萍興化有皺玉郎官紅遊丁香紫璚百步蘭壽香西紫黃香瑞堂紅麝囊紅百步香黃玉玉堂紅緑紗青甜蠟色霞墩黃石紅水留松蕾泉州有張官人馬家緑火煙柳棕緑衣郎漳州有大緑小緑余家緑水團陳紅黑葉等名變遷速計因象賦名百果之盛皆不及此參曰實綴枝頭牢不可摘荔力在枝因名荔枝去寒就溫丹實成夏垂枝布葉離火之象又名離枝又名丹荔色力咸勝體陰用陽駐顏久視之異果也合入手足少陰厥陰宣風木輔君火若經若腑若臟體用形氣是動所生靡不相應何首烏宋開寶藥有雌雄指花實之有無或形色之相肖唯何首烏色分赤白雌雄共生其地兩藤互為交解如天上夫妻目視執手以為淫事者也還須外息諸緣內心無喘堅固服食而不休息乃得形隨物外氣味苦澀微溫無毒主治主瘰癧消癰腫療頭面風治五痔止心痛益血氣黑髭鬚悅顏色久服長筋骨益精髓延年不老治婦人産後及帶下諸疾核曰本生順州南河縣今在處有之嶺外江南諸州都有以西雒嵩山河南柏城縣者為勝唐元和七年僧文象遇茅山老人始傳其事李翱乃著何首烏傳云何首烏者順州南河縣人祖名能嗣父名延秀能嗣本名田兒生而奄弱年五十有八無妻嗣嘗慕道在山一日醉臥山野間忽見有藤二株相隔數武苗蔓互相交結久之方解解之又交田兒訝其異至旦遂發其根無有識者後有山老來出而示之曰子既無嗣其藤乃異或屬仙草何不服之遂杵為末空心酒服一錢七日遂思人道數月強健倍嘗因而嘗服倍至二錢經年夙疾皆痊發烏容少十年內連舉數子更名能嗣子延秀服之皆壽百有六十孫首烏亦多子年百有三十發猶烏也因名首烏有李安期者與首烏同里得授其方遂敘其事而傳之春生苗蔓延竹木牆壁間如木藁狀雌雄共生其地雄者莖色黃白雌者莖色黃赤苗蔓時交結或隱化不見也葉似薯蕷葉而不光澤夜合晝疏又似合歡葉之晝開夜合也夏秋開黃白色花似葛勒花結子有稜似蕎麥雜小如粟粒根有五稜瓣似甜瓜形似連珠色分赤白白雌赤雄也在地五十年者似拳大號山奴服之一年發髭青黑一百年者似碗大號山哥服之一年顏色紅悅一百五十年者似盆大號山伯服之一年齒落更生二百年者似一斗栲栳大號山翁服之一年顏如童子行及奔馬三百年者似三斗栲栳大號山精或似鳥獸山嶽之狀此純陽之體服之成地行仙也修事春末夏中秋初三時候晴明日兼雌雄採之布帛拭去泥土生時勿損其皮烈日曝乾密器收貯一月一曝臨用去皮杵末酒下最良有疾者茯苓湯下以為使也凡服用偶日服訖溫覆取微似有汗不可令如水流漓導引尤良別用他制者無效也忌鐵器豬肉羊血無鱗魚萊蔔蔥蒜觸藥則無力矣先人云讀開寶主治屬內益精血經脈外榮鬚眉容色者也故根雖絶小藤蔓樂延乃得偏多外向以作春花之麗又云取雌雄之交全陰陽之真成有形之識非飛行之神參曰何首烏原名交藤以言象也緣唐李翱有何氏首烏傳宋開寶採附蔓草部遂拈何首烏為正據李傳此指事兼轉注為名矣蓋何即擔荷首上從鬊烏為日魄以言擔荷元陽標鬊以表法也觀夫赤白交結則金火亡刑火金合璧矣更觀夜合晝疏則通乎晝陽之闢則闢夜陰之闔則闔矣故餌食者全純陽之體成地行仙修事用大如三斗栲栳形似連珠鳥獸山嶽者良第近世所採僅大如拳如碗不易獲此奇珍者謂此鍾地靈轉鍾人傑必待人傑乃獲地靈耳即如拳如碗者雖無若大異功亦可維持四大卻病延年設地大失其堅固為癰為痔為瘰癧為癘風設水大失其潤濕為帶為淋為精竭為髓涸為血液枯設火大失其暖熱為冷為厥為卒中為心痛設風大失其動搖為攣為痿為身半不遂為行步不正仍可使風歸動搖火歸暖熱水歸潤濕地歸堅固而衆眚除駐五形充五臟美毛髮悅顏色此蓋益其壽命而強者也楞嚴經云堅固草木而不休息名地行仙形隨物化矣縮砂仁宋開寶唯能若伏若匿乃得能升能出以一物之奇具金匱濟生之用氣味辛溫澀無毒主治主虛勞冷瀉宿食不消赤白泄痢腹中虛痛下氣核曰生西海西戎波斯諸國今從東安道來嶺南山澤亦有苗莖並似高良薑高三四尺葉長八九寸闊半寸許三四月花開在根下五月成實五七十枚作一穗似益志而圓皮緊厚而皺有粟紋外刺黃赤一團八隔可四五十粒形似黍稷表黑裡白辛香似白豆蔻仁八月採取氣味完固也修事去殼焙燥研細用參曰花實在根若芙蕖之本斂縮退藏之謂仁矣固甲函孚界列八隔仁粒比砂攢簇實里可謂至密也已疏漏者曰砂鳴則亟奪其氣味而力不充猶夫其息以踵孕育元陽保任沖舉者也是故升出降入靡不合宜寧獨對待陰凝開發上焦宣五穀味蘇胃醒脾而已即虛可補胎可安崩可填驚可鎮癇可定滑可澀脫可收滲可彌奔豚可下及秋不能從外而內冬不能自上而下與命門火衰不能納氣歸元者亦可使之從降從入矣並命門火衰不能生土及春不能自下而上夏不能從內而外者亦可使之從升從出矣乃若解毒散滯伸筋舒郁化痞卻痛徹飲調中開噎膈攝吐逆此正開發上焦宜五穀味蘇胃醒脾之功力也毋僅瞻其升出失卻其降入顧名思義俯循垂象則得之矣骨碎補宋開寶漸而烈則漸中有頓頓而圓則頓中有漸理應頓悟事以漸消則麼生理會氣味苦溫無毒主治主破血止血補傷折核曰出嶺南虔吉州今淮浙陝西夔路州郡皆有寄生石上或木上多在背陰處引根成條上有黃白赤毛及短葉附之又抽大葉成枝葉長有缺頗似貫衆面色青緑有青黃點背色青白有赤紫點每一大葉兩旁各有小葉叉牙兩兩相對至春作葉冬則干黃無花實根扁而長略似薑形拾遺呼為猴薑江右人呼為胡猻薑日華呼為石毛薑皆形相似也修事其根用銅刀刮去黃赤毛細切蜜潤柳木甑蒸一日夜曬乾急用只焙乾不蒸亦得也先人云味苦走骨氣溫暖骨有火性者恐生懊悁參曰骨碎可補功勝補骨脂矣不唯勝負有別即頓漸有殊形臟亦有宜忌也補骨脂漸而烈骨碎補頓而圓左右平均轉無峻暴之失矣故溫歸於右此生氣之本也協苦性以走骨自內及外而皮毛皮毛者肺之合自外及內而兩腎功力到時莫不森榮互為變化則五臟之勞可充五形之極可裨毋慮氣血之不流傷折之難續與上熱下冷之藏宛形稿不充不裨者矣補骨脂宋開寶氣味辛大溫無毒主治主五勞七傷風虛冷骨髓傷敗腎冷精流及婦人血氣墜胎核曰補骨脂即婆固脂俗訛為破故紙者是也出波斯國及嶺南諸州今嶺外山阪間亦有之莖高三四尺葉尖小似薄荷花色微紫實似麻粒圓扁而黑宜九月採修事酒浸一宿灑出再用東流水浸三日夜蒸之從巳至申日乾用參曰骨者形之一腎之合也蓋形之所繇生必先骨髓始次及筋肉血脈皮毛曰五形即藏之所繇生亦必先腎之肝肝之脾脾之心心之肺曰五臟臟藏神形載氣也肝者筋之合脾者肉之合血脈者心之合皮毛者肺之合合則神與藏俱氣與形俱矣第腎獨有兩左曰水右曰命門火水即髓之源火即生之本本於陰陽其氣五藏五形皆通乎生氣失其所則折壽而不彰此壽命之本也固色黑從腎宜歸於左辛溫從火又當偏向於右矣是以兩藏咸交驅水火之精氣補裨骨髓髓者骨之脂也復從骨髓淫氣於骨散精於腎次第森榮互為變化則凡五臟化薄致五形離決而為勞為傷五形化薄致五氣消亡而為極為痹仍可使之次第森榮互為變化所謂骨氣以精謹道如法長有天命益智子宋開寶智者心有所知知必有言豈不知歲耶氣味辛溫無毒主治主遺精虛漏小便餘瀝益氣安神補不足利三焦調諸氣夜多小便者取二十四枚碎入鹽同煎服有奇驗核曰出崑崙國及交址今嶺南州郡往往有之顧微廣州記云葉似蘘荷長丈餘根上有小枝高七八寸無花萼另作葉如竹箭子從心出一枝有十子叢生大如小棗核黑皮白核小者佳含之能攝涎穢或四破去核取外皮蜜煮為粽味極辛美晉盧循遺劉裕益智粽即此是矣嵇康草木狀云益智子二月連花著實五六月方熟子如筆頭兩頭尖長七八分雜五味中飲酒芬芳亦可鹽曝及作粽食顧微言無華者誤矣今之益智子形如棗核皮及仁皆如草豆蔻云參曰蘇長公益智子記言海南産益智花實皆長穗而分為三節觀其上中下節以候早中晚禾之豐凶大豐則皆實大凶皆不實罕有三節並熟者其為藥只治水而無益於智其得此名豈其知歲耶頻湖備録其記嫌其終近穿鑿耳蓋不知五臟有七神脾土舍其兩曰意與智意者脾土之體智者脾土之用益智子益脾智之土用因名益智耳顧莖發中央綴子十粒具土體之位育土用之成數昭然可徵矣尚書曰土爰稼穡緣土以生物為用而爰生稼穡最得土氣之真即拈以徵土體之肥瘠淳暴寒暖優劣之為性也是知益智既益土用之智應與上中晚禾互為豐凶者以此其為藥以治水亦有故焉蓋水體潤濕水用動流所賴挾持不致泛濫者維土體用用作堤防堤防疏泄則為漏為瀝為遺為滑甚則為崩為潰為泛為濫矣味辛氣溫功齊火熱者脾以陽為用也於是上中下焦亦得藉之以驗豐凶此非益於智奚得此名豈唯知歲毋嫌穿鑿仙茅宋開寶氣味辛溫有毒主治主心腹冷氣腰腳風冷攣痹不能行丈夫虛勞老人失溺無子益陽道久服通神強記助筋骨益肌膚長精神耳目聰明核曰生西域及大庾嶺川蜀兩浙亦有葉青如茅而軟略闊於茅面有縱紋似初生棕櫚狀夏抽徑莖秋高尺許冬至盡枯春初乃生也三四月開花深黃色似卮子瓣不結實根獨豎而直大如小指下有短細肉蕤相附外皮稍粗褐內肉只黃白二八月採根曝乾衡山者花翠碧結黑子亦有白花似卮子者修事東流水洗刮去皮槐砧上以銅刀切作豆粒大烏大豆水中浸一宿醇酒拌挹蒸之從巳至亥曝曬用勿犯鐵及牛乳恐班人發也參曰仙茅陽草足厥陰中治足陽明氣化藥也陽明之上燥氣主之厥陰之中相火治之設陽明標虛厥陰中失者則宗筋縱攣痹不能行及心腹冷氣腰腳風冷丈夫虛勞老人失溺無子矣仙茅主益陽道潤宗筋刺骨而利關機為力甚易陰平陽祕人久服助筋骨益肌膚長精神耳目聰明通神強記誠駐形久視所必需物耳倘壯火熾然少火食氣者不堪僣服以功齊雄附而雄附但起貞下之元此更長淫業之毒慎之慎之白花蛇宋開寶沸湧流動宛如風行水上之渙象覺明空昧相待成搖故有風輪執持世界氣味甘鹹溫有毒主治主中風濕痹不仁筋脈拘急口面喎斜半身不遂骨節疼痛腳弱不能久立暴風瘙癢大風疥癬核曰原出南地及蜀郡諸山中今唯蘄蛇擅名即蘄地亦不易得市肆與官司所取多以江南興國州者偽充之蘄産者龍頭虎口黑質白花脅有二十四方勝腹有十點念珠子口有四長牙尾上有一佛指甲腸形如連珠脊中有兩腎宗奭云諸蛇鼻向下此獨鼻向上埤雅云蛇以眼聽捕蛇者言稍大者則易禁以其耳目開疾習於禁架也小者瞢然則往往難禁矣種類至多唯烏蛇性善不噬物白花者噬人有大毒元稹長慶集云白花蛇毒人毛髮豎立飲於溪水則泥沙盡沸唯蘄州白花蛇性少善故入藥取蘄産者為貴時珍云喜嗜石楠花葉嘗從藤上獲之先撒沙土一把則蟠曲不動遂以報伏雞藤系首懸挂劙刀破腹去其腸肚下置水一盂則反尾自滌其腹蓋護創耳乃以竹枝隨其蟠曲簽定盤系炕上焙乾爾雅翼云蛇死目皆閉唯蘄州者目開如生舒蘄兩界者則一開一閉此理之不可曉者土人云欲識真偽懸蛇於酒甕或缸上注酒數斗酒即沸湧流動若磁石之㶸鐵琥珀之拾芥然否則形色雖備亦無力也土人僅飲此酒亦獲大益得此品用供藥物功力真無限量矣雷公云蛇性竄能引藥至於有風疾處故能治風時珍云風善行數變蛇亦善行數變白花蛇又喜食石楠所以能透骨搜風截驚定搐為風痹要藥取其內定臟腑外徹皮膚無處不到也修事去頭尾春秋酒浸三宿夏一宿冬五宿炭火焙燥如此三次用砂罐盛貯埋地中一宿取出去皮骨取肉用即用此修事法密封收貯可經久不壞若連皮骨或著濕黴則易蛀朽敗矣參曰蛇字古但作它耳從蟲而長象冤曲垂尾形古草居患蛇故相問無它乎今之字旁加蟲而變其音考工記以為紆行之屬故退食委蛇亦用蛇字蛇性竄疾獨居處隱僻稟隨風重巽之體用風大動靜之本性故身形端直而象甲尾甲紆行而象乙雖標甲膽乙肝之木行復具時四干十枚十二節二十四之全數者也埤雅言蛇以眼聽爾雅翼言蛇死目皆閉蘄産者目開如生舒蘄兩界者一開一閉此理之不可曉者然肝開竅於目莊周云蛇憐風風憐目故蛇聽以眼精專於目蘄東南也具巽位之生成故至死不變耳埤雅言蛇盤向壬壬北方也又言十二子辰為龍巳為蛇巳六陽具不為龍而為蛇者龍至此而亢宜為蛇而已然壬固位北而蛇不歸坎此以丁向壬丁壬合而化干之風木亥向巳巳亥對而待枝之風木豈能至此而亢宜為蛇而巳故蛇有兩腎左曰水臟亥枝之陰水右曰火臟壬干之陽水有壬巳則有丁亥有流行則有對待有干木則有枝木矣又不獨精專膽竅且精專膽腑觀蚺蛇膽隨日轉上旬在頭中旬在心下旬在尾更有應膽擊首則應首擊尾則應尾擊左右則應左右取而還生者應膽也精專肝膽斯足徵矣更觀螣蛇雄鳴上風雌鳴下風而化成形遊於霧露乘於風雨行非千里不止稟隨風重巽之體用風大動靜之本性亦足徵矣先人云蛇稟風性白花者更秉金制則凡風力有所不逮動搖失矣用益風大之力仍相待成搖互持四大中者莫良於此是以力主中風微則痹閉不仁或瘙癢或疥癬甚則暴風大風或筋脈拘急骨節疼痛或口面喎斜半身不遂或腳弱不能久立此皆風氣通於肝肝臟筋膜之氣也大筋聚於節筋骨相親著也所謂微則侮己所勝之土埃土飄揚丘陵崩潰甚則病已所賦之形草木搖落摧拉傾僕者是也柳柳宋開寶莊周以松柏獨受命於地冬夏青青比舜之受命於天柳之從聖亦以此歟氣味鹹溫無毒主治主剝驢馬血入肉毒取木片火炙尉之並煮汁浸之核曰出河西所在亦有喜生沙地水旁插之便生干小枝弱皮赤如絳葉整如絲一日三眠起一歲三秀實穗長三五寸如蓼花水紅色婀娜可愛爾雅翼云柳河柳也郭璞以為河旁赤莖小楊也天之將雨柳先起氣以應之故一名雨師字從柳字説云知雨而應與於天道木性雖仁聖矣猶未離夫木也小木既聖矣仁不足以明之當音赬為赤之貞神降而為赤曰柳也非獨知雨亦負霜雪有異余柳段成式云赤白柳出涼州大者為炭入灰汁中可以煮銅則柳又有白色者矣農書云山柳白而明河柳赤而脆南都賦注云柳似柏而香柳中有脂稱柳乳云先人云柳柳不與生長收藏相流通超五行純二氣無殺罰唯生豫顧陰陽氣和而雨先知之應可類推矣當匹陰陽和平之人啓陰陽自和之汗參曰詩疏稱柳柳曰雨師謂其具通而先識也故天將雨必先起氣以應之經云地氣上為云天氣下為雨雨出地氣云出天氣亦可稱柳柳曰云母矣爾雅一名西河河者水之源水之伯也一歲三花一日三眠三起即其氣三三而三之合為九野九野為九藏九藏者神藏五形藏四也然則柳柳功力不獨僅通假氣為痞剝驢馬血入肉毒而已繆仲淳先生本草經疏廣之以治沙疹此不獨取其能通又取其象形疹亦三顯三隱三而三之合為九烹以應九藏人能於此從指事會意假借轉注觀色身無病不可治世界無物不是藥矣詩云啓之闢之其柳其椐然則柳亦良木矣使君子宋開寶氣味甘溫無毒主治主小兒五疳小便白濁殺蟲療瀉痢核曰出嶺南今閩之邵武蜀之眉州皆有生山野及水岸藤蔓如葛繞樹而上葉青緑如兩指頭長二寸許四五月開花一簇一二十葩淡紅輕盈如海棠作實先黃老則紫黑大類卮子殼有五稜中仁如棐色味如栗七月採取久則油黑不堪用矣參曰華瓣五出實介五稜中仁軟美甘潤溫暄誠脾臟之委任具脾腑之體用者也故主脾失委任而致五疳水無承製而作溺濁胃廢體用而生蟲蠹及瀉痢者使君子躬行克盡執揚苦欲綏柔臟腑因以命名與協味之辛烈而威刑者不相侔也烏藥宋開寶氣味辛溫無毒主治主中惡心腹蠱毒疰忤鬼氣宿食不消天行疫瘴膀胱腎間冷氣攻衝背膂婦人血氣小兒腹中諸蟲核曰生嶺南雍州容州今台州雷州衡州皆有以天台者為勝本似茶而高又似樟而矮皮木亦作樟氣葉微圓而尖面青背白狀類鰟魮四五月開花細碎淡黃灰白六七月結實似冬青子生青熟紫核殼極薄仁香微苦根似山芍藥及烏蹄根色黑褐中心作車轂紋形如連珠者佳參曰烏藥氣秉陽暄中紋似轂而日魄為烏堪天行輿地道誠扶輪佳氣也故主根身之中或氣或血或內所因或外所因或馨飪之邪或死厲之屬陰凝留礙有妨生氣者仗此陽暄以之救藥五倍子宋開寶氣味酸平無毒主治主齒宣疳𧈟肺臟風毒流溢皮膚作風濕癬瘙癢膿水五痔下血不止小兒面鼻疳瘡核曰五倍子在處都有蜀中者為勝樹名膚木生叢林中本末俱青六七月無花作子子生葉底初起甚小漸大如菱嫩時翠緑老則黃褐介甲中虛堅結頗脆內有白膜霜降採子曝乾用染重玄遲則殼薄易腐參曰木以膚名精專皮外之膚矣經云夏日在膚泛泛乎若萬物之有餘又云五六月陽氣在表垂枝布葉皆下曲如鉤為太陽淪膚之盡太陰膚受之始效象陰陽纍球葉底小則如黍如粟大則如菱如栗名五倍子者以此假木氣以賦形中有白膜如蠓蠛緣濕以合感而應生木眚自成非關外物耳故主肺臟風毒流溢皮膚面鼻正皮膚者肺之合面鼻者肺之候也若五痔下血為肺臟之邪出授大腸腑器若齒宣疳𧈟為燥金上病假合清肅以濡之至於清暑止渴療咳嗽通喉痹化痰癖逐淡陰主泄痢收肛脫此屬肺金腑臟之變眚若小兒尿血又屬遊溢精氣通調水導下輸膀胱用泄金氣之郁矣木命在皮各有專精或果或仁或枝葉或根干各備全木之體用此獨精專於皮皮復精專於膚膚更精專於葉膚之膚子若侵淫膚眚用主侵淫膚瘡功必勝於胡粉不屬蟲卵不屬果實此屬假木氣以賦形又生成葉膚之膚子濕生亦可化生亦可蓽茇宋開寶氣味辛大溫無毒主治主溫中下氣補腰腳殺腥氣消食除胃冷陰疝癖核曰蓽茇番語也陳藏器本草作畢勃扶南傳作逼撥大明會與作畢茇摩伽陀國作蓽撥梨拂菻國作阿梨訶陀近世作蓽撥不知蓽茇名矣原出波斯國今嶺南特有之多生竹林內二月抽苗作叢高三四尺莖如箸葉如蕺色青形圓闊二三寸亦如桑面光且厚三月開花白色在表七月結子如小指大長二寸許色青黑類椹子而長根如茈葫但黑硬耳九月採實曝乾南人愛其辛芳取葉生茹之舶上來者色臭更勝也段成式言青州防風子可亂蓽茇但形短耳修事去挺用頭醋浸一宿焙乾刮去皮粟子令淨否則傷人肺令人上氣也參曰畢者用以掩兔羽獵賦云荷垂天之畢也茇者走犬曳其足則茇矣味大辛氣大溫故主溫中對待冷陰至堅下氣其驗也殺腥氣者秋金氣肺主氣肺臭腥故也攻而舉之若網羅之殆盡蓋以功力為名也嫌於無陽者乃可攻而舉之否則略開一面庶不至網羅殆盡南燭宋開寶氣味苦平無毒主治主止泄除睡強筋益氣力久服輕身長年令人不飢變白卻老核曰生嵩高少室今江左吳楚山中皆有亦可植之庭除圖經名南天燭古今詩話云即楊桐也其種似木而類草故又名南燭草木男續後草猴藥維那木草木之王凡六各從邦域所稱正名則南燭也本至難長初生似菘菜一紀後漸長成株高三四尺亦有盈丈者莖似蒴藋枝節微紫質極柔脆易於摧折葉似山礬光澤圓厚冬夏嘗青其味少酢七月開花結實生青熟紫得霜則絳赤如丹酸美可食也先人云臨水者尤茂寒食採其葉漬水染飯色青而光能資陽氣大獲嘉美參曰具木體用而曰南燭者地中有木南征吉也燭者庭燎與貞明不息也觀主除睡則得之矣肝主色肝色青筋者肝之合也故主強筋變白卻老亦若食氣入胃散精於肝淫氣於筋也故久服不飢益氣力輕身長年一名男續一名後草又不獨培色身之形臟並可令精氣溢瀉而有子一名草木之王王讀旺謂其偏於升出各旺百八十日以成歲不雕之義見矣服草木之王氣與神通食青燭之精命不復殞豈屬寓言徒供觀聽馬兜鈴宋開寶氣味苦寒無毒主治主肺熱咳嗽痰結喘促血痔瘻瘡核曰出關中及河東河北江淮夔浙諸平澤叢林間春時蔓生附木而上葉似羅摩葉圓厚且澀入夏作花色青白結實似桃李而長霜降葉脫垂垂似鈴枯則四裂中仁似榆策根色黃赤似防己稍小而扁作葛根及木香氣修事採實去葉蔓置絹囊中懸東屋角畔俟干劈開去革膜只取淨子焙乾用參曰形似馬兜之鈴高懸四裂肺金之象也氣味苦寒對待肺熱葉焦為咳為喘為痰結或移熱於腑為痔為漏為腸癰或發於廣顙為瘻為瘡為瘰癧或失於遊溢為癃為淋為水腫或橫乘火位為噦為啘為心痛莫不以熱為本以肺為標宜虛其實毋虛其虛肘後名都淋藤大明名雲南枝蜀本名獨行根事物異名名玉皇瓜唐本名土青木香各隨根莖花實以肖形也綱目名三百兩銀藥此理數之不可曉者荊三稜宋開寶氣味苦平無毒主治主老癖癥瘕積聚結塊産後惡血血結通月水破胎止痛利氣核曰舊不注所産土地今荊襄江淮河陝皆有之多在淺水旁或荒廢陂池濕地間春時叢生夏秋抽莖莖端復出數葉開花六七枝色黃紫作穗細碎列子如粟莖葉花實俱有三稜並與莎草一樣但極長大其本光滑中有白瓤剖之織物柔韌如藤本下有魁初生成塊如子附子亦有扁形者從旁橫貫一根復連數魁或作苗葉但都長扁須皮黃褐削去須皮宛如鯽狀體重者荊三稜圓小如梅者黑三稜鉤曲如爪者雞爪三稜因狀賦名各適其用本非兩物也參曰固以形地舉亦以功用言李廣傳云威稜憺乎鄰國故主老癖積惡匪此破敵不滅不格矣穀精草宋開寶氣味辛溫無毒主治主喉痹齒風痛諸瘡疥核曰江湖南北都有春時叢生荒谷田中莖葉都似谷秧高五七寸柔嫩青緑八九月莖端開花白色點點如亂星餒馬令肥並主蟲顙毛焦之疾一種莖長有節根微赤者出秦隴亦入藥用先人云谷金屬也交草谷之精而化生輕浮潔白秋成得辛清肅之象也喉齒頭目之疾本乎風木標見陽明之上者從治其標逆治其本並治小兒諸疳雀目佐以禽畜之專藏用開竅穴特易易耳參曰谷之言續精之言神觀而鑿鑿者陽之睛也一名戴星文星流星説文云星之言精也陽之榮也故白花點點猶星星也天文志云金之散氣為星其本曰人孟康云星石也金石相生人與星氣相應而成睛也是故力平肝木之風以通喉痹布散翳膜之障以開盲瞽謂其不穀仍續神觀鑿鑿之以陽為睛也若瘡疥淫瘡為火刑金地致金不穀仍可續之若鼻衄不止為木用太過而血菀於上亦屬金之不穀無以乘氣於木下也穀精草布散以金氣火自安其位木亦退其舍矣金位之下火氣乘之火位之下陰精乘之亢則害乘乃制制則化生矣星者散也位布散也宿者宿也星各止宿其處也延胡索宋開寶氣味辛溫無毒主治主破血婦人經水不調腹中結塊崩中淋露産後諸血病血運暴血衝上因損下血煮酒或酒磨服核曰原名玄胡索避宋真宗諱易玄為延也出奚國從安東來奚即東北夷今茅山上龍洞仁和筧橋亦種之寒露前栽種立春後生苗高三四寸延蔓布地葉必三之宛如竹葉片片成個細小嫩緑邊色微紅作花黃色亦有紫色者根叢生樂蔓延狀似半夏但黃色耳立夏掘起陰乾者良石灰煮曝者性烈不堪入藥也修事酒潤或醋潤蒸之從巳至亥俟冷取出焙乾研細用先人云名玄而色黃醞全氣也氣溫而味辛秉金制也以一春而備四氣葉必三之具木生數象形對待肝血之非其所藏而玄為破堅之線索無疑矣參曰玄者象幽而入覆之也荀子云周密則下疑玄矣胡者牛頷垂也狼亦有之豳風雲狼跋其胡載疐其尾又云狼疐其尾載跋其胡索者盡也散也騷云憑不厭乎求索檀弓云吾離群而索居以言疾疚之證因以言主治之功力判屬血中之氣藥氣中之用藥也蓋氣主噓之血主濡之氣之所不噓即血之所不濡矣如腹中結塊募絡癥瘕之為證既血留營實之為因如臚腹氣塊盤繞疝㿗之為證即氣滯衛實之為因如崩中淋露運衄沖暴之為證即血菀營泣之為因如奔豚逆厥百體疼煩之為證即氣弛衛薄之為因玄胡立鼓血中之氣震行氣中之用虛則補實則平致新推陳推陳致新之良物也雖象幽入覆之如胡憑不厭乎求索之殆盡命名玄胡索者以此有是因必有是證因證既顯嘗法已具始可與言變矣燈心草宋開寶氣味甘寒無毒主治主五淋敗席尤良核曰出江南及陝西澤地他處雖有野生但不多耳叢生圓徑與龍鬚草同類龍鬚草莖小瓤實燈心草莖肥瓤虛為別也土人選長大者蒸熟待冷劈取白瓤為炷短細者唯堪織席用皮作蓑謂之夫需質之柔脆性之溫涼各隨水土以分優劣修事取生劈者良或飲或膏或末或圓各從方制若輾末使每用生劈白瓤十斤以米粉調煮稀薄漿水拌潤一伏時曬燥輾末入水澄去漿粉取浮起者曝乾收用先人云外剛內柔表青里白具乙木之氣稟燥金之化體浮用升故能齊通竅穴咸遍腑臟奇方之輕劑通劑也參曰草瓤用以然燈與貞明不息之機矣耎弱而滑輕虛而浮端直而長象一陽之始生自下而上用行體至之發陳物也顧肝之為用疏泄前陰不行焉則為癃為淋為水腫又肝之為用從踵徹巔不及焉則為急喉痹為兩脅胠滿太過焉則為眩冒為目不夜合此不循倫次而允升一唯迅疾而自上所謂浮沉則順之反乎溫涼則逆也木自火出性緣物顯用行體至燈燈續明柔以明升積小以高大廢固不行緩則不及急則太過矣白豆蔻宋開寶氣味辛大溫無毒主治主積冷氣止吐逆反胃消穀下氣核曰出伽古羅國呼為多骨今廣州宜州亦有之不及番舶來者佳本似芭蕉葉似杜若長八九尺光澤而厚冬夏不凋開花淺黃色結子作朵似葡萄初出微青熟則紅白殼白而厚仁似縮砂仁也修事去皮微炒用參曰谷府之受盛水穀以成醞釀若釜中之靡爛有形也其所以成醞釀者藉腎間動氣曰先天又若釜底之灼然薪炭耳更藉肺氣吸呼曰後天又若釜底薪炭輪機動扇乃得灼然薪炭耳白者肺色潔白以成休德也豆者腎谷受盛膹肉之釜器也味大辛氣大溫寧非火然泉達之機乎蔻者寇也當其完聚而即寇之也是以醞釀成精氣當其完聚肺即寇之轉灌溉朝百脈留四藏歸權衡成休德矣主治證名能以此反復推度便可迎刃而解三緣和合體用始備宛如字缺一已不成三王維詩云三點成猶有想肉豆蔻宋開寶事物異名云一名迦拘勒一名脾家瑞氣氣味辛溫無毒主治主溫中消食止泄治積冷心腹脹痛霍亂中惡鬼氣冷疰嘔沫冷氣小兒乳霍核曰肉豆蔻即肉果生胡國胡名迦拘勒中國無有之令嶺南人得種種蒔矣春生苗夏抽莖開花結實都似草豆蔻皮肉之顆則不同其顆外有皺紋內有斑纈紋宛似檳榔紫白相間也修事用糯米粉熟湯和搜裹包其實粳灰火中煨熟去粉用勿犯鐵器參曰樂音曰肉禮記云寬裕肉好之音也方氏云璧外謂之肉內謂之好輔氏云肉好猶言美滿樂聲肥也肉器曰豆詩云於豆於登豆薦菹醢登盛大羹也物盛曰蔻説文云從支從完當其完聚而蔻之也蓋府器之薦登谷者胃其受盛者體轉輸者用也設具體無用則穀食不消心腹脹痛霍亂飧泄嘔沫乳霍矣此以寒中積冷中惡鬼氣之所致肉豆蔻秉剛燖氣味鼓發中黃寇之使出所謂開發上焦宣五穀味而為養宣五畜味而為充充則肌肥而美滿養則膚潤而媚好命名肉豆蔻者以此以受為體以輸為用具體無用則能受不輸中消洞泄之類可比量推度矣山豆根宋開寶氣味甘寒無毒主治主解諸毒藥止痛消瘡毒腫除發熱咳嗽治人及馬急黃殺小蟲核曰出劍南宜州果州及廣西忠州萬州莖蔓如大豆葉青翠經冬不凋廣南一種如小槐高尺許石鼠啖其根捕取者收其腸胃曝乾用以解毒攻熱云甚效參曰宣散氣生曰山食肉皿器曰豆蓋言受納腐化者胃也一名黃結以病狀言一名中藥以功用言種種功用種種病狀悉從中樞散宣生氣所謂解從結心解即分散密蒙花宋開寶氣味甘平微寒無毒主治主青盲膚翳赤腫多眵淚消目中赤脈及小兒疳氣攻眼核曰出蜀中州郡利州甚多木高丈餘凌冬不凋葉似冬青而厚柔而不光潔而淺緑背有白毛花細碎數十房成一朵冬生春放色微紅紫二三月採取曝乾用修事酒浸一宿漉出候燥潤蜜令透蒸之從卯至酉日乾再潤蒸曬凡三次每花一兩用酒半兩蜜半兩為度參曰冬季孕萼繁密春仲作花錦簇先君云具冬營春榮之序爾開寶陳列諸證咸屬肝木失序致令目眚自成妄生節目密蒙象形對待治之説文云瞳矇曰矇有目無眸也周禮云樂師有瞽矇目不明禮記云昭然若發矇矣此以功用為名也威靈仙宋開寶氣味苦溫無毒主治主諸風宣通五臟去腹內冷滯心膈痰水久積癥瘕痃癖氣塊膀胱宿膿惡水腰膝冷疼療折傷久服無有溫疾瘧核曰出商州上洛山及華山平澤今陝西河東河北汴東江湖州郡皆有生處不聞水聲者良生先衆草初起作蔓莖如叉股而四稜葉如楊柳而層疊每層六七葉環列如車輪七月開花六出淺紫色或碧白色作穗似蘭臺子及菊花頭狀實青色根稠密多須似谷歲必敗朽次年旁引生苗年久轉茂一根叢須數百條長二尺許九月採根濕時色黃黑干時色深黑俗呼鐵腳威靈別有一種根鬚都一樣根色黃或白者並不堪用修事陰乾月餘搗末篩過用忌茗及面汁參曰有威可畏有靈可通仙化遷變以為體用者也味苦氣溫性秉風火風得之而作夏脈得之而流行宣發陳通橫遍空所有實所無急方之宣劑通劑也先人云威武靈奇仙趣也其性快其效速其力峻其禍深如商君之治秦立徏木之命令朝示而夕行者也故主久疲宿冷之痼疾元陽委頓猶貫朽粟紅但少設施者藉此便成大觀倘兵柔餉乏作此背水陳終非萬全策耳豎窮三際橫遍十方空諸所有實諸所無方盡得仙化遷變神運無方之妙用甘松香宋開寶氣味甘溫無毒主治主惡氣卒心腹痛滿下氣核曰甘松香金光明經謂之苦彌哆出姑臧涼州諸山今黔蜀州郡及遼州亦有葉細如茅引蔓叢生根極繁密八月採根作湯沐浴令人體香用合諸香及以裛衣參曰臭味如松香草也宜入脾脾味甘脾臭香脾之陽分用藥也功奪土鬱土鬱則奪之行土用也繇是天氣明地氣清土位乎中而暢於四支美之至者也地氣冒明只須降濁濁降則明體自著若欲升清反致濁矣續隨子宋開寶氣味辛溫無毒主治主婦人血結月閉瘀血癥瘕痃癖除蠱毒鬼疰心腹痛冷氣脹滿利大小腸下惡滯物核曰續隨即千金子拒冬聯步菩薩豆也所在俱有南中尤多入藥以南産者為勝苗如大戟初生一莖葉在莖端葉復生莖莖復生葉轉展疊加宛如十字作花亦類大戟但從葉中抽乾並結實耳修治去殼取其色白者綿紙包裹壓去油用先人云嘗見半枝蓮葉上生葉儼如十字春分葉中抽莖莖必三之葉如蓮瓣裹莖而上入夏開花作實實必三稜子必三粒外肉青軟子殼則堅上半黑褐下半黃白內仁如玉溫潤如脂土人稱半枝蓮用治蛇虺螫蠍之毒立有奇驗讀宋開寶始知即續隨子也參曰續隨子葉中出莖以莖之一合葉之二奇連偶斷其數三也春半葉中抽莖夏半實作三稜列子三粒莖只三之葉只二之次第重之生復續續復隨三相參五相伍生道無端唯數可倚而不可違也如營衛周行行必有紀行周不息如環無端生氣乃治自無血結目閉瘀血症瘕營行失於隨續之眚矣亦無痃癖蠱疰冷氣脹滿衛周失於隨續之眚矣續隨辛暢溫燖維數可倚周行不息仍不違於嘗數之紀爾以莖之一合葉之二為剛來而下柔動而説隨從之象也蓬莪朮宋開寶好者尤稱毒藥不得輕下毒手氣味苦辛溫無毒主治主心腹痛中惡疰忤鬼氣霍亂冷氣吐酸水解毒食飲不消酒研服之又療婦人血氣結積丈夫奔豚核曰生西戎廣南諸州江浙或有之三月生苗在田野間莖如錢大高二三尺葉色青白長一二尺大五六寸頗類蘘荷五月黃花作穗花頭微紫根如生薑而術在根下狀如雞鴨卵大小不一好惡並生惡者有毒西人取之先放羊食不食者棄之陳藏器云一名蓬莪黑色二名術黃色三名波殺味甘有大毒也修事九月採術削去粗皮蒸熟曝乾臨用時於沙盆中醋磨令盡然後火畔㶸干重篩過用參曰蓬莪朮惡草荄也根形如卵好惡並生惡者大毒殺人好者毒藥攻疾諧聲逢我戍若逢君之惡取戈自持擊傷以滅之也氣味辛溫對待冷惡疰鬼為因變遷種種形證非此入破未易剪除耳木鱉子宋開寶四王忉悧共相抱夜摩執手兜率笑他化自在眼相覷此則名為六欲樂氣味甘溫無毒主治主折傷消結腫惡瘡生肌止腰痛除粉刺皯𪒟婦人乳癰肛門腫痛核曰出朗州及南中今閩廣諸郡杭越全嶽亦有蔓歲一枯根則不死春復旋生亦可子種種時須雌雄相配紅繩扎定排埋土中及其生也則去其雄方結有子作藤布葉都似薯蕷但葉作五丫色稍嫩緑四月黃華六月結實生時青碧熟則紅黃殼有軟刺纍纍如苦瓜錦荔枝狀每一實有子數十枚長三四分圓扁礧砢形狀如鱉一頭尖者雄種也八月採取中仁青緑修事去油用參曰蔓草曰木以用言也實核曰鱉以形舉也言能以疏泄為己任根身之結者則疏之壅者則泄之經云肝主疏泄寧獨二陰而已乎藥有雌雄此指枝幹已成別花實之有無或形色之相肖假喻而言也若何首烏色分赤白兩藤時相交解如天上夫妻目視執手以為淫事者也唯頓遜國有木曰互婚華似牡丹根干之間實有其具晝則分開夜則聯合如人間夫婦實有淫業者也獨木鱉子胚胎未兆先為匹配而後生生而後有子此又雌雄之異類者矣傳云未有學養子而後嫁此更學養子而後生通脫木法象氣味甘淡寒無毒主治主利陰竅治五淋除水腫癃閉明目瀉肺核曰出江南生山側高丈餘如萆麻狀花上有粉莖中有瓤輕白而柔女工用以飾物不知起自何世漢王符潛夫論固已譏花采之費至梁宗懍記荊楚之俗四月八日有染絹為芙蓉捻蠟為菱藕亦未有用此物者今則通行於世矣或作蜜煎充果食之甘美俗呼通草參曰草類木狀白瓤理通而輕脫也木乘金制曰倚金體用行曰商受前此之木生後此之金離南而轉西矣蓋通因塞用脫因澀用木司陰竅肝所主也故主利陰竅治五淋除水腫下乳催生解諸毒蟲痛耳明目者上通其木竅瀉肺者泄肺之金鬱金鬱則泄之解表利小水也然則泄金之用正所以輔金之體行木之用耳別名倚商離南者以此紅曲補遺氣味甘溫無毒主治主消食活血健脾燥胃治赤白痢下水穀核曰用白粳米一石五斗水淘浸一宿蒸之成飯分作十五處入曲母三斤搓揉令勻復並作一處遂以帛密覆之熱即去帛攤開覺微溫遂復堆起又以帛密覆之次日日中又分作三堆越一時分作五堆再一時復合作一堆過一時又分作十五堆俟稍溫又復合作一堆如此數次乃止至第三日用大桶盛新汲水於桶內以竹籮盛曲分作五六分水中蘸之完時又作一堆仍如前法作一次第四日如前又蘸若米半浮半沉仍如前法作一次復蘸之米盡浮則曲成矣取出日乾收之其米過心赤者謂之生黃未過心者不堪入藥陳久者良參曰稻之不黏者為粳米粒如霜性尤宜水溉種之谷也郁之使塵華為赤過心者赤心為大赤法出近世亦奇術也金谷曰粳性宜水者即金向水求胎藏水母中也易以坎為水為赤干為金為大赤顧谷之能為赤為大赤者其唯稻之粳乎藉金水以相資亦非本有之形色假人力而成者也故女工曰紅紡績織紝功力之謂也郁粳造麴使之衣生令之心赤亦孰非功力之使然乎是故谷入於胃乘中黃之生氣升出之降入之奉心化赤乃得流溢於中布散於外精專者獨行其經隧嘗營無已終而復始也設中黃生氣息則升出降入廢上焦亦不為之開發五穀亦不為之宣味水食亦不消血凝亦不流胃濡脾憊停而成飲矣留於中則為蠱溢於外則為腫注於下則為淋為帶為痢矣稻粳郁之為赤為大赤巳若奉心化赤矣則從前生意已成其終餌之以赤以大赤嗣後生意寧不以成其始乎誠金胎水中為先天木藏火里為後天孕育之基中黃戊己也合物我為互交分成兩象者復還圓相矣致飲之因變生之證從來未經發覆能於此比量推廣法不可勝用矣若只作紅曲參失卻許多看書法門仲淳繆先生為人處方每脾胃疾必多用紅曲又嘗見先生酒後次早單以此種作丸必大啖之庚申中秋曾與頤言白粳蒸罨變赤而成曲如水穀醞釀化赤而為血其主脾胃營血之功有同氣相求之感蟲白蠟會編氣味甘溫無毒主治主安五臟美毛髮生肌止血續筋接骨補虛定痛核曰蟲白蠟蠟蟲營造女貞木上者也出川滇衡永者力勝土人多種之即名蠟樹狀似凍青負霜蔥翠振柯凌風因名女貞其蟲嫩則色白造蠟秋深老則紫赤遺卵作房營結枝畔形如黍粟入春則漸大如豆如芡纍纍盈枝若雀甕螵蛸之類即名蠟種亦曰蠟子內有白卵如蟣一包數十百立夏後逐枝摘取分系各樹越芒種接夏至包拆蟲生延緣枝莖間吮液吐涎狀如凝霜處暑剝取名曰蠟渣過白露黏牢難落矣採得煉化濾清或甑蒸滴瀝磁器中俟冷作塊蠟成矣辛巳五月常州郡邑栽蒔豆類盡為青蟲所啖八月掘地每株根底獲蟲數十條長四五寸重三四兩僵白如脂燒之都成白蠟父執周湛翁目擊其異囑筆以紀之先人云女貞之液蟲腹醞釀復從口吐秋成色白宛如肌腠肉理之脂膏則凡風毒流溢於外者莫良於此參曰乳卵於女貞造蠟於枝上成始於陰姤成終於大觀稟女貞木氣之專精巽入在中速於敷化故主居中之神室散精於五臟淫氣於五形五形者五臟之所合也自外合內繇內合外維中不息之生機功勝女貞實矣羽毛裸鱗介總呼為蟲物入陰中色剝為白退藏合密敷化為蠟精神魂魄意為五神心腎肝肺脾為五臟皮毛血肉筋骨為五形腎藏精骨者腎之合也肝藏魂筋者肝之合也脾藏意肌肉者脾之合也心藏神血脈者心之合也肺藏魄皮毛者肺之合也五月為陰剝八月為大觀秋石蒙筌氣味鹹溫無毒主治主滋腎水養丹田返本還元歸根覆命安五臟潤三焦消痰咳退骨蒸軟堅塊明目清心延年益壽核曰制煉秋石為丹家祕法世所煉者皆渣魄不堪用也其法宜秋月取用人尿二三石入鍋內桑薪緩緩煎收勿使鍋岸生垽有則竹刀掠下或沸滾泛溢亦以竹枝頻攪遂定俟幹成滓即去薪緩火焙燥分置陽城罐上余空二寸許蓋覆磁盞封固罐口養火一周其藥漸生輕盈如雪瑩潔可愛或成五色或象物形此屬上乘宜密貯銀瓶藏陰靜處不則風化成水復須升養仍結如霜但少堅實爾又制既濟玄黍祕法選端潔童男女各認溺器各陸續取溺煎煉成滓各升取上乘秋石各取溺器白垽曬焙令乾先置女垽於銀釜之底次置男秋石於女垽之上次置女秋石於男秋石之上次置男垽於女秋石之上次第安置上餘二寸六一泥封固三方火溫養七日則粒粒丹紅交結釜頂此更屬無上乘藏貯亦如秋石法參曰物熟曰秋石言量也溺緣潤下水藉火大既濟而允升培後天之形臟副先天之神藏者也故諸證咸從形臟生力轉神藏仍與形臟俱若玄黍為陰陽合璧復還圓象使得盡終其天年度百歲乃去大風子綱目氣味辛熱有毒主治主風癬疥癩楊梅諸瘡攻毒殺蟲核曰出海南諸番國真臘記云大風大樹之子也狀如椰子而圓包核數十枚形如雷丸去其衣中仁白色久則黃敗而油不堪入藥矣參曰風從幾從蟲風入八日而成蟲也陳列諸疾皆風動蟲生之患緣因風動仍因風化大風子秉金剛之味辛暖熱之火化釋典云太末蟲無界不到能延於太虛之際不能延於火焰之上風者百病之長也百蟲之祖也大塊之噫氣王者之聲教也蜀粟綱目氣味甘澀平無毒主治主溫中澀腸胃止霍亂黏者與黍米同功根煮汁服主利小便止喘滿燒灰酒服主産難核曰蜀粟即高粱廣雅謂之水稷又謂之荻粱食物謂之蘆穄俗謂之蘆粟又謂之蜀秫者是也種始自蜀因名蜀黍北人多種之以續絶乏宜下濕地春月布種秋月收採莖高丈許狀如蘆荻而內實葉如蘆穗而稍肥粒如椒子而堅硬黏者釀酒粳者炊粥可以濟荒可以養畜梢堪作帚莖堪織席編籬供爨大益民生者也參曰黍為心谷蜀黍色赤氣溫又屬手太陽小腸心之腑藥矣小腸腑主泌水穀調水道輸膀胱傳谷魄下大腸水穀既分霍亂遂定喘滿立止溫中之驗也根荄燒灰主産難者太陽府主開通調傳送正屬開所司爾玉蜀粟綱目氣味甘平無毒主治主調中開胃根葉氣味甘寒主小便淋瀝沙石痛不可忍煎湯頻飲核曰玉蜀粟別名玉高粱即今之御粟也種出西土近所在亦有之矣苗葉類蜀黍而肥又似薏苡而長六七月開花成穗如秕豆狀苗心出苞如棕魚狀白鬚四垂久則苞裂子出攢簇如珠也參曰中秋出子悅澤如珠稟金水之英華宜入肺與腎輔先天之生氣者也故司後天之谷府主調中而開胃開竅於二陰治淋瀝沙石痛不可忍也蓋腎主溪是知其病之在骨山奈綱目氣味辛溫無毒主治主暖中闢瘴癘惡氣治心腹冷氣痛寒濕霍亂風蟲牙痛入合諸香用核曰時珍云出廣中人家亦多種蒔矣根葉如薑作樟木氣土人食其根如食薑云切斷曝乾皮赤肉白古之所謂廉薑恐其類也酉陽雜俎云奈只出佛林國長三四尺根大如鴨卵葉長如蒜薤中心抽莖甚長莖端開花六出色紅白心黃赤不結子其草冬生夏死取花壓油塗身去風氣按此説頗似山奈故附之參曰山宣也奈遇也味辛氣溫臭香且辛也對待寒中諸證者宣散中黃之生氣闢除瘴厲之死氣耳宣氣散生産生萬物者山也死陰之氣奚奈何淡竹葉綱目氣味甘寒無毒主治葉主去煩熱利小便根能墮胎催生核曰所在田野俱有春生苗高數寸莖小葉緑如竹宛如竹米落地所生形色但柔嫩為異耳八九月作穗細長一窠數十須須上結子類麥門冬根而堅硬里人採其根苗搗汁造麴釀酒殊芳冽也參曰淡非濃比淹淡水盈貌也對待急疾如火肺熱葉焦為煩熱為癃閉葉可走之利之根能墮胎催生太陰肺主開闔者闢之急方泄劑也紫花地丁綱目氣味苦辛寒無毒主治主一切癰疽發背疔腫瘰癧無名腫毒惡瘡核曰處處有之壽州者為勝春生苗葉似柳而微細夏月開花紫色結實成角出平地者成莖生溝壑者作蔓又一種生籬落間者葉如木樨花葉花如鈴鐸下垂小而色白今人稱作白花地丁與紫花並用功力乖戾不可不辨參曰疔為干火地在氣中順承天施而成物者地也故主形骸地屬失承天施為癰為疔為瘰為癧使之仍順乎天施而暢於四肢美之至者也第十一帙屠蘇草小記乘雅核參十有一帙附痎瘧論疏稱十二函稿脫而右目盲矣亟梓問世已久乙未金錍落成又眩左目因病得間憶仲景先生兩論其間方劑品藥失核參者四十餘種丁酉穀日遘奇疾蘇絶絶蘇幾數十次絶惟茫茫蘇不知死只以未了公案為繫念因囑筆日紀成書不匝月而畢業病亦稍可得以扶筇盤礴室中檢點乘雅將痎瘧疏另行以此更參補梓十一帙第出自夢魂中語多不次望具眼者嚴加勘駁為幸大矣噫前參蘇方木云功能屠絶鬼氣蘇醒人魂或以此帙名屠蘇草亦可戊戌立夏日廢隱之頤更名蘆旅字號易別號晉公識文蛤本經上品氣味鹹平無毒主治主惡瘡蝕五痔核曰文蛤生東海登萊滄州海沙湍水處大者圓二三寸小者五七分形如海蛤及紫貝獨表文斑彩陸離猶可愛也採無時修治每兩用漿水煮一伏時更用枸杞根皮側柏葉各二兩煮一伏時搗用力轉勝也參曰文蛤生海湍沙磧濕生也濕以合感故蟲偕合表彩陸離復名文蛤兩瓣函合中含靈液可菡可萏流而不盈故主火亢浸淫而蝕瘡水鬱腸澼而五痔至水亡潤火失炎體用兩竭坎窞化息者功力捷如影響五加皮本經上品氣味辛溫無毒主治主治心腹疝氣腹痛益氣療躄小兒三歲不能行疽瘡陰蝕核曰五加生漢中及冤句江淮湖南州郡汴京北地皆有之宿根再發春苗叢生莖類藤葛高六七尺或丈餘枝莖交加間有刺因名白刺每葉五枚或三枚五枚者佳三枚者亦可用若三相參五相伍三五相參而變化生故四枚者不堪用葉類薔薇邊有鋸齒四月花白子青六月子轉黑得霜則紅紫相間文彩陸離因名文章草十月採根皮黃黑肉白色內骨堅徑因名本骨南地者根類枸杞木皮闊厚輕脆芬芳襲人入藥造酒最良蓋木命在皮草荄而言皮者五加專精之在根皮也北地者類秦木柏木樹皮平直如板其色白無氣味療風痛余無所用王君云五加者五車星精也蓋水應五湖人應五德位應五方物應五車故青精入莖則有東方之液白氣入節則有西方之津赤氣入華則有南方之光玄精入根則有北方之黏黃煙入皮則有戊己之靈五神鎮生相轉育成餌之者真仙服之者反嬰因名金鉛金液神丹副名也鉛訛鹽謬矣參曰五從二從乂象參天兩地間互陽交陰中之為五蓋天數五地數五五位相得而各有合者之為加誠五行星精之所化引重致遠以濟不通何患躄不療小兒三歲不能行筋不轉脈不搖賦形功行為名也固入五臟偏駐又在厥陰之肝肝藏筋膜之氣也是得輔厥陰肝體行厥陰肝用除厥陰肝眚其功特著一名五嘉合柏釀酒酉燡佳美行酒勢走血脈通關津達四街徹九竅布二百六十五節開八萬四千毛孔迅速疾行無出其右者至若追風作使闢寒懲暄易熱忷為清涼地攘濡濕致高潔界此其專務蕘花本經中品氣味苦寒有毒主治主傷寒溫瘧下十二水破積聚大堅癥瘕蕩滌腸中留癖飲食寒熱邪氣利水道核曰蕘花出咸陽川穀及河南中牟所在亦有近以壅州者為好苗似胡荽高二尺莖無刺入夏作花簇生細碎生時色黃干則縞白或言世無蕘花每以芫花充用不唯氣味功能懸絶生成形肖亦迥別也參曰山海經云首山多蕘苗首出萼隨之花落盡葉乃茁也故蕘諧堯堯高也廣也炎也上也高廣承寒炎上作苦合配太陽化令對待太陽體用藥也力主寒傷層署表著六標暑巢營舍因遇肅殺之秋風或侵淒滄之水寒或襲沐浴之水氣隨衛入出實虛更顯陰陽且移休作成瘧也至下十二經水破五臟積六腑聚大堅症大堅瘕留癖腸胃中者蕩滌無遺空諸所有捷於影響若食飲馨飪邪從口入者或發於陰而寒或發於陽而熱或寒熱疊呈而陰陽互遷者陂可平往可復艱貞之吉於食有福紫參本經中品氣味苦寒無毒主治主治心腹積聚寒熱邪氣通九竅利大小便核曰紫參生河西冤句山谷今河中淮郡三輔皆有之莖高一二尺葉似槐亦有狀羊蹄者色青緑五月開花白色似蔥花亦有紅紫水葒色者實黑大如豆圓聚生根黃赤有文根皮紫黑肉紅白肉淺皮深三月採之火炙赤紫狀類小紫草參曰赤黑兼色而得紫參水火相射者既濟之為參也猶未離乎火味之苦水寒之氣金亦互木亦交矣故腑臟鹹入根身並葉爾臟在胸腑在腹積者五臟之所生聚者六腑之所成也積解聚散而寒熱平清陽仍走上竅而利濁陰仍走下竅而通矣敗醬本經中品氣味苦平無毒主治暴熱火瘡赤氣疥瘙疽痔馬鞍熱氣核曰敗醬一名苦菜又名苦蕺苦蕺同酸醬名酸醬葉則高大也亦與苦賈龍葵同名種類則迥別矣生江夏川穀所在溪澗近水處亦有之春初嫩苗塌地似松菜葉略狹長面深背淺有鋸齒採作菜蔬漂去苦味有陳醬氣三月莖漸高數寸一節節間生葉各起小枝四散如傘高三四尺入夏白花成簇根白紫八月採取曝乾用參曰詮名敗醬烹之色臭相似形臟腹腸之所需也氣平味苦蓋炎上作苦苦性走下苦肅膚腠苦厚腸胃平則無過不及矣因名苦菜月令小滿苦菜秀白花整密敷布如蓋夏三月此謂蕃秀若所愛在外猶夏日在膚泛泛乎若萬物之有餘也蓋夏火主時金遇庚伏而乃白花金布抑秉製為用制則化生歟故從治暴熱火瘡赤氣焦爍肺金膚皮形臟而為疥瘙疽痔馬鞍熱氣者熱解則清而愈此即點火成金不煩另覓種子矣仲景先生用治腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積聚身無大熱脈數此為腹內有癰膿不獨焦爍肺金之形臟並毀敗腑配之大腸金至斯堅將來者進成功者退理勢然也露蜂房本經中品氣味甘平有毒主治驚癇瘛瘲寒熱邪氣癲疾鬼精蠱毒腸痔核曰露蜂房一名蜂腸一名蜂𭄰一名百穿一名紫金砂生牂牁山谷所在皆有凡四種一曰革蜂窠大者一二丈圍樹上內窠小者隔六百二十六個大者隔一千二百四十個其裹黏木蒂採七姑木汁其蓋採牛糞沫其隔採葉蕊也二曰石蜂窠附人家屋上大小如拳色蒼黑內有青色蜂二十一個或十四個其蓋石垢其黏處七姑木汁其隔竹蛀也三曰獨蜂窠大如鵝卵皮厚色蒼黃內有小蜂頭翅內向僅大蜂一隻如石燕獨據外向人馬被螫則立亡也四曰草蜂窠亦入藥用以革蜂窠為勝今人多用簷前樹枝上者修治同鴉豆枕等拌蒸從巳至未出豆炙鬆脆用參曰黃蜂露處於顯其房倒垂而旋覆顯者密之蜜蜂退藏於密其房橫列於四隅密者顯之動者靜靜者動開者闔闔者開樞機之為用乎故主氣上而驚氣下而癇倒置開闔而瘛瘲乖錯陰陽而寒熱陽重者狂陰重者癲有陰無陽者鬼精有陽無陰者蠱毒顯者密而密者顯行布不礙圓通圓通不礙行布矣至若腸闢為痔通因塞用蜂腸百穿象形對待法也蠐螬本經中品氣味咸微溫有毒主治惡血血瘀痹氣破折血在脅下堅滿痛月閉目中淫膚青翳白膜核曰生河內平澤及人家積糞腐草朽木間大如趾身短節促足長有毛以背滾行乃捷於腳久之化蟬而去生木根桑樹中者曰木蠹曰桑蟲身長足短口黑無毛春雨後化為天牛大腹兩角在沙磧中到走頗捷平陸則不行矣此屬異類宜早辨也修治採無時陰乾同糯米拌炒至米焦黑去身口肉分茸毛並黑塵分作三四截研粉用亦可生用取汁用下乳汁雜豬蹄作羹兩無別也參曰蠐諧齊齊垣屋兩旁隰阪處也螬諧曹曹庭榭東畔棘壤所也故蠐螬濕生無母多在垣屋庭榭積壤腐木間爾雅所謂蟦蠐列子所謂烏足之根是也色黑褐亦有外黃內黑者身不及寸腹文如蠍若蟬故一名蠍化覆育轉玄蟬離卑穢應高潔吸風飲露好鳴種子也行以背駛於足覆育腹行玄蟬足行矣本草指內外潔白之木蠹桑蟲表裡灰色之地蠶蝤蠐者謬矣蓋木蠹桑蟲行以腹地蠶若屈蠖之求伸蝤蠐類蟋蟀之促蹶皆非行於背也然則行身之背者督起於下極之俞並脊裡上風府入屬於腦與任脈會於巔蠐螬功力力主督不會任任內苦結為惡血為血瘀為痹氣為折血在脅下堅滿痛男子為七疝女子為血閉瘕聚仍使之任督交通環周會極蓋肝開竅於目肝木藏也蠐螬兼木為食若淫膚翳膜皆目余眚如木柏栭菌然螬食其餘何眚之有且也木繫系風府循督會任故功用特著昔仲子食螬剩者半李遂使耳有聞目有見信有之矣丹雄雞本經中品氣味甘微溫無毒主治主女子崩中漏下赤白沃補虛溫中止血頭主殺鬼東門上者良雞子隱居別録氣味甘平無毒主治主除熱火灼爛瘡癇痓開喉聲療失音卵中白隱居別録氣味甘微寒主治云心下伏熱煩滿破大熱煩卵中黃隱居別録氣味甘溫無毒主治主除煩熱解熱毒卵殼隱居別録氣味鹹平無毒主治主傷寒勞復發音聲核曰雞羽屬五方所産種類甚多大小形色各各殊異蓋日中有雞西方物也大明生東故雞入之卵生思抱伏而未孚者謂之曰涅又曰雞伏無雄亦卵以卵告灶伏亦出之俗曰灶雞破卵而出毛羽遂具無外腎虧小腸好睨視跑而食之每有所擇故曰雞廉食而不飲有屎無溺也呼曰朱朱相傳雞本朱氏翁化為之者按漢祝雞翁居尸鄉山下養雞百餘載皆有名字呼名則種別而至則朱乃祝之轉也其棲也知陰晴其鳴也知時刻鳴必三度又能自守不為風雨止詩云風雨悽悽雞鳴喈喈風雨蕭蕭雞鳴膠膠風雨如晦雞鳴不已喈喈鳴而不失其和膠膠不失其固也雞老歲久至曉方鳴持寒也或乙丙夜輒獨鳴則行旦有赦謂之盜啼無故群鳴謂之荒雞牝雞雄鳴雄雞乳卵老雞人言謂之不祥古稱雞有五德戴冠文也傅矩武也敢鬥勇也得食相告仁也守夜不失時信也有此五德猶日淪而食之何也以其所從來近也埤雅云蜀魯荊越諸雞越雞小蜀雞大魯雞猶其大者莊子云一越雞不能伏鵠卵魯雞固能矣成玄英云越雞荊雞也魯雞今之蜀雞也按韓子云魯雞之不期蜀雞之不支則玄英所謂魯雞今之蜀雞者非是矣爾雅翼云荊與越為小蜀與魯為大荊越相近蜀非巴蜀魯成公會於蜀者亦魯地云爾李時珍云蜀中鶤雞楚中傖雞並高三四尺江南矮雞腳僅二寸許南越長鳴雞晝夜啼叫南海石雞潮至則鳴遼陽食雞角雞俱肥美大勝諸雞朝鮮長尾雞尾長四尺丹赤者入藥最良近道稱太和者為第一下元歲戊子兩浙群雞肋尖都生爪甲五爪具者輒登天而鳴去則不知所往破卵者每多五彩鳳形或三足四足五足連胸或連脅或四翼五翼六翼連脊或連頸或羽或毛或鱗或介或獸頸而雞身或雞首而獸體或兩身三身而一頭或二頭三頭而兩翼或毛羽之根遍生爪甲或爪甲之端多生毛羽或卵大如鵠子或蛋小如雀卵色相千端鳴啼百怪時有小雞或作人言也是年吳之崇明每潮來即浪滾丹赤雄雞雞身馬蹄無大小各重二斤許不啻千萬計必協群龜池魚一湧遍海面來不復去也至犬羊禽鳥或人身而犬頭或羊首而人軀或一體二三首或兩犬聯脊或三羊並尾或四豕一蹄或獅頭猴身或人手犬足災害疊出不堪枚舉也悲夫人畜莫辨猶從事鼎鼐者亦曰殞哉延壽書云具五色者玄身白首者六指者四距者死不足申者並不可食但閹雞而啼者有毒四月勿食抱雞肉令人作癰成漏並男子虛乏弘景雲五歲小兒以下食雞者多生蛔及寸白雞不可合胡蒜芥李犬肝犬腎食並令人泄血痢同兔食亦作血痢同魚汁食成心瘕同鯉魚食癰癤同獺肉食成遁尸同生蔥食成血痔同糯米食生小蟲一粒一蟲易生速計者也其卵黃雌者為上烏雌者次之首乳者力勝上鋭下圓端有點血鮮赤者首乳也羽爪昉嗉冠血膍脛筋骨屎白草窠衣殼咸收藥用其羽焚之猶可致風畜蠱之家雞輒飛走此靈禽也寧獨克庖餌食而已參曰東方肝木其音角也其竅目也其主筋也其卦巽也其畜雞也故雞鳴日出於寅雞伏日入於酉通晝夜之闔闢木秉金為用也蓋營行脈中衛行脈外經經緯絡陽出陰入而晝夜分故主衛失兩陸之嘗惺反寂而寂反惺寤反寐而寐反寤者或營失經緯之守崩反瘀而瘀反崩積反漏而漏反積者功力捷如影響頭為陽首大明東生鬼魅不祥莫之敢攖矣經云卵應想成便裹殼衣範圍黃白所謂天地之先陰陽之始胚形未兆其氣渾若也破卵而出解甲之孚曰混沌衣曰鳳凰蛻取蛻脫之義爾仲景苦酒湯用未伏之卵鴻濛未判而力用專去黃留白以從陽高懸之以類相求也破之使出音始出聲始發一陰機彀動會厭發分氣張竇端而言答述而語矣去白留黃者以從陰也蓋白賦陽外之形黃鑄陰內之藏主少陰病衛愆歸內煩難臥者仍使之衛歸陰陸睡臥凵凵干眠不與覺時同也並主百合病百脈一宗悉致其病者罔劇湧泄仍假百合藥象從治其本病而後君以卵黃乃治其標病疾流陰氣以成陽合夫榮行脈中衛行脈外出陽入陰如環無端形與形相親藏與藏相葉物各從其類也若屎白之主轉筋脈微弦上下行臂腳挺直而艱曲者馮藏真通於肝肝臟筋膜之氣也仍合筋轉脈搖和柔相離如雞舉足曰平晝者晝夜者夜闢者闢闔者闔矣蜚虻本經中品氣味苦微寒有毒主治逐瘀血破血積堅痞癥瘕寒熱通利血脈及九竅核曰生江夏川穀牛馬所在都有之形類蜜蜂腹四褊微黃緑色嘴鋭而利若鋒鐩然春半後秋半前出茂暑繁盛腹有血者良法取五月修治入丸散去翅足熬熟用湯法亦同參曰蜚虻一名虻蟲陸虻也飛咂牛馬血嘴如芒刺然性頗貪叨腹滿猶咂不已用逐瘀血破血積堅痞癥瘕而成寒熱者遂其性盡出其所留積而後快盍血中有眚乃積乃留眚去血行流不盈矣通利血脈者概手足二十四經隧而言十二焉從頭而走足十二焉自足而走頭風馬牛不相及者而概咂焉則凡經隧逆走頭而逆走足者乃積乃留各遂其性乃行乃流矣故血失所行血失所留者清陽不走上竅而留濁陰不走下竅而積而行焉而流焉何竅不通何竅不利梓白皮本經下品氣味苦寒無毒主治主熱氣去三蟲核曰梓一名木王生河內山谷近道亦有宮寺園亭頗多植此舊説椅即是梓梓即是楸楸即是檟蓋楸之疏理而白色者為梓梓實桐皮者為椅其實兩木大類同而小別異也齊民要術稱白皮有角者曰梓或名角楸又名子楸黃色無子者曰柳楸世呼荊黃楸云然則是數者又以有子為別耳顧梓之子莢細如箸其長僅尺冬後葉落莢猶在樹總總然莢中之子各曰豫章崔豹古今注云棘子曰棗梓子曰豫章桑子曰椹柘子曰佳魯季孫植六檟於蒲圃東門之外子胥曰植吾墓任昉云山中有楸戶掌楸木者可為什器也蓋梓有三木理白者梓赤者楸梓之美文者椅楸之小者檟桐亦名椅與此不同入藥則宜白色有子者用皮則生者良參曰梓為百木長室屋之間有此余材不復震矣亦有子道焉昔者伯禽康叔見周公三見而三笞遂見商子商子使觀於南山之陽見喬木而仰又使觀於北山之陰見梓焉晉然實而俯商子曰喬者父道也梓者子道也於是二子再見乎周公入門而趨登堂而跪周公拂其首勞而食之則以能子道焉耳雜五行書云舍西種梓令子孫順者蓋亦取此詩云維桑與梓必恭敬止靡瞻匪父靡依匪母故古者見喬木必下而趨所以廣孝也桑者母之所事以供蠶繅梓者父之所植以伐琴瑟故見之而恭敬之心惕然生焉不必待於口澤手澤之所漸也神農氏云梓皮苦寒入藥最良蓋苦性趨下寒平熱毒順之也敬止也本經主去三蟲別録療小兒身頭熱煩瘡瘍蟲蝕者顧置室屋之間余材且不復震風蟲之屬寧不降心而退舍焉梓之益利於人道者大矣白頭翁本經下品氣味苦溫無毒主治主溫瘧狂𬌺寒熱癥瘕積聚癭氣逐血止腹痛療金瘡核曰白頭翁一名白頭老人一名王主者端居北位今生吳越矣他處雖時見總不及兩地者為貴春生作叢主株分挺出於衆葉發莖端如杏葉上有縞白茸毛若頭髮疆短之如翁也近根亦有白茸根似蔓荊色深紫其莖有風則靜無風自搖赤箭獨活鬼臼同性河南洛陽界新安山中多服此云令人壽考修治得酒良花子莖葉功無差等參曰命名白頭翁形色之相肖亦白秉金用頭為陽首翁者歷年久事盡知故有風自靜無風自搖驗體之能立用之能行是以首出庶物不為八風所奪也宜哉蕩中藏之垢穢胡頸之癭瘤溫瘧之𬌺狂積聚之傳會寒熱之癥瘕金瘡之屠毒百體治平腹心患滅澤漆本經下品氣味苦微寒無毒主治主治皮膚熱大腹水氣四肢面目浮腫丈夫陰氣不足核曰澤漆出太山川澤今江湖平陸有之春生苗一科分枝叢生柔莖色碧緑如馬齒莧苜蓿葉輩圓黃且緑頗似貓睛一名貓兒眼草莖頭五葉中抽小莖五枝每枝作細花色青緑復有小葉承之齊整如一一名五鳳草一名六葉緑花草莖有白汁黏人根亦白中心徑硬如骨本草為大戟烏頭苗者謬矣參曰瀉水上行之為澤水瀉欲留之為漆水大體用兩葉矣故水亡體用者皮膚熱水惟具體者大腹水氣四肢面目浮腫緣丈夫陰足而精藏而起亟用行體至體至用行兩無礙焉仲景先生金匱要略論咳逆上氣時時吐濁坐不欲眠其脈沉者澤漆湯主之第形寒飲冷則傷肺兩邪相擊為咳為癰為痿矣此體用兩冥至腎氣獨沉宣水之用即所以輔水之體內外合邪泮然冰釋矣狼牙本經下品氣味苦寒有毒主治主治邪氣熱氣疥瘙惡瘍瘡痔去白蟲核曰生淮南川穀及冤句今江東汴東州郡建康三輔多有之苗似蛇毒葉厚而大深緑色六月華八月實實黑根白者佳黑次之設中濕則易於腐爛參曰狼牙象形其善逐貪叨而腸直治用類相同也氣寒味苦有毒逐邪熱氣秉毒攻毒捷如影響蓋風入蟲成熱傷身竅此以劇飲傷飽至腸澼疽痔陰蝕惡瘍餌服固多奇驗洗濯更易滌除也胡粉本經下品氣味辛寒無毒主治主治伏尸毒螫殺三蟲核曰錫鉛皆可造粉錫粉瑩潔無青氣僅可婦女飾面色同肌理無辨也第錫為五金賊不入藥用丹灶家亦不採取鉛粉有青色此即先天之一氣五金之純液入藥最良丹灶家烹煉作匱匪此不用按墨子云大禹造粉張華博物志云紂燒鉛錫作粉則粉之來亦遠矣今金陵杭州韶州辰州皆造其法每鉛百斤熔化削成薄片卷作筒安木甑內甑下甑中各安醋一瓶外以鹽泥固濟紙封甑縫風爐內安火四兩火盡添炭養一七開甑掃取仍封仍養以盡為度不盡者炒作黃丹渣滓密陀僧也孟春余冬録云嵩陽産鉛居民多造胡粉其法鉛塊懸酒缸內封閉四十九日開之則化為粉矣但鉛氣有毒工人多用肥豬犬肉漿酒以厭之中其毒者每至痿黃癱攣而斃此皆巧者時出新意以速化為利故爾相感志云韶粉不白用萊蔔子蒸制則白參曰溉種金谷之糟醯交烹黑鉛而成粉轉作西白金金向水中求也更藉鼎甕醞藏蒸之浮之解堅凝為柔脆碎大塊作微塵燒之粉復還鉛隨分仍合仍合隨分正所以徵從革之體物不遷用行數變也咸屬工力之使然胡其産耳夫如是既襲容平之金德則天氣以急地氣以明何有夫三蟲伏尸螫毒死陰之屬尚有著腳處耶仲景先生君黃連炎上之作苦具太陽寒水之化令且也金至斯堅上達九天下徹九淵內周五藏外彌膚腠用治身熱膚痛為浸淫焦爍毛髮膚皮金肺形藏者黃連粉主之藉炎敲襲清肅易熱惱置清涼地也蜣螂本經下品氣味鹹寒有毒主治主腹脹寒熱隱居云治奔豚瘕積核曰蜣螂生長沙池澤所在有之以土包糞轉而成丸雄曳雌推置於坎中覆之而去數日後小蜣螂孚乳於中也有二種鼻頭扁背襲玄甲因有武士之稱腹翼下有小黃子附母而飛晝伏夜出見燈光則來狐並喜食之宜入藥用小者身黑而暗晝飛夜伏不堪用修治五月五日採取蒸之臨用去足火炙勿置水中令人吐參曰蜣螂蛣蜣也一名轉丸推車客此濕生也合糞壤水土吐唾弄丸而感樞輪之用乎故主輪脫而脹腹樞廢而熱寒至若奔豚之下而上瘕積之非其所據而據者爰彼奮臂舉負而奔則化無停機推車客為用大矣釋典詮蛣蜣具六即佛號凡屬有知毋自墮毋自棄也鼠婦本經下品氣味酸溫無毒主治主治氣癃寒熱月閉血瘕墮胎核曰鼠婦一名負蟠一名濕生蟲出魏郡平谷今處處有多在下濕處甕器底土坎中詩云蛜蝛在室鄭玄言家無人則生大者長三四分小者一二分色灰褐背有橫紋蹙起雙眸兩須多足奔趨甚捷斷之無血唯白漿耳爾雅云每在坎中黏負鼠背因名鼠負韓保升云猶枲耳好著羊身名羊負來也食之善淫故得婦名一名鼠姑猶鼠婦也參曰鼠婦一名負蟠濕生蟲者蓋濕以合感生必土坎甕器之底若舉負而奔蟲之多足者蟠也猶鼠性善疑畏明穴處出則每不果徘徊乃竄耳如假血為瘕而寒熱生假氣為癃而痹閉作留愛納想而乳字成此非身所有者竇而入之悉皆消隕傾營氣之窠臼者也水蛭本經下品氣味鹹苦平有毒主治逐惡血瘀血月閉破血症積聚無子利水道核曰生雷澤池澤處處河池田阪有之色黃褐間黑紋數道腹微黃背隆腹平中闊兩頭尖都有嘴訥者可引可縮兩頭咂人及牛馬脛股不滿其欲不易落也雖燔湯烈火煅研成末入水變生子入人腹為害彌深唯蓄血人隨血下隕方堪藥用否則不敢當也修治五月六月採取用米泔浸一宿曝乾以冬豬脂煎令焦黃用參曰水蛭一名至掌馬蟥也蓋蛭類有三曰山蛭曰草蛭藥用水蛭也生水中喜吮人及馬牛足股蛭吮若莫知至而至者果復性遂蛭乃去否則確乎其不可拔寧斷兩頭入骨為患故主力逐惡血瘀血力破血症積聚此皆血留而盈至若太衝脈過盛任脈不通月事不以時下月閉無子者平其太衝闢其妊娠月事仍以時下而有子有餘於血者則用此法不足於血者不在用之利水道者此濕生蟲水族也用利水道故特易易蓋水入於經而血成不行焉為惡為瘀水蛭乃行不留則留者行亦可留不行則行者留非留行安能時下而有子此行而後留讀農經者大宜著眼李根白皮別録上品氣味甘寒無毒主治消渴止心煩逆奔豚氣核曰李處處有之樹高丈許緑葉白花果極繁茂與麥同候麥秋至李熟矣種類近百子大者如柸如卵小者如彈如櫻味有甘酸苦澀之別色有青緑紫赤黃赤縹綺胭脂青皮灰紫之殊形有牛心馬肝奈李杏李水李離核合核無核匾縫之異生有武陵房陵諸李早則麥李御李四月熟遲則晚李冬李十月十一月熟又有季春李冬花春實也王禎農書云北方一種御黃李大如碗肉厚核小甘津香美江南建寧一種均亭李色紫肥大香如蘭蕙味若醍醐一種璧李熟則拆裂糕液如乳如酪香甜可口一種御李花色紅黃實狀櫻桃先諸李熟一種夫人李表緑里赤肉好肥滿干之嘉慶子也素問云李韭皆酸李東方之果木子也埤雅云李從木從子性頗難老老雖枝枯子亦不細品處桃上果屬有六桃最為下孔子飯黍不以雪桃詩曰投我以桃報之以李又曰丘中有麻彼留子嗟丘中有麥彼留子國丘中有李彼留之子言麻以衣之麥以食之又有李焉且皆丘中植之則留子之政修矣此人之所以思之法言曰男子畝婦人桑之謂思呂子産相鄭桃李之垂於街者莫之援也然則丘中有李又能使人不盜也爾雅曰桃曰膽之棗李曰疐之蓋棗李之臍去疐而已舊云桃李種法大率欲方兩步一株密則陰輒相扇不惟子細味亦不隹也談子化書云李接桃而本強者其實毛梅接杏而本強者其實甘此明造化之權有以知巧而移矣本根皮白甘酸二種入藥甘者良修事取東行者刮去皺皮灸黃用參曰李木之多子老至猶繁纍不易落若荔實專力在系也與麥同候繼絶續乏承順天施養生之道也仲景先生用治水逆犯上病名奔豚橫滑難制者用甘李根白皮甘稟土味秉製為用轉承水下且木實得酸根白金色環承製化在本則子令母實在金則虛則補母在土則承乃制之溯流而上者順流而下矣乃克治平斯無不順何逆之有子名嘉慶良有以也隱居別録廣推奔豚者腎之積氣從少腹上衝心心煩逆又若厥狀撞心消渴也羊肉別録上品氣味苦甘大熱無毒主治暖中字乳余疾及頭腦大風汗出虛勞寒冷補中益氣安心止驚核曰羊類甚多備載羖羊角條核參曰羊火屬子羔羊下有火若火始然可進而大心畜也其為藥用通心主血脈經云藏真通於心心藏血脈之氣也金匱要略羊肉湯療産後腹中㽱痛㽱音鳩鳩急也血澀於營脈滯於搖也別録廣字乳余疾字女子字乳女生子余疾疾解而不了了也大風頭腦汗出虛勞寒冷者木失達火亡發也發之達之中乃補氣乃益驚乃止心乃安木鬱達火鬱發子藉母補母葉子助也薤別録中品氣味辛味溫滑無毒主治主金瘡瘡敗輕身不飢耐老歸骨除寒熱去水氣溫中散結氣作羹食利病人諸瘡中風寒水氣腫痛搗塗之日華曰煮食耐寒調中補不足止久利冷瀉肥健人核曰薤一名藠音叫子蓧音釣子火蔥菜芝鴻薈生魯山平澤所在亦有八月裁根正月分蒔宜白軟良地種法一本率七八支支多者科輒圓大故以七八為率爾雅云薤鴻薈即此是也狀似韭但韭葉中實而扁有劍脊薤葉中空而稍圓有稜線嗅如蔥三月作花細碎紫白色不結實爾雅翼云薤似韭而無實也亦不甚葷古禮脂用蔥膏用薤膏犬豕之屬脂羊牛麋鹿之類蓋物各有所宜故薤與牛肉同啖令人癥瘕是矣少儀云為君子擇蔥薤則絶其本末有萎乾者也麋鹿魚為泣膺為薜雞野豕為軒兔為宛脾切蔥若薤以實之醯以柔之言此四物其作之狀以醋與葷菜淹之悉皆濡熟殺肉及腥蓋雖葷物乃能去腥故古人不去而用之第狼食之迷虎啖之憒鼠吞之毛落狗嚼之反胃獨與獸不相宜也今圃人種薤者每用大蒜置硫黃其中久則種分為薤薤有赤白兩種赤者苦無味白者肥且美可供食饌充藥用閩人目作素蔬飯僧供佛交天祀神非此不稱敬別有一種水晶蔥蒜根蔥葉與薤相似其臭不臭亦其類也按王禎農書云野薤俗名天蒜生麥原中似薤而小味益辛亦可供食但不多有爾雅所謂山韭者是矣參曰薤赤者苦無味主金瘡療風水薤白者肥甘氣煊臭爽充溢乎形氣之間空可滿而滿可空實可虛而虛可實也傳云五葷煉形薤其一矣夫物之英華之美者莫如芝如蓮曰水芝芋曰土芝蜜曰衆口芝薤曰菜芝蓋書之記務光翦薤以入清冷之淵今薤葉篆傳者以為務光所作杜甫詩云束比青芻色圓齊玉箸頭衰年關膈冷味暖並無憂王禎云生則辛疏熟堪溫補植之不蠹嚼之有益老者怡之少者懷之學道人資之疾病人賴之未豈狼餐虎噬狗偷鼠竊所能味其味哉齊諧志有陸郭之兄罹天行疾後頗善啖日食非石斛不飽經十載致家貧行乞一日飢極遇圃有薤蒜者各啖一畦卒悶絶仆地頃吐物如籠漸大如牛馬行人置粒飯於上漸縮小久消成水已而病尋瘳也顧此不唯癥瘕之可柔飢瘡之可療並可治中消懲貪吏之腹矣漢世太官圃冬種蔥薤菜茹覆以屋廡晝夜然蘊以火助其溫瀾乃生召信臣為少府以為不時之物食之傷人不可以奉供養奏罷之又漢孔奮為姑臧長妻也但食蔥薤菜荄而義熙中太常謝淡生遣四人還家種蔥菜免官人之貪其貪廉之不同如此今人多不採用獨金匱有薤白白酒湯治胸痹卒病論有薤白白飲主少陰四逆下利後重閉者使之通泄者使之闔樞機之用乎瓜子仁別録中品氣味甘寒無毒主治腹內結聚破潰膿血最為腸胃脾內壅要藥核曰瓜子甜瓜子也生成備甜瓜蒂核參曰莖蔓樂延稍壅輒潰附本之瓜反小近末之瓜轉大吮吸地液性頗貪狼雖夏火主時無妨水大含遍者也即一粒子具瓜全體仲景先生用治腸癰膿未成者吮吸殆盡隱居別録推廣腹內結聚破之潰之結解聚散故曰最為脾胃壅滯要藥也惡實別録中品氣味辛平無毒主治明目補中除風傷核曰惡實一名鼠黏一名大力一名牛蒡一名蝙蝠刺處處有之三月生苗高三四尺葉如芋而長四月開花作叢淡紫色實如楓梂而小萼上細刺百十攢簇一梂作子數十粒色黑褐好著人衣也參曰惡音烏非遏也禮器云晉人將有事於河必先有事於惡池説文云惡池漚夷並州川也實者充滿緣彼充滿獨遠實也一名大力牛蒡者以此先人博議云此秉風大動搖之用故抽水土之力獨勝味辛氣平為風木乃製為用矣則凡病從風生或因風寒薄郁乃成痤者取之捷如影響設屬形層之外與上部者功力尤勝又云此以承製之品宣助肝木便無太過之失厥受和平之益矣酒別録中品氣味苦甘辛溫有毒主治主行藥勢殺百邪惡鬼毒氣藏器云通血脈厚腸胃潤皮膚散濕氣消憂發怒宣言暢意核曰世本云帝女儀狄始作酒醪變五味少康作秫酒素問上古天真論以酒為漿湯液醪醴論黃帝問曰為五穀湯液及醪醴奈何岐伯對曰必以稻米炊之稻薪稻米者完稻薪者堅帝曰何以然岐作曰此得天地之和高下之宜故能至完伐取得時故能至堅也帝曰上古聖人之湯液醪醴為而不用何也岐伯曰自古聖人之作湯液醪醴者以為備耳為而弗服也中古之世道德將衰邪氣時至服之萬全則酒自黃帝業稱上古作始非獨帝女儀狄造矣酒經云空桑穢飲醞以稷藜以成醇醪此酒之始烏梅女䴷甜醹九投澄酒百種此酒之終食貨志云酒者天之美祿頤養天下享祀祈福扶衰療疾非酒不行故月令仲冬命大酋秫稻必齊麴櫱必時湛酉喜必潔水泉必香陶器必良火齊必得兼用六物大酋監之無有差二白孔六帖云秫米一斗得酒一斗為上樽稷米一斗得酒一斗為中樽粟米一斗得酒一斗為下樽本草云葡萄瓜椹杞菊苄芑林檎橘𣷫李桃杏梅蔥豉薑椒羊羔鹿胎虎脛熊掌凡生物果穀草木之易釀者皆可造酒入藥唯秫酒之清者稱無上乘若秬合郁釀之成鬯此以陽據陰則酒色香而黃在器流動詩所謂黃流在中者是矣故周人尚臭灌用鬯陰達於九淵陰徹於九天條暢於上下致氣於高遠所以降神也酒正職云既有米曲之數又有功沽之巧功沽為善惡是酒之善者為功惡者為沽也詩疏云一宿酒曰沽蓋酒以久為貴故周禮有昔酒之名耳天官酒政掌酒政令以式法授酒材辨五齊之名一曰泛齊言酒熟而泛泛然也二曰醴齊酒成而上下一體汁滓之相得也三曰盎齊成而色蔥白也四曰緹齊昔而色紅赤也五曰治齊渣滓沉下充然悅口也又辨三酒之物一曰事酒二曰昔酒三曰清酒再辨四飲之物一曰清二曰醫三曰漿四曰酏蓋成周酒政嚴矣在周書則有酒誥之篇在周禮則有酒政之官夫祭祀必有酒奉養必有酒燕享必有酒是不容一日廢也然甘酒有戒湎酒有徵沉酒有誓彝酒有誥先王無不致警於酒今周人以酒設官是故五齊之酒三酒四飲之物厚薄之異清濁之異新舊之異此固酒政之所必辨也祭酒之用賓客之用王后世子飲膳之用耆老孤子庶子饗食之用此正酒正所當共者也凡酒用於祭飲酒用於燕禮酒用於饗陳酒用於賓客秩酒用於養老合而言之曰公酒然而酒人以其酒入酒府漿人以其飲入酒府也是皆王之所得用而酒正掌酒之政令未嘗不致警焉其酒材也以式授其實樽也以法共頒酒則有法以行之秩酒則有書契以授之至於祭祀之酌有數王者之燕飲亦有計也他官會計唯以歲終而酒正之出日入其成日計之也月入其要月計之也則周人之致謹於酒可知矣先王於飲之器且有法存焉彝有舟以示其過量則有沉溺之禍尊有罍以示其不節則有浸淫之患六彝曰彝所以示其祭酒之有嘗六尊曰尊所以示其祭酒之有等先王器皿之度往往有戒而況於酌用之際乎飲針曰酒之道豈止於充口腹樂悲歡而已哉甚則化上為淫溺化下為訩禍是以聖人節之以酬酢諭之以誥訓然尚有上為淫溺所化化為亡國下為訩禍所化化為殺身且不見前世之飲禍耶路酆舒有五罪其一嗜酒為晉所殺慶封易內而耽飲則國朝遷鄭伯室室而耽飲終奔於駟氏之甲欒高者酒而信內卒敗於陳鮑氏衛猴飲於藉圃卒為大夫所惡嗚呼吾不賢者性實嗜酒尚懼為酆舒之戮過此吾不為也又焉能俾喧為靜乎俾靜為喧乎不為靜中淫溺乎不為訩禍之波乎既淫溺訩禍作於心得不為慶封乎鄭伯乎欒高乎為之針曰酒之所示示其全真寧能我醉不醉於人參曰方書稱清酒即四飲之一曰清漿人之為醴清也扶衰養疾非酒不行但不及亂可耳如陰之五宮生在五味陰之五宮傷在五味過量乃及亂耳説文云酒酉也釀之美曲酉燡而味美也又就也就人性之善惡也故酒不冰曷命曰丹集秋霜之粳谷醞春生之麥酴互交以金木既濟以水火乃得凍不冰而火可然六陽之為用乎隱居云主行藥勢若百川之潛泄泱漭之淡濘騰波之赴勢動不可遏也蓋行身之剽悍者衛勺飲入口百體遍周酒落焦府不勞彈指走血脈通關津達四街徹九竅布三百六十五節開八萬四千毛孔亦猶衛氣之剽悍即芍力之駢馳桂使之先聘迅速捷機亦無出其右者不觀立使怯者強衰者壯憂者蠲不怒者怒不言者言暢意力行矣倘品行之不端妍醜亦立見矣就人性之善惡歟誠莫之為而為莫之致而致也蒴藋細葉別録下品氣味酸溫有毒主治風瘙癮疹身癢濕痹可作浴湯核曰蒴藋出熊耳川穀及冤句今田野丘墟間亦有之春初生苗每枝五葉夏半花白如盞大結子青碧類緑豆十月紅熟一名接骨芹族也芹品凡三一水芹水英也二旱芹陸英也三蒴藋木英也蓋木謂之華草謂之榮不榮而實謂之秀榮而不實謂之英陸英精專者榮採其英蒴藋專精者葉摘其葉仲景金匱要略論王不留行散療金瘡用蒴藋葉因名蒴藋細葉者初生嫩緑小葉也修事初春摘取細葉陰乾他時葉轉大氣味劣薄矣參曰蒴藋諧聲草諧蒴藋也蓋月冥初蘇之為朔雉伏翕羽之為翟喻功力用相肖耳故得開宣陽氣熏膚充身而瘡瘍闢乃回陰氣骨接肌連而金瘡合樞機之為用鑄形良品也蘆根別録下品氣味甘寒無毒主治消渴客熱止小便利核曰所在有之生下濕陂澤中其狀似竹葉抱莖生無附傍枝花白作穗若茅根類竹而節疏根行水底者其味甘露根水上者不堪用也參曰詩疏云蘆初生曰葭嘉美也長成曰葦偉大也未秀曰蘆蘆黑也蓋蘆曰黑黑水色也臚腹前也假言驢力之在臚也其氣寒其味甘對待熱蘊臚腹大者膀胱氣美失其中致腎水失周胸臆而消渴獨沉膀胱而便利與之各得其平故水者準也稱物平施則水流而不盈行險而不失其正苧麻別録下品氣味甘寒無毒主治安胎胎熱丹毒核曰苧麻閩廣江浙多有宿根不死至春再發一科數十莖亦可分蒔高七八尺葉如楮無叉面青背白有短茸毛夏秋間細穗青花剝其皮可以績布荊楊間則三刈取皮以竹刮其表厚處自脫參曰門屏之間曰寧曲禮云天子當寧而立也大鼗謂之麻天子賜伯子男樂則以鼗將之功主安胎顧名思義則得之矣先人云質直而縷如經如絡故易生則氣勝理潤則血流安胎捷於益母世諦未之識也白附子別録下品氣味辛甘大溫有小毒主治心痛血痹面上百病行藥勢核曰本出高麗及東海新羅國今出涼州及遼東生砂磧下濕地獨莖類鼠尾草細葉周匝生於穗間形似天雄根如草烏頭小者長寸許干皺有節參曰白附子形肖附子而色白陽毒獨行之勇悍亦相肖焉氣味辛溫功齊火熱手少陰心臟之體用藥爾經云心者生之本神之變也其華在面其充在血脈為陽中之太陽通於夏氣故主行藥勢治心痛血痹面上百病耳灶心黃土別録下品氣味辛微溫無毒主治婦人崩中吐血止咳逆血醋調塗癰腫毒氣核曰灶心黃土原名伏龍肝取灶中對釜臍的之赤土也伏火經十年者良修治乳研極細水飛參曰鱗蟲木屬曰龍肝者木藏也蓋肝藏血故主血失所藏為吐血為逆血為崩血為便血餌臥血歸於肝而諸血藏心復得主脾復歸統伏龍功力普矣第木必侮土木襲火傳火襲土駐始而殘賊終而遞生由是觀之並可主木乘土下者脾衰火爍肺葉者咳逆而皆治之釋典云帶彼相起彼帶相起生生之謂乎醋調塗癰腫解毒者醋醯也穰粳谷而作酸金行木德兩備矣全藉火土授受之伏龍順浮沉於生長之門而春而夏而長夏而秋而冬成言乎艮矣何患肉理不通之癰腫死陰毒厲之不攘乎且也萬物莫不生土而歸土物有所歸殺厲之氣暖然齊春仁之潔矣醋別録下品氣味酸苦溫無毒主治消癰腫散水氣殺邪毒核曰醋一名酢一名醯一名苦酒五穀及秕糟飴果皆可造入藥唯取晚粳者上早秈者次糯秫者又次其法三伏時用陳倉米一斗淘淨蒸飯攤冷盦黃曬簸水淋淨判以陳倉米二斗淘淨蒸飯和勻氣歇入甕遂注水淹過寸許密封置暖處三七日成糯醋秋社日用糯米一斗淘蒸以六月六日造成合小曲一分和勻同水二斗注甕中封釀三七日成粟醋法用陳粟米一斗淘浸七日蒸之再淘淋倍水入甕密封日夕開攪一次一七日成小麥醋法用小麥二斗水浸三日蒸熟盦黃入甕水淹過麥密封七七日成大麥醋法用大麥一斗水浸三日蒸熟盦黃曬乾水淋過再以大麥二斗蒸熟和勻入甕注水封閉三七日成飴餳醋法用飴餳十斤水三十斤煎化俟溫入白曲末二十兩入甕攪勻封甕口日中曬三七日成糟秕諸果者不堪藥用不盡紀也參曰粳溉谷也釀之作酸酸木味也是木本水為源矣故法取粳造者良蓋酸津肝木誠肝臟之體用物楞嚴云談説酢梅口中酸出耳提面命尚爾津津至決癰消腫膚受者猶得蠲除飲之啖之寧不聚津豬水澤及稿瘁乎若目為肝家本有之物忘源者在在皆然矣主散水殺邪潤濕者仍歸水大邪孳者寧不降心退舍焉佐膽作導疏泄前後陰亦取致津斂液以潤枯腸膽決乞醯非無所自也豬膽別録下品氣味苦寒無毒主治主傷寒熱渴陳藏器曰敷小兒頭瘡治大便不通以葦筒納入下部三寸灌之立下核曰豬豕也易擊坎為豕性趨下俯首喜卑穢天將雨則進涉水波為水畜也蓋十二子亥為豕故亥象形以一陰生於午至亥而六陰備謂其嫌於無陽也是以豬之在物以從豕在氣以從亥其應水也為能克其類焉牝曰豝曰彘牡曰㠟曰豭皮膚血肉筋骨髓腦臟腑膏膜頭臚脬卵懸蹄耳垢燖湯繩縛咸歸藥用若豭豕其力轉勝故牡豬之膽倍大於牝諸方取用大膽者以此參曰膽者肝之腑謀慮決斷之所出焉經云十一臟皆取決於膽其所賴以斷判流行者衆矣囊皮裹汁氣用為先是非塊然肉好之比性濡滑味大苦氣大寒大凡火熱為眚燥涸為證者對待治之至續脈慰勞利腸滌垢此則氣用前通並得潔齊形臟蓋膽者甲乙之始陰陽之兆所賴以斷判行流豈小補云乎哉蜘蛛別録下品氣味微寒有小毒主治大人小兒㿉及小兒大腹丁奚三年不能行者核曰蜘蛛處處有之色蒼褐而斑有棘毛雙眸巨口六足大腹爪牙鋭利齧人最毒尿遺著人遂作瘡瘍腹下有細稜絲從內放也結網在人家簷角籬頭陋巷間空中右繞作網綸經二十有四布緯七十有二蟲豸觸著即放絲捆扎細小而後啖也埤雅云蜘蛛結絲以網飛蟲人之用計安能過之掃其網置衣領中令人知巧闢忘入藥唯用懸如魚罾者亦名䖦蟱赤斑者名絡新婦入方術家用余並不採取種類甚多大小顏色亦不一也爾雅但分蜘蛛草土及蠨蛸四種齧人甚毒往往見於典籍按劉禹錫傳信方云判官張延賞為斑蜘蛛咬頸上一宿有二赤脈繞項下至心前頭面腫如數斗幾至不救一人以大藍汁入麝香雄黃取一蛛投入隨化為水點咬處兩日愈貞元十年崔從質員外被蜘蛛咬腹大如孕婦僧教飲芋乳數日而平李絳兵部手集云蜘蛛咬人遍身成瘡飲好酒至醉則蟲於肉中似小米自出也劉郁西域記云赤木兒城有蟲如蜘蛛毒中人則煩渴飲水立死飲葡萄酒至醉吐則解元稹長慶集云巴中蜘蛛大而毒甚者身運數寸踦長數倍竹木被網皆死中人瘡痏痛癢倍嘗惟以苦酒調雄黃塗之仍用鼠負蟲食其絲則愈修治火熬焦者良參曰蜘蛛噴泄放絲磨旋右轉結網以網飛蟲知物觸而遂誅之地以陽殺陰藏之謂乎易曰結繩網罟以佃以漁蓋取諸離象曰明兩作離繼明照於四方之火德歟重門擊柝以待暴客蓋取諸豫象曰雷出地奮先王以作樂崇德殷薦之上帝以配祖考之木德歟故聖人之作易也仰觀於天俯察於地而又觀鳥獸之文與地之宜則所謂取才於物也仲景兩論為方劑祖蜘蛛輔木王之桂曰蜘蛛散主治陰狐疝氣偏有大小時時上下觸突網募亂作腹心者盡誅之卷束狂勃剪滅不格也陶隱居遵祖劑作別録廣治小兒三歲不能行蓋天道左旋天以陽生陰長地道右轉地以陽殺陰藏地道也坤道也應地無疆以順天行之健及小兒大腹疔此高粱之變洗除特易易耳鱧腸唐本草氣味甘酸平無毒主治血痢針灸瘡發洪血不可止者敷之立已汁塗眉發生速而繁核曰鱧腸所在有之南方下濕地尤多苗似旋覆莖似馬莧葉似楊柳花細白作實似小蓮房色青碧一種苗梗枯瘦似小蓮花色正黃實亦作房且圓南人謂之小蓮翹二種折其苗並有汁出須臾遂黑俗謂之旱蓮又謂之金陵草參曰鱧玄鱧體色青玄俗呼黑鱧首具七星隨鬥指而向之神轉不回之謂乎美在腸形相肖也蓋腸暢也通暢胃氣為水穀道心肺腑大小腸也經云肝主色自入為青入腎為黑爾雅翼云青出於藍月令云刈藍以染重玄則又玄出於青矣為腎之心藥肝藥肝之腎藥心藥心之肝藥腎藥也故鱧腸産南而色玄則凡毛髮鬚眉色變於色者使之各色其色耳經云腎之合骨也其榮發也其主脾也肺之合皮也其榮毛也其主心也又為肺之脾藥腎藥心藥肝藥矣故鱧腸白華在秋稟庚金之化色味乃充氣平味甘亦即土大舒和之用又為脾之腎藥心藥肝藥肺藥也此以五星互呈故得形臟敵應為心肝脾胃爪生髮長筋轉脈搖彌膚致腠誠駐形形物耳若主血痢正胃失通暢致穀道不泌不分蓋鱧至難死自非連鯘者比至主針灸瘡發洪血不止鱧腸脈勝而通心色勝而通肝則脈有所主血有所藏心主腎也肝主肺也水火既濟矣木金互交矣膚受者捷如影響況餌食者乎豨蘞唐本草氣味苦寒有小毒主治熱𧈟煩滿不能食搗汁主金瘡止痛續血生肌除諸惡瘡消浮腫核曰豨蘞所在有之春盡作苗莖有直稜間作班點葉似葈耳微長又似地松稍薄對節生葉花葉皆毛肥壤者一株分枝數十八九月作小花深黃色實如蒿子外萼有刺喜黏人也修治採葉洗淨曝乾入甑中每層酒潤蜜酒疊滿封固甑口蒸一時許取出曝乾如前法蒸曝九次則氣味香美參曰楚人呼彘為豨呼嗅為蘞蓋腎畜彘腎臭腐為腎臟之體藥也其味苦其氣寒其性潤下又為腎臟之用藥也對待熱𧈟為眚若蟄蟲之壞我戶耳經云腎虛者心懸若病飢煩滿不能食灸之則強食生肉又云腎虛脛腫寒逆實則骨氣以精是故駐形者其始淫氣於腎散精於骨以次淫散乃得筋柔肌生血榮毛美耳若風氣通於肝致筋膜馳痿此以氣病形亦以形病氣輔肝之母即所以補腎之形形全則神俱五形若一矣土瓜救荒本草氣味苦寒無毒主治邪熱解勞之清心明目核曰苦瓜副名癩葡萄錦荔枝所在都有閩廣尤多四五月下子生苗引蔓長丈餘有澀毛葉類野葡萄莖間卷鬚亦若葡萄之絡絆也七八月作小花黃色五瓣結實如雞卵皮上㿔癩宛若荔枝殼狀初生青色熟則黃赤內有紅瓤丹紅如血殼極苦瓤最甜瓤中裹子形扁色褐似木鱉子狀閩廣者瓜長尺許他處則圓短但本大末鋭耳取殼皮青翠者煮肉作羹及鹽醬充蔬味雖苦澀頗有清韻善解熱惱也根如胡蘿蔔質柔且滑削挺作導用泄腐穢耳參曰苦瓜苦詮味瓜象形象實綴在須蔓間也殼苦瓤甜因名苦瓜生時青碧熟則丹黃水火通明土金授受際也形類荔實又狀人心瓤肉正赤如凝血殼皮痱㿔猶蝟刺第柔滑若膚肌罔同荔刺之辣手藉此形色持維中土遞襲容平乃得懲煩雪躁息肩勞乏頓開心目轉熱惱為清涼地矣根荄膩澤削挺作導通因塞用特易易耳漿水宋嘉祐氣味甘酸溫無毒主治主調水引氣宣和強力通關開胃止渴六亂泄利消宿食宜作粥薄暮啜之解煩去睡調理臟腑十令酸止嘔噦白人膚體如繒帛核曰漿水炊粟令熟投冷水中浸六夕味作酢面生花色類漿汁故名漿水蓋粟粒細圓南北皆有北田猶多苗都如茅有青黃赤白黑褐之殊或因姓氏地名或因形似時令隨義賦名不啻數十種如早有趕麥黃百日糧中有八月黃老軍頭晚有雁頭青寒露粟故成熟有早晚苗稈有高下山澤有宜異實收有息耗質性有強弱氣味有美惡順天時量地理則用力少而成功多任性返道勞而無獲矣大都早粟皮薄而米充晚粟皮厚而米瘦與粱同類穗大毛長粒粗而黏者粱穗小毛短粒細而粳者粟也苗似粟低小有毛秀特舒散米粒悅澤一稃一米米粒稍肥者稷也一稃二米米粒稍細者黍也狀如蘆荻而內實葉如蘆穗而稍肥米如椒子而堅硬者蜀粟也蜀粟即高粱廣雅謂之水稷又謂之荻梁食物謂之蘆穄俗謂之蘆粟又謂之蜀秫也苗葉都似蜀粟而肥又類薏苡而長六七月開花成穗如秕豆狀苗心出苞如棕魚白鬚四垂久則苞裂子出攢簇如珠者玉粟一名玉蜀粟又名玉高粱即今之御粟也漿水所需取陸種之早粟一稃一米最細而圓者炊浸合宜為用彌佳日久致敗為害殊甚禁李同食令人霍亂妊婦食之令兒骨瘦産後尤忌清漿啜之絶嗣不字醉人頻飲失音不語也參曰漿水粟漿也炊粟浸釀六夕乃成去滓純水一名清漿蓋粟本作𠧪禾象穗在禾之上也春秋題辭云粟乃金所主米為陽之精西葉米而粟成矣孔子曰粟之為言續也為陸種之首舊谷既絶新谷未登接絶續乏名之曰粟其味鹹其氣寒炊之作漿其氣溫其味酸且甘顧穀類水屬葉西而登炊之釀之稼穡之甘曲直成酸五氣固備而酸津獨著爽旦微明春生之象也乃爾漿水穀味開發上焦熏膚充身澤毛若霧露之溉斯毛脈合精行氣於府府精神明留於四藏則絶者接而乏者續矣何患氣之失引水之失調開之不通渴之不止霍亂之難平湧泄之難定宿食之難消乎薄暮啜之解煩去睡此爽旦微明春生之休徵也調腑理臟此府精神明留於四藏之休徵也煎之令酸止嘔定噦此宣水穀味開發上焦之休徵也白人膚體如繒帛此熏膚充身澤毛若霧露之溉之休徵也至宣和強力將挈衛營平權衡成寸口後天生氣從之先天真氣自守矣白魚宋開寶氣味甘平無毒主治開胃下氣去水氣令人肥健核曰白魚一名鰋一名鮊匽白也白色也生江湖中大者長六七尺色白形窄腹扁鱗細內有細刺頭尾俱昂灸瘡不發者作鱠食之參曰魚冬淵春涉化無停機者共浮沉於生長之門白者金色金者水母生生不息之源也仲景先生用治水亡澤上而消渴水亡潤下而小便不利開寶推廣開胃開胃者開發上焦熏膚充身澤毛若霧露之溉令人潤身而肥健氣無有不下水無有不去矣蓋用行則體消體止則用息用不忘體體不亡用亡則不祥莫大焉顧水之從魚猶云之從龍風之從虎親上親下物各從其類也浮石日華氣味鹹平無毒主治煮汁飲止渴治淋殺野獸肉核曰出南海交州之陽水沫集塵埃蕩漾水面日久凝結而成色黃白體虛而輕仍未離乎塵沫本相也先人云山融成水歸宗走海泡幻立堅仍呈本相隨波上下止止行行行行止止會心者得之參曰抱朴子云燒泥為瓦燔木為炭水沫為浮石皆去其柔脆變其堅剛釋典云火劣水勢濕為巨海干為州潭是故彼大海中火光常起彼州潭中江河常注雖幻化異形而水火之性終不隕滅顧浮石之浮水上即火性浮炕之上炎詩大雅云蒸之浮之是也若止渴治淋即濕者干之乾者濕之若積塊老痰癭癧疝瘕砂石淋露即去其堅剛變其柔脆隨根身之缺陷現四大之遍周若以結治結猶幻歸幻耳鉛丹日華氣味辛微寒無毒主治主吐逆反胃驚癇癲疾除熱下氣煉化還成九光久服通神明核曰鉛丹原生於鉛出蜀郡平澤近皆炒鉛為之法用每鉛一斤以土硫黃十兩硝石一兩熔鉛成汁下醋點之俟瀼沸時遂下硫黃一塊少頃再下硝少許沸定再點醋依前下少許硝黃待自作末則成丹矣近多以作粉鉛腳不烢成粉者用礬石硝石合炒成丹力轉薄矣若欲轉丹為鉛只用蓮鬚蔥白汁拌丹漫煎煅成金汁傾出土上即還鉛矣市肆者每以鹽硝砂石雜亂凡用須用淨水漂去硝鹽飛去砂石澄干微火漫炒紫赤色置土地上攤去火毒乃入藥用會典云黑鉛一斤燒丹可得一斤五錢參曰鉛秉重玄五金水也點烹成丹碎大塊作太末轉丹還鉛會太末歸太玄下而上外而內元始合璧動定九光丹體備已故主吐逆反胃驚走狂癲下而上者上而下矣癇疾下氣忤惡聚積外而內者內而外矣水濟火則熱除火濟水則通神丹成敵應莫捷於鉛降真香證類氣味辛溫無毒主治燒之闢天行時氣宅舍怪異小兒帶之辟邪惡氣核曰降真原名新絳出黔南南海山中及大秦國似蘇方木燒之不甚香得諸香和之則特美入藥以番降紫而潤者良今廣東廣西安南漢中施州永順保靖及占城暹羅渤泥琉球諸番皆有朱輔山溪蠻叢話云雞骨香即降香本出海南今溪洞僻處所出者似是而非徑瘦不甚香周達觀真臘記云降香生叢林中番人頗費砍斫之功乃樹心也其外白皮厚八九寸或五六寸焚之氣徑而遠又稽含草木狀云紫藤香長莖細葉根極堅實重重有皮花白子黑其莖截置煙焰中經久成紫香可降神也參曰降真新絳也推陳出新降者大赤易曰干為赤坎為大赤貫流先天一氣者歟主利率類以從陽遠於絶類以從陰也燒之真降詮名降真蓋真者仙變通乎天提挈天地把握陰陽獨立守神命曰真神故主天行時氣宅舍怪異辟邪惡氣遠於生陽顯諸死陰之屬者斂臼消滅顧赤心在中重皮鞏固宛若衛外為固之為陽藏精起亟之為陰也仲景先生祖劑主利脈革之半産漏下佐以蔥莖前通乎陽隧君以旋覆誠營血之師帥旋者周旋旌旗之指麾覆者伏兵奉旌旗之指麾者而後新降起亟乎陰衛外乎陽則行者留留者行矣本草失列品類時珍補入綱目療金瘡折跌出血不止者此遵祖劑之行留而推廣之副名降真良有以也頤更推廣之不但系小子婦人吉猶可系丈人之失與亡協旋覆蔥株斯藏精而起亟衛外而為固者也潦水綱目氣味甘平無毒主治主煎調脾胃去濕熱之聖藥核曰雨水曰潦疾雨曰驟徐雨曰零久雨曰苦雨曰愁霖雨晴曰霽時雨曰澍雨而晝晴曰啓也蓋雨從云下天地氣和而為雨怒而為風故凡易稱雨者皆和之象也詩云有淹萋萋興雨祁祁淹陰雨也或作目弇淹水氣之云也傳云雨雲水氣萋萋盛貌祁祁徐貌蓋云欲盛盛則雨足雨欲徐徐則入土且亦云氣不待族而雨者非陰之和也故詩云以萋萋雨以祁祁為善爾詩曰靈雨既零命彼倌人星言夙駕稅於乘田瑞應圖云靈雨瑞雨也降而應物謂之靈雨星晴也言夜而雨夙而星見於是督勸農乘此傳所謂務材訓農者也鹽鐵論云周公之時雨不破塊風不鳴條雨則必以夜夜者正雨之時也詩云我來自東零雨其濛濛善沾濡又喜陰結不解羈旅之愁於是為甚詩以言其情也雨無正曰雨自上下者也衆多如雨而非所以為政也政者正也夫文一止為正衆多如雨則無正矣詩云月離於畢俾滂沱矣又曰益之以霢霂滂沱大雨也小雨謂之霢霂釋名曰言淋瀝沾浸如人之沐唯及其上支而已根不濡也蓋霢膏潤於土如人之脈故曰霢也説文云秋薶厚穜故謂之麥然則霂言其上霂言其下也詩云艽艽黍苗陰雨膏之方暑之苗也暑雨暴息無陰雲以覆之日隨蒸焉則苗稿矣將以潤之乃所害之也故詩以陰雨為善俗諺五月謂之分龍雨曰隔轍言夏雨多暴至龍各有分域雨晹往往隔一轍而異也易云密雲不雨目我西郊言小畜也畜者畜也升氣又自乎西故能為密雲而已蓋入藥之潦宜取陰雲之雨斯本天地之和本草取霪雨為潦是非陰陽之正矣備録經雅用供博粲云爾參曰地氣上為云天氣下為雨雨出地氣云出天氣交互升沉沛然降注也對待水寒獨沉俾之起亟熏膚充身澤毛若霧露之溉歟別録主調煎脾胃之聖藥經言人之脾胃以地土名之人之氣汗以風雨狀之器界益根身疏相培親相無情於有情互相感召耳柏葉李時珍氣味苦微溫無毒主治煮汁洗漆瘡核曰側柏側生扁柏葉也生成見柏實條核參曰木諧白者柏向西承製以全木德肝臟體用備矣葉側曰孫曰絡曰經曰脈克肖乎形蓋肝藏血失所藏血吐不止守所藏何吐之有時珍廣之洗療漆瘡金形人膚受其眚名曰橫漆克承製又何橫之有褌襠拾遺主治煮汁主解箭毒並女勞復陳藏器曰陰陽易病燒灰服之並取所交女人衣裳覆之核曰褌襠小衣也一名褲一名犢鼻一名觸衣以褌復為之剪取近男婦二根隱處衣舊者是參曰褌股衣也襠兩股跨縫之中也一名褲褲跨同一名犢鼻者男之襠一名觸衣者女之襠非短犢鼻長觸衣也顧犢鼻名穴亦男可觸衣女可犢鼻矣蓋襠當息吹流液之的此氣之所聚即情之所鍾意之所之即心之所向無情之於有情互相感召耳洗汁療箭毒並女勞復燒灰主陰陽易病固火水之相射成陰陽之合璧匪此隱戶之衣不足以當飛簇之中匪此近陰之器不足以挽頽陽之宇雖具報身能所痛癢之差別總不離觸塵與受愛憎之違順閲觸衣犢鼻之副名遂可意料幻化敵應之遊戲矣第十二帙芷園素社痎瘧論疏痎瘧因證素問瘧論及刺瘧法最詳而悉後世守其偏承致經義蒙晦訛謬良多審因者略證局證者昧因知常而不及變循變而反舍常殊不知有是因方有是證因證既顯常法已具而始可與達變矣乃或常法既迷因證靡辨以寒為熱熱為寒虛作實實作虛致微者劇劇者危展轉變承連年月不已其死生存亡莫之能測也偶方孺先生舉問及此聊紀數語以就正痎瘧總名曰痁痁者秋時寒熱兼作即痁作而金伏者是也分名曰痎曰瘧瘧即惟火沴金酷虐殆甚日作日休者是也痎即間日發或間數日發深入陰分者是也此皆得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外募原六腑之間如客於頭項或肩背手足者則藏皮膚之內客於胸脅或臚腹者亦藏皮膚之內或腸胃之外或募原或六腑之間此皆營氣之所舍也以夏氣通於心心主營血之氣故也經云以奉生身者莫貴於經隧故不注之經而溜之舍也舍即經隧所歷之界分每有界分必有其舍猶行人之有傳舍然也此暑令人汗空疏腠理開者以暑性暄發致腠理但開不能旋闔耳不即病者時值夏出之從內而外衛氣仗此猶可捍禦因遇秋氣機衡已轉自外而內矣其留舍之暑令汗空疏腠理開風遂承之以入或得之以沐浴水氣舍於皮膚之內與衛氣並居衛氣者晝行於陽夜行於陰風與水氣亦得陽隨衛而外出得陰隨衛而內薄內外相薄是以日作故衛氣至必腠理開開則風與水氣之邪入入則病作衛氣與三陽之氣亦並於陰矣當是之時陽虛而陰盛外無氣故先寒栗也衛氣虛則起於毫毛伸欠陽明虛則寒栗鼓頷太陽虛則腰背頭項痛三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒甚則湯火不能溫脈則體靜而至來遲也不列少陽形證者以太陽為開陽明為闔少陽為樞而開之能開闔之能闔樞轉之也設舍樞則無開闔矣離開闔無從覓樞矣故開闔既陷樞機豈能獨留倘中見樞象即為開闔兩持所以持則俱持陷則俱陷也三陽俱陷則陰氣逆陰氣逆極則復出之於陽陽與陰亦並於外則陰虛而陽實陽實則外熱陰虛則內熱內外皆熱則喘而渴甚則水水不能寒脈則體動而至來數也此陰陽上下交爭虛實更作陰陽相移也極則陰陽俱衰衛氣相離故病得休衛氣復集則復病也其作有日晏日早者邪氣客於風府也衛氣一日一夜大會於風府循膂而下日下一節二十一日至骶骨故其作也日益晏也二十二日入於脊內注於伏膂其氣上行九日出於缺盆其氣日高作復日益早也有不當其風府而作者謂邪中異所則不當其風府也如中於頭項者氣至頭項而作中於肩背者氣至肩背而作中於腰脊者氣至腰脊而作中於手足者氣至手足而作中於胸腹者氣至胸腹而作故衛氣之所在與邪氣相合則病作是以風無常府邪氣之所合即其府也若痎之間日或至數日作者其氣舍深內薄於陰陽氣獨發陰氣內著陰與陽爭不得出是以間日及間數日而作也間日作者邪氣內薄於五臟橫連募原也間數日作者邪氣與衛氣客於六腑而有時相失不能相得故休數日乃作也但所中之腑即諸經募之舍更當兼見諸經募之證如舍屬足太陽者更令人頭重腰痛寒從背起先寒後熱熇熇暍暍然熱止汗難已舍屬足陽明者更令人灑淅寒寒甚久乃熱熱去汗出時喜見日月光得火氣乃快然舍屬足少陽者更令人身體解㑊寒不甚熱不甚惡見人心惕惕熱久汗出甚舍屬足太陰者更令人不樂好太息不嗜食多寒熱汗出多病至則喜嘔嘔已乃衰舍屬足少陰者更令人嘔吐甚多寒熱熱多寒少欲閉戶自處其病難已舍屬足厥陰者更令人腰痛少腹滿小便利如癃狀非癃也數便耳意恐懼氣不足腹中悒悒然舍屬肺募者更令人心寒寒甚熱熱間善驚如有所見也舍屬心募者更令人煩心甚欲得清水反寒多熱不甚舍屬脾募者更令人寒腹中痛熱則腸鳴鳴已出汗舍屬肝募者更令人色蒼蒼然太息其狀若死舍屬腎募者更令人灑灑然腰脊痛宛轉大便難目眴眴然手足寒舍屬胃募者更令人善飢不能食食則腹支滿也此但詳足經而無手經者經云風寒暑火天之陰陽也三陰三陽上奉之又邪不幹臟列臟證者非真臟之藏乃藏募之氣化證也更有曰溫曰寒曰疸曰牝者溫即先熱後寒之溫瘧也內分二種其一夏亦傷暑秋亦中風後更傷寒則暑熱在內風氣在中寒獨在外故唯寒風互為上下不涉營舍之暑以勢唯兩岐難於三向故也其先熱者風乃陽邪是以先外出而上從乎寒則外勝外勝故先熱也逆則復內入而下從乎風下從乎風則外負外負故後寒也其二證兼腦髓燦肌肉消亦先熱後寒同名溫瘧者此先冬中寒風藏於骨髓以冬氣通於腎腎藏骨髓之氣也至春陽氣大發邪氣不能自出因遇大暑腠理發泄或有所用力邪氣與汗皆出先從內出之外也如是者陰虛而陽盛陽盛故先熱衰則氣復入入則陽虛陽虛故後寒也寒即先寒後熱之寒瘧也亦夏傷大暑其汗大出腠理開發因遇夏氣淒滄之水寒藏於腠理皮膚之中秋更傷風則病成矣此先傷水寒後傷風氣故先寒而後熱也暑亦在內勢亦兩岐止此一種無有其二疸即但熱不寒之疸瘧也亦分二種悉屬內因其一陰氣先絶陽氣獨發則少氣煩冤手足熱而欲嘔以陽即熱不假外邪一唯似暑故無寒也其二肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣不及於陰故但熱而不寒其氣內藏於心而外舍於分肉故令人消燦肌肉此以似暑之肺熱為內因更受寒風為外因者也牝即但寒不熱之牝瘧也夏亦傷暑秋亦中風但陽氣獨沉不能挈陰自下而上為陽實虛陰仍實此仲景先生補瘧論之遺闕有疸必有牝故也至有隨四時而作者則證形少別於常法如秋病者寒甚冬病者寒不甚春病者惡風夏病者多汗乃若得之於冬而發之於夏藏之於心而顯之於肺者雖亦似因時異形此即溫與疸之因分內外更超於常法者也以上約略兩論之常稍置先後云爾本經唯列刺法先於瘧之未發時陽未並陰陰未並陽因而調之真氣乃復邪氣乃亡故先其時堅束其處令邪氣不得入陰氣不得出審候見之在孫絡盛堅而血者皆取之如舍屬足太陽者刺郤中郤中者金門也在足外踝刺入同身寸之三分此陽維別屬也舍屬足陽明者刺衝陽在跗骨動脈上去陷谷三寸刺入三分留十呼此足陽明原也舍屬足少陽者刺俠溪在足小趾次趾岐骨間本節前之中刺入三分留三呼此足少陽榮也舍屬足太陰者刺公孫在足大趾本節後一寸刺入四分留七呼此足太陰絡也舍屬足少陰者刺太鍾或太溪太鍾在足內踝后街中刺入二分留七呼此足少陰絡也太溪在足內踝後跟骨上動脈陷者中刺入三分留七呼此足少陰俞也舍屬足厥陰者刺太衝在足大趾本節後二寸陷者中刺入三分留一呼此足厥陰俞也舍屬肺募者刺列缺合谷列缺在手腕後寸半刺入三分留三呼此手太陰絡也合谷在手大指次指岐骨間刺入三分留六呼此手陽明所過也舍屬心募者刺神門在掌後鋭骨端陷者中刺入三分留七呼此手少陰俞也舍屬脾募者刺商丘在足內踝下微前三寸陷者中刺入三分留七呼此足太陰經也舍屬肝募者刺中封見血在內踝前一寸半陷者中仰足取之伸足得之刺入四分留七呼此足厥陰經也舍屬腎募者刺太鍾太溪取法如前足少陰例舍屬胃募者刺足陽明太陰橫脈出血厲兌解溪三里悉主之厲兌在足大趾次指之端去爪如韭葉刺入一分留一呼此足陽明井也解溪在衝陽後三寸半腕上陷者中刺入五分留五呼此足陽明經也三里在膝下三寸䯒骨外廉兩筋分肉間刺入一寸留七呼此足陽明合也此十二瘧者其發各不同時當先察其病形以知其舍於何舍則知衛氣所集時矣須未發時如食頃而刺之一刺則衰二刺則知三刺則已不已刺舌下兩脈出血又不已刺郤中盛經出血又刺項以下挾脊者必已舌下兩脈者廉泉也如未暇審其所舍必先問其病之所先發者先刺之如先頭痛及重者先刺頭上上星百會及兩額懸顱兩眉攢竹間出血如先項背痛者先刺風池風府大杼神道間出血如先腰脊痛者先刺郤中出血如先手臂痛者先刺手少陰陽明十指間出血如先汗出惡風者風瘧也刺三陽經背俞之血者如䯒痠痛甚按之不可得者曰胕髓病以鑱針針絶骨出血立止或瘧之始發也身欲寒時先刺手陽明太陰足太陰陽明之井俞身方熱時更刺跗上動脈開其空出其血此即陽明脈也若瘧脈滿大急者刺背俞及伍佉俞用中針各一適肥瘦出其血背俞謂大杼伍佉俞謂譩嘻也若脈小實急者灸脛之復溜在內踝上二寸陷者中灸五壯此足少陰經也更刺指之至陰在足小趾外側去爪甲如韭葉刺入一分留五呼此足太陽井也若脈緩大虛者便宜用藥不宜刺矣設刺諸陰之井無出血間日一刺瘧不渴間日作者刺足太陽渴而間日作者刺足少陽溫瘧不汗出者為五十九刺此皆無往而未得其並者也過之則失其時矣如瘧之且發也陰陽之且移也謂其氣逆未可治也故經言無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗正方其盛時必毀及其衰也勢必大昌此之謂也從來藥治方劑固多獨缺全局唯金壇王肯堂先生輯證治準繩內立二方其一用升麻茈胡葛根羌活防風甘草其二用石膏知母粳米桃仁紅花豬苓鯪鯉甲亦各得全局之半今復為一雖復實奇誠奇方之宣劑也以之為主俾即主知常因常達變於是化而裁之推而用之神而明焉存乎其人矣蓋痎與瘧乃風與暑合作為病應從兩治矣但氣病之至所有遠近上下及新故重輕之別則適其至所而為方治亦有奇偶重復及從逆反佐之殊先釋主方大略次後便於分析也先因於暑暑即火熱必郁肺金之燥化轉夏成秋溽暑自息故藥皆從乙庚合化法即以五種風藥為乙白虎全方為庚獨金火相刑難於交遞更以甘草之土維持長夏欲藉火土授受之際方堪對待夏火上極之勢轉為秋金下降之令此即點火成金不煩另覓種子者也雖轉成金金不生水寧成生化縱使夏火頓除不過暫時潛伏又以知母陰潤之水以復母仇即淫勝郁復法也若金鬱則泄之解表利小水者風藥豬苓是矣更因於風風即風木必動脾土之濕化脾土運行風斯息矣故藥亦從甲己合化法即以五種風藥為甲甘草為己又粳米石膏為金乃土轉生金復驅風木也若土鬱則奪之行土用者土以生木為用風藥屬木正所以行土用也又風並衛氣亦須治風五種風藥正治風之劑又衛氣下陷營中並致三陽亦陷唯挈三陽衛氣自持如羌活之挈太陽葛根之挈陽明茈胡升麻防風之挈少陽是也但偏重少陽者樞機維持開闔故也又暑藏營舍亦須治暑白虎全方正治暑之劑藏之營舍亦須治營桃仁紅花之類是也若鯪鯉穴山而居遇水而入則是出陰入陽穿其經絡於營舍舍且傾倒暑更何從棲息耶又有兼沭浴之水氣舍於皮膚者即以豬苓徹之更有兼淒滄之水寒侵著肌腠者豬苓固能利徹更須佐以辛溫乃可對待水寒之寒羌活茈胡之類是矣故風暑合作其始也形證必稍偏於風此因未易釀熱先須重於從風輕於從暑不必盡用全方解表利小水足矣久則暑熱熾盛風亦釀熱方稱二氣平均現證始無偏勝乃從全方合治法也此但指風暑初中時一氣無偏負者言設有暑勝於風現證必稍偏於暑者治宜從暑而帶風亦有風勝於暑現證稍偏於風者治宜從風而帶暑甚至有暑熱獨熾惟現暑象絶無風證者治惟從暑不必兼風此種世人目為中暑者謬矣蓋暑則常顯而不休瘧則時間而時甚縱或無間亦必刻期加重或七日九日十四日暑雖縱橫殆甚久則勢必稍遜以汗以熱亦即所以泄暑也未現之風至此始露方寒來而熱往熱往而寒來始從兩治法也以上獨暑氣偏勝與疸瘧之但熱者不同類疸則獨見疸瘧之形證此則惟暑氣勝於風寒者也又甚至有風氣獨盛惟顯風證絶無暑象者治惟從風不必兼暑此種世人目為傷寒或為中風或久之風暑俱現轉語云風寒轉而成瘧者亦謬矣蓋寒與風惟冬中傷即時為病各顯標本之化其不即病者至春始變為溫至夏始變為暑暑病者熱極重於溫也始現證時便不惡寒一惟惡熱且煩且渴而無汗若風之至夏亦變暑病者更加自汗出鼻息鼾語難出脈浮而身重也故此溫此暑惟春惟夏隨時變遷亦即隨時現證是以隨時命名至夏則人身出機已盡無復伏藏故不得不隨夏出之機發露殆盡未聞猶可伏匿至秋反見冬時即病之寒化而無標證之陽象者經云夏惟傷暑秋成痎瘧亦如寒風至春變溫至夏變暑同一機衡繇此觀之夏月寒風從何而至更可云寒風轉而成瘧乎此不知夏雖傷暑不若秋風之獨厲是以惟見寒風絶無暑象亦如暑熱獨熾時間時甚或刻期增劇或七日九日十四日風雖摧拉至此勢亦稍遜作熱作汗亦即所以泄風也其伏匿之暑與風始無偏勝方得均平互為顯現亦始從兩治法也以上惟風氣專令與牝瘧之但寒者不同類牝則獨現牝瘧之形證此則惟風氣勝於暑熱者也若痎之內薄於陰者治固同法但暑舍深邃與淺近者方有異同先須度二氣之勝負但偏於向營即從主方隨證損益次後治暑如石膏粳米䈽竹葉之類佐以海螵蛸驅逐營舍之固結力轉營為衛矣更以常山解夏熱之交互定陰陽之且移常即恆久不變山即艮止不遷之意也若間二日或數日發者可類推矣設兼見足太陽形證者即為舍屬足太陽宜桂枝茈胡各半湯太陽為開但寒熱交互似乎從樞故即從樞轉開甚則大青龍湯主之又太陽從本從標故可從本氣之風暑標見之寒化陽象者也兼見足陽明形證者即為舍屬足陽明宜桂枝一白虎二湯固陽明為闔止須治開開開則邪去邪去則旋闔矣倍白虎一分者陽明不從標本從乎中治之濕化故也甚則鱉甲煎丸主之陽明多血多氣故也設胃家實大便難者調胃承氣湯主之兼見足少陽形證者即為舍屬足少陽宜小茈胡湯少陽從本少陽為樞故也兼見足太陰形證者即為舍屬足太陰宜小建中湯太陰為開太陰從本故也設自利便膿血時腹自痛者桂枝倍芍藥加大黃湯主之此脾家實腐穢當去故也兼見足少陰形證者即為舍屬足少陰宜茈胡加細辛湯少陰為樞少陰從本從標故也兼見足厥陰形證者即為舍屬足厥陰宜四物加苦楝附子黃芩湯厥陰為闔不從標本從乎中治之火化故也設厥甚者宜下之厥深熱亦深故也設消渴氣上撞心心中疼熱飢不能食食即吐蛔者烏梅丸主之兼見肺家形證者即為舍屬肺募也先宜桂枝黃耆白薇款冬花散次宜秫米甘草常山之屬兼見心家形證者即為舍屬心募也先宜桂枝黃芩湯次宜甘草蜀漆常山鱉甲石膏香豉梔子烏梅淡竹葉之屬兼見脾家形證者即為舍屬脾募也先宜小建中湯次宜粳米常山甘草知母鱉甲之屬兼見肝家形證者即為舍屬肝募也先宜通脈四逆湯次宜烏梅蜀漆鱉甲女萎知母苦參常山石膏甘草細辛白薇香豉之屬兼見腎家形證者即為舍屬腎募也先宜桂枝加當歸芍藥湯次宜䈽竹葉常山烏梅香豉蔥白之屬兼見胃家形證者即為舍屬胃募也先宜桂枝二白虎一加芍藥黃芩牡桂湯次宜藜蘆常山皂莢牛膝巴豆之屬若先熱後寒之溫瘧其一宜桂枝二麻黃一湯其二宜款冬白薇茹藘圓若先寒後熱之寒瘧宜麻黃二桂枝一小青龍一湯若但熱不寒之疸瘧其一宜女萎石膏湯或葛根豬苓湯其二宜香豉梔子栝蔞湯若但寒不熱之牝瘧宜蜀漆湯或牡蠣湯若秋病者寒甚先宜從風以扶陽次宜主方兩治法也若冬病者寒不甚先宜藿香正氣散次投主方亦可但當重於從風輕於從暑此必先歲氣無伐天和故也若春病者惡風先宜茈朴湯次投主方亦可若夏病者多汗主方主之雖時值暑氣流行亦須偏於從風俟暑風平等本標互顯乃可從兩治法也設病反其本而已轉標陽然於主方重於從暑甚則惟得標方一惟治暑宜白虎湯或竹葉石膏湯更當視其內外證如寒已罷而作熱之時必大煩喝大汗出面垢齒垢消渴飲冷而未能解者乃可投之設暑證雖具面齒雖垢而作熱之時縱冰水不能寒仍覺淅淅惡風者還從主方重於從風更有一種雖淅淅惡風或嗇嗇惡寒非若怯寒風之表虛反若遇寒風而身熱愈熾者此屬陰微陽亢又當重於從暑更有一種寒極而熱熱極而汗汗極而熱不解者表未去也又當重於從風設脈反躁疾或遲伏或狂言迷亂或默默不欲言不為汗解者病名陰陽交交者死不治更有一種熱極而汗汗極而熱愈熾或渴或不渴肢體痛煩筋脈攣急汗仍蒸蒸不已者此屬寒薄營氣轉作燎炎設偏於從風必口爛舌齦立見殂斃矣法當宣攝營氣以潤筋膜若兼身重木強筋肉壅腫者此又屬風濕相搏法當宣攝衛氣以充肌腠更有一種外證汗出惡熱內證胃家實大便難者此屬陽明內結更有一種汗煩喘喝消渴飲冷水舌苔白澀隨飲隨涸者此屬胸中熱若舌苔白滑者此又屬胸上寒更有一種汗煩喘喝消渴飲冷水胸中滿悶心下悸沖或嘔或噦或咳或噎者此屬水鬱若水藥入口即吐者此又屬水逆更有一種大汗出後胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮微熱消渴者此屬胸中水涸若虛煩不得眠反覆顛倒心中懊悁者此又屬胸中客熱更有一種汗煩喘喝消渴飲沸湯舌苔白滑者此屬胃中寒若舌苔灰白頻飲頻涸者此又屬胃中熱更有一種舌苔白滑垢膩涎濁者此有宿食未化也在上脘者當吐之在胃中者當下之若時下利食飲不進惡聞食臭噯氣難舒者亦屬有宿食設偏於從風必續自汗出手足寒胃中干縱轉行承氣輩亦難下達腸胃矣更有一種齒舌燥涸或渴飲冷水或渴飲沸湯而中藏陰寒者不可概作熱論或食宿飲留則唾液罔周致齒舌燥涸者有之或鼻窒唇揭則吸呼從口致唇舌燥涸者亦有之更有一種舌苔青黑亦不可概作熱論或少啖甘酸便令青黑實非本有之色也更有一種舌本無苔而舌皮光薄且紅白柔嫩宛如新生望之若有津唾抹之燥涸殆甚者此屬妄汗吐下走亡血液所致死不治也以上皆寒熱虛實之變附録以備料簡至若病久不愈者此病結為癥瘕急治之宜鱉甲煎圓虛勞者宜蜀漆圓或牛膝湯或丁香酒如或暑風淫並而經隧廢弛或寒熱遷變而升降失序或虛實更作而上下交持或表陽散懈而里陰獨沉或營衛虧竭而血氣損傷或故病未攘而新邪再襲或食飲過叨而飲留食宿或以欲竭精而形藏化薄或煩勞則張精絶或大怒則形氣絶或憂愁思慮復傷脾或形寒飲冷復傷肺或強有用力或勞汗當風或夙疾反顯而新疾似隱或新疾方痊而夙疾轉熾或有似是而非或有似非而是種種證因亦令病久不愈者更當度情志之苦欲補瀉及後先輕重而消息之又不可偏執諸方而概投之矣蓋暑藏營舍而為汗煩喘喝及體若燔炭正暑氣暄發之本性耳固稱必郁肺金之燥化與痹營血之流行而無肺金營血之標證者正所謂在天成氣氣惟郁化亦所謂先為是動未所生也設不亟正治或早加禁截則在天之暑氣轉而成在地之火行乘刑金臟及後為所生病矣如火乘金臟則少氣喘咳血溢血泄鼽嚏嗌乾耳聾目赤肩背熱癮疹痤痱身熱膚痛為浸淫甚則肺氣焦滿胸中隱隱刺痛口中辟辟燥咳唾涎沫穢濁者肺痿唾膿血腐臭者肺癰此皆火乘金臟所致也如後所生則痹血成勞血脈虛少不能營於五臟六腑身體不仁肌肉甲錯兩眸黑暗目瞑目眩鬚眉落毛髮折四肢痠痛熱煩行動則喘喝手足厥寒衄血咯血卒喘悸忡咽乾舌涸裡急少腹堅小便癃腰呂痛陰頭寒精氣清冷夢交失精魂魄飛墮飧泄溏泄食谷不消腸鳴幽幽臚腹都滿善盜汗虛煩不得眠馬刀挾癭此皆痹血成勞所致也蓋風並衛居而為寒栗鼓頷及善行數變正風氣摧拉之本性也固稱必動脾土之濕化與痹衛氣之外衛而無脾土衛氣之標證者亦所謂在天成氣氣惟郁化亦所謂先為是動未所生也設不亟正治或早加禁截則在天之風氣轉而成在地之木行乘剋土臟及後為所生病矣如木乘土臟則黃疸腸澼肌肉消瘦飲食不能為肌膚體重煩冤腸鳴腹支滿身䐜憤舌難言口吐沫甚則三焦無所御四維斷絶肢體尪羸獨足腫大此皆木乘土藏所致也如後所生則痹氣成勞內閉九竅外壅肌肉衛氣散懈少氣不足言皮聚毛落血菀於上陰不勝其陽則脈流薄疾並乃狂陽不勝其陰則五臟氣爭九竅不通甚則目盲不可以視耳閉不可以聽潰潰乎若壞都汨汨乎不可止此皆痹氣成勞所致也蓋或兼得之以沐浴水氣舍於皮膚之內與衛氣並居者濕化也設濕化不攘則一身盡疼飲發中滿頭汗出首如裹身黃背強欲得被覆向火甚則肌肉萎行善瘛四肢不舉歷節黃汗腹滿食減溏泄腸鳴反下甚設更早加禁截則濕化轉而成土乘侮水藏矣當病腹痛清厥意不樂體重煩冤胸中不利陰痿不用腰脽痛少腹痛心下痞痛動轉不便時害於食足脛寒而逆此皆濕化乘勝所致也蓋或兼遇夏氣淒滄之水寒藏於腠理皮膚之中者寒化也設寒化不折則水失體用而心氣抑心下悸寢汗憎風甚則奔氣咳喘水飲支飲眼下浮起如蠶蠱脛腫腹大若蠱狀設更早加禁截則寒化轉而成水乘傳火臟矣當病身熱躁悸骨肉不相著足痿不收持濡泄血溢陰厥奔豚上下中寒讝語心痛熱中瞀悶渴而妄冒此皆寒化乘勝所致也如或暑藏營舍舍屬足太陽經脈之界分兼見頭重腰痛寒從背起先寒後熱熇熇暍暍然熱止汗難已之經化證者不亟正治或早加禁截必注之經而溜之府當病沖頭痛挾脊痛目似脫項似拔腰似折髀不可以屈膕如結踹如裂尻呂腳皆痛小指不用甚則癲狂頭漾項強痛目黃淚出鼽衄癃閉戴眼直視而遺溺如或暑藏營舍舍屬足陽明經脈之界分兼見灑淅寒寒甚久乃熱熱去汗出時喜見日月光得火氣乃快然之經化證者不亟正治或早加禁截必注之經而溜之府當病顏黑善呻數欠惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹狂亂溫淫汗出鼽衄口喎唇疹頸腫喉痹大腹水腫膝臏間腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中指不用胃中熱則消穀身以前皆熱胃中寒則脹滿身以前皆寒有不得隱曲女子不月其傳風消而息賁如或暑藏營舍舍屬足少陽經脈之界分兼見身體解㑊寒不甚熱不甚惡見人心惕惕熱久汗出甚之經化證者不亟正治或早加禁截必注之經而溜之府當病口苦善太息心痛脅痛不可轉側面有微塵體無膏澤足外熱小指次指不用甚則頭頷痛目鋭眥痛缺盆中腫痛胸脅肋髀膝外外踝脛絶骨前諸節痛時寒熱馬力挾癭狐惑智失而黃出如或暑藏營舍舍屬足太陰經脈之界分兼見意不悅好太息不嗜食多寒熱汗出多病至則喜嘔嘔已乃衰之經化證者不亟正治或早加禁截必注之經而溜之藏當病舌本強胃脘痛腹脹善噫而嘔甚得後與氣乃快然如衰身體重大指不用甚則舌本痛體難動搖食不下煩心心下急痛溏瘕飧泄水閉黃疸不能臥而強立或怠惰嗜臥股膝內腫厥四肢痿易而不收如或暑藏營舍舍屬足少陰經脈之界分兼見嘔吐甚多寒熱熱多寒少欲閉戶自處其病難已之經化證者不亟正治或早加禁截必注之經而溜之藏當病嗌痛頷腫不可以顧肩似拔臑似折甚則耳聾目黃兩頰間腫頸頷肩臑肘臂外後廉皆痛小腹急痛泄如下重足脛寒逆而骨痿如或暑藏營舍舍屬足厥陰經脈之界分兼見腰痛少腹滿小便數如癃狀氣不足意恐懼腹中悒悒然之經化證者不亟正治或早加禁截必注之經而溜之藏當病腰脅痛不可俯仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色胸滿嘔逆飧泄狐疝四肢滿閉淋溲便難而轉筋如或暑藏營舍舍屬肺募之界分兼見心寒寒甚熱熱間善驚如有所見之藏化證者不亟正治或早加禁截邪干肺臟矣當病發咳上氣甚則大骨枯稿大肉陷下胸中氣滿喘息不便其氣動形期六月死如或暑藏營舍舍屬心募之界分兼見煩心甚欲得飲清水反寒少熱不甚之藏化證者不亟正治或早加禁截邪干心臟矣當病筋脈相引而急甚則大骨枯稿大肉陷下胸中氣滿腹內痛心中不便肩項身熱破䐃脫肉目匡陷真藏見目不見人立死其見人者至其所不勝之時則死如或暑藏營舍舍屬脾募之界分兼見寒甚腹中痛熱則腸鳴鳴已汗出之藏化證者不亟正治或早加禁截邪干脾臟矣當病發疸腹中熱煩心出黃甚則大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真藏見十日之內死如或暑藏營舍舍屬肝募之界分兼見色蒼蒼然善太息其狀若死之藏化證者不亟正治或早加禁截邪干肝藏矣當病脅痛出食甚則大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項期一月死如或暑藏營舍舍屬腎募之界分兼見灑灑然腰脊痛宛轉大便難目眴眴然手足寒之藏化證者不亟正治或早加禁截邪干腎臟矣當病少腹冤熱而痛出白甚則大骨枯稿大肉陷下肩髓內消動作益衰真藏未見期一歲死見其真藏乃與之期日如或暑藏營舍舍屬胃府之界分兼見善飢不能食食則腹支滿之府化證者不亟正治或早加禁截邪入胃府矣當病留飲吐沫關格蛔結天癸竭精氣衰少甚則羸瘦短氣胃絡脈絶陽絡傷則吐血陰絡傷則便血見血即死如或暑藏營舍次復風寒兩襲而作先熱後寒之溫瘧者不亟正治或早加禁截多致痹氣血而成風痹以次乘傳所謂痹傷形移皆有次也或致風鬱成黃或致邪逆胸腹而成蠱也更有一種冬中寒風藏於骨髓次遇大暑邪氣與汗皆出證見骨髓消肌肉爍亦先熱後寒同名溫瘧者不亟正治或早加禁截多致形藏損至皮聚而毛落至骨痿不能起於床者死或骨痿不能起於床至皮聚而毛落者死所謂至從下上損從上下也如或暑藏營舍次遇夏氣淒滄之水寒更中秋氣降肅之風化而作先寒後熱之寒瘧者不亟正治或早加禁截亦致痹氣血而成痛痹或致水閉成疸或致水飲溢出肌膚腸胃之外而成腫也如或陰氣先絶陽氣獨發證見少氣煩冤手足熱而欲嘔而作但熱不寒之疸瘧者不亟正治或早加禁截多致身體灼熱目盲狂走或致熱氣所過則為癰膿或致胃疽腸腐其人死身色赤腋下溫心下熱也更有一種肺素有熱厥逆上衝中氣實而不泄因有所用力腠理開風寒舍於皮膚之肉分肉之間而發證見肌肉消爍亦但熱不寒同名疸瘧者不亟正治或早加禁截多致喘咳血溢毛髮焦折或致肺痿肺癰吐涎沫及膿血也如或暑藏營舍風並沖居獨表氣微虛不能挈陰自下而上而作但寒不熱之牝瘧者不亟正治或早加禁截多致陰陽離決血菀於上或致重陰則癲脫陽見鬼其人死身色青脛先寒唇先黑也如或春病者惡風夏病者多汗冬病者寒不甚不亟正治或早加禁截其變生形證此則因時之序以顯經藏之化或已兼經藏之化此又因經藏界分轉生變承矣至於間日發或間數日發者不亟正治或早加禁截其變生形證以其舍深橫連募原內薄六腑則易干臟腑多致病死不治也然則夏令暑熱之氣為致病之本因人身營氣之舍為奉本之標見秋氣降肅之風沐浴之水淒滄之寒為成病之宗乘若衛氣三陽此則作病之關機經藏界分此又營舍之畛畦也故寒熱間作及兼經藏之化曰常注經溜府及見乘勝之證曰變是以一歲之中長幼之病多相似者以暑為時序對待所必有之氣故爾乃若五運六氣亦作痎瘧宜應別論以五歲六期始一再見為流行相襲加臨之化故爾如歲火太過炎暑流行民病瘧其兼證喘咳少氣血溢血泄耳聾嗌燥中熱肩背熱如歲木不及復則炎暑流火民病寒熱其兼證痱疹癰痤如赫曦之紀炎暑施化民病鉓瘧其兼證瘡瘍血流狂妄目赤如陽明司天燥氣下臨暴熱乃至民病寒熱其兼證心痛如少陰司天熱氣下臨大暑流行民病寒熱其兼證喘嘔嚏鼽吐衄鼻窒如陽明之政炎暑大行民病寒熱其兼證咳逆嗌塞振栗癃閟三之氣燥熱交合民病寒熱其兼證喘咳氣上四之氣寒雨降民病瘧寒之疾其兼證骨痿血便暴僕振栗譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍如少陽之政炎火乃流民病寒熱瘧其兼證聾瞑色變如太陰之政四之氣溽暑蒸化民病瘧其兼證腠理熱血暴溢心腹臚滿而熱甚則胕腫如少陰之政三之氣大火行民病寒熱更作其兼證咳喘目赤氣厥心痛四之氣溽暑至民病寒熱其兼證嗌乾黃疸鼽衄飲發如火鬱之發大暑至民病溫瘧其兼證瘛瘲骨痛四肢䐜憤瘍痱嘔逆腹暴痛血溢流注目赤心熱甚則瞀悶懊悁溫汗濡玄府善暴死也如厥陰在泉風淫所勝民病灑淅振寒其兼證欠呻兩脅裡急心腹支滿膈咽不通食則嘔逆腹脹善噫得後氣乃快然身體皆重如少陰在泉熱勝則焰民病寒熱如瘧其兼證皮膚痛目瞑齒痛䪼腫腸鳴氣上喘不能久立少腹中痛而腹大如少陰司天熱淫所勝民病寒熱其兼證咳喘氣中唾血鼽衄溺色變甚則瘡瘍胕腫肩背臂臑缺盆中痛肺脹滿膨膨而喘咳如少陽司天火淫所勝民病頭痛發熱惡寒而成瘧其兼證皮膚熱痛色變黃赤咳唾血溢熱中仰息傳而為水身面跗腫如陽明司天燥淫所勝寒清於中感而成瘧其兼證左股脅痛咳而腹鳴注泄騖溏甚則心暴痛不可反側嗌乾面塵如太陽之勝凝溧且至民病瘧其兼證寒厥入胃內生心痛陰中乃瘍隱曲不利筋肉拘苛血脈凝泣目如脫寒入下焦傳為濡瀉如少陰之復燠熱內作民病寒熱其兼證振栗讝妄寒已而熱膚痛暴喑少氣骨痿膈腸不便外作浮腫如少陽之復大熱將至民病瘧其兼證鼓栗寒極寒極乃熱血溢血泄少氣脈萎嗌絡焦枯渴飲水漿上為口糜下為跗腫赤黃色變小便數而欠也顧運行之相襲及主客之加臨亦莫不以暑熱為本因營舍為剽見但所顯證形皆屬藏化所謂病所勝之藏承所不勝之氣故也制方施治各有宜忌高則抑之下則舉之有餘折之不足補之佐以所利和以所宜同則異之異則從之治寒以熱治熱以寒所以順流行安主客而適寒溫也設不察時令與流行主客之差別而概治之甚至早加禁截多令暴亡所謂中運行者十全五中天刑者無一生行傷藏故也可不慎歟頤性生木魯不敢強作臆説以資觀聽謹從經論詳別因證之常變衍疏成編聊備參考豈漫云著述乎況未盡實多千里比肩端祈指駁芷園素社痎瘧疏方計録方三十八則聊備因證之常其變乘氣運先賢未經詮則頤又何敢妄參或藉此化而裁之則海內諸方多堪擇用誠神而明之則存乎其人焉爾至於揀選藥石從上古人不唯審方域辨氣候必蓄司歲孕生之物以備一紀之需恐失所精專難以待從逆反佐遂苦欲補瀉也但世苦綿力七年之病猶難三年之艾況品物咸具者乎是以雷公精參炮炙以補不逮設並棄置勿遵更或良楛不侔直欲制挺而撻堅利烏乎可瘧主方諸方分兩已從古方裁減或三之二或五之四設更欲增損須諒因證之微甚以為去就然方大病易除方小病難已也白虎青龍各半湯茈胡取銀州者去須及頭用銀刀削去黃薄皮少許粗布拭淨銼細勿令犯火七錢升麻不經雨晹者形色翠碧削去皮用黃精汁浸一宿曝乾銼蒸再曝三錢葛根取潔白肥嫩者用雪水或秋露潤透切片陰乾九錢羌活去頭細銼以淫羊藿拌浥三日曝乾去藿五錢防風勿用叉頭叉尾者叉頭令人發狂叉尾發人痼疾取肥大柔潤色黃通理者銼細五錢甘草取黃中通理者去頭尾尖處各四五寸僅取中節切作寸許長入磁器中好酒浸蒸從巳至午取出曝乾銼細七錢五分知母槐砧上銼細干木臼杵搗數千下勿犯鐵器七錢石膏取潔白如束針者研極細用甘草水飛三遍澄清去水曬乾再研三兩桃仁去皮同白朮烏豆置磁器中煮三伏時取出劈開心黃如金色為度曝乾搗爛五錢紅花粟米泔浸片刻取出用布袋絞去黃汁青蒿拌覆一宿曬乾三錢五分豬苓銅刀削去黑皮切作薄片用東流水浸一宿取出銼細以升麻葉對拌蒸一日去葉曝乾如無葉即升麻亦可九錢鯪鯉甲取近尾甲好酒浸一日擇高潔地上掘一土穴用炭火燒赤置甲於穴內以淨瓦覆之瓦上實土勿令氣泄俟冷取出研碎另掘一土穴埋甲過宿次早取用五錢五分粳米一合淘淨上十三味以水三升五合先煮粳米減半升去粳米同諸藥煮取升半去滓分三服露置星月下高潔處橫刀其上寅卯時取初服再煮數沸俟病者睡熟推醒服服畢莫共人語覆蓋取微似汗二服未發前半時許服服畢溫覆勿使寒栗大作熱亦漸減三服發後半時許服服畢再半時許方啜熱粥飲盞許以充營衛勿食他物損傷藥力也痎轉方主方同瘧竹螵蛸湯䈽竹葉取向東枝葉摘去蟲蝕及有蟲卵穢迹者東流水洗淨二兩海螵蛸取潔白輕脆重重有紋如通草者用