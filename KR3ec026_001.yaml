front:
  text: 本草乘雅半偈自序余質性黑暗又不能多取師承然以黑暗故益不自知其為黑暗每閲本草艱苦殊甚間亦弋獲記之側理夫自寫其一得爾而稍稍為人物色歲在庚午武林諸君子大集余舍舉仲景兩論及靈素祕奧期餘一人為之闡發余謝不能然亦不欲自祕其師承也於是時計此書之成自丙寅至庚午僅得十之二自庚午至癸酉僅得十之三而以誦説故幾不能竣事會春風座中狂飈拂面余遂絶念世紛專意筆墨自丙寅至癸未幾歷十八春秋而此書始成原分參核衍斷四種故名其書為乘雅數四為乘非取載之義也明年甲申方事剞劂又明年乙酉五月會有兵變挈家而逃流離萬狀諸楚備嘗沿至丙戌之十月始得生還而家徒四壁則板帙之零落殆盡可知已既慕古人破甑弗顧之意而仍自懷千金敝帚之思勉緝舊業僅能完參核之殘缺衍斷倍多何能補漏雖余之始意亦欲中分四種謂參核可該衍斷遂又名其書為乘雅半偈尋又念一生精力何忍自藏其半語詳義例中而今則姑俟之矣余平生實不能負笈遠遊師承殊少於家庭則有先大人荷薪之訓於父執則有紹隆王先生金匱之心傳象先陳先生薛案之私淑於往來則有仲淳繆先生之指示而李不夜先生嚴忍公先生則文章道誼之宗模也幼耽禪學於聞谷憨山二大師得其南車於離言和尚得其點醒而云間施笠澤古婁潘方孺同邑茹居素亦皆宇內名流既己于于而來豈少起豫之益故余之言雖不乏道脈持黑暗之資恐猶是摸索語耳將以就正海內即以貽笑海內而前所稱武林諸君子咸以是書出殊可為人師承余不敢冒其稱也余特不敢不稱述其師承者也丁亥重九日盧之頤書於無恆業
