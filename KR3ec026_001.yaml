body:
  text: 本草乘雅義例圖説核自炎帝嘗藥形質始皙惟德刑異齊而厥狀緣以區分先賢著為圖説間亦差別大率三統相承風氣代變且聲教漸遠而物性亦移或古之所産今無取焉倘按舊圖靡施新效余謹從先賢序述名類中妄加辨核間取數十種躬蒔齋圃求其甲孕癸終之候敢曰旁通誠以術重安人機殊相馬方則猶是而投或罔功者繇辨之有未辨也芟繁就簡多仍舊文語有之見色見心設繇是而循所以生成之序以返而探所以生成之原如良將用兵務使兵識將意將識兵情斯靡投不善矣作圖説核本經參本經言簡意盡精義入神其範圍曲成之妙非古之聰明睿智而神聖者何以與此先賢多得其精引而不發後世曲士見外遺內取粗舍精或守其一隅而乖其全體斯精義裂矣余早歲獲聆先人之緒論捍格鮮解久之從一品一節中稍見一斑因溯求本經所以立名之意與後人隨事異稱之故其德性氣味功能之殊具溫涼寒熱燥濕之異齊剛柔升降開闔發斂之互用固君臣佐使之所繇分也然張弛縱橫之妙如善兵者因敵為變以操其分合之神故多亦勝少亦勝動亦勝靜亦勝設未能直參古聖精義入神之奧雖自謂了了余知其不無茫茫矣余顓愚譾陋積歲茫茫然偶有一得輒妄憶之而妄言之覬海內高明庶有因鄙説而起豫者作本經參別録衍別録蓋陶隱居就本經而稍廣之所謂衍也始余因本經立名而稍得所以敷陳治理之義觸類興思偶窺一斑載閲別録業已引而伸之矣於此粗自信所見之或可與古為徒也別録既衍本經余復敢為別録衍顧余於隱居何能為役雖然推此志也使人知別録與本經非二説余則幸矣作別録衍附方斷在昔賢聖莫不深皙本經精義入神之奧是以因病立方各有深意顧人之病證雖同而所以受病或異倘按方以合病合其幸也不合且以病試方矣故於諸方之次謬為之斷俾察證者更審證之所從來庶弗至以人僥幸耳然微茫變動之介其輕重緩急有似是而非似非而是者謬在千里差則毫釐尤不可不深思而熟講也故能精研本經之奧則我可以立方矧有古方之可循者乎不則余懼其操方以希合也作附方斷時崇禎歲次戊辰季冬八日錢唐後學盧之頤識本草乘雅凡例一本草立名聖賢各有深意以德以性以色以味以體以用為品不同要使後人顧名思義即一端而得其大全如六書之指事會意八卦之設象通變原有至理存焉古之名家精識洞徹未有不深窺本草之奧者故嘗以一種而治多病自藥性有賦人安苟簡執一端而遺大全求其苦心刻意能深探本草所以立名之義者纍十數百年而不少概見矣則聖賢深意晦蝕已久是編不揣非敢強為傅會務就一端而求大全所謂其次致曲固曲士之微誠也一是編皆就本草綱目以為闡揚蓋綱目一書李氏父子博集精研近代之篤志本草者無出其右矣第良工苦心惟恐挂漏不無泛愛蓋以後人而推求前人之所未盡自易為力然意在相成以惠養後世總欲立欲達之一念也如有肆然思蓋前人之意則鬼神將呵責之矣況是編之未盡實多千里比肩端祈指駁一是編所重在參原夫本經立名居要其主治亦獨挈綱宗乃後人未達深旨故隱居有別録之述正從綱宗中再加演暢耳所以愚竊謂別録為本經之衍也然愚所以竊重於參者惟能參本草之真德用斯於古人立方之意隨病之輕重緩急而嘗變不一處始堪措手今之執古方而未盡效者豈方有未善哉未能變通而輕重布之耳一君臣佐使之説聖有明謨較若畫一無可移易然亦借國體喻之如人主清境內而授之將則君且委責於臣矣顧此適足以彰主之明而成主之重又如人臣出疆有利社稷安國家者專之可也此適以見使之不辱而君之善任耳凡此皆所以措國於不傾者也然則本經立名雖有定品苟不精參以妙其時措之宜亦鮮濟矣一藥産古今不同姑以人參言之相傳皆稱上黨往時皆用遼之清河若上黨則絶無矣間有朝鮮者頗不適用今則大率皆鮮産矣古人用藥取之中原而有餘今多采之遐方遠裔其近産者絶不足用至於良楛不侔更宜甄察然以良較楛其賈往往倍蓰什百是其取效亦必倍蓰什百世人類多畏良取楛無力者不必論奈何有力家視身之輕也至於醫者亦苟就之直欲制梃而撻堅利愚竊於此頗三致意一所附諸方頗有得將在外及大夫出疆之義者設方與證合取效甚捷然取效之後尤宜加謹培養所謂逆取而順守也方中不能一一備陳此義惟精參而嚴辨之毋拘毋忽一先人肆力本草著有博議蓋沒齒無倦也然於諸款之下有豫有奪故曰議其議或一或二至於六七不局局然為定額故曰博今亦備列編中不敢言洲源聊以明不賢之識小至於家授諸方間亦附見統公海內一諸説中間引釋典緣先君與王紹隆先生皆從紹覺法師講惟識論因有所悟愚小子竊聆緒餘遂知仲景立論之法暗與惟識相契且其妙有超於先天者用是不敢避流俗譏嫌略取一二以俟躍如一藥産苟非目擊徒取耳聞不無盡信書之蔽即愚數十年來所睹稍多蓋不俟五十而知四十九年之非矣所望高明深心遐覽者有以命之不妨刊正一愚之參囿於知聞猶之井觀已耳況數千年未抉之奧豈易備闡然先儒訓詁實後儒之藉惟是異時有因之觸發者獲為之藉其幸大矣一姬公爾雅專為釋名後之曰翼曰埤種種稱述其説始廣是編雖主於顧名思義而或翼或埤亦妄意竊取云爾一藥品雖有德性色味體用之不一然其要惟在能妙其用若識其妙用斯於升降出入之法可以大投可以輕取無不如意矣主治立論實與內經相表裡愚於參中頗引內經者以此然有一病而有數藥兼用及可互用者亦有一病而必賴一藥獨治者夫善事必先利器固矣苟器之未習而徒抱臨淵之羡俾病者醫者兩蒙譏焉惡乎可崇時禎歲次辛未孟夏八日錢唐後學盧之頤識乘雅半偈採録諸書大意神農本經三百六十五種恰應周天之數天度無虧此藥何容去取惟是古有今無存空名者居三之一故於本經實得二百二十二種今之人知有神農本經而不知其有食經然亦三卷中存茗草一條而後之人始知有食經也夫本經已亂於張華而食經又歸於剝蝕故以茗草寓存羊之意殊不必於此一條再如本經爭所自出矣蓋淮南世紀皆以本經出自黃帝既出黃帝而神農之稱又何以傳之千萬𥜥而無改惟陶隱居則信以為烈山氏之書在漢書亦云本草不知斷自何代而作猶疑之耳未嘗確言其出於軒轅氏也總之神聖開天之筆非二帝不能作即隨屬一人亦可或者書契未作之先口耳相授至後而始有筆傳也此非余之言而先哲之言也今食經以剝蝕故人無置喙則幸矣陶弘景字通明於本經已各有別録數如本經而又於本經之外復收採漢魏以下諸名家所用之藥三百六十五種亦名別録上之梁武按弘景在宋末為諸王侍讀尋歸隱勾曲山房號華陽隱居梁武每有大事輒往咨訪故時人又號為山中宰相卒年八十五諡貞白其書首敘藥性之源論病名之診次分玉石等部又有名未用者三品今於三百六十五藥之中採五十種唐本草者出自唐高宗時故系之以唐初高宗以陶隱居所注本經精粗溷收特命英國公李績等主纂修之事績等亦稍有增損故又謂之英國公唐本草顯慶中有監門長史蘇恭等以重加訂釋請帝覆命趙國公長孫無忌等與恭等互相採訪則又增入新藥一百二十四種分類諸品及有名未用者列十一部合目録及圖經通共五十三卷世又謂之唐新定本草今於其中録其功用者凡二十種藥性本草即藥性論非陶隱居之筆而唐甄權之筆也權扶溝人仕隋為祕省正字唐太宗時春秋百二十歲矣帝幸其第訪以藥性因上此書其他著述尚有脈經明堂人形圖今從藥性中取神麯土茯苓二種唐孫思邈撰千金備急方三十卷亦採靈素扁鵲諸書所論補養諸説及本草之關於食用者分類而系之名曰千金食治夫思邈隱居太白隋唐徵辟皆不就年百餘而卒則其所得必不止服食也而服食亦足以概所得矣尚有千金翼方枕中素書攝生真録福録論三教論老莊注為世所重而余録其食治中𭷥酥一種正為切於觀頤耳唐開元中三原尉陳藏器撰本草拾遺亦以本經雖有補集而遺沉尚多故別為此書今按藏器為吾浙之四明人其書博極群書精核物類訂繩謬誤搜羅幽隱自本草以來一人而已而世猶有僻怪之誚此與指橐駝為腫背馬者何異人胞一種功用最大特亟採之蜀後主昶命翰林學士韓保升等取唐本草重加訂釋間有增補別為圖經凡二十卷昶自為文以辨其首謂之蜀本草其生成形狀更核於陶蘇諸家即增補金櫻子為世要藥特録之宋太祖開寶六載命尚藥奉御劉翰道士馬志等取唐蜀本草及拾遺諸書而參校之馬志注解學士盧多遜等刊正七年復詔志等重定學士李助等看詳此書凡兩經參訂今取凡三十一種宋仁宗嘉祐二年詔光祿卿直祕閣掌禹錫尚書祠部郎中祕閣校理林億等重修本草所增定共九十九種計一千八百條謂之嘉祐本草秉筆者意在兼收務從該博以副詔旨而於祕奧實無大發明今為採十種日華諸書本草開寶中人撰不著姓氏但云日華大明序集諸家本草按千家姓大姓出東萊則其人乃姓大名明也或又言田姓云其於藥之主治功能頗稱詳悉凡三十卷今取蓬砂一種用藥法象為李東垣先生筆先生諱杲字明之真定人其祖嘗見神女從地湧出謂汝有賢孫當以鴻術名世後得先生果有倍年之覺受業於潔古老人即盡得其學祖潔古珍珠囊而增以義例嚮導活法著為此書中亦間有補遺如所採通脫木一種是已嘗嗟世人不辨脈證溷同治病著辨惑論其遺稿實多皆門人集成不無出入惟脾胃一論謂其以一臟具五臟體一氣備五氣用發人未發真千古之卓見也本草衍義補遺乃朱震亨所著震亨元末人字彥修世稱為丹溪先生云震亨嘗從羅太無學醫而此書則因寇氏之衍義而推衍之者也幾二百種亦多所發明但時泥舊説而又以諸藥分配五行恐不無牽強之失今採紅曲一種本草會編出祁門汪機手機字省之嘉靖時人懲王氏本草不收草木形狀乃削去上中下三品以類相從菜谷通為草部果品通為木部合諸家序例共二十卷故有會編之名其撮約似乎簡便而混同反難撿閲薺在菜部中最為微品而取以為冠何其陋也掩去諸家更覺零碎臆度疑似殊無實見僅有數條可録取蟲白蠟一種嘉靖末年祁門陳嘉謨撰本草蒙筌其部次一宗王氏集要每品具氣味産採治療方法創成對偶以便誦記間附己意頗有發明便於兒讀故名蒙筌秋石一種亦屬新增取之本草綱目者乃明楚府奉祠敕封文林郎李時珍之所撰也珍字東璧蘄州人其書搜羅百代訪採四方分五十二卷列一十六部部各分類類凡六十標名為綱列事為目增藥三百七十四種今採六種本經藥品惟本經及別録得依三品且不敢紊次自別録而下為草為木為果為谷為蟲豸不無後先者以各自成帙故耳從來本草命名雖殊而各有增人故損益之權非一手一足之所能操也損操損益者豈有意乎損益哉知荒谷貴玉之説則知不佞採録之意矣所録切要藥品各附諸家本條下歷代本草幾四十家除食經及本經不論外今所録者只一百四十三種合之農經仍是三百六十五種上契周天下備人用亦既優然有餘矣丁亥中秋盧之頤子繇甫識第一帙紫芝本經上品希世異種服食致仙上品上生與天合化氣味甘溫無毒主治主耳聾利關節保神益精氣堅筋骨好顏色久服輕身不老延年青芝本經上品氣味酸平無毒主治主明目補肝氣安精魂仁恕久服輕身不老延年神仙赤芝本經上品氣味苦平無毒主治主胸中結益心氣補中增智慧不忘久服輕身不老延年神仙黃芝本經上品氣味甘平無毒主治主心腹五邪益脾氣安神忠信和樂久服輕身不老延年神仙白芝本經上品氣味辛平無毒主治主咳逆上氣益肺氣通利口鼻強志意勇悍安魄久服輕身不老延年神仙黑芝本經上品盤繞層臺寄生於土者此草芝凡芝也不足數耳氣味鹹平無毒主治主癃利水道益腎氣通九竅聰察久服輕身不老延年神仙核曰出五嶽名山者貴嘗以六月生應六月之卦以表德也神農經云山川雲雨四時五行陰陽之精以生五色神芝為聖王休祥瑞命禮云王者仁慈則芝草生論衡云芝生於土土氣和則芝草生不假種識隨處寄生隨緣現相先人云靈異無根如優曇一現若盤繞層臺寄生於土者此其嘗也本經惟標六芝然其色相奇異不可不識存録以廣見聞菌芝生深山大木之上淵泉之側五色無嘗或如宮室龍虎車馬飛鳥之形木威喜芝生千年茯苓上上生小木狀似蓮花夜視有光持之甚滑燒之不焦飛節芝生千歲松樹上皮中有脂形狀如飛木渠芝寄生大木如蓮花九莖一叢味甘且辛黃柏芝生千年黃柏根下下有細根如縷建木芝其皮如纓其實如鸞參成芝赤色有光扣其枝葉作金石音樊桃芝其木如籠其花如丹其實如翠鳥千歲芝生枯木下根如人形跌坐刻之有血塗人兩足能行水上亦可隱形以上皆木芝也獨搖芝有風不動無風自搖一莖直上中空外赤貼莖杪之半生細小尖葉稍頭成穗作花灰白結子十二枚至秋不落卻透虛入莖中還筒而下根大如斗更有遊子十二枚相為環繞牛角芝生虎壽山及吳凌狀似蔥特出如角色青翠長三四尺龍仙芝宛如升龍相負之形紫珠芝葉黃實赤狀似紫李色白符芝大雪而花季冬而實朱草芝其莖如針九曲三葉葉有實也五德芝狀似樓殿五色具備方莖紫色以上皆草芝也玉暗芝生有玉之山狀如鳥獸色無嘗彩多似山水蒼玉亦如鮮明水晶七孔九光芝生臨水石崖間狀如盤盎有莖有葉葉有七孔夜視有光食之七孔洞徹石蜜芝生少室石戶中桂芝生石穴似桂乃石也其色光明石腦芝石中黃亦石芝類也石芝石象生於海隅及石山島嶼之涯肉芝其狀如肉附於大石頭尾俱有乃生物也赤如珊瑚白如截肪黃如紫金黑如重漆青如翠羽光明洞徹儼若堅冰大者重十多斤千歲燕千歲蝙蝠千歲龜萬歲蟾蜍山中小人皆肉芝類也鳳凰芝生名山金玉間燕胎芝形如紫葵紫色如燕狀黑雲芝生山谷之陰黑蓋赤理莖黑味鹹又有五色龍芝五方神芝甘露芝青雲芝雲氣芝白虎芝車馬芝太乙芝名狀不一皆服食仙去者也抱璞子云欲求芝草當入名山必以三月九月乃山開出神藥之月也忌山佷日用天輔時出三奇吉門到山須六陰之日明堂之時帶靈寶符牽白犬抱白雞包白鹽一斗及開山符檄著大石上入山執吳唐草一把山神喜芝乃得見禹步往採以旺相專和支幹上下相生之日刻以骨刀陰乾為末服有神異若人不致精久齋行穢德薄又不曉入山之術雖得其圖鬼神不與終不可得郭璞云一歲三華瑞草也昔四皓採芝群仙服食者也智者大師云服食石藥但可平疾服食芝草並可得仙陶隱居云凡得芝草正爾食之無餘節度故皆不云服法也天有五氣御五方而生五嶽此指神芝所生緣山川雲雨四時五行陰陽之精此指神芝能生因則神芝不惟為五芝首且獨為五嶽主矣故欲盡神芝希有功德須從生成能所中看得廣大圓滿先人云芝草為仙家服食藥之上品上生者也從山石水木之靈氣鬱蒸所結亦草亦木亦石亦土而非草非木非石非土與菌楊敻別要在名山大川古木仙境中得者服之自然靈妙李瀕湖以為可食溷置菜部是何異高隱灌園耶豫從固陵山中獲小黃芝細咀微咽頃之喉間涼潤如雲盤繞五內信是氣鍾非灌溉滋生之比靈異無根如優曇一現宜特尊諸首又云神農為民疾遍嘗草木以起夭扎芝則可以養性移情進之於德如仁慈忠信和樂勇悍非草木所能滋益也感天地氤氳之和屬精神不屬形質故主治如此耳參曰陰陽合和地氣上為云天氣下為雨雨霽云徹則芝生氣味涼潤體相旋繞不假種識以無成有故益五藏有中之無藏形為有藏神為無也如神芝具五色味則五藏鹹入紫芝赤黑相間則交通心腎偏得一色一味則各從其類矣與滋培有形者別異澄徹性靈久而得仙設非煙霞靜隱之流外息諸緣內心無喘不堪僭服耳雨霽云徹陰陽必清必淨矣不與陰陽蒸郁而作楊菌者反乎人參本經上品三丫五葉背陽面陰欲來求我椵樹相尋氣味甘微寒無毒主治主補五臟安精神定魂魄止驚悸除邪氣明目開心益智久服輕身延年核曰人參一名人參人銜人微黃參地精土精神草海腴皺面還丹搖光星所散也運鬥樞云人君廢山瀆之利則搖光不明人參不生生上黨及百濟高麗多於深山背陽向陰及椵漆樹下下有人參則上有紫氣春生苗四五相對一莖直上三丫五葉四月作花紫色細小如粟秋後結子或七八枚如大豆生青熟紅秋冬採根堅實堪用如人形者有神出上黨者形長黃白狀似防風堅潤而甘百濟者形細堅白氣味稍薄高麗者形大虛軟氣味更薄唯以體實有心味甘微苦多餘味者最勝收納新器中密封可經年不壞頻見風日則易蛀生用㕮咀熟用隔紙焙之或醇酒潤透忌鐵器鹹鹵用童便潤制者謬矣惡皂莢反藜蘆畏五靈脂為茯苓馬藺之使先人云參贊天地奠安神理精腴在握還丹可期形山之祕寶帝王之仁澤也又云人參功力安定精神魂魄意志於倉忙紛亂之際轉危為安定亡為存如武有七德一禁暴二戢亂三保大四定功五安民六和衆七豐財又云生處背陽向陰當入五藏以類相從也人身衛氣日行於陽道則寤夜入於五藏則寐則凡病劇張惶不能假寐者人參入口便得安寢此即入藏養陰安精神定魂魄之外徵矣繆仲淳先生云神農曰微寒隱居曰微溫微寒則近於溫微溫則近於寒以言乎天則得生生升發之氣以言乎地則得清陽至和之精上應瑤光狀類人形故能回陽氣於垂絶卻虛邪於俄頃功魁群草力等丹丸矣參曰參參也設作生訓未盡本旨蓋三才並立方成世諦故天資萬物之始地資萬物之生人則參天兩地稟萬物之靈人參雖質依於草而克肖乎人是具足三才乃精英之氣融結所成也色白屬金氣寒喜陰屬水花色純紫及生處上有紫氣屬火三丫屬木味甘五葉屬土五行周備是補五臟而奠安神舍則邪僻自除竅穴明徹濟弱扶傾運用樞紐者也顧彼命名之義功德作用可知參天兩地則人為天地樞紐天地為人軀殼矣無軀殼則種性無依無樞紐則世界不立彼此交互不相舍離而此種性能生諸緣和合六塵應現根身之相即以根身為親相分器界為疏相分有器界便有敗壞有根身便有疾疚有疾疚便有藥石而藥石又分優劣醇暴及得氣味之全與偏者人參參天兩地淪結所成功德真無量矣甘草本經上品合腑臟為中內筋骨外肌肉為四氣味甘平無毒主治主五臟六腑寒熱邪氣堅筋骨長肌肉倍氣力金瘡腫解毒久服輕身延年核曰甘草一名蕗草靈通國老美草出陝西河東州郡及汶山諸夷處春生苗高五六尺葉如槐七月開花紫赤如奈冬結實作角如畢豆根長三四尺粗細不定皮亦赤上有橫梁梁下皆細根也以堅實斷理者佳輕虛縱理細韌者不堪用凡使去頭尾及赤皮切作三寸長劈為六七片入瓷器中好酒浸蒸從巳至午取出曝乾銼細入藥苦參乾漆為之使惡遠志反大戟芫花甘遂海藻忌豬肉先人云甘具生成路通能所草從柔化和協衆情又云和具四義一合二純三分明四接續甘草四德備焉又云青苗紫花白毛槐葉咸出於黃中通理之荄土具四行不言而喻矣又云土貫四旁通身該治是以土生萬物而為萬物所歸參曰尚書云土爰稼穡稼穡作甘言土以能生為性而所生草木唯稼穡最得土氣之和即拈以徵土性及土味耳有云土位乎中又云土貫四旁難者曰設標竿於中東觀則西南觀成北中亦難定豫謂中當豎論四當橫論內經云地何憑乎大氣舉之也固知上下唯氣而土獨居其中四即在中之土橫貫四旁離四無中統言之也甘草色味性情含章土德為五味之長故治居中之腑臟為邪所薄而寒熱外見與在內之筋骨在外之肌肉悉以橫貫之力堅固長養氣聚於形形全則力倍形敗則氣亡金瘡成腫如掘土剝地以致腠理斷絶此屬九土之精行土之用接續地脈仍相連合毒性殺厲即以幽靜平和之土緩解之毒自降心而退舍焉形全則身輕形固則延年中央內外左右四旁皆土貫之若因土致病因病及土者宜用設四行借用另須體會土爰稼穡金曰從革等語直指五行真性若能生之能所生之所又指五行體用黃耆本經上品扶疏處正顯整密整密處正見扶疏氣味甘微溫無毒主治主癰疽久敗瘡排膿止痛大風癩疾五痔鼠瘻補虛小兒百病核曰出蜀郡漢中今不復採唯白水原州華原山谷者最勝宜寧二州者亦佳春生苗獨莖叢生去地二三寸作葉扶疏狀似羊齒七月開黃紫色花結小尖角長寸許八月採根長二三尺緊實若箭干皮色黃褐折之柔韌如綿肉理中黃外白嚼之甘美可口若堅脆味苦者即苜蓿根也勿誤用木耆草形類真相似只是生時葉短根橫耳修治去頭上皺皮蒸半日劈作細條槐砧銼用茯苓為之使惡龜甲白蘚皮先人云黃耆一名戴糝戴椹百本戴在首如衛氣出目行頭自上而下從外而內百骸百脈咸衛外而固矣又云耆可久可速能知衛氣出入之道路便能了知黃耆之功用矣參曰黃中色通志云始生為黃耆耆宿也指使不從力役如人胃居中營衛氣血筋脈齒髮之屬莫不始生於胃而衛氣之詬吸營血之濡運筋脈之展搖齒髮之生長亦莫不從胃指揮宣布所謂外者中之使也營血筋脈悉屬有形統御節制唯一衛氣所謂衛者氣之帥也癰疽久敗大風癩疾五痔鼠瘻咸無衛氣衛外故肌肉腐爛黃耆味甘氣溫肉似肌腠皮折如綿宛若衛氣之衛外而固者也故能溫分肉充皮膚肥腠理司開闔唯衛氣虛弱不能固護肌肉者宜之倘涉六淫毒熱熾盛又當謝之未可謬用補虛者補衛氣之虛小兒陰常有餘氣常不足故百病咸宜也涉六淫毒熾盛亦非禁止不行惟在頤指氣使者何如耳耆宿則更事久歷事能盡知乃可頤指氣使不從力役設非主張於內者安能固護於外耶蓍實本經上品近取諸身遠取諸物氣味苦酸平無毒主治主益氣充肌膚明目聰慧先知久服不飢不老延年核曰生少室山谷及蔡縣白龜祠旁春時宿根再發端直無枝末大於本一本一二十莖或四五十莖經百歲者莖亦百莖雖多總一本也秋後花出莖端紅紫色實褐色如艾實呂氏春秋云蓍滿百莖所在之處獸無虎狼蟲無蛇螫其下便有神龜守之其上常有青雲覆之傳云天下和平王道得而蓍莖長丈又云天子蓍長九尺諸侯七尺大夫五尺士庶三尺設有僭用便失靈異埤雅云此神草也亦草中之多壽者也故蓍從耆參曰悉一根抽發原具生生變化之數而末大於本所謂知來者逆也明目者字從目即默識精明條分縷析之徵也聰慧先知者字從老即更事久盡知之徵也氣味苦酸平得木火升出之機故益氣熏膚充肌根繁余百行地無疆故不飢不老神物考云蓍天所生之神物也其法始於伏羲今唯文王孔子墓間生之其莖長丈一年長寸百年長丈自丈後則不長矣其叢滿百數止百莖無多寡也覆以紫雲守以靈龜祥瑞之物氣類之感耳爾雅翼云聖人幽贊於神明而生蓍蓍草也初不待聖人而生蓋通天之道窮物之理備物致用以為天下利故能擇物之神者用之易曰蓍之德圓而神卦之德方以智又云神以知來智以藏往其孰能與此菟絲子本經上品氣味辛平無毒主治主續絶傷補不足益氣力肥健汁去面皯久服明目輕身核曰出朝鮮川澤田野間今近道亦有以冤句者為勝夏生苗如細絲遍地不能自起得他草木則纏繞而上其根即漸絶於地寄生空中無葉有花白色微紅香亦襲人結實如秕豆而細色微黃久則黑褐勿用天碧草子形真相似只是味酸澀並黏手也修治去殼用苦酒浸一宿取出再以黃精汁相對浸一宿至明微火煎焙乾燥入臼中燒熱鐵杵杵之成粉參曰菟從兔性相類也服月魄以長生陰陽體陰陽用也爾雅云唐蒙菟絲菟絲女蘿注曰別四名則是謂一物廣雅云女蘿松蘿也菟絲菟丘也則是一物二名矣癸酉七月過煙霞望林樹間有若赤網籠冪者有若青絲覆罩者又有青赤相間者以訊山叟曰赤網即菟絲青絲即女蘿因憶古樂府所謂南山冪冪菟絲花北陵青青女蘿樹者是矣青赤相間者即蘿菟交互唐樂府所謂菟絲故無情隨風任顛倒誰使女蘿枝而來強縈抱者是矣但女蘿藤類細長而無雜蔓故山鬼歌云被薜荔兮帶女蘿言如帶也菟絲蔓類初夏吐絲不能自舉隨風傾倒縈草者則不經久若傍松柏及他樹則延蔓四布宛如經緯根或絶地亦寄生空中質輕揚不損本樹之精英反若得之而花葉倍繁於昔夏末作花赤色而無葉隨亦結實實或著樹間次年隨在吐絲不下引也雷公謂稟中和以凝正陽之氣得其性矣內經云陽在外陰之使也陰在內陽之守也互交之機惟兔絲有焉設內無陰則纖微之物安能受氣以生誠得陰陽內外之樞紐故主陰陽之氣不足以著絶傷益氣之力致肌肉若一成肥健人矣別録主強陰此即陽無內守局方主真陰不固此即陰無外使更主心腎不交佐以茯苓蓮實謂菟絲雖具內外上下之機其所專精則外與上相親切而茯苓者其精氣旋伏於踵則內與下相親切更借蓮實之坎滿填離中之虛位則內外上下及中各有憑持佐以玄參潛消痘毒方名玄菟痘乃受胎之毒包含至陰之內仗玄參之玄端從子半至陰之中逗破端倪交互菟絲陽外之陰使默相化育內守之陰不期清淨而清淨在外之陽不期輕升而輕升只須內外及上下不必從中之樞鍵也乃若磁朱之會心腎亦即內外上中及下之機朱上火磁下水非神麯在中之樞上下不交矣曲乃肝谷之麥但木得水浮肝得水沉先以半生曲反佐從下之水更以半熟曲越沉而浮以肝得煮而浮仍從木相也然則上下之交全從中樞互濟故上下及中各有所專唯在熟思精審以一推十十推百耳大都病機不離升降升降不離上下上下不離開闔開闔不離陰陽陰陽不離內外其名雖異總歸一元經云陰內陽守陽外陰使能會陰陽之元始則上下內外左右前後一言而終爾雅翼云菟絲田野墟落中甚多皆浮生藍苧麻蒿上不必下有茯苓為根也凡言上有菟絲下有茯苓者不知何所本又云一名唐一名蒙詩云爰採唐矣沫之鄉矣爰採麥矣沫之比矣爰採葑矣沫之東矣以刺男女相奔期於幽遠者唐則採藥麥則採谷葑則採菜又唐尤浮遊無根之物蓋逐之而不反矣淮南子云菟絲無根而生蛇無足而行魚無耳而聽蟬無口而鳴皆自然者也蓮實本經上品氣味甘平無毒主治主補中養神益氣力除百疾久服輕身耐老不飢延年核曰出荊楊豫益諸處生湖澤陂池間獨建寧老蓮肥大倍嘗色香味最勝凡蓮實作種者遲生藕芽作種者易發根橫行初生曰蒻成節曰蔤藕其總名節分二莖一上豎作葉一橫行即子藕不藕不生節節皆然本曰蕸莖曰蕖葉曰茄荷亦總名華曰菡萏殼曰房實曰菂菂心曰薏蓮亦總名也清明生葉夏至芰荷出水即旁莖作華節分三莖矣葉則晝舒覆華以避日夜卷露華以承露華則朝開夕合合時曰菡開時曰萏經三日夜不合即謝單瓣者成房房中之菂從下生上菂外緑衣衣里有白膚仁成兩瓣薏色青碧即具卷荷二枝倒折向上中含華茁從上生下菂衣經秋正黑入水必沉滷鹽煎之能浮生山海間者可百年不壞人得食之令發黑不老紅華者蓮優藕劣白華者蓮劣藕優故採實宜紅採藕宜白各取得氣之盛者也別有千葉層臺並頭品字者有葉晝卷夜舒者有華至夜入水名睡蓮者有金色蜜色青色碧色五色者有朱邊白蜜邊白白邊紅者有五彩如絨繡者此皆異種華於華不足於蓮與藕也採得其實先宜蒸熟或暴焙乾修治每斤用獖豬肚一枚洗極淨盛貯其實蒸熟取出不可去心焙燥入藥得茯苓枸杞山藥白朮良今市肆一種石蓮子如土石味極苦澀不知為何物食之令人腸結參曰其根藕其實蓮蓮者奇也藕者耦也奇耦者即坎離之中畫蓮實者即坎中之滿能填離中之虛故稱補中中即中黃假實中之薏以為種子其中所縕為資始資生之本微而能著固而愈強故養益神氣百疾自除菊耐霜蓮耐日寒暑所不能損者豈患老之將至耶然妙在薏設修治去之失卻聖胎種子矣客曰經秋正黑入水必沉滷鹽煎之能浮生山海間者百年不壞食之能令發黑不老者何也頤曰蓮實一名水芝蓋鍾天一之靈以透發地二之德見秋金之母自然本色畢露入水而炎上一脈已斷全歸水性密藏不出無復浮理唯以滷鹽之本族柔之煎熬之火力迫之自然生氣流動不容終沉若歸宗於海者必能久居其所以北方之水液滋血之餘後天之坎精潤形之稿宜其黑髮不老也客曰安靖上下君相火邪者何也頤曰蓮從藕根抽莖開華以及結實皆自下而上實中之薏包縕根莖華葉形復倒垂自上而下有歸根潛伏之義薏居中為黃婆能調伏心腎又苦味能降此為蓮之心苗含水之靈液結於炎夏又秉火之正令其安靖上下君相火邪氣味應爾客曰本經主治惟實別録以藕節止吐血衄血消瘀血血悶者何也頤曰心主血脈吐衄即血無所主脈無經緯亦道路填塞疆界失制藕質脈絡井然竅穴玲徹節則又為疆界之總制象形從治則血有所主錯綜經隧仍無礙矣茯苓本經上品從來相傳上有菟絲下有茯苓不知何所本嘗見菟絲隨木縈繞茯苓當不獨只在松下矣又傳松脂化茯苓茯苓化琥珀又不知何所本世又重抱木者曰茯神赤色者主利水又不知何所本羽毛鱗介之長為四靈故取形如鳥獸龜鱉者良則苓宜作四靈長矣以降地之魄待遊天之魂真真對證氣味甘平無毒主治主胸脅逆氣憂恚驚邪恐悸心下結痛寒熱煩滿咳逆口焦舌乾利小便久服安魂養神不飢延年核曰出太山山谷及華山嵩山郁州雍州諸處生古松根下下有茯苓則松頂盤結如蓋時有彤絲上薈非新雨初霽澄徹無風不易現也此即古松靈氣淪結成形如得氣之全者離其本體故不抱根如得氣之微者止能附結本根故中心抱木小者如拳大者如斗外皮皺黑內質堅白形如鳥獸龜鱉者良虛赤者不堪入藥又一種即百年大松為人斬伐枯折槎枿雖枝葉不復上生而精英之氣亦淪結成形謂之茯苓撥即於四面丈餘地內以鐵錐刺地有則錐固不可拔無則作聲如甕者謂之茯苓窠中有白色蒙翳蒸潤其間如蛛網然尚屬鬆氣將結成形者也亦可人力為之就斫伐松林根則聽其自腐取新苓之有白根者名曰茯苓纜截作寸許長排種根旁久之髮香如馬勃則茯苓生矣修治去皮搗作細末入水盆中頻攪浮者濾去之此即赤膜也誤服令人目盲或瞳子細小馬藺為之使惡白斂畏牡蒙地榆雄黃秦艽龜甲忌米醋酸物得甘草防風芍藥紫石英麥門冬共療五藏參曰歲寒不凋原具仙骨雖經殘斫神靈勿傷其精英不發於枝葉而返旋生氣吸伏於踵所謂真人之息也故茯取伏義苓取齡義又松木參天條達之氣反潛隱不露亦茯取伏義苓取令義二擬未確聊備博採云爾芳香清氣潛藏根底對待忿戾濁邪沖逆胸脅皓苓下居彤絲上薈對待憂愁怫逆形諸顏面摧殘槎枿俯就零落對待刀圭在心有懷怨恨珍重深邃對待驚駭氣上鎮定不動對待恐懼悸忡形質塊磊氣味清疏對待晦滯立堅心下結痛神靈在躬對待寒熱外侮幽靜安間對待勞亂煩滿滲泄就下對待水寒逆肺清間平淡對待口焦舌乾轉旋氣化對待小便閉癃吸元歸踵對待遊魂於天恬淡虛無對待神不內守服氣長生對待飢渴夭齡悉屬象形巽以入之清氣上升濁氣下降此其驗也嵩山記曰嵩山有大松樹或百歲或千歲其精變為青牛為伏龜採其實可長生萬松記曰夫松木德之中正也五德具焉故其好生似仁其後凋似義其調理似禮其枝不生汙下似知其氣化為茯苓其脂化為琥珀似信柏實本經上品氣味甘平無毒主治主驚悸益氣除風濕痹安五臟久服令人肥澤美色耳目聰明不飢不老輕身延年核曰處處有之當以太山陝州宜州乾陵者為勝四季長青葉葉側生枝枝西向有三種一名叢柏枝葉叢疊今人呼為千頭一名渾柏獨葉叢茂木心紫赤唯堪作香皆不結實不為藥用一名扁柏木心微白芳香清烈作花細小結實有角四裂子出尖小介殼霜後採取中仁黃白最多脂液唯乾陵者木理旋繞宛若人物鳥獸狀陸離可觀修治蒸熟去皮殼搗作餅子日乾收用先人云萬木皆向陽而柏獨西指者順受金制以為用乃能成其貞固而可久故字從白乾枝葉實為用有別實具全體內含章美故入五臟葉如脈絡故治絡不堅固而潰脈不攝溢而崩枝則氣倍於葉故入肢節干則氣烈於枝故主全身矣聖惠方以實治驚癇及大便青白色者蓋肝木受制怒則乘其所勝是以青白之色見於便而驚從藏發匪實奚宜參曰柏芳香高潔文彩陸離即參天直上誰能禁之乃俯焉西向以秉制所天可謂至德也已巨擘喬木作社稷棟梁宜哉殷人以柏其逆知後世之西向乎味甘美性和平對待肝木失制發為驚駭悸忡質堅固氣條達驅除風濕成痹也德潤於身安藏樂道耳目聰明色澤長生矣山書云木植三百六十而鬆柏為之長史記云松柏為百木長而守宮閭公羊注云松猶容也想見其容貌而事之柏猶迫也取親而不遠之義故壇壝丘墓多植之埤雅云柏掬也性堅緻有脂而香故古人破為暢臼用以搗郁雜記云暢臼以掬杵以梧廣志云柏有續柏有汁柏崔實云七月收柏實列仙傳云赤松子好食柏實齒落更生王修賦云既殊群而抗立亦含真而挺正豈春日之自芳必霜下而為盛烈風不能摧其枝積雪不能改其性詩云泛彼柏舟在彼中流言柏非不可以為舟特非柏之所宜故其薑守義引以自況也世以柏之指西猶磁之指南也先人云柏從白即具秉製為用象抑木以金為魄歟雲母本經上品土即地氣沙更清疏離本歸根生機嘗在各具偏勝兼色為四時宜青春赤夏白秋黑冬也故云砂兼黃宜季夏土磷石晶晶純白無兼為四時宜亦可專宜秋白雲之母即水之母也不曰云生足下而曰云覆其上即此可徵母字義深心者得之釜底燃薪而水出又足徵矣氣味甘平無毒主治主身皮死肌中風寒熱如在車船上除邪安五臟益子精明目輕身延年核曰出太山齊山廬山琅琊北定今雲夢山方台山及江州淳州杭越間亦有生山石間宜二月採候雲氣所出之處掘取無不大獲但掘時忌作聲也小者長三五寸大者長五七尺作片成層可析光瑩如水白澤輕透者遂為貴以沙土養之歲月生長置千斤於一室中雲氣嘗起向日觀照五采並具陰地不見雜色也多青者名雲英多赤者名云珠多白者名雲液多黑者名雲母但具青黃者名云砂晶晶純白者名磷石各以偏勝之色為四時之宜云砂宜季夏磷石宜四時服也純黑者不堪服令人淋瀝發瘡根即陽起石也修治設經婦人手把便失靈異每斤用甘草地黃小地膽草紫背天葵各一鎰乾者細銼生者取汁置瓷鍋中次入雲母用天池水三鎰著火熬煮七日夜水火勿令失度自然釀成碧玉色漿沉於鍋底更以天池水猛投其中隨手頻攪有浮起如蝸涎者即掠去之凡三度澄定去水更用沉香一兩搗為末以天池水五升煮汁二升分作三度淘澄其漿曬乾任用主療諸疾抱朴子云或以桂蔥水玉化之為水或以消石合置筒中埋之為水或以露於鐵器中原水熬之為水或以蜜搜為酪或以秋露漬之百日韋釀挺以為末或以樗血無顛草合餌之服至一年百疾除三年反老還童雲氣嘗覆其上五年役使鬼神飛行神仙惡徐長卿忌羊肉畏蜿甲及流水澤瀉為之使參曰雲母生云故名雲母雲中具雨露霜雪是雨露霜雪亦以云為母也然云之母曰云母而云母之母曰高山釋典云水勢劣火結為高山是故山石擊則成焰融則成水蓋其氣濛浡而為潤濕升騰而為炎上故知水火之結高山高山之育雲母雲母之生雲氣雲氣之變雨露霜雪雖乘化有異而體性不遷更推潤濕之水皆從火蒸誠交互發生遞相為種者客曰五行之理水能剋火今雲水從火出不幾矯亂乎頤曰此寶明生潤非有形相剋制化之比也若非火光上蒸則就下之水焉能含遍十方乎經云腎苦燥急食辛以潤之相提而論實與釋典吻合斯足徵矣客曰古人命名簡約何得故為奇特頤曰物體性情若非意外尋求比量推奪便為句字所縛客默然良久身皮死肌此土實不靈用升騰變幻之母開鋤頑頽自能反活回鮮土主肌肉若風木相乘者培其根種則侮土之風不期自退蓋風雲總歸同類即以同類之云逐之風之中者自不能停此亦從化之理矣如在車船上者畏風大動搖之狀也安五臟者邪除則元真通暢五臟安和益子精者益子精之用明目者目乃水精所結能行水上故令目明輕身延年者修煉佩服骸如雲化以有形之物和合氣交之中則日日更新新新非故修治之法當同龍骨以回其靈云性從龍也雲母生云名雲母云具雨露霜雪是雨露霜雪為云之子為水矣然則云又宜號水母澤瀉亦能行水上令人明目但多服反致目盲者謂其瀉澤上行澤盡則竭故也若雲母則從母發源寧至有竭乎丹砂本經上品本具煙霧氣作畫自然神異座中者為君朝護者為臣如此生成宜作萬靈主氣味甘微寒無毒主治主身體五臟百病養精神安魂魄益氣明目殺精魅邪惡鬼久服通神明不老能化為汞核曰出符陵山谷符陵涪州也接巴郡之南今不復採矣出武陵西川諸蠻夷中者通屬巴地謂之巴砂蘇頌曰近出辰州宜州階州而辰州者為最生深山石崖間穴地數十丈始見其苗乃白石曰硃砂床砂生床上大者如雞卵小者如榴子狀若芙蓉頭似箭鏃連床者色黯而光明瑩徹碎之嶄岩作牆壁如雲母石成層可析者辰砂也過此以往皆淘土石中得之無石者彌佳宜州者亦有大塊亦作牆壁但罕類物狀色亦深赤為用不及辰砂蓋出土石間非生石床故也宜之鄰地春州融州亦有砂故其水盡赤每煙霧鬱蒸之氣作赤黃色土人謂之硃砂瘴能作瘴癘為人患也階州者但可作畫不堪入藥雷斆曰砂凡百等有妙流沙如拳許大或重一鎰具十四面面如鏡遇陰沉煙雨即有紅漿溢出有梅柏砂如梅子許大夜有光照見一室有白庭砂如帝珠子許大面有小星燦爛然有神座砂金座砂玉座砂不經丹灶服之自延壽命次有白金砂澄水砂陰成砂辰錦砂芙蓉砂平面砂金星砂馬牙砂神末砂曹末砂豆瓣砂石砂塊砂溪砂土砂等不可一一細述也宗奭曰出蠻洞錦州界狤獠洞老鴉井者井深廣數十丈聚薪焚之石壁迸裂處即有小龕中生石床如玉床上結砂光明可鑑砂洎床大者重七八兩或十餘兩張果云丹砂者萬靈之主居南方或赤龍建號或朱鳥為名上品生辰錦中品生交桂下品生衡邵清濁體異真偽不同辰錦者生白石床上十二枚為一座如未開蓮花光明耀日座中大者為君小者為臣四面朝護又有紫靈砂圓長似筍而紅紫亦上品又有如馬牙光明者亦上品白色若雲母者為中品石片稜角生青光者為下品交桂所出但是座上及打石得之形似芙容者亦入上品顆粒通明者為中品片段不明者為下品衡邵所出雖是紫砂得之沙石中者亦下品也承曰金州商州一種色微黃作土氣信州一種形極大光芒牆壁略類宜州所産而有砒氣破之作生砒色若入藥用見火殺人庚辛玉册云柳州一種全似辰砂塊圓如皂角子不入藥用出商黔宣信四州者內含毒氣及金銀銅鉛之氣並不可用設雜石末及鐵屑與黑色名陰砂者亦不堪用時珍曰色不染紙者為舊坑色鮮染紙者為新坑舊坑者佳新坑者次之斆曰凡修治硃砂靜室焚香齋浴後取砂以香水浴過拭乾碎搗更研三伏時入瓷鍋內每砂一兩用甘草二兩紫背天葵五方草各一鎰著砂上以東流水煮三伏時勿令水闕去藥更以東流水淘淨熬干又研如粉入水瓷瓶用青芝草山須草各半兩蓋之下十斤火煅從巳至午方歇候冷取出細研如塵又法以絹袋盛砂用蕎麥灰淋汁煮三伏時取出流水中浸洗研粉飛曬又法同石膽消石和埋土中可化為水鐵遇神砂如泥似粉先人云丹正一點腎間動氣水裡陽生義合日月玄關之靈祕如剎帝利種尊重貴上百靈呵護非上品不可服食又博議云人之肢體臟腑血氣營衛之精神充御之丹砂能養精神則天君泰然百體從令矣客曰只須丹砂一味病莫不治諸藥俱可廢矣曰丹砂之力能使精神凝聚凡從精神以致四體五臟百病者得其因而百病良已非百病皆可獨以丹砂治也設四體五臟百病波及精神者或求其因而借用之亦可客曰化汞之語即升作水銀否曰此即關尹子所謂煉精神而久生以服久百體能如汞化可以成液玄門汞八兩鉛半斤正指內丹耳客曰丹砂養精神人參安精神有分別否曰養有育義安惟使之寧也先人辨論經文詳且盡矣頤不更加詳訂參曰虛無太極動而生陽靜而生陰分成兩物男女相為飲食彼此各闕一半故爾丹家修煉戊巳互交金木干坎填離復遠圓相惟丹砂色味性情靡不吻合色赤離也氣寒坎也伏汞水也固質金也甘平性味土也蓋水中有金火中有木方堪攢簇所謂龍從火里得金向水中求假此外丹滋培四大而四大之內中黃為戊巳精神即坎離魂魄作金木內外合成丹嬰兒方養育博議重言精神而概言魂魄意志參語單拈太極統具精神魂魄意志一屬先天一屬後天法也菖蒲本經上品昌目光也時云美目昌兮此竅更切氣味辛溫無毒主治主風寒濕痹咳逆上氣開心孔補五臟通九竅明耳目出音聲久服不忘不迷惑延年核曰菖蒲一名昌陽堯韭水劍草運鬥樞云玉衡星散為菖蒲典術云堯時天降精於庭為韭感百陰之氣為菖生上雒石澗間池州戎州蠻谷中者亦佳所在亦有月令云冬至後五旬七日菖始生百草之先生者也於是始耕喜生逆水根莖絡石略無少土稍有泥滓即便凋萎葉心有脊如劍四時長青新舊相代新者從莖端抽發舊者從莖末退去一葉一節節稀莖長節密莖短莖昂者莖端生葉莖僕者節旁分枝潔白下生者為根翠碧有節者為莖有以根為須莖為根者因莖枝延蔓布石故爾望夏作花黃色紫色者尤善以莖瘦節密摺之中心微赤嚼之辛香少滓者入藥最良以砂石栽之旦暮易水則易茂春夏愈摘則愈細葉僅長寸許甚有短至一二分者別有香苗挺秀金錢臺蒲諸種甚奇而香苗之最細者曰虎鬚尤可娛目東坡云凡草生石上者必須微土以附其根唯石菖蒲濯去泥土漬以清水置盆中可數十年不枯不死節葉轉堅瘦根鬚轉連絡忍冬淡泊蒼然几案延年之功信非虛語神隱書云石菖蒲置几案間夜坐誦讀煙收其上不致損目或置星月下每旦取葉尖珠露洗目不月功能明目久之白晝可見星斗修治以銅刀刮去黃黑皮及硬節同嫩桑枝相拌蒸熟日中曝乾勿得誤用形如竹鞭及色黑氣臭味腥者秦皮秦艽為之使惡地膽麻黃忌飴糖羊肉勿犯鐵器令人吐逆繆仲淳先生云陽精芳草辛溫四達充百邪散邪結壅遏既徹九竅應之而通用資宣道臻乎太和仙家服食藥之上品上生者也先人云萬物資生於陰必資始於陽以陰感陽而盛故曰昌陽又云蒲性幽潔不喜近人不染塵垢得其情性長生長青苟失其所立見凋痿又云蒲葉皆偶九節為奇過不及皆非中節又云在陰在脈之痹乃濕乃風之因咸能使之開發設寒本專令取效更捷紹隆王先生云菖蒲得道種智不似人心隨境即變清心寡欲人餌之莫不仙去可比琴瑟妙音指發參曰水土合和抽為草木唯菖蒲全得生陽之氣吮拔水液盤絡砂石不假地土之力昌美溪浦之間故名菖蒲以治病之用言當號昌陽以發生之體言當號陽昌痹者閉塞不通風寒濕三種相合而成咳逆上氣者此毫竅固拒肺氣壅遏兩相搏擊以致喘咳菖蒲味辛氣溫宣通開發使一身之氣起亟旋展郁痹喘咳當自舒矣痹證有五菖蒲獨宜脈痹取象形從治則易於分解又觀菖葉兩岐菖莖盤絡悉從中心透發故能開人心孔而心孔為諸脈絡之宗主其攣結屈曲之狀儼似之背陽喜陰臭之爽朗當補五臟之用非補五臟之體以用行則竅通也明耳目者通九竅之驗出音聲不忘不迷惑者開心孔之驗蒲性幽潔挺秀長生故為延年之藥從莖中抽葉處看破開心孔又從莖枝盤結處配合心主包絡即種種識症法亦咸從生成中體會來不惟説破至理並説破看法染太祖後張氏忽見庭前菖蒲生花光彩照灼非世所有驚謂侍者曰見否曰不見曰當嘗聞見者當富貴遂取吞之是月即孕武帝赤箭本經上品如此生成甚奇天地生物亦不易矣余鄉宋大司馬經略朝鮮一時乏餉蘿中神授以物指畫其處覺而掘地獲物如芋如卵煮食勇力倍嘗久未之識核赤箭生成始知即是天麻耳氣味辛溫無毒主治主殺鬼精物蠱毒惡氣久服益氣力長陰肥健輕身增年核曰赤箭一名神草赤芝鬼督郵定風草獨搖草合離草根名天麻一名離母生陳倉川穀雍州太山少室諸處春生苗初出如芍藥獨抽一莖挺然直上高三四尺莖中空色正赤貼莖杪之半微有尖小紅葉四月梢頭成穗作花灰白宛如箭干且有羽者有風不動無風自搖結實如楝子核有六稜中仁如面至秋不落卻透空入莖中還筒而下潛生土內根如芋去根三五寸有遊子十二枚環列如衛皆有細根如白髮雖相須實不相連但以氣相屬耳大者重半斤或五六兩皮色黃白名曰龍皮肉即天麻也本經名概根苗後人分苗曰赤箭根曰天麻功力稍有同異故耳與六芝同類力倍人參故為仙家服食藥之上品上生者也但不易得世人所用皆御風草根非赤箭也御風莖葉與赤箭相似獨莖色青斑葉背黃白兼有青點隨風動搖子不還筒治療稍合補益大乖異矣修治宜銼置瓶中每十兩用蒺藜子一鎰緩火炒焦蓋於其上綿紙三重封系瓶口從巳至未取出蒺藜再炒再蓋凡七遍俟冷淨布拭去汗氣竹片剖開焙乾搗用參曰赤陽箭剛陽剛中正者也力能獨運不為物移故有風不動無風自搖見剛之體能立用能行也其苗從根而干虛中直達符合少陽自下而上從內而外故增益氣力其實從莖納筒環列象歲符合太陰從外而內自上而下故長陰肥健既類靈芝亦名神草操升降之機似河車之轉故能增壽延年又以弧矢之威森衛之衆潛返之力故能殺鬼精除惡毒乃若因風動搖驚癇攣癖盡屬陰邪之證唯剛能勝之獨恨土人以御風相混致真者遁世悲哉吾未見剛者薯蕷本經上品肥遁則無不利氣味甘平無毒主治主傷中補虛羸除寒熱邪氣補中益氣力長肌肉強陰久服耳目聰明不飢延年核曰薯蕷古名也避唐代宗諱改作薯藥又避宋英宗諱改作山藥後世惟名山藥不知薯蕷名矣生嵩山山谷及臨朐鐘山南康蜀道北都四明山東江南懷慶諸處入藥野生者為勝供饌家種者為良春生苗蔓延籬落紫莖緑葉葉有三尖似白牽牛葉更厚而光澤五六月開花成穗淡紅色結莢成簇三稜合成堅而無仁其子別結葉旁狀似雷丸大小不一皮色土黃內肉清白煮食甘滑春冬採根生時擲地如粉干則內實不虛其色潔白如玉青黑者不堪入藥種植甚易截作薄片者亦生隨所杵之竅而像之也南中一種生山中根細如指極緊實刮磨入湯煮之作塊不散味更甘美食之尤益於人勝於家種者江中閩中一種根如薑芋皮紫極大者重數斤煮食雖美但氣寒於北地者修治勿用平田生二三紀者須要山中生經十紀者其皮赤四面有須者良採得以銅刀刮去赤皮洗去涎蒸過曝乾用六芝為之使惡甘遂參曰效所杵之竅以賦形如預備署所故稱薯蕷假微薄之種充氣淪結建立中央故治傷中以致虛羸而為寒熱邪氣者乃若益氣力長肌肉即治傷中虛羸之驗也而傷中之因皆因陰氣萎蘼薯蕷入土便生陰森肥遁寧不強陰且其賦形效竅則有竅處寧不周到雖假故物為胎亦屬氣化所鍾是與六芝交相為使乾地黃本經上品氣味甘寒無毒主治主傷中逐血痹填骨髓長肌肉作湯除寒熱積聚除痹療折跌絶筋久服輕身不老生者尤良核曰地黃一名芐名芑名地髓羅願曰芐以沉下者為珍故字從下先人云天玄而地黃天上而地下陽戊而陰巳陽浮而陰沉則地黃地髓芐芑之義與情性為用之方可以想見古取咸陽川澤及渭城彭城同州諸處今唯懷慶者為上諸處隨時興廢不同耳江浙壤地者受南方陽氣質雖光潤而力微不及懷慶山産者稟北方純陰皮有磊砢而力大也古人種子今唯種根二月生苗初生塌地高者不及尺許葉如山白菜而毛澀又似小芥葉而頗厚中心皺紋如撮莖上有細毛梢頭開花如小筒子而色紅紫亦有黃色白色者結實作房如連翹中子甚細而色沙褐根如人指長短粗細不嘗甚有一枝重數兩者汁液最多雖暴焙極燥頃則轉潤二月八月採者未窮物性八月殘葉猶在莖中精氣未盡歸根二月新苗已生根中精氣已滋於葉不如正月九月採者氣全也種植甚易入土即生大宜肥壤根肥多汁法以土壤作壇如浮屠數級寸段蒔灌根長滋盛也但種植之後其土便苦次年止可種牛膝再二年可種山藥足十年土味轉甜始可復種地黃否則味苦形瘦不堪入藥也作乾地黃法去皮入柳木甑內置瓷鍋上蒸之蒸透取出攤令氣歇拌酒再蒸又出令乾勿犯銅鐵器恐令人腎消發白男損營女損衛也作熟地黃法取肥大者三十斤洗淨曬乾更以三十斤搗汁相拌蒸之又曝又蒸汁盡為度則光黑如漆味甘如飴者始佳若入丸散止可入砂盆內隔湯蕩燥勿用火焙以傷藥力先人博議云地黃別名地髓又名芐名芑苗不能高生意在根味甘色黃沉重多汁當入脾為脾之腎藥以名髓多汁而氣寒也熟之則色黑能入腎填髓反為腎之脾藥以名芐名芑味甘色黃而填為土入之象然土為水之用神似土堤所以防水也形如血脈本經用逐血痹蓋血者取中焦水穀之汁變化赤色以行經隧如中如汁如經隧皆象其形痹者閉而不通隨其血之不通而為病如在目則赤在齒則痛在肉理則癰腫在心則昏煩在肺則咳血壅遏而為身熱枯耗而為燥澀痿軟泛濫而為吐衄崩漏血痹頗廣各以類推逐者俾其流通之義也觀其入土易生可知矣鬚髮為血脈之餘血痹則黃赤易見可使之黑者痹去而血華也性惟潤下功力到時二便通利以為外徵千金方黑膏用治熱積所成之斑肘後方拌雞蒸汁用治寒積所成之疝咸從血痹之所生耳血中有痹則骨髓不滿肌肉不長筋脈斷絶均謂傷中若填滿若生長若接續皆克成血液之流通者也所云寒熱積聚惟從痹字中生第加一轉語耳因彼不通所以積聚若作五積六聚用地黃以除之未有不反益其積聚者如寒中虛人在所必忌否則膩膈滑腸中滿減食矣如此看血痹可稱遍周根身四大矣即以此法類推五痹及六極五勞之形病更合八風五運六氣四時之氣病與不內不外因之似形似氣者視根身若見垣亦若掌中觀菴摩羅果參曰苗葉布地高不及尺隨地逶迤生機偏向根荄者也根截入土橫穿直豎絶不以堅礙妨活潑真得色空者耳其汁深黃染手不落其味甘美著舌不散吮拔地髓性頗貪狼故種植之地土便憔苦十年後方得轉甜功德力量可望而知矣先人判乾者為脾之腎藥熟者為腎之脾藥明顯的確及釋本經別録精詳深邃讀之可比類旁通頤不更參枸杞本經上品氣味苦寒無毒主治主五內邪氣熱中消渴周痹風濕久服堅筋骨輕身不老能耐寒暑核曰古取嘗山者為上後世唯取陝西甘州者稱絶品生平澤丘陵阪岸間春放苗作榴葉狀軟薄堪食莖幹叢生高三五尺陝之蘭靈及九原以西者並是大樹七月作花紫色隨結紅實形長如棗核凌冬不落二月葉發五月再發其實乃謝七月葉又發花即隨之極易延蔓根深者一發三四尺枝莖寸截或分劈鏤刻橫埋土中旬日便發易生如此冬採根春採葉夏採實秋採莖功用並同本經名概葉實根莖後世始岐而二之以根皮有清熱滋補之異而略言莖葉更以根去骨存皮則又不可解矣別有一種枸棘相類其實但實圓枝節間有刺不堪用修治取實鮮明紅潤者洗淨醇酒浸一宿搗爛用莖葉唯陰乾根如物狀者為上東流水浸一宿刷去土甘草湯又浸一宿焙乾用苗伏砒砂根伏硫黃凡木之易生者榕柳之與桑杞榕柳雖易生不若桑杞通體精專葉實根莖功用並著杞則更勝於桑凌冬不落為迥別也嘉安朱孺子居大箬岩見溪側有二花犬相戲逐至杞叢下獲杞根二枚形狀與戲犬無異煮食之俄頃飛升仙去參曰枸從苟誠也省作句觀斷絶寸莖根鬚俱髡以入土中旬日即發枝幹分劈鏤刻亦不之死仁機扇動一誠之致也命名之義或取諸此其味苦得夏大之令其氣寒得寒水之化故主夏氣病藏之邪致熱中消渴也唯以怒生為用故痹為之起濕為之收又苦寒能堅故枝韌比筋根皮裹骨斯筋骨受之地仙卻老有繇然矣且二五七月俱發宜耐寒暑也爾雅曰杞一名機即枸杞也按詩有六杞將仲子弓篇無拆我樹杞四牡篇集子苞杞杕杜篇言採其杞南山有臺篇南山有杞湛露篇在彼杞棘四月篇隰有杞桋菊花本經上品氣味甘平無毒主治主風頭頭眩腫痛目欲脫淚出皮膚死肌惡風濕痹久服利血氣輕身耐老延年莖葉根實並同核曰出川澤田野間雍州南陽山谷者最勝宿根再發亦可子種莖葉花實種種不同即菊譜所載龍腦新羅都勝御愛玉球玉鈴金萬鈴銀臺棣棠蜂鈴鵝毛金錢夏金鈴秋金鈴酴醾玉盆夏萬鈴秋萬鈴繡球荔枝合蟬垂絲粉紅桃花順聖淺紫紅二色鄧州黃鄧州白等亦不能盡收也莖有株蔓紫赤青緑之殊葉有大小厚薄尖禿之異花有千葉單瓣有心無心有子無子黃白紅紫淺色間色大小之別味有甘苦酸辛之辨又有夏菊秋菊之分唯以單葉味甘者入藥即菊譜中名鄧州黃鄧州白者是矣其花細碎品不甚高蕊若蜂窠中有細子正月採根三月採葉五月採莖九月採花十一月採實修治唯陰乾朮枸杞桑根白皮為之使無子者謂之牡菊燒灰撒地中能死龜黽説出周禮風俗通云酈縣有菊潭飲其水者皆得上壽又吳末朱孺子入玉笥山餐菊英乘雲上升康生亦服甘菊而仙終南五老洞碑載漢永壽出墨菊其色如墨用其汁以書背萌國有紫菊謂之日精一莖一蔓延及數畝味甘食者永不飢渴一種名薏者莖青肥大形似蒿艾味綦苦澀誤服則泄人氣又不可不辨參曰飽霜不隕草中松柏也苗春花秋色黃氣烈秉秋金之制以製為用故字從掬言在掌握間也風頭頭眩目欲脫淚出此肝木變眚摧拉隕墜能節制之則無三者之病矣皮膚死肌惡風濕痹二者風木失制亢害所勝菊得木體之柔順受金制自然木平風息也芳香疏暢故利氣柔潤陰成故利血凡力之能持者則物輕性之不媚者則耐久更生延年名實相副夫奚疑承乃制則不亢亢則害無承製矣從來以熱極似水者引亢則害承乃製作證自不知其背謬耳能持物輕不媚耐久真堪警世麥門冬本經上品氣味甘平無毒主治主心腹結氣傷中傷飽胃絡脈絶羸瘦短氣久服輕身不老不飢核曰出函谷川谷及堤坡肥土石間者多野生出江寧新安及仁和筧橋者多種蒔古人唯用野生者細皺香美宛如麥粒功力殊勝也四季不凋秋冬根葉轉茂叢生如韭青似莎草長尺余多縱理四月開花如蓼結實翠碧如珠根鬚冗蝟貫須連結儼若琅玕色白如玉中心堅徑最多脂液也修治瓦上焙熱即迎風吹冷凡五七次便易燥且不損藥力或以竹刀連心切作薄片醇酒浸一宿連酒磨細入布囊內揉出白漿點生薑汁杏仁末各少許頻攪數百下久之澄清去酒曬乾收用入湯膏亦連心用方合上德全體今人去心不知何所本也地黃車前為之使惡款冬苦瓠畏苦參青蘘木耳伏石鐘乳紹隆王先生云麥門冬具稼穡甘稟春和令當入足陽明為陽明之體用藥故本經所陳諸證皆屬陽明之上為病若痿蹶又屬陽明之下為病經云陽明為闔闔折則氣無所止息而痿疾起矣是以治痿獨取諸陽明陽明為五臟六腑之本五臟六腑皆受氣於陽明故爾先人博議曰心腹脈絡皆心所主胃絡肌肉皆心所生美顏吐衄唯心所現結者能使之不結絶者能使之不絶唯從容潤澤潛滋暗長淪結成形者也又云麥門冬葉色嘗青根鬚內徑外柔連綴貫根上凌冬不死隨地即生以白色可入肺甘平可入脾多脈理可人心凌冬可入腎長生可入肝雖入五臟以心為主心之腎藥也其氣象生成及命名之義能轉春為夏使腎通心但力量不闊大如有守有養貞靜寧諡和潤舒徐之君子也倉皇之際雖自憒憒然躁進表露者不及其久而不變也其根儼似脈絡故本經以之治心腹結氣傷中傷飽胃絡脈絶蓋心腹中央皆心之部分脈絡亦心之所主悉屬象形對待法耳若脈絡之絶傷中之絶傷飽之絶羸瘦肉理之絶氣結使然者咸可使之復生別録所云皆結氣傷中傷飽之所生蓋強陰益精消穀保神安藏美色皆復脈通心潤經益血之力也蓋心主血脈脈潰血溢脈傷則咳經水已枯乳汁不下脈氣欲絶者皆克成效如水入干經而血乃成不入於經以致浮腫者潛滋之妙賴有此耳惟陰形緩性人及脾慢中寒有濕者不相宜也參曰金水主時則根苗茂盛有繼絶續乏之義三冬閉藏而陰陽互根之妙麥則獨貞其竅故處秋冬之時能行春夏之令以降入為升出者也故名麥門冬四季長生中央堅徑氣味甘平具土德性當判入脾脾之脾藥也色白屬金脾之肺藥也似脈屬火脾之心藥也不凋屬水脾之腎藥也長生屬木脾之肝藥也所謂一臟之內具五臟焉故五臟六腑位於內十二經脈見於外莫不資始於脾資生於胃互為樞紐者也蓋心腹結氣中央所司傷中傷飽胃絡脈絶羸瘦短氣象形對治故繼絶續乏之義悉從中字起見耳廣推研釋雋永可思蓋土主中宮長養後天必須德全之品相為匹配其唯麥冬乎至若保心之神定肺之氣安肝之魂補腎之精因脾轉屬者無所不宜若脈傷則咳經絡斷絶致血液妄行經水枯竭變生煩熱焦渴者求其因而借用之亦可大抵象形對治更相宜也先人有議輒加推廣如此太一餘糧本經上品禹及太一咸鍾水土精氣即楞嚴四大法也氣味甘平無毒主治主咳逆上氣癥瘕血閉漏下除邪氣肢節不利久服耐寒暑不飢輕身飛行千里神仙核曰太一餘糧與禹餘糧同一種類咸鍾水土精氣融結成形但勝劣有異生太山山谷者曰太一餘糧是水勢劣土偏鍾土氣之專精者也生東海池澤者曰禹餘糧是土劣水勢偏得水氣之專精者也今世知有禹餘糧不復識太一餘糧矣太山久不見採唯會稽王屋澤潞所在諸山時有之外裹若甲甲中有白白中有黃似雞子黃而重重如葉子雌黃輕敲便碎如粉所在有之霏雪先消者是也設中無黃但有黃濁水者為石黃水有凝結如石者為石中黃非太一餘糧也修治用黑豆黃精各五合水二斗煮五升置瓷鍋中下餘糧四兩煮之旋添汁盡為度藥氣香如新米矣搗之又研萬杵乃已杜仲為之使畏貝母菖蒲鐵落先人云太一以氣言氣似神化大似六芝遠離本色參曰太一即太乙氣之始也塊然獨存而無所不存故能鎮定中黃敦艮之止對待肺金不能收斂下降以致咳逆上氣若癥瘕血閉者氣不詬運也漏下淋漓者氣不收攝也氣如橐籥血如波瀾決之東則東決之西則西氣一息不運則血一息不行太一能令元氣屈曲而出使凝閉漏下者不得不隨之詬運抑揚所謂欲治其血先調其氣設元真萎頓則邪氣外薄太一能暢真氣則邪氣自不相容矣肢體不利者氣壅之也太一黃中通理宜氣四達氣拒而固不受寒暑氣充而實不苦飢虛氣清以升輕身飛行石鐘乳本經上品審形狀辨土地此不獨具山全體更藉外緣以相資也具山全體故功力勇悍乃爾氣味甘溫無毒主治主咳逆上氣明目益精安五臟通百節利九竅下乳汁核曰生少室山谷及太山第一齣始興者佳江陵及東境名山石洞中亦有按范成大桂海志所説甚詳云桂林接宜融山洞石穴中鍾乳甚多仰視石脈湧起處即有乳床白如玉雪乃石液融結所成者乳床下垂如倒生山峰峰端漸鋭且長若冰柱柱端輕薄中空如鵝翎乳水滴瀝不已且滴且凝此乳之最精者以竹管仰承取之而煉治家又以鵝管之端尤輕明如雲母爪甲者為勝孫思邈曰乳石必須土地清白光潤如羅紋鳥翮蟬翼一切皆成白色者可用其非土地者慎勿服之殺人甚於鴆毒別本注云凡乳生深洞幽穴者皆龍蛇潛伏之處或襲龍蛇毒氣或洞口陰陽不均或通風氣或黃色赤色乳無潤澤或煎煉火色不調一煎以後不復易水服之令人發淋又乳有三種一種石乳其洞純石石津相滋陰陽交備具蟬翼紋者其性多溫一種竹乳其洞遍生小竹竹津相雜石狀如竹其性多平一種茅乳出茅山其山土石相雜遍生茅草茅津相滋形質潤滑其性多寒皆以光澤者為善余處亦有不可輕信雷公曰凡使勿用頭粗厚並尾大者為孔公石不用色黑及經大火驚過並久在地上收者與曾經藥物制者須要鮮明輕薄而有光潤如鵝翎筒子者乃佳修治鍾乳八兩用沉香零陵香藿香甘松白茅各一兩水煮過再煮汁方用煮乳一伏時漉出以甘草紫背天葵各一兩同煮漉出拭乾緩火焙之入臼杵粉篩過入鉢中令有力少壯者二三人不住手研三日夜然後以水飛澄罩以絹籠日中曬乾入鉢再研三萬遍乃以瓷盒收之太清經煉鍾乳法取好末置金銀器中瓦一片密蓋勿令泄氣蒸之自然化作水也之才曰蛇床為之使惡牡丹玄石牡蒙畏紫石英蘘草忌羊肉時珍曰亦忌參術犯之多死土宿真君曰鍾乳産於陽洞之內陽氣所結服之可柔五金麥門冬蒜韭實胡蔥胡荽貓兒眼皆可服之經云水勢劣火結為高山鍾乳本具水火二大矣則乳質全類似水而勇悍獨專寧非火勝水劣乎修治水煮仍交水火以濟之但煮則水勝於火所以少平勇悍也今世多用火煅反助長其勇悍故每多石毒燃燒之患先人云五臟安和竅節通利即地形仙矣此屬藉資大須保任久與相習乃成自然參曰乳乃石之靈液具山之全體者也顧山體有清濁而乳之優劣因之如婦人異質則鍾乳之厚薄與味之甘淡氣之腥香冷暖其滋益嬰兒與否亦自有辨故鍾乳先須論土地再審形狀庶幾得之唯天地之氣鍾於名山而乳凝焉觀其主治一一可想如肺系填塞脹滿則不能分布諸氣故咳逆上氣鍾乳虛中宛若肺系何患填塞脹滿此石液所鍾光潤瑩徹故明目目亦水液所鍾洞見明暗此石中精髓點滴不窮故益精髓之體此艮山之液能益真陰然五臟至陰須寧靜濡潤乃得安和若通百節利九竅下乳汁藉穿山石之力耳龍骨本經上品土大頑頽則風木變眚以木必基土維土為命互為乘制制則化生氣味甘平無毒主治主心腹鬼疰精物老魅咳逆泄痢膿血女子漏下癥瘕堅結小兒熱氣驚癇齒主小兒大人驚癇癲疾狂走心下結氣不能喘息諸痙殺精物久服通神明核曰出晉地及太山剡州滄州太原山岩水岸土穴中此龍化解脫之處也其骨細其文廣者雌其骨粗其文狹者雄五色具者上白黃色者中純黑者下矣各隨五色合五藏如五芝五石英五石脂之入五臟也山書云鱗蟲三百六十而龍為之長元命苞云龍之為言萌也陰中之陽故龍舉而云興説文云龍春分而登天秋分而潛淵物之至靈者也埤雅云龍鱗八十有一具九九之數陽之極者故為辰而司水鯉鱗三十有六具六六之數陰之極也故變陽而化龍淮南子云羽毛鱗介皆祖於龍羽嘉生飛龍飛龍生鳳凰而後鸞鳥庶鳥凡羽者以次生焉毛犢生應龍應龍生建馬而後麒麟庶獸凡毛者以次生焉介鱗生蛟龍蛟龍生鯤鯁而後建邪庶魚凡鱗者以次生焉介潭生先龍先龍生玄黿而後靈龜庶龜凡介者以次生焉埤雅云龍亦卵生而思抱雄鳴上風雌鳴下風而風化廣雅云有鱗曰蛟龍有翼曰應能有角曰虯龍無角曰螭龍未升天曰蟠龍玉符稱世俗畫龍之狀馬首蛇尾又有三停九似之説謂自首至膊膊至腰腰至尾皆相停也九似者角似鹿頭似駝眼似鬼項似蛇腹似蜃鱗似魚爪似鷹掌似虎耳似牛也或曰龍無耳故以角聽又云驪龍之眸見千里纖芥論衡云龍頭上有骨如博山形名曰尺木無尺木者不能升天其為性粗猛而畏鐵愛玉及空青而嗜燕故食燕人不可渡海又曰蛟龍畏楝葉及五色線故漢以來祭屈原者以五色線合楝葉縛之古者豢龍御龍氏徒以知其好惡而節制之將雨則吟其聲如戛銅盤涎能發衆香其噓氣成云反因云以蔽其身故不可全見今江湖間時有見其爪與尾者歲時云夏四月後龍乃分方各有區域故兩畝之間而雨暘異焉又多暴雨説者曰細潤者天雨猛暴者龍雨也又能火與人火相反得濕而焰遇水而燔以火逐之則燔息而焰滅矣餌食者當知其出處愛惡如此修治龍骨香草湯浴兩度搗粉絹袋盛之用燕子一隻去腸肚安袋於內懸井面上一宿取出再研極細用昔有飂叔安有裔子曰董父實甚好龍能求其嗜欲以飲食之龍多歸之乃擾畜龍以服事帝舜舜賜之姓曰董氏曰豢龍故帝舜世有畜龍及有夏孔甲擾於有帝帝賜之乘龍河漢各二各有雌雄孔甲不能食而未獲豢龍氏陶唐氏既衰其後有劉纍學擾龍於豢龍氏以事孔甲能飲食之夏後嘉之賜氏曰御龍管子云龍被五色而遊故神欲小則為蠶蠋欲大則涵天地欲上則凌雲氣欲下則入於深泉變化無日上下無時謂之神變化論云龍不見石猶人不見風魚不見水也韓文云噓氣成云云固弗靈於龍也然龍乘是氣茫洋窮乎玄間薄日月伏光景感震電神變化水下土汨陵谷云亦靈怪矣哉云龍之所能使為靈也若龍之靈則非云之所能使為靈也然龍弗得云無以神其靈矣失其憑依信不可與異哉其所憑依乃其所自為也易曰云從龍既曰龍則云從之矣紹隆王先生云龍稟陽而伏陰神靈之物也神則靈靈則變神也者兩精相合陰陽不測之謂也參曰龍耳虧聰以角為聽固有六根互用此則借用以為六根者也春半登天秋半潛淵揆機衡之升沉是合四時之宜耳豢龍氏醢龍以食張華云龍酢得醋則生五色安知非形似龍類也別録為死龍之骨蘇寇疑為神物無自死理既屬神物又安知非從尸解而去也故僅存朽骨尚獲靈異乃爾對待生人未朽之四大便為鬼疰精物老魅之所侮與泄痢膿血癥瘕堅結之早現頽敗相者若驚癇癲疾狂走痙痓此不能震驚百里施諸己身者也古有龍髯作拂見燕則冉冉自飄龍皮作障溽暑時云生涼作固屬謬誕亦未必非尸解物留人間世以顯靈異者也雷公修事藏納燕腹懸井面上此遂出處嗜欲之性倍發其靈異故爾但用燕似覺傷生且非時亦不易得不若以雲母易紫燕云從龍物各從其類也客曰龍骨畏石膏喜牛黃人參何也頤曰石膏稟艮止之凝肅雖與潛蟄之德相符御天之性則反故畏之牛黃黃中通理厚德載物人參參天兩地奠安形藏藉以濟弱扶傾運用樞紐故喜之又曰牛黃為君佐以龍骨牛黃又反畏龍骨何也頤曰牛黃全具敦阜之體龍則時蟄時躍蟄時無礙躍時未免為之崩且潰耳眼耳鼻舌身意曰六根色聲香味觸法曰六塵根之合塵各有專司互用則根塵疊應矣若龍之角為根身之餘物以之借聽此亦極大神通繇此觀之物物都有神通神通者我之不能彼之獨善者是也若蚱蟬之鳴以脅蠐螬之行以腹與猿猴之善援羚羊之挂角火鼠之火食魚龍之藏淵何莫非極大神通入水不濡入火不燒者乎蜂蜜本經上品氣味甘平無毒主治主心腹邪氣諸驚癇痙安五臟諸不足益氣補中止痛解毒除衆病和百藥久服強志輕身不飢不老延年神仙核曰蜜蜂一名蜜蜂爾雅翼云蜜蜂似蜂而小工作蜜也説文蜜作蜜云蜂甘飴也蓋若鼎器而幕之山海經云谷城之上足蜂蜜之盧今土木之蜂亦各有蜜北方地燥多在土中故多土蜜南方地濕多在木中故多木蜜又有岩蜜石蜜俱在岩石間也今人家所畜之蜂小而微黃大率腰腹相稱如蠅蟬也喜事者以窾木容數斛置蜂其中養之開小孔才容出入永嘉地記云七八月中嘗有蜜蜂群過有一二小蜂先飛覓止泊處人知輒內桶中以蜜塗桶內飛者聞蜜臭或停不過三四往來便舉群悉至矣今人家養蜂或群逸以百千萬數中有大者為王群蜂羿之從其所往人收而養之多在穀雨春分時也採取百芳醞釀造蜜其房謂之蜜脾王之所居疊積如臺語云蜂臺蟻樓言蜂居如臺蟻居如樓自然論云蜂無王則盡死君臣之體生死不移也一日兩出而聚鳴號為兩衙其出採花者取花須上粉置兩髀唯牡丹芍藥蘭蕙之粉或負於背或戴於首或採無所得者經宿花間一不敢歸或螫毒人蜂亦尋死故古稱蜂蠆有毒近其房則群起攻人故戰國有蜂旗軍行用之云若蜂起之將也寒冬無花深藏房內即以釀蜜為食春暖花朝復出卷採矣宛陵有黃連蜜色黃而味小苦雍雒間有梨花蜜色如凝脂毫州太清宮有檜花蜜色小赤南京柘城縣有何首烏蜜色更赤各隨所採花色性之溫涼亦相近也蜜脾之底為蠟埤雅云蠟生於蜜而天下之味莫甘於蜜莫淡於蠟蓋厚於此者必薄於彼理之固然也西方之書曰味如嚼蠟舊説蜂之化蜜必取匽豬之水注之蠟房而後蜜成故蠟者蜜之跖也方言云其大而蜜謂之壺蜂即今黑蜂也蓋亦釀蜜楚辭所謂赤蟻若象玄蜂若壺者是也試蜜真偽以燒紅火箸插入蜜中提出起氣者為真起煙者為偽修治每沙蜜一斤用水四兩入銀石器內桑柴火慢煮掠去浮沫至滴水成珠不散乃用又法以器盛貯重湯中煮一日候滴水不散取用亦佳且不傷火也七月勿食生蜜令人暴下霍亂味酸色青赤者食之心煩不可與蔥及萵苣同食令人利下食蜜飽後不可食鮮令人暴亡繆仲淳先生云集草木群英之精合水土風露之氣醞釀成蜜故其氣清和其味甘純施之精神氣血陰陽內外罔不相宜先人云蜜本萬卉之黃採集醞化於蜂岩石土木出處之端藜連烏檜生成之自參曰垂穎如鋒故名蜂傳云蜂蠆垂芒主之所在衆蜂旋繞飛舞如衛政令甚嚴蜂有臣禮者是也集採百芳退藏於密吹鼓醞釀而蜜成矣故謂之蜜其房如脾謂之蜜脾儼如胃形受盛水穀醞釀以成精血也甘平色黃當判入脾故補中而益中氣蓋萬物莫不資始於脾故主諸不足耳設土大頑頽則木無所倚遂成驚駭癇痙蜂蜜敦土化用厚德載物則上逆下陷之氣旋歸於本位矣安五臟者安五臟之形有形歸土脾所司耳心腹居中為邪所薄則中宮不安安中所以逐邪未有中不安而能剪除外侮者和百藥解毒者以甘性能緩則無躁暴漂𣵡之峻脾藏志故久服強志輕身不飢不老總屬脾土事耳第二帙牡桂本經上品關有匹為十二原之所出入節之交三百六十五會為神氣之所遊行出入也氣味辛溫無毒主治主上氣咳逆結氣喉痹吐吸利關節補中益氣久服通神輕身不老箘桂本經上品氣味辛溫無毒主治主百病養精神和顏色為諸藥先聘通使久服輕身不老面生光華媚好嘗如童子核曰牡桂出合浦交趾廣州象州湘州桂嶺諸處生必高山之巔旁無雜樹自為林類葉色嘗青凌冬不凋如枇杷葉邊有鋸齒表裡俱有白毛中心有縱文兩道宛如圭形四月有花無實木皮紫赤堅厚臭香氣烈味重者為最枝皮為桂枝干皮之薄者為桂皮厚者為桂為桂心為肉桂為官桂以皮作釘釘他木根旬日即死箘桂出交趾桂林山谷生必臨岩正圓如竹小於牡桂亦自為林凌冬不凋葉如柿葉尖狹光澤無鋸齒中心有縱文三道四月蕊黃花白五月結子如暗河之實木皮青黃環卷如筒亦以一皮之厚薄分桂枝桂心之差等參曰牡桂凌嶺箘桂臨岩旁無雜木自為林類此非落落難合故為高險乃剎帝利種凡木不得與其班列故爾桂從圭執圭如也圭者陰陽之始自然之形故葉文如之光澤色相不假雕琢牡色紫赤有花無子得陽之始箘色青黃有花有子得陰之始牡為牡箘為牝也蓋圭之妙用宣揚宣攝靡不合和牡主氣結喉痹神明不通關節不利此病之欲宣揚者也牡則先宣攝中氣而後為宣揚者也亦主上氣咳逆不能吸入反吐其吸此病之欲宣攝者也牡則先宣揚中氣而後為宣攝者也箘主和顏色使光華外溢媚好嘗如童子及為諸藥之先聘通使此藏陰之氣欲宣揚者也箘則先宣攝精神而後為宣揚者也設宣揚而不先宣攝宣攝而不先宣揚斯不和斯不合矣箘則宣揚宣攝藏陰神藏之五牡則宣揚宣攝中氣關節竅脈形藏之四功力之有異同者牝牡有別故也不唯有別且各分身以為族類故各從其類以為上下內外輕重厚薄之殊氣味辛溫功齊火大對治以寒為本以陰為標以寒水為化或本之本氣似隱而標之寒化反顯或陰氣承陽而血妄行或水寒亢害而厥逆洞注或火不歸源而外焰內寒或火失炎上而盲聾喑啞或真火息而邪火熾或壯火盛而少火滅此皆宣揚宣攝火大之體宣揚宣攝燎原之用灰心冷志人內無暖氣外顯寒酸更當餌服乃若驅風捷如影響以剎帝利種凡木望風自靡故一名梫言能侵害他木木得桂而即死圭之義大矣哉梵語剎帝利此云王種故圭有四鎮桓信躬王公侯伯執之從重土者以封諸侯也又土圭測土深正日景以求地中又圭田田之所入以奉祭祀為言潔也又六十四黍為圭又刀圭作匕正方一寸抄散取不落為度桑上寄生本經上品氣味苦平無毒主治主腰痛小兒背強癰腫充肌膚堅齒髮長鬚眉安胎其實主明目輕身通神核曰近海州邑及海外之境地暖不蠶桑無採剪之苦氣厚意濃兼之鳥食榕實糞落桑上乘氣而生葉如橘而軟厚莖如槐而肥脆三四月作黃白花六七月結黃緑實大如小豆汁稠黏或斷莖視之色深黃者良世俗多以寄生他木上者充之不惟氣性不同且反生災害矣修治根莖枝葉並銅刀銼細陰乾不可見火繆仲淳先生云感桑木精氣而寄生故其主治一本於桑更抽拔其英粹功用尤勝於桑矣參曰木性之易生者榕桑稱最桑雖曲直僕傴靡不怒生榕附水土沙木莫不勃發更異者鳥啖榕實遺出桑上遂爾寄生故主形骸寄生之齒髮鬚眉及胞胎癰腫堅之長之安之療之其功獨著若主腰痛治背強充肌膚及明目輕身通神者此屬形骸親相分特易易耳先人云寄生桑木身半大似腰呂之象則凡腰呂之疾為宜一名寓木寓木者如膽寄肝當治膽病胎亦寄發齒鬚眉亦寄也實之通神當切於魂斷決疑斯釋矣又云人世如寄此復寄寄取彼寄寄以益其寄易生速計之流得有著腳處隨計就計矣然木性之易生者榕桑稱最真真兩得其計矣防風本經上品氣味甘溫無毒主治主大風頭眩痛惡風風邪目盲無所見風行周身骨節疼痹煩滿久服輕身核曰出齊州龍山者最勝青兗淄州者亦佳二月生芽紅紫色作茹柔嫩爽口三月莖葉轉青莖深葉淡似青蒿而短小五月開花似蒔蘿花而色白攢簇作房似胡荽子而稍大九月採根似葵根而黃色一種石防風生山石間葉青花白根似蒿根而粗醜修治去叉頭叉尾及枯黑者叉頭令人發狂叉尾發人痼疾也制黃耆畏萆薢殺附子毒惡藜蘆白斂乾薑芫花得蔥白能行周身得澤瀉藁本能療風得當歸芍藥陽起石禹餘糧療婦人子藏風先人云四大中風力最勝執持世界罅無不入設人身腠理疏泄則生氣有所不衛風斯入焉故欲防禦障蔽者匪通天之生氣勿克也防風黃中通理鼓水穀之精以防賊風之來命名者以此又云身本四大合成以動搖為風則凡身中宜動處不動即是風大不及宜動處太動即是風大太過防風甘溫辛發中通濡潤勻而平之無過不及此防風功用又云衛我用我勻氣以芳參曰動搖飄拉風木之本性也土失留礙致風木變眚亦有風木變眚致土失留礙者如風在頭則掉眩在目則瞀盲在骨節則疼煩而疼煩瞀盲掉眩政風木動搖飄拉之性耳風行周身亦善行數變之用也臭味甘芳黃中通理敦九土之精以防八風之侮彼以巽入我以艮止在土轉而為吐生在木不得不轉為戴土而出矣功能敦土德用以防風木之相乘設風木已乘土大寧不戴負地土而出然則驅風木之外侮即所以行土大之德用以土大失體與用乃致風木之相乘耳釋名云上者吐也能吐生萬物也木者戴也戴土而出也生氣通天論指衛氣曰生氣又喻衛氣曰陽氣若天與日失其所則折壽而不彰此壽命之本也防風質黃具中土之色甘溫專中土之味蓋土德惟馨芳香充達拒諸邪臭故頭目身首有風尚未入臟者能從中拒撤之若防己則苦辛主泄治證亦不相同防風如任德以御外侮之寇防己如借權以清君側之姦然因名思義其曰防己固為可以自衛亦並此本身是應防之物蓋治世之能臣亂世之姦雄也故本經一入上品一入中品惟得土升陽之氣能化土重滯之形風大持土視大地如鴻毛身輕以此沙參本經上品氣味苦微寒無毒主治主血結驚氣除寒熱補中益肺氣核曰出淄齊潞隨江淮荊湖州郡沙磧中二月生苗初生如小葵葉圓扁不光八九月抽莖莖端葉尖長如枸杞邊有細齒葉間開小花五出色紫長如鈴鐸結實如冬青實中有細子霜後苗枯根長尺許若黃土地中者根則短小根莖俱有白汁如乳故一名羊乳羊婆奶根干時宛似人參中黃外白世所用者皆偽不知為何許物食之反損肺氣惡防己反藜蘆先人云色白而乳肺金之津液藥也故又得知母志取苦心之名參曰樂樹沙磧而氣疏質本秋成而性潔參容平之金令轉炎敲為清肅者也故可汰除肺眚因熱傷氣分為灑淅寒熱及藏真失行營衛陰陽致氣不詬血不濡與驚氣上逆不能詬之使下者功用頗捷術本經上品氣味苦溫無毒主治主風寒濕痹死肌痙疸止汗除熱消食作煎餌久服輕身延年不飢核曰出嵩山茅山者良杭越舒宣諸州亦有唯湖州津山者最佳多生高岡上葉頗大葉葉相對方莖有毛莖端有花有紫碧紅色根岐生紫色塊大者為勝或大如指如拳或至數斤者剖暴謂之片術爾雅疏云生山中者曰山薊曰白朮平地者曰薊曰赤朮赤者苗高二三尺葉亦抱莖梢間葉略似棠梨腳下葉各有叉三五出邊作鋸齒及小刺根如人指及老薑狀色黑褐而氣味辛烈古人用術不分赤白自宋人始指赤朮曰蒼朮但氣味有和暴之殊則施治亦有緩急陰陽之別修治白朮人乳潤之制其性也亦取易入陽明陽明燥金從乎中治太陰之濕化故也若療脾疾先用米泔浸透次以山黃土拌蒸九次曬九次竊土氣以助脾及宣胃府醞釀敷布之用耳赤朮亦用米泔浸透更以陳壁土水浸潤一二日取出去皮曬乾切片每術四兩先用脂麻六兩微火拌炒以濡其燥緩其暴更用粳米粳衣四兩微火拌炒則不染濕作黴矣忌桃李及松菜雀肉青魚蛤蜊先人云術字從木別名多山行脾土用曰木曰肝又云死肌脾體不靈黃疸脾色外見肢痙脾用不行食停脾氣不轉不飢脾精自固矣參曰術從木觀葉葉相對抱莖生儼似木字莖方葉附四旁合土大寄旺四季當判脾之肝藥用藥也又可判肝之脾藥父藥也以木必基土吮拔水液方條達發生故以木為母土為父耳風寒濕合成痹者此先因於風寒濕後之風為百病長故也痹則閉塞不通故死肌痙疸死肌者土頑頽痙者土震動而疸者土色見也緣土無用神受木所侮木無制抑敗亂所勝土不堤防泛濫為汗土不寧靜火勝地熱土無風力飲食停積術行土用大土力妄泄者既已歸源疏漏者寧不固密如是火熱頓消涼生風暢醞釀宣布脾土展舒矣既藥有雌雄子母兄弟則水土之抽為草木宜哉水母而土父矣土為水之堤防有知之者飲食之仗風力以為醞釀宣布人所未知須解一藏具五藏用者始得女萎本經上品禮備之祥所生唯和王者之用野人之節也氣味甘平無毒主治主中風暴熱不能動搖跌筋結肉諸不足久服去面皯好顏色潤澤輕身不老核曰爾雅名熒又名萎移萎香別録名萎蕤又名玉竹地節吳普名葳蕤樊阿名青黏先人云節竹其形萎熒作象玉青為色風木之性也生太山山谷及滁州舒州漢中均州處處山中亦有春生苗莖強直似竹作節葉亦如竹兩兩相值葉端有黃色班點三月開青花遂結實如珠根橫行如荻根及菖蒲概節平直多脂潤雖燥亦柔須節冗密宛如冠纓下垂之綏而有威儀之義瑞應圖曰王者禮備則萎蕤生於殿前威儀之義於此可見修治以竹刀刮去須及皮節洗淨蜜水浸一宿蒸了焙乾先人云動搖名風不能動搖名中風無風大性故澤色輕身皆屬風力所轉紹隆王先生云性稟醇和如盛德君子無往不利故可資其利用而不窮正如此藥之能補益臟腑滋培血氣氣為陽則身輕血為陰則顏駐根本既治百疾自除矣參曰體性柔軟津汁黏埴根荄繁盛垂垂似纓儼若威儀之容貌以能卓立於禮而為節文度數者也故王者禮備則葳蕤生於殿前細觀命名其形狀可想見矣能立於禮以固人肌膚之會筋骸之束若愈色婉容手舞足蹈莫非節文度數之詳耳其不能動搖跌筋結肉面皯色黯皆為慢風暴熱之所困以禮節之默然感化所謂動容貌遠暴慢者也於是肌膚潤澤筋骸轉搖故身輕不老翩翩若仙矣雜記云蕤賓律名謂五月一陰之氣委蕤於下嵇康琴賦云飛英蕤於昊蒼則葳蕤上下察矣詩云望見葳蕤舉翠華旋開金屋掃庭花望幸者尚爾飄飄神舉寵幸者想更超逾騰躍矣牛膝本經上品氣味苦酸平無毒主治主寒濕痿痹四肢拘攣膝痛不可屈伸逐血氣傷熱火爛墮胎久服輕身耐老核曰出河內川穀及臨朐今江淮閩越關中亦有不及懷慶者佳深秋收子初春排種其苗方莖暴節葉葉對生頗似莧葉六七月節上生花作穗遂結實如小鼠負蟲有澀毛貼莖倒生根柔潤而細一直下生長者約三五尺九月採根莖葉亦可單用修治去頭蘆用黃精汁浸一宿取出銼細焙乾參曰讀牛膝經年不得其解偶憶風馬牛不相及句比類推之牛喜風順馬喜風逆故知經隧從頭走足其逆流而上與不得順流而下者當百倍其力故一名百倍更觀實若鼠負根直下行宛如甲拆蓋牛為土畜在卦曰坤從土解孚以行脾用是以稟土氣之平兼木火之味是主寒濕成痹溜於肢節醞釀成熱遂致四肢拘攣膝痛不可屈伸經云濕熱不攘大筋軟短小筋弛長軟短為拘弛長為痿重言膝痛不可屈伸者以濕傷在下偏此更甚故爾或痹於血或痹於氣並可逐而通之如別録之治胸中痛腰脊痛莖中痛五淋癃閉下痢喉痹此正痹於氣如癥瘕血結惡血血暈此正痹於血咸成有餘之證形也如傷中少氣失溺絶陽此亦痹於氣如陰消陰痿精涸水涸及金匱要略之治血痹虛勞此亦痹於血咸成不足之證形也如痎瘧之暑傷營舍風並衛居此則痹於血復痹於氣成虛實更作之證形也蓋痹者失其流通之謂若傷熱火爛之上炎使其旋順乎下若墮胎之就下與得其平以全甲力此不循倫次越甲拆之解孚先抽乎乙之軋出耳氣則形駐故輕身耐老纖細之質徑直下生三四五尺非百倍其力者那能如是蓋直者為經合入經隧明矣手足十二經合兩手足草有四經矣十二自上走下十二自下走上則牛膝合入自上走下十二經隧矣痎瘧者陰陽相移上下交爭牛膝妙用使下者仍順乎下則上者仍安乎上矣牛性順之物也亦大力之物也膝之為用承上以接下如坤之承乾蓋順而健矣此藥根下行而能引伸力之大而健可知膝司承接力怯而弗任則不可屈伸用體性之至順極健者療之自無不濟膝名既同藥治最合土用衰則寒濕侵惟乘氣旺者能出涔濘故痿痹以之通理失則四肢勿暢惟居體下者能致緩和故拘攣以之蓋人身下體屈伸之大者莫如膝舉要而言力效易見若其順承天施而氣得上行不止及踵而且至腕矣逐血氣義參語備妙然詳味逐字更糾有闢山驅水之力熱因濕蒸火為寒變皆憤騰於上者也非順德深至曷能降伏哉可身受田單之爇炬自旋滅燕師之燹烽即怒攻而順性未嘗失也又其力能下持非下走者坤為子母牛故胎可弗墮順相因而極厚載華嶽而不重故身能輕順守柔而永貞比松柏之後凋故老能耐石斛本經上品氣味甘平無毒主治主傷中除痹下氣補五臟虛勞羸瘦強陰益精久服厚腸胃核曰出六安山谷及荊襄漢中江左廬州台州溫州諸處近以溫臺者為貴謂其形似金叉然氣味腐濁不若川地者形頗修潔氣味清疏母取美觀舍清用濁也叢生水旁石上根糾結甚繁干則白軟莖葉生皆青脆干則黃韌五月生苗似竹節間出碎小葉七月開淡紅色花十月結實節旁自生根鬚折之懸挂屋下時灌以水經年不死俗呼為千年潤此即蜀中所産入藥最良一種麥斛形似大麥纍纍相連頭生一葉而性多寒一種雀髀斛莖大如雀髀葉在莖頭一種草斛若小草長三四寸柔且韌折之如肉而實一種木斛中虛如木長尺余色深黃而光澤修治去根頭酒浸一宿曝乾酥拌蒸之從巳至酉徐徐焙乾唯入湯膏不入丸散以質綿韌不作末故也陸英為之使惡凝水石巴豆畏雷丸殭蠶先人博議云石止而不動斛受而量滿黃色甘味平氣具土德化有杜而不出受而不施成而不生及遂事之義故有杜蘭禁生石蓫之名蓋五中之傷外出形骸之痹內以伏匿之氣故外消肌肉而內乏陰精此能去內外之因而致內外之益則五中不傷是為之補久之則中藏既盛外府自厚矣參曰不藉水土緣石而生一名禁生雖禁猶生也一名杜蘭此以形舉亦處杜塞之境猶若光風泛蘭也顧山之有石若人之有骨盤結之狀亦若筋膜之聚絡骨節也斛量名象其能入能出也故石斛功力宛如胃府運化精微散精於腎淫氣於骨散精於肝淫氣於筋膜以及從脾淫肌肉從心淫血脈從肺淫皮毛何莫非水穀之源次第敷布於神藏次第滿溢於形藏者設痹塞則中傷致令胃失所司不能下精與氣遂成神藏之虛勞形藏之羸瘦耳久服則量而滿故腸胃厚滿而溢故虛勞補羸瘦充設非強益穀精安能逐除痹塞以續傷中乎禁生杜蘭深可味也肉蓯蓉本經上品宛如生物當與肉芝同一種類氣味甘微溫無毒主治主五勞七傷莖中寒熱痛養五臟強陰益精氣多子婦人癥瘕久服輕身核曰出河西山谷及代郡雁門陝西州郡多有之叢生勃落樹下並土塹上春時抽苗似肉色而紅有鱗甲第一齣隴西者形扁紅黃柔潤多花味甘且肥也次出北國者形短花少巴東建平間亦有而不佳有言馬精落地所生觀勃落樹下並土塹上此非馬交之處或説誤耳今人多以金蓮根用鹽盆制而偽充又有以草蓯蓉充之者宜審修治先須清酒浸一宿至明以棕刷去沙土浮甲劈破中心去白膜一重如竹絲草樣者有此能隔人心氣致令氣上也以甑蒸之從午至酉取出又令酥炙得所用參曰柔紅美滿膏釋脂凝肉之體也燕休受盛外發夫容肉之用也具體及用名肉蓯蓉喜生西地外被鱗甲藉土金相生誠培形藏之上品藥也故主藏室傾頽致藏形之勞與傷者用強體陰之精以益陽生之用則凝者釋釋者凝矣何患癥瘕寒熱者哉經云肌肉若一則形與神俱故久服輕身蓬藟本經上品亦可以膽為主當入少陽經云十一臟腑皆取決於膽少陽膽厥陰肝府也氣味酸平無毒主治主安五臟益精氣長陰令堅強志倍力有子久服輕身不老核曰出荊山平澤及冤句今處處有之秦吳尤多時珍曰此類凡五種豫嘗親採以爾雅所列者較之始得其的諸家所説皆未可信一種藤蔓繁衍蔓有棘刺逐節生葉葉大如掌狀類小葵葉面青背白厚而有毛六七月白花碎小就蒂結實三四十粒而成簇生時青黃熟則黑黯微有黑毛狀如桑椹而扁冬月蔓葉不凋者俗名割田藨即本草所謂蓬者是藟也一種蔓小於蓬藟亦有鉤刺一枝五葉葉小面背皆青光澤無毛開白花四五月結實成子亦小於蓬藟不簇生而稀疏生時青黃熟則烏赤冬月苗凋者俗名插田藨本草所謂覆盆子爾雅所謂茥缺盆者是也二種俱可入藥一種蔓小於蓬藟一枝三葉面青背淡白微有毛開小白花四月實熟紅如櫻桃似覆盆而色大赤酢甜可食不入藥用俗名𧂭田藨爾雅所謂藨者是也一種樹生者樹高四五尺葉似櫻桃葉而狹長四月開小白花結實如覆盆子但色紅為異俗亦名藨爾雅所謂山莓陳藏器所謂懸鉤子者是也一種就地生蔓長數寸開黃花結實如覆盆色鮮紅亦可食者本草所謂蛇莓者是也若以五類互為辨析則蓬藟覆盆自定矣諸家立論多端皆近是而非更有以蓬藟為根覆盆為子及覆盆為子蓬藟為苗與樹生為覆盆草生為蓬藟並以蓬藟覆盆為一物者恐出臆説難以為據也頤曰顧名思義蓬藟族類繁多因名蓬藟宜別子母兄弟以及雌雄則覆盆亦一支派矣但稟氣有優劣功用有異同不可不細為辨析也否則差之毫釐失之千里諸家臆説紛出獨蘄陽立言遵古特表而録之斆曰凡使用東流水淘去黃葉並皮蒂取子以酒拌蒸一宿東流水再淘兩次曬乾用先人云一名覆盆又名陰藟陰有覆義知斯嘉美便可發覆又云津汁為味甘中之酸為肝用藥咸具生成裨少火生陽之機逢形氣淫業之纍又云生機勃發用可駐顏參曰草之不理風轍輪旋曰蓬田諧草木在草木之間曰藟故蓬藟有藤蔓草木繁疏整棘之別藨田三候色味性情之殊蓋以易生多變而能五臟鹹入各隨所受以從類爾雖入五臟以肝為主當入厥陰厥陰者陰之盡陽之始也是以入厥陰之經長陰令堅強志倍力益精之氣而有子此體用雙彰之效也即腑臟之經亦莫不終於此始於此耳久服輕身不老即生變之徵但肝主疏泄服之過多雖得其用而戕其體天和損矣慎之蘼蕪本經上品合參芎藭義意始備氣味辛溫無毒主治主咳逆定驚氣辟邪惡除蠱毒鬼疰去三蟲久服通神核曰蘼蕪芎藭苗也圖説具芎藭條內陶隱居云蘼蕪一名江籬管子云五沃之土生蘼蕪李時珍云莖葉靡弱而繁蕪故以名之子虛賦稱芎藭菖蒲江籬蘼蕪上林賦云被以江籬揉以蘼蕪似非一物蓋嫩苗未結苗名蘼蕪既結根名芎藭大葉似芹名江籬細葉似蛇床名蘼蕪淮南子云亂人者若芎藭之與藁本蛇床之與蘼蕪郭璞贊云蘼蕪香草亂之蛇床不損其真自裂以芳詩云山上採蘼蕪山下逢故夫少司命云秋蘭兮蘼蕪羅生兮堂下緑葉兮素枝芳菲菲兮襲豫夫人兮自有美子孫何為兮愁苦蘭有國香人服媚之古以為生子之祥而蘼蕪之根主婦人無子也先人云得青陽之氣通甲膽之精輔神明之德者也參曰蘼蕪莖葉輕虛端直繁蕪蘼弱因名蘼蕪氣味辛溫稟少陽甲膽之力正中抽發萬化為之一新舒徐和緩春之春藥也對待急驟上逆不循次第而為咳逆驚氣者原從至陰閉密之內逗破端倪故可闢除邪惡鬼疰蠱毒三蟲所謂生陽能死死陰也若非通神胡能有此功力乎客曰主身中老風頭中久風風眩者何也頤曰風性宣發久老身中無風大性故先須甲膽逗破端倪乙木方能抽發雖行木用實補木體客曰止泄瀉亦屬甲乙乎頤曰此正風木失制敗亂所勝亦須甲乙體用從土甲拆則土中之水假借木力吮拔雖屬仇讎轉成三緣和合矣硝石本經上品氣味苦寒無毒主治主五臟積熱胃脹閉滌去蓄結飲食推陳致新除邪氣煉之如膏久服輕身朴硝本經上品氣味苦寒無毒主治主百病除寒熱邪氣逐六腑積聚結固留癖能化七十二種石煉餌服之輕身神仙核曰時珍云硝石丹爐家用制五金八石銀工用化金銀兵家用作烽燧火藥得火即焰起狐剛子煉粉圓謂之北帝玄珠諸鹵地皆産河北慶陽及蜀中尤多秋冬間鹵地生白掃取煎煉而成多不潔以水煎化結於盆底者狀似朴硝又名生硝謂煉過生出之硝也在上者或有鋒芒故硝石亦有芒硝牙硝之名與朴硝同稱而水火之性異也崔昉外丹云硝石陰石也此非石類掃取鹵地白屑煎煉所成今呼焰硝者是也時珍曰朴硝有三品生西蜀者俗呼川硝最勝生河東者俗呼鹽硝次之生河青齊者俗呼土硝又次之皆生斥鹵地刮掃煎汁經宿結成狀如鹽末猶多沙土猥雜其色黃赤別録云朴硝黃者傷人赤者殺人須再以水煎化澄去滓腳入萊蔔數枚同煮熟去萊蔔傾入盆中經宿則結成白硝如冰如蠟俗呼為盆硝齊衛之硝煉之底多上生細芒如峰別録所謂芒硝者是也川晉之硝煉之底少上生牙如圭角作六稜縱橫玲瓏洞徹可愛嘉祐所謂馬牙硝者是也狀如白石英又名英硝二硝之底通名朴硝取芒硝英硝各同萊蔔煎煉數次去鹹味即名甜硝二硝置之風日中吹去水氣則輕白如粉即名風化硝取朴硝芒硝英硝同甘草煎煉更用鼎罐升煅即名玄明粉諸硝總是一物但分精粗之異俗呼皮硝者是也時珍云諸硝自晉唐以來諸家都無定見不知硝有水火二種形質雖同性氣迥別今以本經朴硝硝石為正別録芒硝嘉祐馬牙硝開寶生硝俱系多出今並歸併朴硝水硝也有二種煎煉結出之細硝為芒硝為牙硝凝結盆底者為朴硝硝石火硝也亦有二種煎煉結出之細芒亦名芒硝牙消又名生硝凝結盆底者為硝石但二硝初生鹵地時硝石色白易煉朴硝黃赤再三煎煉始成為異也雷公曰凡使硝石先研如粉用雞腸菜柏子仁共二十五個和作一處丸如小帝珠子大以瓷瓶子於五斤火中煅赤投硝石四兩於瓶內遂投帝珠子入瓶自然伏火也凡使朴硝多恐不潔再同萊蔔煎煉一二次用諸家各立名相致朴硝硝石反混亂難別獨蘄陽標朴硝為水硝硝石為火硝以二硝為綱諸硝為目令後學一顧瞭然功德真無量矣能合諸硝歸水火二種識見甚真然切要在形質雖同性氣迥別二義此所謂圓融不礙行布也如乳中之酥酪醍醐是一是三無差別而有差別也先人云火硝屬火大所攝凡身中無暖熱相者用之精良主治積熱在臟者蓋臟屬身中之陰熱即陰火積有堅象所謂諸寒之而熱不去者須此消之以陰火遇水反熾用火逐之始滅卻耳又云朴硝主百病是有法寒熱邪氣是宗是能六腑是所積聚六字是所之相能化下是引證唯此一消字用消積聚結固留癖而返病愈參曰朴硝硝石咸生鹵地假水火二大以為形質但勝劣有異故水火之用迥別楞嚴云火騰水降交發立堅濕為巨海干為洲灘以是義故彼大海中火光嘗起彼洲灘中江河嘗注交妄發生遞相為種用是思維彼水硝者火勢劣水故火體似藏而水用獨著彼火硝者水劣火勢故水體似藏而火用獨著觀其主治則思過半矣有如反寒水之本得火熱之標積聚六腑結固留癖而為百病之邪此親相四大之分反承器界疏相之水變遷暖熱交發立堅致令四大缺陷潤濕之水動搖之風偏歸暖熱之火堅固之地矣先須水硝之水用對待其火熱從治其本寒轉以中藏之火體從治其火熱對待其本寒有如火熱為本藏陰為標標氣似隱本氣自盛積聚胃藏蓄結脹閉之邪此親相之分亦為疏相之火交發立堅致令四大反成缺陷者先須火硝之火用對待其標陰從治其本熱此正發真歸元結固悉皆消隕所謂非從則弗逆非逆則弗從也顧水硝功力致新推陳火硝功力推陳致新三復斯言其義自見二硝之分水火宛如太極之分兩儀而陰中有陽陽中有陰此又坎離互根之妙諦思硝石為鹵地所生與海灘之鹽相似從無致有變柔為剛故以名石如秋石之亦名石也雖分水火二種而核其根源止是一水其焰發熱騰亦水中之火也水經注記某處水肥然可以燃燈又即水具火不待煎疑矣惟為水中之火故宜臟熱之陰火亦從治之一法也禹餘糧本經上品氣味甘寒無毒主治主咳逆寒熱煩滿下赤白血閉癥瘕火熱煉餌服之不飢輕身延年核曰出東海池澤凡山島中池澤亦有之形如鵝鴨卵外有殼重疊中有黃色細末如蒲黃無沙者佳近年茅山池澤中者極精好狀如牛黃重重甲錯其佳處乃紫色靡靡如面嚼之無復磣其生成之因已具太一餘糧條內修治細研水洮取汁澄之勿令有沙土可也參曰績平水土有如神禹故曰禹然亦水土之精氣所鍾土劣水勢偏得水氣之專精者也曰餘糧者煉餌服之不飢延年故也氣味甘寒對待火熱及水土濁邪聚為寒熱為咳逆為煩滿為赤白為血閉為癥瘕或腎形無堅固性致洪水泛濫者當捷如影響神農嘗百草別五味五氣有毒無毒及方域形色功能優劣以名藥物若禹餘糧績平水土詮名曰禹抑逆知後世之有神禹乎余讀本經文似出周人手筆況太乙兩字又出自老氏口角滑石本經上品坎不盈柢既平氣味甘寒無毒主治主身熱泄澼女子乳難癃閉利小便蕩胃中積聚寒熱益精氣久服輕身耐飢長年核曰出赭陽山谷及太山始安之陰廣之桂林各邑及猺洞中皆出即古之始安也山東蓬萊縣桂府村所出者亦佳初取柔軟久漸堅強冰白如凝脂滑而且膩根即不灰木中有光明黃子即石腦芝也若理粗質硬色青有黑點者謂之斑石或烏色緑色黃色蒼色五色者皆可作器不堪入藥修治竹刀剖淨研極細用牡丹皮同煮一伏時去牡丹皮取出以東流水飛過數次曬乾用紹隆王先生云滑從水從骨故能散精於腎淫氣於骨以助髓液流通之用參曰潔白如水體之澄湛性滑稟水用之動流氣寒具水化之捍格奇方之滑劑重劑也主身熱泄澼乳難癃閉蕩胃中積聚寒熱者滑可去著也益精氣輕身耐飢長年者重可去怯也先人評藥云助精運用益彼空大水流而不盈行險而不失其正者也白石英本經上品氣味甘微溫無毒主治主消渴陰痿不足咳逆胸膈間久寒益氣陰風濕痹久服輕身長年核曰出華陰山谷及太山今澤州虢州雒州亦有近取澤州者為勝大如指長二三寸六稜如削白徹有光長五六寸者彌佳黃端白稜者名黃石英赤端白稜者名赤石英青端赤稜者名青石英黑澤有光者名黑石英若細而長及大而不正與多瑕疵者都不堪用時珍云澤州有英雞嗜石英而性補五石英制汞死砒惡馬目毒公參曰色相瑩如華萼故名石英以石質可入腎白色可入肺中含火氣可逐寒故主腎氣不周於胸而消渴天癸枯竭而陰痿不足肺不容平而咳逆上氣氣無帥制而痹閉不輸火失修容而胸膈久寒久服輕身長年寧靜所致耳五色石脂本經上品氣味並甘平無毒主治主黃疸泄痢腸澼濃血陰蝕下血赤白邪氣癰腫疽痔惡瘡頭瘍疥瘙久服補髓益氣肥健不飢輕身延年五色石脂各隨五色入五臟核曰青色脂生南山或海涯白色脂生少室天婁山或太山黃色脂生嵩山色如豚胸雁雛黑色脂生雒西山空地赤色脂生少室或太山延州色如絳滑如脂皆揭兩石中取之以理細黏舌綴唇者為上修治研如粉新汲水飛過三度曬乾用畏黃芩大黃官桂先人云膏釋脂凝皆肌肉中液也肌肉有餘則其氣揚於外凝中大有不凝義世人止知固濟未盡石脂大體三復本經自見又云有上貫四旁義腎水得用義六腑淨潔義心邪順去義遠志本經上品氣味苦溫無毒主治主咳逆傷中補不足除邪氣利九竅益智慧耳目聰明不忘強志倍力久服輕身不老核曰出泰山及冤句川穀冤句屬兗州濟陰郡今從彭城北蘭陵來河陝雒西州群亦有之有大葉小葉二種俱三月開花四月採根大者葉大花紅根亦肥大小者葉小花白苗似麻黃而青葉似大青而小根形如蒿而黃色苗即小草也修治去心否則令人煩悶仍用甘草湯浸一宿曝乾或焙乾得茯苓冬葵龍骨良畏珍珠藜蘆蜚蠊齊蛤紹隆王先生云氣味芳烈陽草也菖蒲之流乎入手少陰經蓋心為君主之官神明出焉天君既定五官自明百體從令矣先人云識深志遠出處咸宜苗短根長司腎之物參曰志意也心之所之心之所向也藏於腎而用於心故處則為意出則為志也意居六根之六志居五神之五可謂遠也已矣維爾之遠乃可裨神明之欲動欲流圓通無礙令根身聰慧輕安也如是則何有於器界六淫潛入根身之中而為填塞奔逆者哉蒲黃本經上品氣味甘平無毒主治主心腹膀胱寒熱利小便止血消瘀血久服益氣力輕身延年神仙核曰香蒲蒲黃苗也處處有之秦州者良叢生水際似莞而褊有脊而柔春生嫩葉出水時紅白茸茸然取中心入地白蒻生啖甘脆瀹以作鮓一宿可食亦可炸可蒸及曬乾磨粉作餅周禮謂之蒲俎詩云其蔌伊何惟筍及蒲是矣至夏後則莖抽葉中花抱莖端如武士捧杵謂之蒲槌即蒲萼也黃即花上粉屑一名蒲灰開時便取蜜搜作果食之大美七八月摘葉柔滑而溫可以為席故禮男執蒲璧言有安人之道也凡使勿用松黃及黃蒿二件全似蒲黃只是味跙及吐人真蒲黃鬚隔三重紙焙令黃色蒸半日卻再焙乾參曰蒲水草黃其夏火之華英也凡草木綻萼吐英與夫榮實蒂落莫不具春升夏出秋降冬藏之象至黃布花心此又夏出吐英之榮極時也第蒲黃四布花上若黃金經久不變是知蒲性精專在黃而以巨陽為用寒水為體合入太陽誠太陽氣分血分藥也故太陽是動則病寒熱小便不利其所生則病衄血血瘀咸可療之客曰水草紅白夏華抱莖具心腎義亦可入心之腎入臂之心藥矣頤曰手足太陽少陰為腑臟表裡上下中見入手太陽兼中臟之手少陰入足太陽兼中臟之足少陰所謂標之上氣之化氣之下中之見也此蒲黃互腑臟表裡上下之中見是以心腎咸關與水火既濟心腎交互者不同例耳客曰既入心腎亦可交互頤曰交互便非開闔合象中樞蒲黃四布花上唯標臣陽之開方顯在中之見此以府經之氣涉藏經之化非府經之形合藏經之神參五運之相襲六氣之對待以及標本病傳比量推度則得之矣百花有黃花謝黃滅以非專精於黃也蒲黃黃金不變固屬專精亦具夏火長夏土秋金三義巨陽太陽也太陽之上寒氣主之中見少陰太陽所謂標寒氣所謂本少陰所謂中也本自水中草標著在夏火吐英榮極時故專走太陽兼乎中見澤瀉本經上品氣味甘寒無毒主治主風寒濕痹乳難消水養五臟益氣力肥健久服耳目聰明不飢延年輕身面生光能行水上核曰出汝南池澤今汝南不復採以涇州華山者為善河陝江淮八閩亦有之春生苗叢生淺水中葉狹長似牛舌獨莖直上五月採葉秋時白花作叢似穀精草秋末採根形大而圓尾間必有兩岐者為好九月採實俱陰乾修治不計多少銼極細酒浸一宿取出曝乾畏海蛤文蛤先人題藥序云壬寅春受仁和劉矦旨集本草約言一夕解衣欲寢偶拈澤瀉讀之以其利水道也又能止寒精之自出以其明目也又能使人目盲以其催産難也又能種人子息遂發疑立久漏或再下觸發行水二字貫其文似覺釋然越三歲以此法解本草示禹航沈生彼若以為未盡然也遂動疑再讀得比類法如甘草色味性情有土之德能生萬物而為萬物所歸辛亥冬日中見茶氣上升有細細點子手挹攬生潤始解澤瀉命名之義迄今望壬寅已十七年矣尚未盡了其大義可見余之遲鈍懶惰寧不自生愧作哉有人以新刻本草見遺讀之不無憾然遂溫習綱目後題數言以自記義出偶中若泣若歌余小子敢云著述乎後之哲人莫踵豫之流弊內無真見而外發狂言破裂當世之規矩準繩也倘有有志之人旁聞不甘遂深究本經遍攻諸性融化世間文句提其精微而印正之示一草一木宛然若指諸掌不是空言實實見之行事以濟疲癃夭扎可開天下後世人眼目此真吾師也敢不甘拜下風脫或未然還須珍重時巳未浴佛日記於芷園懺室參曰世知火與元氣不兩立不知水亦與元氣不兩立何也停則為水散則為氣如水上升為云云下降為雨而宣發上升者火力使然故知氣即體水即相火即用用不離體體不離相離則不祥莫大焉澤瀉功力體用俱備故益氣之力能行水上以面生光為外徵耳如是則五臟安和聽視澄徹痹通乳易肥健水消輕身延年矣設無水相徒行體用便目盲水涸為禍不淺古人言火與元氣不兩立即舉一隅轉水亦與元氣不兩立即三隅反茵陳蒿本經上品氣味苦平無毒主治主風濕寒熱邪氣熱結黃疸久服輕身益氣耐老面白悅長年白兔食之仙核曰生太山及丘陵坡岸上所在亦有不及太山者佳春生苗似蓬蒿而葉緊細九月作花結實與菴䕡花實相似亦有無花無實者秋後莖枯經冬不死至春舊苗復生修治用葉有八角者陰乾去根細銼勿令犯火伏硇砂先人云諸邪成熱入中為疸必從腠理脈絡而內薄之陳絲如腠如理如脈如絡芬芳疏利味苦健行則入者出結者散矣又云誠山廚之清供脾土之生陽者也參曰甲子季春經山陰道中遠矚籬落間宛若緑氣蒸出就之叢生似藻纖柔青整訊之土人即茵陳蒿也始釋焄蒿悽愴沐醯青陳之絲之義藏器謂其因舊苗而發因名茵陳內經云春三月此謂發陳大相吻合故因者仍也托也陳者故也有也木德之始也言仍託故有以宣木德之始雖與蘩蕭蔚莪至秋老成同為蒿屬不若此芳香宣發之能因陳致新耳寒熱邪氣交結於中不能宣發則鬱黴成黃此陳也茵陳宣發發陳外入之邪外出陳去而新生矣輕身面悅白者久服則新新非故益氣者即益新新宣發之氣耳巴戟天本經上品氣味辛甘微溫無毒主治主大風邪氣陰痿不起強筋骨安五臟補中增志益氣核曰出蜀中今江淮河東州郡亦有不若蜀中者佳多生山林內葉似茗經冬不枯又似麥門冬葉而厚大秋深結實根如連珠宿根青色嫩根紫白以連珠多肉者為勝土人採根同黑豆煮紫殊失氣味一種山葎根極相似但色白土人以醋煮之雜巴戟內莫能辨識但擊破之紫而鮮潔者偽也紫而青白兼糝粉色其理小暗者真也修治同枸杞子湯浸一宿漉出再用酒浸一伏時更拌菊花熬令焦黃去菊以布拭乾用先人云草木至冬莫不隨天地氣化而藏獨此不凋與天相戟當為冬腎之生物也其精志與骨咸腎所司欲其生髮者仗此大有所裨參曰深秋結實經冬不凋反地之陽殺陰藏得天之陽生陰長可判屬肝而以戟以辛又可判屬肺矣誠肺肝秉製為用之用藥也故主天有八風不從鄉來者之外所因與經有五風觸五藏之內所因或肝失用而陰痿不起或形失生而筋骨不強或志從陰藏而頽或氣從陽殺而損靡不因風入中虛戟以擊之雷公法秉制之宜閲杞菊生成斯義自見不曰巴戟地而曰巴戟天雖似弄巧實出至理如是乃可合天有八風經有五風御五位觸五藏也續斷本經上品氣味苦微溫無毒主治主傷寒補不足金瘡癰傷折跌續筋骨婦人乳難久服益氣力核曰川蜀江南皆有出川蜀者最良蘇恭曰所在山谷有之俗用方莖葉似苧根似大薊色黃白者蘇頌曰三月生苗干有四稜葉似苧兩兩對生四月開花紅白色似益母花根如大薊赤黃色範汪方云即是馬薊與小薊葉相似但小於小薊葉又似旁翁菜而小厚兩邊有刺刺人花紫色時珍曰續斷其説不一別録復出大小薊但自漢以來皆以大薊為續斷相承久矣二蘇與梧君相符當以為正今人以紫色而瘦折之有煙塵起者為良無者即南續斷有者即川續斷也藥録云樂延蔓葉細莖如荏根本黃白有汁今用莖葉節節斷皮黃皺如雞腳者斆曰採得其根橫切銼之去向里硬筋酒浸一伏時焙乾用又云草茆根真似續斷誤服令人筋軟先人云繼絶開心維榮是賴雖鮮干少異而根華實同參曰斷者續之因名續斷故枝莖根節宛如經脈骨節也是主續筋骨連肉理貫經脈利乳難補不足益氣力續之功用大矣哉此以功用詮名合大小薊紅蘭花洎夫藍義意始備車前子本經上品好生道旁及牛馬足迹中命名之義昭然矣氣味甘寒無毒主治主氣癃利水道小便除濕痹久服輕身不老核曰出真定平澤丘陵阪道中今江湖淮甸近汴北地處處有之詩疏云車前好生道旁及牛馬足迹中韓詩外傳云直曰車前瞿曰芣苡瞿乃生於兩旁者春初生苗緑葉布地如匙面纍年者長尺許中抽數莖作穗如鼠尾花甚細密色青微赤實如葶藶色正黑五六月採苗七八月採實圃人或種之蜀中尤尚也修治淘洗去泥沙曬乾用入湯液宜炒過入丸散宜酒浸一宿蒸熟搗爛作餅曬乾焙研常山為之使先人題藥云車前好生道旁及牛馬足迹中古人以敝車作薪謂之勞薪道路之土得不謂之勞土乎以勞所生之物喜通行而好動作者故治濕土之化致傷水大之用為氣癃為水道停止者莫不精良一云雷之精服之神化雷震木也前陰亦屬肝木疏泄二便須氣化以出形化反不易之乎且車行而前孰不開讓疏泄之義顯然無子者子路不疏泄也其間必有隱曲車前開道病去而路通矣婦人樂有子薄言採之良有以也參曰引重致遠曰車不行而進曰前春生苗葉翠碧可觀行肝之用肝之氣分藥也癃則肝氣疲罷致水道小便失於轉輸遂成濕痹矣車前當道則前陰疏泄更主淚出之從流而上與淋瀝之從流而下者各返於所當止也利而不泄故益精用壯氣化但氣味甘寒須以辛佐不可獨往耳肝主疏泄二便故云癃則肝氣疲罷能使逆流而上者順流而下順流而下者溯流而上不但作車又堪作楫大棗本經上品氣味甘平無毒主治主心腹邪氣安中養脾氣平胃氣通九竅助十二經補少氣少津液身中不足大驚四肢重和百藥久服輕身延年葉覆麻黃能令出汗核曰近北州郡皆出青州者特佳木心絳赤枝間有刺四月生小葉尖澤五月開小花青白作蘭香七八月果熟南北皆有不及青州者肉厚多脂種類甚多如御棗水菱棗味雖美不堪入藥有齒疾疳病及蟲𧈟人不宜啖小兒尤不宜食與蔥同食令五臟不和與魚同食令腰腹痛多啖令齒黃生蝕嵇康有云齒處晉而黃是矣紹隆王先生云味甘氣溫而性平中不足者以溫充之形不足者以甘輔之後天生氣藉此盈溢於內外矣參曰甘平多肉為脾之果從兩束以束脾與胃之陽氣腐化水穀設散漫不羈便無醞釀宣布之力唯其束束方能數數腐化耳其心赤故主邪氣之在心腹以致中宮不安中安則養脾和胃矣十二經絡莫不資始於脾脾屬太陰太陰開故開通九竅而助十二經脈也補少氣者補中氣之少補津液者津液咸從脾運脾強則津液足身中有餘若中氣上逆成大驚者亦得仗庇旋歸本位脾主四肢虛則四肢重強則四肢輕和百藥者甘平無毒赤心之投也脾資後天故輕身延年脾虛當服實則不任用之葉覆麻黃則揚液成汗以能宣通津液假麻黃張大之力耳合麥門冬參看則知資始資生兩有異同處更合龜鹿蚱蟬白殭蠶狗脊萆薢而推廣之其法不可勝用矣唯其束束則不散漫不羈矣唯其不散漫不羈乃得赤心之投矣爾雅注云有壺棗壺猶匏也自大而鋭上者是也有細腰者為轆轤棗其實小而圓紫黑色者為羊棗潘嶽賦云棗下纂纂朱實離離清異録云百益一損者棗漢武內傳云老子西遊省太真王母共食王門之棗其實如瓶爾雅翼云棗者朿木棗束相重棗朿相連又云大而鋭上曰壺細腰曰邊白熟曰櫅樹小實酢曰膩實小而圓紫黑曰遵大如雞卵曰洗苦味曰蹶泄不著子曰晢味短苦曰還味棗有十一名郭氏得九焉後世有紫棗玄棗西王母棗東海蒸棗洛陽夏內與夫雞心牛頭羊矢獼猴其名不可勝載古者八月剝棗大戴禮云剝者取也其修治則曰新之疐之以為饋食之籩女貞實本經上品氣味苦平無毒主治主補中安五臟養精神除百病久服肥健輕身不老核曰出武陵山谷諸處時有木肌白膩葉厚而柔長者約四五寸碧緑色面深背淡花極繁冗結子纍纍滿樹而色褐即蠟樹也立夏前後取蠟蟲種子裹置枝上半月後其蟲化出延緣枝上造成白蠟民間大獲其利亦名冬青負霜蔥翠振柯凌風故也雖與冬青同名共種實異冬青即凍冬葉微圓子紅色蟲不造蠟為別也世俗盡用冬青實女貞實不復識二物功用迥別採擇者不可不辨先人云凌冬負霜子繁肌膩蟲食化蠟堅白脂潤何精如之故主補中肥健不老又云凌冬之資不老之藥形生本缺金水之精者需此貞實堅固其形然餌服者亦須如女之貞久而不變乃獲其益參曰不曰士貞而曰女貞謂主居中之藏陰故也則凡藏室萎頓以及精神魂魄意志離敗而為百病者靡不相宜故久服則散精於肝而淫氣於百骸肥健輕身不老其外徵也女貞之主居中藏陰宛若貞女之司中饋也故清士斂其質貞女慕其名淫散字義合石斛石脂參看始得辛夷本經上品氣味辛溫無毒主治主五臟身體寒熱風頭腦痛面皯久服下氣輕身明目增年耐老核曰所在有之樹高三四丈枝條繁茂正二月開花花出枝頭有紫白二色花落乃生葉葉間隨含花茁經夏曆冬其茁漸大長半寸而尖鋭茁外有苞重重有青黃茸毛順鋪長半分許如有毛小桃開時脫苞花似蓮花大如小盞作蓮蘭花香白花者呼為玉蘭更有千瓣者以紫花之萼為貴年淺者有花無子經三四十年者方結實也修事拭淨萼上赤毛用芭蕉水浸一宿更以漿水煮之從巳至未取出焙乾若治眼目中患即一時去皮用向裡實者芎藭為之使惡五色石脂畏菖蒲蒲黃黃連石膏黃環先人云植樹四十年方實孕萼歷三季始開結子閲九月可採醞藉濡遲不似辛散之物大有和平之象又云辛夷合宜用實第人心不能待其成耳苞萼雖可用恐力不及實之全體專精也又云遍歷四時之氣故形藏咸宜舉寒與熱四氣在其中矣有春氣在頭象風木主色象顧增耐兩字則得之矣參曰草木花葉俱有外苞萼拆解孚各有同異唯辛夷萼茁顯著特甚蓋遍四氣故曰辛辛新也五行均等故曰夷夷平也是以藏形咸輔而辛平木用故主風頭腦痛面皯氣上也久服輕身明目增年耐老者奠安形藏澄徹竅穴之功耳生人有胞凡胎生俱有胞濕生化生或胞或殼或合感或離應卵生唯殼主於草木果實有莩人或習聞若草木孕萼作葉亦具外苞從來未曾話破孟夫子所謂明足以察秋毫不足以見輿薪者皆如此類松脂本經上品氣味苦甘溫無毒主治主癰疽惡瘡頭瘍白禿疥瘙風氣安五臟除熱久服輕身不老延年核曰出太山山谷處處亦有今以塞上衡山者為良其樹修聳多節其皮粗厚有鱗其葉凌冬不凋二三月抽蕤長三五寸謂之松黃放花結實狀如荔枝疊成鱗砌秋老則子長鱗裂隨風飛散著土便生其脂通明宛如薰陸香以松皮內自然凝聚及流結根底不見日月者為第一鑿取者次之煮成者不堪用宜六月採修治用一大釜釜中置水釜上置甑甑中用白茅藉甑底更置黃沙於茅上厚寸許然後布脂炊以桑薪湯減頻加熱水俟脂盡入釜中乃出之投於冷水既凝又蒸凡三度則色白如玉入鉢徐研鉢底置水方易細陶貞白雲採煉松脂法並在服食方中以桑灰汁或酒煮軟挼納寒水中數十過白滑則可用震亨云松脂屬陽金伏汞制砂粉銀可作匱也參曰松有脂如人有血血餘則發華不稿脂余則葉華不凋松針上指宛如須發心之血分藥也癰疽惡瘡頭瘍白禿疥瘙風氣此血中眚因於血液枯涸致火氣流亢侵淫膚肉耳松脂陰潤麗澤澤其枯潤其涸拾其遺補其闕也雖入血分其性情形色參合五行色黃可入脾堅凝可入肺長生可入肝不凋可入腎味苦氣溫可入心五行周備故安五臟若苦能除熱假陰潤麗澤之質耳百木夭其氣與液僅自周其急也松木壽豈其自周其氣之餘為苓其液之餘為脂為珀咸成不朽槐實本經上品垂布有如鉤之象右腎命門火也當用老槐之實矣然則槐之火若龍之火歟晝炕而聶夜聶而炕互呈開闔之樞鍵也氣味苦平無毒主治主五內邪氣熱止涎唾補絶傷五痔火瘡婦人乳瘕子藏急痛核曰生河南平澤近道亦有小枝攫拿垂布如蓋其葉青緑而細葉大而黑者名杯槐葉晝合夜開者名守宮槐葉之初生季春五日而兔目浹旬而鼠耳更旬而始規再旬而葉成四五月開赭黃花六七月結黑褐實作莢如連珠奇數者為貴花未開時狀如粟粒採取煎汁染黃色甚鮮美修事用銅錘捶破烏牛乳浸一宿蒸一伏時曬乾收用先人云槐實一名守宮晝合夜開是得氣於陰槐字從鬼鬼為陰之靈冬鑽其火冬亦時之陰故入五臟入血分入隱僻之地有取北面不見日枝及三更仰臥咀嚼者真得其竅若氣得出而不得入陰能闔不能開舍此無繇矣參曰冬取槐檀之火槐當入腎宜乎偏向於右右為命門火藏故也淮南子云老槐生火誠極陰生陽之象爾亦可入肝槐性暢茂葉尤可玩嘗有香氣宛爇松風是得木體之柔誠腎肝之用莊周云水中有火乃焚大槐故從治壯火之侵淫膚肉五內之真火息而邪火熾釋木云槐葉晝聶夜炕故從治太陰開折之不能從闔而涎唾妄泄厥陰闔折之不能轉開而乳瘕急痛及風鬱於中而蟲蝕成痔也則凡能開不能闔能闔不能開者莫不迎刃而解設或差池未有不反實其實虛其虛者矣蔓荊實本經上品具筋骨人方耐歲寒氣味苦微寒無毒主治主筋骨間寒熱濕痹拘攣明目堅齒利九竅去白蟲久服輕身耐老小荊實亦等核曰出汴京秦隴明越諸處生水濱苗莖蔓延高丈許莖中心方對節生枝枝小弱如蔓春時舊枝作小葉如小楝五月葉成如杏葉六月作穗便出青萼將開則黃開時花色紅白九月結實黑斑大如梧子極輕虛實上近蒂處有白膜蓋子冬則葉凋莖則耐寒次年再發修治去蒂子下白膜一重酒潤一伏時蒸之從巳至未曬乾收用惡烏頭石膏繆仲淳先生云邪去則九竅通明痹散則光澤脂致參曰垂布如蔓故名蔓柔枝耐寒故名荊主筋骨寒熱濕痹拘攣柔筋堅齒耐老輕身者象形取治法為劑中之輕劑通劑也顧實體輕揚而炎上作苦故利九竅去白蟲者秉風木宣和之用耳先人博議云具筋骨關機之象耐字義深大有容焉德備淳化故列上品用合敷和之紀者無出其右矣小荊實本經上品氣味苦溫無毒主治主骨間寒熱通利胃氣止咳逆下氣核曰出北方今處處有之即黃荊實牡荊實也一名楚多生山野不經樵採者樹大如碗莖多不圓或扁或異或似竹節其木心方其枝對生而不作蔓一枝五葉或七葉葉如榆葉略長而尖邊有鋸齒五月梢間作花如穗紅紫色花多子粗歷歷疏生結實如胡荽子正圓色褐外有白膜裹之具青赤兩種青者為荊赤者為楛嫩苗可作莒囤古者婦女為叉即此荊也古者刑杖以荊亦此荊也春秋運鬥樞云玉衡星散而為荊凡修治法同蔓荊防己為之使畏石膏得柏實青葙術同療風疾參曰實小於蔓故名小其木心方故名荊不為蔓生一名牡子叢而疏一名楚運鬥樞云玉衡星散而為荊故主機回不轉偏成骨間寒熱之冬入咳逆下氣之秋降仰協玉衡機轉不回矣通利胃氣者滋後天以副先天功勝於蔓毋以大小忽諸蔓荊柔枝耐寒曰荊小荊其木心方曰荊然小荊枝亦柔徑蔓荊木亦心方故小荊亦筋骨受之蔓荊亦屬玉衡星散龜甲本經上品厴可供卜以垂象者大效法者地故取諸腹厴日華用厴亦本於此龜運任脈服天氣以通神明也氣味酸平無毒主治主漏下赤白破癥瘕痎瘧五痔陰蝕濕痹四肢重弱小兒囟不合久服輕身不飢核曰生南海池澤及江湖近取江州湖州交州者骨白肉厚其色分明供卜入藥最良論衡云春啓冬蟄食於清而遊於濁者龜也尚書中候云堯沉璧於雒玄龜負書而出背有赤文緑字史記云禹治水時神龜負書出於雒其數皆九是作九疇述異記云堯時越裳獻千歲龜背有科斗文紀開闢以來事帝録之曰龜歷廣雅云王者不偏黨尊耆老則玄龜出白虎通云龜者天地間壽考物也故問之龜象也爾雅翼云甲蟲三百六十神龜為之長廣雅云神龜者玄文五色神靈之精也説苑云靈龜千二百歲文五色似金似玉背陰象陽上隆象天下平象地盤衍象山四足轉運應四時文著象二十八宿蛇頭龍翅左精象日右精象月博議云廣肩巨腰內肉外骨雌雄尾交卵生而思抱乘雅云轉旋任脈呼吸以耳或云腸屬於首者謬矣爾雅翼云千歲之化下氣上通長尺二寸浮於蓮葉之上或藏於叢蓍之下可卜天地之終始能知存亡吉凶之變寧則申申如也動則著矣漢書云元龜距形一尺二寸直一千一百六十為尺貝十朋公龜九寸以上直五百為壯貝十朋侯龜七寸以上直三百為公貝十朋子龜五寸以上直百為小貝十朋是為寶四品周易或益之十朋之龜蓋龜者決疑之物或益而得十朋之龜則盡天人之助也類考云蔡國君之守龜蔡氏因以為名長尺有二寸漢書云諸侯以龜為寶家不藏龜三正記云天子龜長一尺二寸諸侯一尺大夫八寸士六寸龜陰故數偶也陰之老也龜以火灼之何以陽動陰也周禮云龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰雷屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之凡取龜用秋時攻龜用春時各以其物入於龜室上春釁龜華人掌燋契以待卜事龜策傳云龜一曰北斗二曰南辰三曰五星四曰八風五曰二十八宿六曰日月七曰九州八曰玉龜凡八名龜龜圖各有文於腹下此龜不必滿尺二寸得長七八寸亦可寶矣又曰龜有五色以時用之青靈之龜春宜用西坐而東向赤靈之龜夏宜用北坐而南向白靈之龜秋宜用東坐而西向玄靈之龜冬宜用南坐而北向黃靈之龜四時之季用坐中央而隨時向龜書云春占後右寅卯木兆也夏占前右巳午火兆也秋占前左申酉金兆也冬占後左亥子水兆也乘雅云天子占鼎耳曰土兆遵帝域也諸侯占輔弼曰木兆人生於寅也卜歲時占天垣亦曰木兆帝出乎震也各有定穴毋逾位次然後觀象察變數往知來順竅穴之骨理而著文者曰食墨逆竅穴之骨理而著文者曰危墨五兆雨霽蒙繹克而貞悔於斯見矣更參方隅之五鄉定位之生制六神主客之加臨三重形體之嘗變左右輕重之權衡主事本源之宜忌更辨色聽聲必齋必敬庶幾乎吉凶可判克應可憑也或云龜聞鐵聲則伏老桑煮之易爛蘇頌云頭方腳短殼圓版白者陽龜也頭尖腳長殼長版黃者陰龜也陰人用陽陽人用陰經云龜甲勿令中濕陶言厴可供卜殼可入藥古者上下甲皆用之日華僅用龜版後世遂主之時珍云按陶氏用生龜炙取日華用灼多者皆以其有生氣神靈也曰敗者謂鑽灼陳久如敗也吳氏反用自死枯敗之版復謂灼者失性謬甚矣修治須用神龜神龜版當心前一處四方透明如琥珀色者最佳鋸去四邊石上磨淨灰火炮過塗酥炙黃用亦有酒炙醋炙豬脂炙及炮灰用者各有所宜惡沙參蜚廉畏朐胋瘦銀參曰龜運任脈而脈通於首非腸也會督脈於巔交督脈於尾閭耳如鹿會任脈於尾閭交任脈於巔耳故以督會任者陽外而陰內以任會督者陽內而陰外信夫龜形象離而神在坎也漏下癥瘕五痔陰蝕任之為病也即坎失剛中用離失虛中體耳痎瘧則經脈縱橫致任督不能維持於經脈濕痹四肢重弱則經脈緩解致經脈不能依循於任督小兒囟不合此任不會督於巔龜蓋以骨為表囟合固宜牡蠣本經上品經云骨氣以精謹道如法長有天命氣味鹹寒無毒主治主傷寒寒熱溫瘧灑灑驚恚怒氣除拘緩鼠瘻女子帶下赤白久服強骨節殺邪鬼延年核曰出東海池澤及南海廣閩永嘉海旁皆有之初生時假水沫傍石向日者漸結成形大如拳石四面漸長至數丈或數十丈磈礧如房房多左顧嶄岩如山連絡不動房中有肉大者如馬蹄小者如指面名曰蠣黃潮來房開潮去房闔闔時納小蟲以充腹一種形圓如龜殼大小皆夾砂石丈夫服之令無髭也修治每用左顧者二十四枚以東流水一斗入鹽二兩煮一伏時再入火中煅赤研粉以琥珀吸引隨手便起先人云牡蠣單生無偶而左顧者當屬一陽故本經所主皆少陽所生病也然須水飲之因成堅固之象者始相合也又評藥云假無成有泡幻立堅水中之金關津之鍵參曰此濕生也濕以合感斂水之融攝山之結合感成形者也但磈礧連絡堅固不遷宛若山水之附贅懸疣耳其啓閉候潮誠應開闔之關鍵陰陽之樞紐者故名牡牡者門牡也蠣者金堅之用也味鹹氣寒體於水而用於水不離水相故爾傷寒寒熱者一陽樞象之是動溫瘧灑灑者一陽樞象之所生驚恚怒氣者一陽上逆之從開帶下赤白者一陽下逆之不闔拘緩鼠瘻者一陽之不能從開從闔也所謂門牡自亡則開闔不得久服強骨節者假水融結儼如人骨象形巽入骨氣以精殺邪鬼者奇生無偶玉衡左旋生陽偏勝陰屈自斂延年者澒留成丹餌之則仙水凝為質自可延年有言百歲雕所化則亦化生矣然百歲雕不易得何牡蠣之多也如雀之為蛤特一端之變現非嘗也牡有因無牝而名者有因不生子蔓而名者有生子而根乃生苗而名者此屬濕生亦屬化生即謂無雄亦可段成式以牡丹駁之又謂無目更何顧盼不知情意之所向即為顧豈必定以目視此皆拘執不圓通不可以格物論古者天道左旋蠣房左顧揆度奇衡道在於一樞機之象乎所主諸疾咸屬去來不定蓋去來不定正從開從闔之樞象也不獨入少陽亦入少陰矣故內經鼠瘻淡陰痎瘧淋露之疾皆名曰寒熱病則本經寒熱兩字當貫通章樞機之義昭然可見矣麝臍香本經上品即全真後身尚保中黃八極為未命元神氣味辛溫無毒主治主辟惡氣殺鬼精物去三蟲蠱毒溫瘧驚癇久服除邪不夢寤魘寐核曰麝字書謂之𠪙釋獸謂之麝父多出陝西河東益州秦州文州諸處諸蠻夷中尤多也形似獐麋而小色黑褐嘗食柏葉夏月多啖蛇蟲至冬香滿入春滿甚便自剔去香生陰莖前皮內別有膜袋盛之性多忌所遺糞嘗就一處雖遠逐食必還走之不敢遺迹他所慮為人獲人反以是求得必掩群而獲之此當是疑忌之義也釋獸云虎豹之文來由貍麝之香來射則其皮與臍之為纍也吳筠玄猿賦以為麝懷香而賈害狙伐巧而招射謂是也凡用須辨真偽生香心結雖不易得但取香臍中之當門子捻之如血線拓之如桃花瓣臊甚者始真縱膜囊完固尤多偽造分三種第一名生香即自剔出之遺香也但不易得香聚之處草木不生帶過園林瓜果不實是其驗也其次名臍香即捕得殺取者其三名心結香即麝遇犬獸捕逐驚畏失心狂走墜死者人得之破心見血流出脾上作乾血塊者不堪入藥又有一種名水麝者臍中惟水即以其水滴一點於鬥水中用灑衣服經年香氣不散性唯愛臍為人所逐即投岩舉爪剔裂其香就縶而死猶拱四足保其臍也唐天寶初養於囿中以麝為獸之香者故物之香比之有麝香鳥麝香木又有靈貓似麝生南海山谷如貓身亦曰鈴貍異物志云靈貍其氣如麝其毛可以為筆鄭虔云麝毛筆一管直行寫書四十張貍毛筆一管界行寫書八百張為貴也修治向日開之但微研不必苦細耳如欲細甚入醇酒少許不損香氣繆仲淳先生云邪氣著人則淹伏不起其香芳烈走竄借其氣以達病所關機竅穴莫不開通先人云射有丹機生物皆殺臍為身蒂形藏都通參曰射主中的的即中黃香結於斯當入脾藏中黃正脾主之宮位耳氣味辛溫性專宣發一派生陽全得甲力脾之用藥也故辟惡氣殺鬼精物去三蟲蠱毒夢寤魘寤若開通竅穴透達肌骨以中黃建立則八極洞徹但發露殆盡僅可施諸脾土之陽不可投諸敦厚寧謐者耳五色石脂補遺參曰石中之脂如骨中之髓故揭兩石中取之以黏綴唇舌者為上何也骨與肌肉原相連屬而骨中之髓假水穀之精凝聚所成從土發源填滿骨空自外而內者也自外而內更復自內而外如骨髓滿溢散精於腎淫氣於骨散精於肝淫氣於筋散精於脾淫氣於肉散精於心淫氣於脈散精於肺淫氣於皮毛皮毛血脈肌肉筋骨五臟之所合也悉從精髓陶鑄成形故五脂先歸於髓遊溢精氣轉輸各藏是以本經別録補髓為宗乃若黃疸腸癖癰腫瘡瘍種種病證悉屬水液血氣混濁不清石脂能使精氣遊溢去滓純髓諸疾潛消矣第三帙桑根白皮本經上品曲直僕傴靡不怒生枝幹葉實各有專精具木性之全體者無出其右此獨拈葉中絲縷而言其枝幹皮根理文絲縷亦各各井然氣味甘寒無毒主治主傷中五勞六極羸瘦崩中絶脈補虛益氣除寒熱出汗核曰所在有之花椹枝皮功無差等葉頻摘頻發枝頻剪頻生雖去枝純干干尤生枝葉充蠶食材多適用全體專精灌木易生之上品也爾雅云桑辨自椹者梔又云女桑桋桑檿桑山桑郭璞注云辨半也椹與椹同半有椹半無椹曰梔干小條長曰女葉細岐鋭皮理粗戾曰桋檿桑絲中琴瑟山桑似桑材中弓弩皆材之美者他木鮮及之矣李時珍云桑有數種檿條而分者椹少葉繁白桑葉大而厚山桑葉尖而長雞桑葉花而薄子桑先椹後葉望海桑高數丈枝幹茂盛亭亭如車蓋桑生黃衣曰金桑其本必將稿矣種樹書云桑根下嘗培龜甲易茂不蛀典術云箕星之精散而為桑箕水星也龜神在坎故桑以龜為食東坡曰琴絃舊而聲暗桑葉揩之發聲如新本草云桑根見地上者曰馬額有毒殺人旁行出土者曰伏蛇亦有毒轉治心痛故吳淑類賦云伏蛇治痛馬額殺人修治採十年以上向東畔嫩根銅刀刮去青黃薄皮一重取里白皮切焙皮中涎甚勿去之續斷桂心麻子為之使忌鐵及鉛王盤曰桑種甚多不可遍舉世所名者荊與魯也荊桑多椹魯桑少椹葉薄而尖其邊有瓣者荊桑也凡枝幹條葉堅徑者皆荊之類也葉員厚而多津者魯桑也凡枝幹條葉豐腴者皆魯之類也荊之類根固而心實能久遠宜為樹魯之類根不固心不實不能久遠宜為地桑然荊之條葉不如魯葉之盛茂當以魯桑條接之則能久遠而又盛茂也魯為地桑而有壓條之法傳轉無窮是亦可久遠也荊桑所飼蠶甚絲堅韌用最上也禹貢稱厥筐檿絲注曰檿山桑此荊之美而尤者也魯桑之類宜飼小蠶荊桑宜飼大蠶凡桑果以接傳為妙一曰身接二曰根接三曰皮接四曰枝接五曰靨業接六曰搭接今夫種植之功其利既溥又加之以接傳猶變稂莠而為嘉禾易碔砆而為美玉也既接傳矣復須剔其蟲蠹柳子所謂吾聞養樹得養人術此長民為國者所當視效也夫民為國本本斯立矣既興其本又除其害為治之道無以外是苟審行之不惟得勸課之法抑亦知教政之本與輯要曰桑之種性惟在辨其剛柔得樹藝之宜使之各適其用種樹之宜惟在審其時月又合地方之宜使之不失其中又曰種椹而後移栽移栽而後布行布行而後修蒔修蒔而後科斫科斫者種桑惟在稀科時斫使其條葉豐腴而蚤發不致蠶之稚也科斫尤在接換接換之法惟在時之和融手之審密封系之固擁包之厚使不至疏淺而寒凝也郭子章曰月令季春之月命野虞無伐桑柘鳴鳩拂羽戴勝降桑具曲植籧筐后妃齋戒親東鄉躬桑禁婦女毋觀省婦使勸蠶事蠶事既登分繭稱絲效功以供郊廟之服無有敢惰所以為天下蠶事勸也木各有所宜土惟桑無不宜桑亡不宜故蠶亡不可事豳風之詩曰女執懿筐遵彼微行爰求柔桑則豳可蠶將仲子之詩曰無折我樹桑則鄭可蠶車轔之詩曰阪有桑隰有楊則秦可蠶氓之詩曰桑之未落其葉沃若桑之落矣其黃而隕桑中之詩曰期我乎桑中則衛可蠶皇矣之詩曰攘之剔之其檿其桑桑柔之詩曰菀彼桑柔其下侯甸則周可蠶禹貢兗州桑土既蠶厥篚織文則魯可蠶青州厥篚檿絲管子亦曰五粟之土其檿其桑則齊可蠶荊州厥篚玄纁則楚可蠶孟子策梁曰五畝之宅樹之以桑則梁可蠶蠶叢都蜀衣青衣教民蠶桑則蜀可蠶猶之農夫之於五穀非龍堆狐塞極寒之區猶可耕且獲也今天下蠶事疏闊矣東南之機三吳越閩最夥取給於湖繭西北之機潞最工取給於閬繭豫道湖閬女桑桋桑參差牆下未嘗不羡二郡女紅之𨴗而病四遠之惰也夫一女不績天下必有受其寒者而況乎半天下女不績也豈第五十之老帛無所出不績則逸逸則淫淫則男子為所蠱蝕而風俗日以頽壞公父文伯母曰王后親織玄紞公侯夫人加之以紘綖卿之內子為大帶命婦成祭服列士之妻加之以朝服自庶士以下皆衣其夫社而賦事蒸而獻功男女效績愆則有闢古之制也彼大夫之家而主猶績奈何令天下女習於逸以趨於淫乎國家蠶桑載在令甲凡民田五畝至十畝者栽桑麻木棉各半畝十畝以上者倍之田多者以是為差特廢不舉耳故月令躬蠶之禮魯母績愆之闢與令甲桑麻之數此三者不可謂迂而不講也先人云桑為蠶食桑是蠶之天矣蠶質作絲絲是蠶之精矣絲絲縷縷如人身外之毛髮身內之經絡毛髮廣之鬚眉經絡廣之肉腠又深之廣之如經絡為營血流行之處或經脈損而營血崩或營血去而經脈涸從脈生病咸可以桑參曰季夏取桑柘之火桑當入脾為脾之心藥以絲縷如脈心主脈故也絲髮五音皮堅似革色白屬金亦可入肺脾之肺藥也曲直僕傴靡不怒生得木全性亦可入肝脾之肝藥也精英在椹色黑氣寒亦可入腎脾之腎藥也雖入五臟以脾為主然非寄四臟於脾四臟別有體用此則脾臟中之四臟也設因脾轉屬為效甚速蓋傷中者傷中央土致五臟之勞與極耳羸瘦即肉極崩中絶脈即脈極桑司中央火且絲縷專勝故治肉脈之極其功特著補虛者補脾土之虛益氣者益中央之氣絲縷在葉葉可通心以除寒熱汗乃心液故也橘柚本經上品氣味辛溫平無毒主治主胸中瘕熱逆氣利水穀久服去臭下氣通神核曰橘柚生江南及山南山谷今以廣中者稱勝素華丹實皮既馨香又有善味尤生於洞庭之包山過江北則無故曰江南種橘江北為枳函考工記云逾淮而北為枳則有異同矣橘頌云后皇嘉樹橘徠服兮受命不遷生南國兮屈原比之夷齊願置以為像取其貞介似有志也春秋運鬥樞云璇星散為橘弓人以橘為干也柚似橘而大其味尤酸孔安國云小曰橘大曰柚郭璞云柚似橙而大於橘禹貢揚州厥包橘柚錫貢橘柚皆不耐寒故包裹而致之也錫貢者須錫命而獻之言不嘗來也列子云吳楚之國有大木焉其名為柚碧木而冬生實丹而味酸食其皮汁已憤厥之疾齊州珍之渡淮而北化為枳焉則是其類矣子虛賦云橘柚芬芳蜀都賦云家有鹽井之泉戶有橘柚之園廣志云成都有柚大如斗呂氏春秋云果之美者江浦之橘雲夢之柚然則橘柚類雖同而種則異本經合稱之功力無優劣矣考古方書用橘不用柚今遵本經橘柚並用為正修事橘柚各去白膜銼細鯉魚皮裹一宿至明取用先人云橘柚通呼以本經命名為正類有橙柑圞枳之異樹有高下小大有刺無刺有刻無刻之別實有圓扁長鋭大小光纍之殊大都色象深緑凌冬不雕則一也實皮布竅色深於皮皮里有膜囊上有脈囊中裹瓤瓤內裹汁以養核也種類雖多但以皮肉氣味互為分析橘皮苦不可食肉甘可食橙皮甘可食肉酸不可食柑皮肉酸甘皆可食圞枳皮肉皆不可食柚則形長皮肉與橘同味矣大段橘之美者皆接生子種者不結實縱結實亦形長而味不美今人指此為柚子此則橘柚合稱之本義柚子不用接生亦取本有色味不從人力為也廣中柚子極大可食永嘉呼之為苞此又似圞名雖同柚種則異矣韓彥直有橘譜列十有四種以溫州者稱上品近衢州航埠沿溪三十里夾岸樹橘花朝香雪彌空果熟金星綴碧種有巨細色有紅赭約二十餘種唯琭橘最美武林棲水出蜜橘凡數十品名金錢穿心者雖秀色可觀又不如佛肚臍形小皮癩甘美可口也霜降採取氣足味足密藏至春剖皮抽脈破囊吮汁亦可振精醒神為得句破疑之助若欲擇皮用充藥餌不若廣中者皮薄而香愈陳則愈善也又云橘從矞矞者錐有所穿滿有所出兼已出未出義矞雲二色黃赤郁紛從矞取象者以此專勝在皮雖年深日久不但芳辛不改轉更清烈他果萬不能及此以木實之皮秋成得辛稟從革作金之用故可存可久誠肝藏之用分氣分藥也蓋人水穀入胃具升出降入之妙而遊溢精氣先及皮毛轉輸五臟此正水穀變現春夏秋冬耳合矞之已出未出如穿如滿之象真不待言語形容矣經云上焦開發宣五穀味熏膚充身澤毛若霧露之溉橘皮有焉再讀本經及諸家法乃知橘義真實不虛客曰陳皮留白補腎和中去白消痰泄氣從古所稱奉為律令今以矞義合之似覺未當曰此正證明八字義耳果能達矞義而用之的是橘皮四法不知此義而用之寧不溷他藥之四法乎若果可混性便移易必非本有之真性矣水穀入胃具升出降入之妙即東垣得悟法門從此縱橫應變莫不繇此貫通可見讀書不貴博只要實悟得古人一言一字便終身受用無窮參曰木命在皮各有專精以具全木之體橘柚專精者實實復專精者皮皮布細竅宛如人膚即脈絡肉理筋膜子核各有屬焉橘諧矞與霱同云間五色曰慶三色曰霱橘間青黃丹色之如霱也矞者錐有所穿取象膚間竅也及滿有所出取象氣中機也柚諧由與由同書云若顛木之有由枿徐云已到之木更生孫枝象枝條華菡之形也經云垂枝布葉皆下曲如鉤又云夏日在膚泛泛乎萬物之有餘也故橘柚力能轉入為升轉升為出即轉闔為開也種種形證悉從人從闔致胸中瘕熱水穀失宣神明不通氣逆及氣臭耳下氣者出已而降玉衡機轉之妙用也經云秋日下膚蟄蟲將去其斯之謂歟夏日在膚泛泛乎萬物之有餘秋日下膚蟄蟲將去即轉入為升轉升為出轉出為降之氣中機也杜仲本經上品氣味辛平無毒主治主腰膝痛補中益精氣堅筋骨強志除陰下癢濕小便餘瀝久服輕身耐老核曰出上虞山谷及上黨漢中上虞在豫州虞虢之虞非會稽上虞縣也今出建平宜都及商州成州峽州諸山大谷中亦有之樹高數丈葉似辛夷又類柘葉初生嫩葉可食謂之棉芽木皮狀似厚朴拆之白絲相連江南單呼曰棉花實皆苦澀亦堪入藥木可作履以益腳也修治削去粗皮每十六兩用酥一兩蜜三兩和塗火炙以盡為度銼細用先人云杜仲從土從中其色褐為土剋水象腎之用藥也腰本腎府濕土為害必侵腎水而腰先受之據名據色可以療也若象形能使筋骨相著又一義矣參曰杜牝仲次合陰合耦合象太陰之始生自上而下從外而內者也皮絡如綿皮理如革合至陽淪膚始盡至陰容平始平也平則轉出為降降則中實中實遂成入令矣入則精志益筋骨強藏精而起亟矣何患老之將至餘瀝之有又何患藏陰之形未充致奉生者少轉為痿厥及木用不及之有既容且平又何患長夏之土化未攘與秋金驟斂中含潤濕之有至陽淪膚始盡所謂夏三月此謂蕃莠至陰容平始平所謂秋三月此謂容平至陽即太陽至陰即太陰酸棗仁本經上品氣味酸平無毒主治主心腹寒熱邪結氣聚四肢痠痛濕痹久服安五臟輕身延年核曰出汴雒及西北州郡處處雖有但分土産之宜與不宜耳多野生在坡阪及城壘間似棗而皮細木心赤色莖葉俱青花似棗八月結實紅紫色似棗而圓小味極酸當月採實取核中仁奭曰嵩陽子言酸棗木高大貨者皆棘子此説未盡蓋不知小則為棘大則為酸棗平地則易長崖塹則難生故棘多生崖塹上經久不樵則成干人方呼為酸棗更不言棘實一本也此物才及三尺便開花結子但科小者氣味俱薄科大者氣味俱厚今陝西臨潼山野所出亦好此亦土地所宜也修治酸棗用仁以葉拌蒸半日去皮尖先人云味酸入肝色赤入心心之肝藥也有開義出義魂神義欲魂來歸欲闔轉入者非所宜也又云棘刺外出無邪服此反傷其內又云別録主煩心不得眠者心腹邪結氣聚使然耳服之結散聚消心定煩息故得睡眠又云未有散邪結氣聚之物能使衛氣入臟而就安寢者世人見不得睡眠便用棗仁思之真堪絶倒參曰棗為脾果味酸屬木脾之肝藥也色赤屬火脾之心藥也具春升夏出之機脾之陽分藥也蓋心腹居中即脾土之宮位為寒熱邪氣結聚於中不能主持四末致成濕痹痠痛而為凝閉之陰象者棗能運行脾用鼓舞脾陽轉凝閉為升出結聚自散痹閉自通矣五臟居中稟氣於脾亦仗以輕安也從來作不寐家枕中祕但欲寐人形藏中結聚乎空洞乎決明子本經上品氣味鹹平無毒主治主青盲目淫膚赤白膜眼赤淚出久服益精光輕身核曰生龍門川澤者良今處處有之為園圃所蒔四月生苗高三四尺本小末大葉似苜蓿晝開夜合兩兩相貼七月開花淡黃五出結角如初生豇豆長二三寸角內列青碧子數十粒參差相連狀如馬蹄下大上鋭一種本小末尖葉不夜合者茳芒也蓍實為之使惡大麻子紹隆王先生云決明稟陰精之體具青陽之用宜入肝腎肝開竅於目瞳子精光腎所司也先人題藥云決明葉晝開夜合兩兩相貼其葉夜不合者茳芒也人之眼夜合故治眼疾因名決明味鹹走血氣寒待熱故治青盲膚膜淚出熱傷血分者相宜倘屬氣分及風寒致目中諸證者非所宜矣參曰夏仲生苗秋仲結實獨得呼出之機儼具合張之相味鹹走血故治目中諸眚之因血液凝滯者罔不有功觀其子角鋭利分撥翳膜想更特易仲夏半夏生蓋當夏之半夏仲決明生亦當夏之半秋仲結實又當秋之半矣然則夏之能張秋之能合樞機使然耳蒺藜本經上品氣味苦溫無毒主治主惡血破症積聚喉痹乳難久服長肌肉明目輕身核曰出馮翌平澤所在亦有長安最饒喜生道旁春時布地蔓生細葉入夏作碎小黃花秋深結實狀似菱米三角四刺實有仁也同州沙苑一種生牧馬草地上亦作蔓生莖間密布細刺葉如初生皂莢葉整齊可愛開花作莢長寸許內子如麻碧緑色狀似羊腎嚼之若新茶香頃則轉作豆腥氣隔紙焙炒色香勝茗微火煎煮津液不竭者乃真也修事刺蒺藜揀淨蒸之從午至酉日乾木臼舂令刺盡再用酒拌蒸從午至酉日乾用沙蒺藜或熬膏或酥炙髮香研作末用刺蒺藜烏頭為之使先人云刺蒺藜成熟於秋而外刺堅徑得金之堅固氣為肝之用藥明矣然肝雖有藏血之體而血非可留之物留則不虛靈而汙惡斯致疾矣蒺疾也梨利也其性宣行快便故治積聚乳難諸證沙苑者莖有密刺結實成莢嚼之作新茶香不無分別取象補腎功力不相近也參曰蒺之言疾梨之言利不唯具從革之金用亦秉炎上之火用矣何也鋭利者金之用迅疾者火之用故兼火之氣與味金之色與形為七方之奇之急十劑之通之宣也是主喉痹乳難與症堅積聚以及惡血之急閉皆以柔乘剛非所據而據之匪此破敵不易開通以剛乘柔有所據而據之矣所謂急因急用通因塞用者是也更藉疾威敷及下士開發上焦宣水穀味熏膚充身澤毛則肌肉長百骸輕其角鋭利用開盲瞽特易易耳李蘄陽以沙苑一種附列本經之後主治補腎之神藏及腎之形藏名雖同而形實異功能亦迥別也觀其莖布密刺而亦成熟於秋秉堅金之體與用者但刺蒺藜鋭利顯著宣揚形藏之非所欲留沙蒺藜鋭利斂藏宣攝藏形之應所欲守為別異耳急閉兩字要著眼喉痹乳難生死在呼吸間豈容少待五味子本經上品氣味酸溫無毒主治主益氣咳逆上氣勞傷羸瘦補不足強陰益男子精核曰生齊山山谷青州冀州陝西代郡諸處高麗者最勝河中府者歲貢杭越間亦有之俱不及高麗河中之肥大膏潤耳春時蔓生木上長六七尺葉尖圓似杏三月作花黃白似蓮七月成實叢生莖端如豌豆生青熟紫五味俱全修治以銅刀劈作兩片石蜜浸蒸從巳至申更以漿水浸一宿緩火焙乾蓯蓉為之使惡葳蕤勝烏頭先人云玄者一陽初動冬藏之半也人身之氣藏者為精精之能動者為玄玄之所未及正精之所閉密也故一名玄及髓會為精故又名會及會字之義如百骸髓會而為精一滴生人衆形畢具又曰益降氣之不足正所以強陰也倘陰柔深曲者餌之便成淡陰重憎慳象耳參曰五味俱全酸收獨重重為輕根俾輕從重故益降下之氣也咳逆上氣者正肺用不足不能自上而下以順降入之令勞傷羸瘦者即經云煩勞則張精絶使人煎厥肉爍也此補勞傷致降下之不足與補中益氣之治不能升出者反能降便是強陰陰強便能入矣以入為水藏事故益男子精精為水藏物耳設六淫外束及肺氣焦滿餌之反引邪入藏永無出期縱得生全須仗夏火從中帶出或為斑疹或作瘡瘍得汗乃解倘未深解病情願言珍重芡實本經上品氣味甘澀平無毒主治主濕痹腰脊膝痛補中除暴疾益精氣強志令耳目聰明久服輕身不飢耐老神仙核曰出雷池池澤處處亦有武林者最勝土人善紀孕實時日如期採取則殼柔肉糯早則殼爛肉未凝遲則殼堅肉粳老矣三月生苗莖在水中葉貼水面莖葉多有芒刺莖長丈餘者中必有孔有絲軟者剝皮可食葉似荷而大皺紋如縠蹙衄如沸面青背紫五六月作花紫色花開向日向日結苞外有青刺如蝟形如栗球花出苞頂形如雞喙剝之內有斑駁軟肉裹子纍纍如珠璣殼內有白米狀如魚目根作三稜煮食如芋爾雅翼曰枚食細嚼能致上池之津故主益人猶如馬齧短草則肥悅與小兒食不易長大故主駐年芡與菱皆水物而性異芡花向日菱花背日其陰陽向背有不同則損益陰陽亦別異矣埤雅云荷華日舒夜斂芡華晝合宵炕此亦陰陽之異也修治先蒸熟日中曬裂取仁亦可舂取粉用暇日記云芡實一斗以防風四兩煎湯浸過經久不壞參曰芡生水中華實向日具既濟水火義又草木類全藉水土吮抽發育芡則更藉日中火為先後身亦具木胎火里義又葉上蹙衄如沸連莖刺棘如蝟實皮實殼如介亦具金胎水中義誠互交木金火水之駐形物也如益精強志不飢即駐形之裡應目明耳聰輕身耐老即駐形之外合飛行神仙即駐形之行圓功滿也未有形已駐而中央之基不築已不煉者若濕痹之腰脊膝痛及卒暴疾即駐形物之主治功能也先人博議云芡乃大中之小粗中之精澀中之甘荊棘中之軟美壅滯中之流行意闌中之氣悟疲憊中之強武然於精細甘美之間所含畜力且剛且久故餌食者貴細貴長毋貴多貴數也龍從火里得金向水中求尋胞胎祕旨也大中粗中荊棘壅滯意闌疲憊之流望之無不拋卻若非前人具眼幾至當面錯過大麻仁本經上品氣味甘平無毒主治主補中益氣久服肥健不老神仙核曰處處有之爾雅翼云麥黃種枲枲黃種麥顧麥之生即枲之成枲之成即麥之生也枲者有實之大麻也有雌雄二種雌者結實雄者不結實若子放勃時須去雄者設未放勃而先去之則不成子矣修治極難去殼取帛包置沸湯中浸至冷乃出之垂井中一夜勿令著水次日日中曝乾就新瓦上挼去殼簸揚取仁粒粒皆完先人云麻品凡五黃絡苧𦯶白也黃葉五岐絡葉無岐苧葉圓背白莖皆直上黃實即大麻殼褐仁白多脂液與諸麻之實迥別又云體直類木仁滑似髓肝之腎藥也故益精填髓潤髮黑鬚參曰大麻色黃一名黃麻麻有雌雄雄為苴雌為枲枲即有子之大麻也一葉五岐別曰黃枲氣味甘平為脾胃之體藥枝莖條暢為脾胃之用藥仁脂濡潤為脾胃之滑劑濕劑也故主補中益氣久服肥健不老神仙別録及附方諸證亦以四義釋之更參主客佐使真不勝其用矣麥黃種枲種枲時正木火司令時也枲黃種麥種麥時正金水司令時也交通之際抑中央宮土之五數矣獨活本經上品氣味苦甘平無毒主治主風寒所擊金瘡止痛奔豚癇痙女子疝瘕久服輕身耐老核曰出蜀漢西羌者良春生苗如青麻狀一莖直上有風不動無風自搖六月開花作叢或黃或紫生砂石中者葉微黃生厚土中者葉青翠有兩種一種形大有臼如鬼眼者今人呼為獨活一種蠶頭鞭節色黃紫臭之作蜜蠟香今人呼為羌活近以老宿前胡及土當歸黑皮白肉臭如白芷者用充獨活不可不辨採得銼細以淫羊藿拌浥二日曝乾去藿用免人心煩繆仲淳先生云獨活稟天地正陽之氣以生名列君部非比柔懦之主小無不入大無不通卻亂反正之君主藥也故能開萬竅八風之邪通四大關津之捷羌獨本同一種但分質有虛實老嫩氣有厚薄緩急之殊耳先人評藥云自行其意獨得嘉名參曰動搖萬物者莫疾乎風故萬物莫不因風以為動搖唯獨活不然有風獨立不動無風獨能自搖在蜀名蜀活在羌名羌活隨地以名亦隨地有差等但可互為兄弟不可強別雌雄其從治不能獨立不動而為風寒刀刃之所擊及奔豚癇痙之因風以為動搖復因風而反乎上下開闔者若女子疝瘕此不能自搖耳不能自搖即闔而不開不能獨立不動即開而不闔唯獨活則闔而能開開而能闔當入肝之經厥陰之闔具備風木化氣之體用者歟參合赤箭生成主治彼此功力昭然但合赤箭不為物移之體能立力能獨運之用能行故僅可強御外侮而少遜駐形以其無森衛旋返之力故耳天門冬本經上品氣味苦平無毒主治主諸暴風濕偏痹強骨髓殺三蟲去伏尸久服輕身益氣延年不飢核曰生奉高山谷奉高太山下縣名也今處處有之喜高潔地上春生藤蔓大如叉股高丈許葉如絲杉纖徑青整澀而無刺一種葉如茴香尖細青疏滑而有刺夏生細花白色亦有黃紫二色結實在根枝之旁色黑褐入伏後則無花暗結實矣根科生如百部一科一二十枚大如手指圓實而長根白色亦有黃紫二色雒中者粗干大葉殊不相類嶺南者無花有子余無他異以根作湯可浣垢縑素越人呼為浣草修治去皮用柳木甑柳木柴蒸一伏時灑酒令遍更添火蒸一伏時取出作一小架去地二尺攤上曝乾地黃貝母為之使畏曾青搗汁制雄黃硇砂禁鯽魚設誤食中毒搗浮萍汁解之參曰門司出入出即生也冬司寒令寒即水也合天一生水故名天門冬天者清肅為用水者澄湛為體其能浣垢亦謂得清肅澄湛之力耳對待染汙不潔之氣使形骸氣血混濁不清致偏痹不周遂生三蟲伏尸及暴受風濕而成諸痹者咸相宜也設合寒邪便當束置蓋寒原屬水法當逆治非反佐順從之類柔潤多脂得澄湛水體故強骨髓色白性降得清肅金用故益肺氣久服骨氣以精故輕身延年不飢天冬一名天棘獨以金標名義者尊其母子則昭然矣庵閭子本經上品氣味苦微寒無毒主治主五臟瘀血腹中水氣臚脹留熱風寒濕痹身體諸痛久服輕身延年不老核曰生雍州川穀及上黨近道亦有之春生苗高二三尺莖色白似艾莖而粗葉色緑似菊葉而薄八月開花淡黃色結實亦如艾實中有細子極易繁衍藝花以之接菊能耐霜雪蒿屬也葉老可以覆蓋植之可以闢蛇荊實薏苡為之使紹隆王先生云藏真通於心心藏血脈之氣也藏真高於肺以行營衛陰陽也藏而不行者菴䕡以行之行而不藏者棕櫚以藏之參曰莊周云天下之水莫大於海止而不盈尾閭泄之是也五臟瘀血腹中水氣臚脹留熱風寒濕痹此皆留止於中不能展泄外出菴䕡能使氣血展泄外出唯展則展衆展唯泄則泄衆泄有以覆蓋軍行宿舍易菴為掩䕡為廬是反益其留止矣繇於掩藏而後發泄則其出有根如人繇屋舍而達門戶也故不出稱䕡又安菴字卸重行泄耳茺蔚子本經上品氣味辛甘微溫無毒主治主明目益精除水氣久服輕身核曰茺蔚即益母爾雅名萑蓷劉歆云萑臭穢也臭穢即茺蔚陸機云蓷益母也益母即茺蔚故曾子見之而感思也古用實今用草蓋茺蔚專精在實取充盛密尉之義用草則舍密從疏矣出海濱池澤今園圃田野近水濕處甚繁二月生苗如嫩蒿狀入夏漸高至三四尺莖四稜如黃麻莖葉尖岐如蓍艾葉莖有節節節生穗叢簇抱莖四五月間穗開小花紅紫色亦有白色者每萼內有細子四粒粒似蒿子色黑褐有三稜藥肆中往往作巨勝子貨之生時微臭夏至後莖葉皆枯根色白也修治微炒髮香或蒸熟向日中曝乾舂簸去殼取仁伏澒制砂白花者良先人云生成止在三春具備肝木體用誠生榮之物益母之珍也參曰生成在春節穗森榮實作三稜合天三生木得木體之全具五行之相大益肝膽者也茺蔚之名言能自上按下從內徹外豐美備足何也十一臟腑取決甲膽故爾故主上明眼目下輸水氣內益精髓外固形骸益母者胎從厥陰始結産自少陽發伸娠前娠後靡不以肝膽為芻狗者種種功力悉以充肝之用尉木之體玩索解分自得之矣胎從厥陰始結指巳亥作胞胎産自少陽發伸指寅申之甲拆蛇床子本經上品氣味苦平無毒主治主男子陰痿濕瘡婦人陰中腫痛除痹氣利關節癲癇惡瘡久服輕身好顏色核曰生臨淄川穀及田野墟落間三月生苗高二三尺葉似蘼蕪枝上有花頭百餘同結一窠四月放花白色結子攢簇兩片合成極輕虛似蒔羅子亦有細稜修治用濃藍汁百部草根汁同浸一伏時漉出日乾卻用生地黃汁相拌蒸之從巳至亥取出曝乾惡牡丹貝母巴豆伏硫黃參曰蛇虺性嗜蛇床故一名蛇粟蛇米床者喜臥於其下也蛇性竄疾獨居處隱僻稟風木善行數變之體用耳蛇床功用靡不吻合設非氣性相似寧為蛇虺所嗜男子陰痿濕癢婦人陰中腫痛正厥陰隱僻之地氣閉不通所致蛇床宣大風力鼓舞生陽則前陰疏泄竄疾自如並可伸癲癇之氣逆於藏與關節之壅塞不開痹去則身輕肝榮則色其色矣真堪作把握陰陽維持風色之良劑也風性不離動靜竄疾即動性隱僻即靜性耳丹參本經上品氣味苦微寒無毒主治主心腹邪氣腸鳴幽幽如走水寒熱積聚破症除瘕止煩滿益氣核曰丹參一名赤參山參逐馬郤蟬草奔馬草木羊乳也出陝西河東州郡及隨州處處山中皆有二月生苗高尺許方莖有稜一枝五葉葉對生如薄荷葉而有毛三月至九月作小花成穗如蛾形又似紫蘇花中有細子一苗數根根大如指長尺余皮丹肉紫畏鹹水反藜蘆先人云丹赤心色奔逐為緣蟬速於化郤速於蟬又云根多且久發露太盡氣藏之時安能使有畜積耶參曰丹固指色入少陰心主主夏氣病藏之邪驅之使出亦可指丹曰樞使從闔之邪從樞轉出少陰為樞故也心腹邪氣腸鳴幽幽如走水狀此寒熱積聚癥瘕假形雖屬病藏實樞象耳丹者前三五兮後三五亦三十時中兩日半三五之中曰月樞三十之中曰日樞細辛本經上品觀此生成盡情顯出少陽火用之象氣味辛溫無毒主治主咳逆上氣頭痛腦動百節拘攣風濕痹痛死肌久服明目利九竅輕身長年核曰出華陰高麗山谷中者為上今處處雖有皆不及也南陽臨海者亦可用山海經云浮戲之山多少辛管子云五沃之土群藥生細辛是矣春生苗一根則一葉相連今多以杜衡為之博物志云杜衡能亂細辛振古已然頤為能亂細辛者不止杜衡當以根苗色味細辨之葉似小葵莖柔根細端直而長色紫味辛嚼之習習如椒者細辛也葉似馬蹄莖微粗根似細辛而曲色黃白味亦辛者杜衡也一莖直上莖端生葉如傘狀根似細辛而微粗色黃白味辛兼苦者鬼督郵也根似鬼督郵而色黑者及己也葉似小桑根似細辛而粗長色深黃味辛臭臊者徐長卿也葉似柳葉根似細辛而粗長色黃白味苦者白微也根似白微而脆色白味甘者白前也修治揀去雙葉者切去頭上子以瓜水浸一宿曝乾用曾青棗根為之使得當歸芍藥白芷川芎牡丹藁本甘草共療婦人得決明鯉魚膽青羊肝共療目痛惡黃耆狼毒山茱萸忌生菜貍肉畏硝石滑石反藜蘆世人用細辛不分真偽繇辨之不早辨也杜衡鬼督郵徐長卿白微白前五種根皆粗肥反於細辛之細五種亦多曲反於細辛之直紹隆王先生云肝木上行春風上升反於橫遍矣經云無怒其志使華英成莠此春轉成夏升轉從出之機乎先人云密通精氣顯益火大青陽之象也參曰細指形言辛指味言輕清柔徑端直修長當入少陽宣達甲膽之用自下而上以行春令者也故主春氣者病在頭而為頭痛腦動目不明竅不利此雖自下而上不能宣達者也咳逆上氣此惟自下而上不循倫次者也百節拘攣此不能自下而上升從入令者也痹痛死肌此不得自下而上反侮所勝者也總屬肝用之過與不及而獨偏向不及者歟輕清柔徑端直修長即內經所謂春脈如弦何如而弦春脈者肝脈也萬物之所以始生也故其脈之來輕虛以浮端直以長以言肝木之用效象天氣以為形容者也細辛功用吻合的是少陽用藥無疑矣白膠本經中品氣味甘平無毒主治主傷中勞絶腰痛羸瘦補中益氣婦人血閉無子止痛安胎久服輕身延年鹿茸本經上品附革故所以鼎新正見陰陽互根之妙氣味甘溫無毒主治主漏下惡血寒熱驚癇益氣強志生齒不老核曰鹿者仙獸自能樂性遊處山林從事云泉志無忌性警防善接其類與麋為友有角無齒者牡曰麚無角有齒者牝曰麀無齒謂無上齦齒若下齦則牝牡咸有與禽鳥之與角無齒似同而實異也牝小於牡毛雜黃白牡大於牝毛間黃白故云牡質斑斑斑斑點點如星星也行則同旅食則相呼性喜食龜能別良草不食諸毒分背而食食時則群長四顧相望俟衆飽長乃食群小互為巡視矣集居必環角外向臥眠必口接尾閭其息曰場其迹曰𪋝埤雅云鹿善決驟故其迹𪋝而不禸詩云町疃鹿場言町畦村疃無人焉故鹿以為場也物類考云鹿好群而相比陽類也故夏至感陰氣而角解從陽退之象爾麋則冬至感陽氣而角解從陰退之象爾麋孕子於仲春而生於秋鹿孕子於仲秋而生於春爾雅翼云鹿六為律鹿主律故鹿六月而生鹿雖應律然非辰屬八卦亦無主也其子曰䴠子生得雨或水乃行地耳格物論云鹿千年者色蒼又五百者色白再五百年者色玄玄之又玄仙化登乎天矣埤雅云懷瓊於角下者角有斑痕紫色如點行或有涎出於口不復能急走也蓋鹿戴玉而角斑魚懷珠而鱗紫故有諸中未有不形諸外矣陶隱居云古稱鹿之似馬者直千金今荊楚之地其鹿絶似馬當解角時望之無辨土人謂之馬鹿以是知趙高指鹿為馬蓋以類爾角解之後始生之角曰茸色如茄紫者為上修事白膠採全角鋸開並長三寸急水中浸一百日取出刮去黃皮拭淨以鹼醋煮七日旋旋添醋勿令少歇戌時不用著火只從子至戌也日足角白色軟如粉便搗爛每十兩入無灰酒一鎰煮成膠陰乾研篩用又法用米泔浸角七日令軟入急流水中浸七日去粗皮以東流水桑柴火煮七日旋旋添水入醋少許搗成霜用其汁加無灰酒熬成膠用修事鹿茸用黃精自然汁浸兩日夜取出切焙免渴人也參曰鹿陽獸也臥則口接尾閭以通督脈性喜食龜以交任脈能取所不足以自輔獸之至靈者也故任病則先治督以陰生於陽而陽為督陰為任也即奇經六脈與兩手足各十二陰陽經脈亦莫不綜於任督也禮記疏云鹿夏至而解角謂消長使然不知革故所以鼎新即此可見陰生於陽之妙矣故角之力用雖廣而茸為獨專茸主漏下惡血寒熱驚癇任為病也角主傷中勞絶羸瘦諸經肉理為病也咸不能與督脈相交所致腰痛呂為病也鹿力在呂亦即督脈所過也血閉無子任不通也不得相輔於督也胎不安胞系化薄也不得依循任與督也若益氣強志生齒不老延年者即任督已交陰氣乃生骨氣以精之外徵耳蘭草本經上品氣味辛平無毒主治主利水道殺蠱毒闢不祥久服益氣輕身不老通神明核曰蘭草香草也別名都梁香千金草即孩兒菊醒頭草也禮記佩帨蘭茞楚辭紉秋蘭以為佩西京雜記載漢時池苑種蘭以降神或雜粉藏書衣中主闢蠹者皆此蘭也出太吳池畔及溪澗水旁下濕地荊州記云都梁有山下有水清淺之中生蘭草詩疏云鄭俗三月男女秉蕑於水際以自祓除者是也二月宿根再發紫莖素枝赤節緑葉葉對節生光澤有岐嫩時可挼可佩八九月漸老枝頭成穗作花紅白狀似雞蘇久之花瓣轉白絨裂如球球中有子一粒絨著子上色黑味苦臭香氣烈即千金花也一種山蘭即蘭草之生山中者莖葉花實都同但山澤有分功用亦異與澤蘭同類異種故蘭草名大澤蘭澤蘭名小澤蘭二種皆生水旁但澤蘭莖方節短葉上有澀毛氣味俱疏淡功用則迥別矣近世之所謂蘭非古之所謂蘭草蘭生山谷葉如麥冬而稍長四季長青不畏霜雪迎春開花花出根底一干一朵亦有一干數朵者小蘭也若生閩廣葉似菅茅而稍短四季長青畏霜雪及春風入夏開花花出根底一干數朵亦有一干一朵者秋蘭也朱子離騷辨證云古之香草花葉俱香燥濕不變今之蘭類花萼雖香干則腐臭葉又不香不識何時以幽蘭誤蘭草也方虛谷訂蘭説云古之所謂蘭即今之孩兒菊千金草今之所謂蘭其葉如茅根名土續斷花萼馥郁故得蘭名楊升庵云世以蒲宣者為蘭九畹之受誣久矣吳草廬蘭説云蘭草有枝有莖草之植者也幽蘭無枝無莖草之芳者也因山谷稱之置之座右世遂謬指為離騷所稱之蘭以此參曰臭香味辛氣化中藥也故主益氣利水道經云膀胱者州都之官津液藏焉氣化則能出矣故蘭闌也泛闌流離也又蘭闌也闌闢不祥也主殺蠱毒通神明令輕身不老也花即千金花苗即千金草以花煮酒臭類木香苦甚黃連用治滯痢獲效頗捷正闌闢不祥利水道宣氣四達之功耳薏苡仁本經上品凡濕則重礙燥則輕潑氣味甘微寒無毒主治主筋急拘攣不可屈伸久風濕痹下氣久服輕身益氣核曰出真定及平澤田野間所在亦有今用梁漢者但氣劣於真定耳交趾者最良彼土呼為竿珠三月宿根自發高四五尺葉如初生芭茅五月抽莖開紅白花五六月結實重纍殼青緑堅薄而鋭中仁如珠味甘美咬著黏齒可以作粥釀酒一種形圓殼厚者即菩提子一種大而無味者即粳𧆐也修治每一兩以糯米二兩同拌炒熟去糯米更以鹽湯煮片刻曬乾用繆仲淳先生云久服可以輕身者濕去則脾胃安脾胃安則中焦治中焦治則能營養乎四肢通利乎血脈經膜矣參曰薏諧意意者脾藏之神用故主脾藏失用致肝木萎厥遂成筋急拘攣不可屈伸耳即經所謂有傷於筋欲以吾意縱之屈伸其若不容及土失留礙致己所不勝之風吸引同類之濕相合而成痹閉不通者仁唯解孚下行生氣而甲拆之似與乙木之軸軋而上行者不可同日而語矣土具體無用吐生草木以為用也顧草木之條達正顯地土之為用耳地膚子本經上品地性堅固膚居肌表氣味苦寒無毒主治主膀胱熱利小便補中益精氣久服耳目聰明輕身耐老核曰出荊州平澤及田野間近道亦有初生薄地五六寸一科數十枝蓬起蔓延弱不勝舉根亦如蒿莖葉皆青宛如荊芥三月開淡黃花結子青白色極繁盛似頭眠蠶沙狀子落莖老可以為拂故一名落帚獨帚王帚王彗掃帚地葵地麥白地草涎地衣鴨舌草千心妓女其苗葉燒灰煎霜制砒石粉霜水銀硫黃硇砂先人題藥云地膚子一干數十枝攢簇直上其子繁多星之精也其味苦寒得太陽寒水氣化蓋太陽之氣上及九天下徹九泉外彌膚腠故地膚之功上治頭而聰耳明目下入膀胱而利水去疝外去皮膚熱氣而令潤澤服之病去必小水通長為外徵也參曰蔓延敷布弱不勝舉因名地膚主治功力真能使吾身生氣敷布在表有宣義有開義當入太陽太陽為開故也氣味苦寒亦得太陽寒水之化故可對待太陽陽象之標則凡以熱為本者莫不相宜膀胱太陽經也標盛則熱與得寒水之化者逆治之熱謝而小便澄徹矣補中者中補乃能敷布益精氣者益精乃能化氣蓋膀胱者州都之官津液藏焉氣化則能出矣聰明耳目輕身耐老者以開展則竅通竅通則充實光輝矣藍實本經上品氣味苦寒無毒主治主解諸毒殺蠱蚑疰鬼螫毒久服頭不白輕身核曰生河內平澤處亦有蔬圃作畦子種者凡五種唯藍實專取蓼藍蓼藍葉如蓼三月生苗五月開花成穗淡紅色花實皆如蓼歲可三刈故先王仲夏令民無刈藍以染鄭玄雲恐傷長養之氣也一種松藍葉如白菘一種馬藍葉如苦蕒即郭璞所謂大葉冬藍俗稱板藍者是也花實並如蓼藍唯苗葉別異一種吳藍長莖如蒿而花白吳人種之一種木藍長莖如決明高者三四尺分枝布葉葉如槐葉七月開淡紅花結角長寸許纍纍如小豆角子如馬蹄決明而微小迥與諸藍不同而作澱則一也別有一種甘藍可作蔬食而藍澱者掘地埋缸以藍水浸一宿入石灰頻攪萬餘下澄清去水則色青成澱亦可干收用染青碧其攪掠浮沫掠出陰乾者謂之靛花即市賣之青黛也此屬石灰造作而成慎勿輕用世人以其色青為入肝清解之藥謬甚矣真青黛出波斯國既不可得不如用藍實或藍葉或自然汁之無間雜者良博議云藍實久服頭不白蓋春氣在頭用其色以助春氣之生自然益頭並及發矣肝主色自入為青則凡病變於色者極為允當如痘如丹如斑如血如五色痢如目赤目黃如五臟熱先見顏與頰者力可巽入乎肝剋制乎脾為平熱之輕劑也觀斑蜘蛛應聲蟲噎膈蟲三案亦奇異矣每見種藍人日日掃蟲不掃即盡食之此生蟲之物反殺蟲者何正巽以入之之義耳蓋人飲食之隨氣機變化如大火聚投之自無噍類藍入胃是蟲之食也則蟲自翕聚藍隨氣機變化而蟲亦隨之一入氣機便無回避慎哉順境之好當著眼也參曰藍者生也象萬物生時之色也釀之成澱色成勝母青出藍而青於藍者也肝主色肝色青當入肝為肝之的藥亦可為肝之腎藥以多汁而氣寒也亦可為肝之心藥以味苦而性通徹也以色以味及性與氣鹹得東南巽木之作用而能潔齊萬物者也四時可植一歲三刈則生陽偏勝而周甲唯春故藍從監監者監觀四方者也蟲蚑疰鬼皆殺厲所鍾死陰不潔之屬藍能巽以入之而與物為春則殺厲之氣齊潔暖然似春仁之青出矣久服則肝榮肝榮則發華動搖舒轉皆得所欲藍靛青黛總屬分身不若藍實之包含真無盡藏也巽主入其性情也潔齊萬物其功力也潔可作潔亦可作滌除清洗之潔凡濕穢則蟲生潔則淨盡耳木香本經上品氣味辛溫無毒主治主邪氣闢毒疫溫鬼強志主淋露久服不夢寤魘寐核曰木香草類也出天竺及崑崙南番諸國今惟廣州舶上來廣州一種類木類藤似是而非滁鬼海州一種是馬兜鈴根市肆以此相混不可不慎也三洞珠囊云五香者木香也一株五根一莖五枝一枝五葉葉間五節故名五香燒之上徹九天也根形如枯骨而味苦辛黏牙者為良凡修事入理氣藥只生用不可見火欲實大腸麵裹煨熟用繆仲淳先生云稟木火之陽具土大之精清明開發行藥之神先人云上為木象徹具春宣參曰木香香草也名木者當入肝故色香氣味各具角木用亦入脾故根枝節葉亦各具宮土數入脾則奪土鬱入肝則達木鬱經云木鬱則達之土鬱則奪之奪土即所以達木達木即所以奪土土以木為用木以土為基也邪氣毒疫溫鬼淋露夢寤魘寐致郁土鬱木者咸可達之奪之強志者即強木土之用得以行其志耳土大具體無用吐生草木以為用也木以土為基又超出體用之外以言能生之源王不留行本經上品氣味苦平無毒主治主金瘡止血逐痛出刺除風痹內寒止心煩鼻衄癰疽惡瘡瘻瘡婦人難産久服輕身耐老增壽核曰江浙並河東皆有苗莖俱青高七八寸葉隨莖生似松藍葉四月開花黃紫色或紅白色實殼若酸漿子大如黍粟形圓色黑根黃如薺三月收苗五月摘子根苗花子通用修治拌濕蒸之從巳至未漿水浸一宿焙乾用先人題藥云命名之義亦奇吾身有王所以主吾身之氣血及主氣血之留行者氣血之留王不留則留者行矣氣血之行王不行則行者留矣顧血出不止與難産無乳者兩可用此其義自見參曰王不留行即金盞銀臺禁宮花也先人題藥以留行兩字分句讀之主治功力真可迎刃而解但核圖説以備參考黃連本經上品太陽獨為上下內外主氣味苦寒無毒主治主熱氣目痛眥傷泣出明目腸癖腹痛下痢婦人陰中腫痛久服令人不忘核曰漢取蜀産唐取澧州今取雅州眉州者為良苗似茶叢生高尺許一莖三葉花黃色凌冬不凋有二種一種根粗無毛有連珠形如鷹爪質堅實色深黃一種無珠多毛中虛色淡黃各有所宜也凡使以布拭去肉及毛漿水中浸二伏時漉出柳火焙乾用忌豬肉惡冷水先人云苦寒凌冬寒水之象有節色黃中土之制判為心之用藥也又云熱氣上炎即以炎上作苦之品巽以入之變易其性以致和平參曰黃取其色連象其形凌冬不凋氣寒味苦合得太陽寒水化氣假此黃土以為堤防不特默化其侮反侮其侮以為用神方隨機應變絶無內顧之虞炎上作苦苦性走下匹休太陽上及九天下徹九泉外彌膚腠內達五中故連可上治頭目下及陰中外療瘡瘍內主腸胃久服則遠於熱煩而安於寧謐故令人不忘皆以火熱為本氣火熱為標見火熱為化氣者也葵子本經上品非不返顧其根足徵衛足之知矣氣味甘寒滑無毒主治主五臟六腑寒熱羸瘦五癃利小便久服堅骨長肌肉輕身延年核曰生少室山中今郊野園圃不拘肥瘠地都有四時可以子種宿根亦再發秋深布子覆養經冬者曰冬葵入藥最良內經云脾之菜也爾雅翼云秋菜未生種此以相接也又云葵為百菜主味尤甘滑故為馬踐漆室女知憂及國公儀休相魯慍而拔之不欲奪園夫之利也其子雖經年不浥微炒令滭炸散著濕地遍踏之朝種暮生遠不過宿實如指頂皮薄而扁實內子輕虛如榆莢仁埤雅云冬種者有雪弗令從風飛去言體輕也每雪輒一勞之令地保澤葉不受蟲掐必待露解收必待霜降晚則黃爛早則黑澀其莖挺生莖疏葉密傾向太陽而衛足孔子曰禾生垂穗向根不忘本也又云鮑莊子知不如葵葵猶能衛其足蓋禾之向根仁也葵之衛足知也仁以守之知以揆之故葵揆也其萼翠其花豔花具五色間色單瓣千瓣王禎農書云本豐耐旱可防荒儉以作菹臘枯枿可以榜族根子又能療疾咸無遺棄誠蔬茹之要品民生之資益也種類亦多有露葵兔葵黃葵錦葵蜀葵入藥者只宜蜀葵今市肆一種充冬葵者氣味濁惡色深褐質沉重形如橘核服之令人腸滑別録指此為冬葵又出蜀葵一條似與爾雅不相符合當判蜀葵子即本經葵子用之頗驗每用市肆偽充冬葵子不唯反澀且損脾傷胃也先人云寒熱欲通而不藏致肌肉羸瘦五癃欲藏而不通致水道閉塞葵性滑養竅能使藏者通返顧衛根能使通者藏蓋滑為水骨故可堅骨骨堅則肌肉長形全則輕身延年矣又云葵具五色有多種冬茂者曰冬葵猶芥之有冬芥春芥為脾之菜腎之藥也字從癸從冬皆屬於腎其子易生用治胎産自然入神功主助精益水輸水溺道非不返顧其根也察通關格之專藏止消中之多溺可想見矣若病屬久藏而發者如淋如帶如痘疹如死胎如丹石毒如消渴如癰腫沒頭如腸癰胃疽如肉錐怪證皆有奇徵第有風疾宿病天行病後曾被犬傷者忌之世人但知能發宿疾不知不許人有久藏患害為他日卒中之虞耳參曰葵歸也揆也揆度生氣之歸揆度生機之出也味甘氣寒體滑易生遂含土劣水勢抽為草木以孕發陳之兆故主腑臟寧謐之地為寒熱所侵以致羸瘦州都之所為五邪所薄以致五癃此不當于歸所當揆度以出者也骨堅便利通淋之徵肌長身輕主羸之驗也揆度生氣之歸即能使通者藏揆度生機之出即能使藏者通但之歸之出屬氣機欲通反藏欲藏反通屬病機耳龍膽本經上品氣味苦澀大寒無毒主治主骨間寒熱驚癇邪氣續絶傷定五臟殺蠱毒核曰處處有之吳興者為勝宿根黃白直下抽根一二十條類牛膝而短直上生苗高尺余類嫩蒜而細七月開花類牽牛作鈴鐸狀莖類竹枝冬後結子莖便焦枯一種味極苦澀經冬不凋名石龍膽類同而種別修治取陰乾者銅刀切去須土頭了銼細甘草湯浸一宿漉出曝乾參曰細詳名義合甲膽之體用宜入肝之府少陽之樞藥也其氣寒逆治熱為本陽為標相火為化者也其味苦苦曰炎上苦性走下苦能入骨故主骨間寒熱及驚則氣上癇則氣下不循樞象者也續絶傷者膽主解孚拆甲故也定五臟者五臟取決於膽決而後能定也蠱者死陰之屬膽者生陽之屬生陽之側豈容死陰久據乎哉合龍膽生成的是少陽樞藥為少陽之對待法少陽化氣屬相火龍膽氣味俱苦寒故也龍陽物也呵氣成云既能變水又能變火埤雅云龍火得濕則焰得水則燔以人火逐之則息故人之相火似之此以龍名而兼取膽味龍火之炎上如甲拆之尺木能升於天不專主降又能療目之火眚也景天本經上品具高明之象秉寒水之化令氣味苦平無毒主治主大熱火瘡身熱煩邪惡氣花主女人漏下赤白輕身明目核曰景天一名慎火戒火即火丹草也出太山山谷今南北皆有種置簷屋云可闢火春生苗高一二尺莖色黃赤質極脆弱折之有汁葉色淡緑似馬齒莧光澤柔厚作層而上夏開碎花紅白結實如連翹而小中有黑子如粟粒秋後莖枯明年宿根再發參曰性喜高顯因名景天置之簷屋順其性爾炎上作苦苦性走下火熱為本者相宜火空則發寒熱溫涼則逆也漏下赤白熱傷血分者方中肯綮乾漆本經上品氣味辛溫無毒主治主絶傷補中續筋骨填髓腦安五臟五緩六急風寒濕痹生漆去長蟲久服輕身耐老核曰出漢中金州梁州者最善益州廣州浙中者次之木高數丈干如柿葉如椿花如槐實如牛奈子五六月刻取汁液干之即曰乾漆狀如蜂房孔孔間隔但性急易燥熱則難乾無風陰潤雖嚴寒亦易燥否則不堪入藥修治搗碎炒熟不爾損人腸胃半夏為之使畏雞卵忌油脂得蟹則化而成水參曰夏三月漆液始足當入心以色朱明而性燥急半夏為使可知矣干之當入腎以色玄英而喜陰潤蟹化成水可知矣入腎為腎之心藥入心為心之腎藥補中者補中焦血液血液皆繇中焦變化所成也心主血腎主液故爾則凡血液燥涸致筋脈緩急斷傷及髓腦不滿五臟不安痹閉不通罔不有功而接續填滿奠安周痹皆克成血液之濡潤流通者生漆去長蟲以其入心則得心君火大之令如大火聚長蟲自無噍類矣水瀉欲流之謂漆即具水之體火之用矣
