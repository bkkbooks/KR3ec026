body:
  text: 紫石英本經上品氣味甘溫無毒主治主心腹咳逆邪氣補不足女子風寒在子宮絕孕十年無子久服溫中輕身延年核曰出太山山谷嶺表錄異云瀧州山中多紫石英其色淡紫其質瑩徹隨其小大皆具五稜兩頭如箭鏃比之白石英其力倍矣太平御覽云自大峴至太山皆出紫石英太山者甚環瑋平氏陽山縣者色深特好烏程縣北壟山者甚光明但小而黑東莞縣爆山者舊以貢獻江夏礬山亦有永嘉固陶村小山者芒角甚佳但小薄耳必以五稜如削紫色達頭如樗蒲者乃良修治火煅醋淬凡七遍研末水飛三四次曬乾入藥長石為之使畏扁青附子惡鮀甲黃連麥句姜得茯苓人參療心中結氣得天雄菖蒲療霍亂過服紫石英設乍寒乍熱者飲酒遂解先人云溫潤如玉則心光可通餌服者無妄躁獲益當無量矣叅曰赤黑相間曰紫坎離交會之色也石乃山骨英乃石華艮山為體震動為用故主體用不足致邪入心腹作咳作逆者正離失虛中坎失剛中耳若風寒在子宮絕孕無子十年弗克攻者藉坎離交會則體用雙彰十年乃字矣久服溫中輕身互坎填離之驗也虛中剛中正陰陽互根之妙礬石本經上品氣味酸寒無毒主治主寒熱泄痢白沃陰蝕惡瘡目痛堅骨齒煉餌服之輕身不老增壽核曰出河西山谷及隴西武都石門吳中益州晉州青州慈州無為州諸處頌云初生皆石燒碎煎煉乃成礬也凡五種其色各異白礬黃礬綠礬黑礬絳礬也時珍云折而辨之不止五種白礬方士謂之白君出晉州者上青州吳中者次之潔白者為雪礬光明者為明礬亦名雲母礬文如束針狀如粉撲者為波斯白礬併入藥為良黑礬鉛礬也出晉地其狀如黑泥者為崑崙礬其狀如赤石脂有金星者為鐵礬其狀如紫石英引之成金線畫刀上即紫赤色者為波斯紫礬並不入藥餌惟丹灶及瘡家用之綠礬絳礬黃礬俱見本品條下其雜色者則有雞屎礬鴨屎礬雞毛礬粥礬皆下品亦入外丹家用也修事凡使白礬石貯瓷瓶內置於火中煅令內外通赤鉗揭起蓋旋安石蜂巢入內燒之每十兩用巢六兩燒盡為度取出放冷研粉以紙裹安五寸深土坑中一宿取用又法取光明如水晶酸咸澀味俱全者研作細粉以瓷瓶用六一泥固之候泥干入粉三升於瓶內旋入五方草及紫背天葵各取汁一鎰俟汁干蓋瓶口更泥封上下用火百斤煅之從巳至未去火取出則色如銀研如輕粉用時珍云今人煅干謂之枯礬不煅者為之生礬入服食家法用新桑合槃一具於密室淨地以火燒地令熱灑水或若流於上乃布白礬於地上以槃覆之四面用灰壅定俟一日夜其石精皆飛於槃上即掃取之更如前法凡數遍乃止名曰礬精若欲作水即以掃下礬精一斤納三年苦酒一斗中澄清之號曰礬華百日彌佳若急用之七日亦可甘草為之使惡牡蠣畏麻黃叅曰礬石具五色味本經品白為上寒酸偏勝澀其性非味也蓋弱土之氣御於白天生白礬是稟天一水轉堅金地矣故一名羽涅羽者水之音涅者水中之具土者固石顯土地堅金之體相熔則仍還水大潤濕之本性耳然則功能不唯澀去脫亦滑去著矣故泄痢白沃者澀之息肉瘡蝕者滑之若堅骨固齒明目增年及失音瘰癧痰癖淡陰之疾此以澄湛堅明為體用對待染汙晦濁為形證故也空青本經上品氣味甘酸寒無毒主治主青盲耳聾明目利九竅通血脈養精神益肝氣久服輕身延年核曰出益州山谷及越嶲山今蔚蘭宣梓諸州亦有產上饒似鐘乳石片片含紫色光彩者佳次則蜀嚴道及北代山者亦好玉洞要訣云空青受庚辛赤金之精甲乙陰靈之氣多近名泉久而含潤初從坎中出者其內有水如漿味頗甘酸經久即干如連珠金星燦燦然庚辛玉冊云多生金坎中生生不已故青為之丹有如拳大及卵形者乃得空中有漿如油出銅坑者亦佳止堪作畫又有石青楊梅青皆是一體而質有精粗點化以曾青為上空青次之楊梅青又次之但圓實如珠者不堪用也修事各隨方制酒浸醋拌制過乃可變化畏菟絲子紹隆王先生云色青法木故可入肝功能明目肝主開明於目故也然瞳子神光專司在腎空青中空有漿宛如骨中之髓且金星燦燦然象形從治特易易耳叅曰空青黃赤金礦之精粹也蓋五行金位於西黃為五金土赤為五金火也造化指南云紫陽之氣生綠青陽之氣生青空青者石綠之得道者也黃帝云青陽走上竅蓋肝竅目故益肝明目清盲並利九竅也通血脈者諸脈皆屬於目也養精神者心藏神腎藏精藉金木之交互火水之合璧也然則空青以功用詮名矣曾青本經上品氣味酸小寒無毒主治主目痛止淚出風痹利關節通九竅破症堅積聚久服輕身不老核曰出蜀中及越嶲蔚州鄂州諸山谷其山有銅曾青生其陽曾青者銅之精也色理頗類空青累累如黃連相綴又如蚯蚓屎而方稜色深如波斯青黛層層而生叩之作金聲者始真造化指南云空青多生金礦曾青多生銅礦乃石綠之得道者稟東方之正色修煉點化與三黃齊軀獨孤滔云曾青住火成膏可結澒制砂亦含金氣所生也須酒醋漬煮乃有神化若塗鐵上則色赤如銅畏菟絲子修事勿用夾砂石及有銅青者每一兩取紫背天葵甘草青芝用乾溼各一鎰細銼入瓷鍋內置青於中用東流水二鎰緩火煮五晝夜勿令水火失時取出更用東流水浴過研乳如粉用叅曰曾層也其青從實而空從空而層然則曾出於空曾為空之純粹精也曾亦可以為增矣故功力曾益其空之所不能不唯力走空竅更主利關節破症堅積聚者緣累結以為形而從治也久服則實從空空從層身輕不老耳阿膠本經上品氣味甘平無毒主治主心腹內崩勞極洒洒如瘧狀腰腹痛四肢痠疼女子下血安胎久服輕身益氣核曰東阿井在山東兗州府陽穀縣東北六十里即古之東阿縣也水經注云東阿井大如輪深六七丈水性下趨質清且重歲常煮膠以貢煮法必取烏驢皮刮淨去毛急流水中浸七日入瓷鍋內漸增阿井水煮三日夜則皮化濾清再煮稠貯盆中乃集爾冬月易干其色深綠且明燥輕脆味淡而甘亦須陳久方堪入藥設用牛皮及黃膠並雜他藥者慎不可用修治豬脂浸一夜取出柳木火上炙燥研細叅曰取義在水仍存井名膠者已成之質也一名傅致如言傅會致使會之始至也或云濟水所注蓋濟為楚隱則伏流顯則正出正出者湧出也與阿水質之清重性之下趨似不相符難考其所從來矣驢力在臚臚腹前也亦黑也皮也顧力在臚色專者黑精專者皮耳緣水性之下趨協皮革之外衛藉火力以成土化從下者上從外者內矣雖轉甘平仍含本有鹹寒故走血以主內崩此衛不將營營將安傅乎乃至形藏失其濡潤遂成藏之五勞形之六極以及四肢經隧或涸或汙酸且痛也陰不足則陽下陷陽不足則陰上乘上乘下陷故灑淅惡寒輒復發熱如瘧狀下血即血崩血濡則胎固專言心腹腰腹者驢力在臚故也經云陰者藏精而起亟陽者衛外而為固阿膠兩得之矣緣水性之下趨協皮革之外衛藉火力以成土化正所謂傅會致使會之使至也從下者上指下趨之水藉火力而上炎從外者內指外衛之皮革藉火力而內向外之合內下之從上中黃之位乎蜜蠟本經上品氣味甘微溫無毒主治主下痢濃血補中續絕傷金瘡益氣不飢耐老核曰蠟蜜脾也埤雅云其房如脾故謂之蜜脾一名蠟蜂蠟生於蜜而天下之味莫甘於蜜莫淡於蠟舊說蜂之化蜜必取匽豬之水注之蠟房而後蜜成故謂之蠟蠟者蜜之蹠也修事取蜜後緩火煉化濾入水中其色黃俗名黃蠟更用水煮化以好綿紙折作數層入冷水中蘸濕遂貼蠟上一吸即起仍投冷水中有蠟凝紙上者即剝取之再吸再剝以盡為度鋪竹扁內日中暴之干則頻灑以水久之則色白如練因名白蠟非新白而久黃也與蟲造白蠟不同類惡芫花齊蛤叅曰蜜密也蠟合也蠟為蜜房合密以成醞釀者也味甘氣溫居中色黃對治胃不合密遂痢膿血更續金瘡之不合密肉理肌膚胃府之所司爾益氣者益胃土之氣補中者補中央之胃中央合密故不飢耐老蠟為蜜脾裨助百芳以化蜜也蜜甘而蠟淡非厚彼而薄此猶夫瓜甜而蒂苦所以見中樞之別於本末內外也月令定五行作五味歸五藏素問另出淡味為五味本凡形藏不足者各以其味以補之傾頹者專以淡味以維之本經判味曰甘此指著舌時猶有蜜味在嚼之蜜味去真味現矣淡不厭質可久不飢耐老者以此桑螵蛸本經上品出世人不肯作此用世人亦無暇及此氣味鹹甘平無毒主治主傷中疝瘕陰痿益精生子女子血閉腰痛通五淋利小便水道核曰桑螵蛸螳螂子也深秋乳子作房黏著桑枝上者入藥用房長寸許大如拇指重重有隔房每房有子如蛆卵芒種節後一齊都出月令有云螳螂生也螳螂驤首奮臂修頸大腹兩手四足善緣而捷以須代鼻喜食人發尤善捕蟬爾雅云不過螳螂其子螵蛸捕蟬而食執木葉以自蔽蟬將去而未飛為之一前一卻莊子云螳螂執翳而搏之得見而忘其形蓋謂是也斅云凡使勿用雜樹枝上生者名曰素螺須覓桑枝東畔生者採得去核子用沸漿水浸七次鍋中熬乾用別作修事無效也先人云房藏久遠一房百子有腎之慳得甲之體候陰之物輸精之用者也叅曰桑螵蛸即螳螂秋深產卵連綴桑枝東畔者良螵從票蛸從肖言勁疾輕舉肖類母性也月令芒種螳螂生蓋是月升陰始起殺蟲應而生焉不生是謂陰息唯捕蟬時有進退勢餘隻知進而已當入厥陰具厥陰體用者也故主厥陰隱深之境唯知厥退為疝瘕陰痿精涸血閉五淋癃約此不從升陰而起反從降陰而息者對待治之倘陰殺自強所當斂避設不知卻欲仗怒臂以當車轍恐亦不勝其任也第四帙玄參本經中品氣味苦微寒無毒主治主腹中寒熱積聚女子產乳余疾補腎氣令人明目核曰生河間川穀及冤句山陽近道亦有之二月生苗高四五尺莖方而大作節若竹色紫赤有細毛葉生枝間四四相值形似芍藥七月開花白色或茄花色形似大薊花端叢刺刺端有鉤最堅且利八月結子黑色一種莖方而細色青紫葉似脂麻對生又似槐柳尖長邊有鋸齒七月開花青碧八月結子黑褐根都科生一根五七枚生時青白干即紫黑宜三八月採修治用蒲草重重相隔入柳木甑蒸兩伏時勿犯銅鐵器餌之噎人喉喪人目惡黃耆乾薑山茱萸反藜蘆叅曰玄正子半一陽將復之時也非動非靜若顯若匿一點微芒萬鈞之力其味苦已向乎陽其氣寒未離乎陰儼似少陰之樞象參贊化育之元始具備少陰之體用者也主治功力與芍藥相似芍則端倪已破玄則醞藉幽微故主寒熱積聚之欲成堅凝閉密與產乳余疾之已出未淨補腎氣者補腎氣方萌之機兆非補腎藏欲藏之形質體用周備則精華上注故令目明冬三月此謂閉藏使志若伏若匿若有私意若已有得非水凝如石之腎氣獨沉矣又經云冬三月欲如運樞又云陰者藏精而起亟也水蘇本經中品氣味辛微溫無毒主治主下氣殺穀除飲食闢口臭去邪毒辟惡氣久服通神明輕身耐老荏子氣味辛溫無毒主治主咳逆下氣溫中補體葉主調中去臭氣別錄薺薴氣味辛溫無毒主治主冷氣泄痢生食除胸中酸水挼碎傅蟻瘻藏器核曰水蘇即紫蘇一名盧蘇處處有之喜生水旁春二月皆以子種或子著地間次年自發莖方葉圓葉端有尖邊作鋸齒肥地者葉面背俱色紫瘠地者僅背紫面青七八月開花紅紫色成穗作房結實如芥子臭香色褐碎之絞液作油甚甘美也若葉面背色白者即荏子子不甚香而葉轉辛若葉面背青白者即薺薴葉上有毛而氣臭五月採葉七月採莖九月採實各取得氣之全今市肆莖葉多霜後採取此已藁之本氣味俱失不宜用也別錄另立蘇及白蘇兩條蘇即水蘇白蘇即荏子又有魚蘇雞蘇二種魚蘇即荏子同類一名𦺗蘇狀似茵陳葉大而香吳人用煮魚食因名魚蘇雞蘇一名回回蘇莖葉俱紫葉邊鋸齒極細密葉面交紐若剪絨狀宛似雞冠因名雞蘇王禎云即水蘇之異形故主療諸疾亦相同也先人云諸蘇同一種類但有家蒔野生及色香氣味之殊故主治功力似異而同也皆宜於水質都柔潤雖色香氣味稍分厚薄而辛溫芳烈則一當以本經水蘇為正顧蘇之有荏有薺若術之有蒼有白何須另立門戶叅曰此以功用詮名水取坎剛以蕩活潑之體蘇則震虩以舒陽和之用更詳色香氣味體性生成致新推陳之宣劑輕劑也故主氣下者可使之宣發氣上者可使之宣攝並可開發上焦宣五穀味熏膚充身澤毛若霧露之溉故谷亦殺毒亦去臭惡亦闢神明可通輕身耐老矣別錄用治吐血衄血及血崩此氣不宣發宣攝以氣如橐龠血如波瀾所謂欲治其血先調其氣若胃絡脈絕致血衄崩潰者更相宜也葉則偏於宣散莖則偏於宣通子則兼而有之而性稍緩別錄又出荏子藏器又出薺薴荏即水蘇之色白者易於入肺以肺之經氣起於中焦上隔屬肺乃能布氣四達故也薺即水蘇之色青者易於入肝以肝之經氣終於中焦中焦食氣乃能散精於肝故也如泄痢酸水正食氣不得散精於肝致氣冷痿厥遂成五飲變生種種形證耳水蘇獨為中焦主故可宣揚復可宣攝荏子獨為上焦主為經氣之始薺薴獨為下焦主為經氣之終而三蘇之揚攝又莫不繇中焦次第以為分屬者然水蘇樞之屬荏子開之屬薺薴闔之屬矣假蘇本經中品界域相連依真傍假呼盧應六性相近也氣味辛溫無毒主治主寒熱鼠瘻瘰癧生瘡破結聚氣下瘀血除濕疸核曰假蘇即荊芥竊似盧蘇原屬野生今為俗用遂多種蒔二月布子生苗方莖細葉似落籬而細八月開小花作穗成房房如水蘇內有細子似葶藶色黃赤連穗收用叅曰假者蘇之故名假蘇如假寒熱為鼠瘻為瘰癧假氣為結為聚假血為瘀假濕為疸假偽非真者蘇蘇震行緩散自釋矣別名疆𫈨荊芥疆畫界分荊方芥辛也言能畫疆界殊方域悉新以辛也麻黃本經中品纖細虛中宛如毛孔故可對待滿實之毛孔氣味苦溫無毒主治主中風傷寒頭痛溫瘧發表汗出去邪熱氣止咳逆上氣除寒熱破症堅積聚核曰出滎陽中牟汴京者為勝所在之處冬不積雪二月生苗纖細勁直外黃內赤中虛作節如竹四月梢頭開黃色花結實如百合瓣而緊小又似皂莢子而味甜根色紫赤有雌雄兩種雌者開花結實修治去根及節煮十多沸掠去白沫恐令人煩根節能止汗故也厚朴白薇為之使惡辛夷石葦叅曰表黃里赤中虛象離生不受雪合輔心王宣揚火令者也主治寒風溫瘧標見頭痛之標經侵淫部署之首形層之皮致毛孔滿實逆開反闔者宣火政令揚液為汗而張大之八萬四千毛孔莫不從令而去邪熱氣矣但熱非病反其本得標之病即寒風暴虐之氣使人毛孔畢直皮膚閉而為熱勁切之性仍未反乎本氣之寒也咳逆上氣者毛孔滿閉則不能布氣從開故上逆而咳症堅積聚者假氣成形則不能轉闔從開故積堅而症蓋不獨本性不遷即本氣猶未變易故仍可轉入為出易冬為春否則妄汗亡液敗亂心王矣葛根本經中品合葛根石膏麻黃三種則知仲景處方大局仲景為立方祖三種為諸方始也氣味甘辛平無毒主治主消渴身大熱嘔吐諸痹起陰氣解諸毒核曰鹿食九草此其一也出閩廣江浙所在有之有野生有家種春生苗引藤延蔓長二三丈取治絺綌各以地土之宜以別精粗美惡耳葉有三尖似楓葉而長色青翠七月開花成穗累累相綴紫粉色似豌豆花結實似小黃豆莢上有毛莢中之子綠色而扁似鹽梅核生嚼腥氣即本經所謂葛谷也根大如臂外紫內白長八九尺以入土最深者良五月五日採根曝乾殺野葛巴豆百藥毒先人云外陽內陰有三陰漸長化炎熱為清涼之象叅曰讀本經主治合仲景葛根湯法此從陽明中治之氣化藥也謂陽明之上燥化主之不從本氣之四氣標陽之二陽從乎中見太陰之濕化者如消渴身大熱及闔逆或熱逆之嘔吐與邪郁或熱鬱之諸毒此正中見之陰氣勿起致令陽明之上燥涸殆甚葛藤延蔓顯明葛根陰潤在中具備陽明上中下之全體者無出其右故能從乎中治以撤諸痹痹撤則中見上下各各從令此以化合化亦以化逆化也假以治本偏於風盛以風木必動脾土之濕化使脾土運行風斯息矣亦不必另配甲己方始化合亦不必轉生子金以復母仇即本有辛味可作甲兼甘可作己濕化亦己形似肌腠亦己也白色可作金味辛亦金腥臭亦金藤絡堅勁亦金也假以治標偏於二陽二陽即陽明也論部署己深入首太陽之次陽明論形層己深入一膚二皮之肌分若邪停太陽之部署亦必太陽之陽明若邪停太陽之形層亦必太陽之肌分即正陽陽明亦屬外證延蔓之邪非內證堅凝之實但體性陰潤或寒本濕本主氣及寒化標陰專令者所當避忌或邪在部署之首而非風木本盛或邪在形層之膚未成轉熱之勢未有不致寇至者世人不但目為輕淺且以之從治嚴寒恐非所宜也本經痹字與風寒濕相合之痹不同如消渴身熱嘔吐及陰氣不起與諸毒皆痹也故云諸痹顯明即陽明在中即中見化合化者中見之濕化在上之燥化也竹葉本經中品屍錄貞五年禹有海犯盜禁罪羅浮入至十三嶺巨竹百圍二一尺二十九長二丈海戶因破之為筏後獻於刺史李復陸可為圖而記之觀其節候則策數刻定無盈虧青白之交曰茹可稱部署之少陽分形層之層脅所通中有節界節似經顧如環無端者奇之八偶之十二可默會矣合天之文併合地之理矣陰陽者數之可十推之可百數之可千推之可萬天地之陰陽不以數推以象之謂也每見種竹人三歲者盡刪之並鋤前根之老夙者此唯更歷六期之半超出一元之外氣味苦平無毒主治主咳逆上氣血溢筋急惡瘍殺小蟲根作湯益氣止渴補虛下氣實通神明輕身益氣核曰土中苞筍各以時出旬日落籜成竹也莖有節節有枝枝有節節有葉葉必三之枝必兩之枝下之枝一為雄二為雌雌者孕筍成竹根鞭喜行東南六十年一花花實則枯枯曰䈙實曰𥳇小曰筱大曰簜按戴凱之竹譜云植物之中有名曰竹不剛不柔非草非木小異實虛大同節目蓋種類六十有一焉今略考之亦不止此曰籦籠竹黃帝使伶倫伐之於崑崙之墟吹以應律者曰員丘帝俊竹節可為船曰𥶽竹薄肌而勁曰篁竹堅而促節曰棘竹生交州諸郡叢生有十數莖大者二尺圍肉至厚實中夷人破以為弓其筍食之落人鬚髮一名笆竹曰箄竹大者如腓虛細長爽南人取其筍未及竹者灰煮續以為布曰弓竹出東垂諸山中長數十丈既長且軟不能自立薛翊異物志云斑駁如玳瑁曰蘇麻竹一名沙麻竹長數丈葉大如履竹中可愛者可以為弓五嶺左右遍有之曰箖箊竹葉薄而廣吳都賦所謂竹則篔簹箖箊即越女試劍竹是也桃枝是其中最細者曰𥳍竹生崑崙之北南嶽之山長千丈斷節為大船曰般腸竹生東郡緣海諸山中其形未詳曰服傷竹大者五六寸其中實滿曰挲摩竹桂廣皆植大若茶碗竹厚而空小一人正擎一竿見嶺表錄曰箸竹長三丈許圍數寸至堅利土人以為矛可作彈弓弦其筍未成竹時堪為糾又名史葉竹又名篻竹曰百葉竹生南垂界甚有毒傷人必死一枝百葉因為名一名篣竹曰繇𥶽竹為物叢生見吳郡賦曰𥲊竹一豐二種至似苦竹而細軟肌薄曰蓋竹亦大肌薄色白生江南深谷山曰簡簣竹竹節疏而筍可食曰𥱈筒竹見吳都賦筍可食曰雞脛竹似脛大者不過如指疏葉黃皮曰籚竹似蘆出揚州東垂肌理勻淨可以為篪曰箭竹高者不過一丈節間三尺堅勁中矢箘簵二竹亦皆中矢篃竹一尺數節葉大如扇俗謂之䈲笴可以作篷亦可作矢彗筱竹中帚細竹若箭竹可作箭莽竹疏節鄰竹堅中簢竹中空仲竹無笐俱見爾雅種龍竹樆竹見廣志桃枝竹皮滑而黃可以為席䈏竹實厚脆孔小幾於實中安成以南有之又桃竹江心磻石上出可為杖竹譜云竹皆中空此竹獨實如木利竹蔓生若藤實中而堅韌漢竹大者一節受一斛小者受數斗菡墜竹大如腳指筍皮未落往往有細蟲齧之籜隕成赤文似繡畫可愛木竹出靈隱山中堅亦通節脈菰𥬲竹生於海南內實外澤晉竹吳王賜越見吳越春秋永嘉大羅山有龍牙竹其竹長四五尺稀節人取必有大風雨雷電人下山則止齊民要術𥭕竹筍無味杜臺卿淮賦有檳榔竹身毒國出笻竹可為杖一名狹竹張騫西至大宛所得見漢書一名芀竹廣志新州石城陝隘宋紹興中州守黃濟植芀竹圍繞之竹有刺芒棘華然一豚不能入澀勒竹有芒可以銼爪見老學庵筆記繇梧竹長三四丈圍一尺八九寸可作屋柱出交阯見南方草木狀葺竹頭有文文見字林狗竹毛在竹間見臨海異物志無筋竹色如黃金堅貞疏節出嶺南見竺法真羅山疏石麻竹勁利可為刀見裴淵廣州記苞竹堪作布見顧微廣州記實心竹文彩斑駁可為器物又垂絲竹枝弱下垂見雲南記咸都有對青竹黃而溝青浙亦有之惟會稽頗多呼為黃金間碧玉竹見養疴漫志護居竹見無錫縣誌氵僕竹如苦竹長節而薄可作屋椽𥲑竹青皮內白如雪軟軔可為索三稜竹狀若棕櫚葉莖柄三脊射竹可為箭峽州玉泉鬼谷子洞前竹竹葉有文成符葉葉不同佩之可以避患見宋陳日華瑣碎錄有匾竹出廬山釋惠遠能役使鬼神善闢蛇行者嘗持此竹筍出亦匾建安篔簹竹一名簞竹節中有人長尺許頭足皆具大者中甑筍亦中射見異苑雷州有電斑竹見地理志相迷竹內空生黃堪作丸鏞竹內空容三升米亦生黃俱出廣州新婦竹出武林竹圓直可作篦高潘州有疏節竹五六尺一節通志竹之良者有䈽竹又溱州通竹直上無節空心見北戶錄桂陽縣出筌竹大者圍二尺又交趾有篥竹實中有毒以刺虎中之則死見山海經注辰州有龍絲竹高盈尺細如針江湖中一種野竹其葉糾結如蟲狀名蝦蛸竹見語異錄當塗縣慈姥山有簫管竹圓致異於他處篁堅而促節皮白如霜粉蜀嘉定產月竹每月生筍漢陽出楓箤竹南方草木狀扶南有云母竹一節為船山海經舜林竹一節可為船羅陽竹若芭蕉黎母竹每丈一節臨賀竹其大十抱人面竹有節一覆一仰如畫人面廣西出雪竹斑極大紅而有暈蜀涪州有相思竹對抽並胤𥯨簩竹異物志南方思勞國所產可礪指甲李商隱射魚曲𥯨簩弩箭磨青石繡額蠻渠三虎力字又作澀勒東坡詩倦看澀勒暗蠻村合歡竹出南嶽下渚州安思縣多苦竹有青白紫黃四色浙中有天親竹末皆兩岐成都府彭縣大隋山生竹若龍頭俗呼龍頭竹九嶷山有雙梢竹初生枝葉即分兩梢亦名合歡竹荻蘆竹冬天不凋其竹似蘆荻鶴膝竹節下大小似苦竹閩中人呼為槌竹石兊竹生閩中竹似石竹而小古散竹節似馬鞭葉似桐樹而小皮似棕櫚箖竹出襄州臥龍山諸葛亮祠中長百尺只梢上有葉雪峰語錄雪峰為剎與經蔣諸山相甲乙岡巒百里間有奯竹玄倭國有篠干竹少室山有爨器竹又繇廣志永昌有漢竹圍三尺余大者一節受一斛神異經南方荒中有𥫴竹長百丈圍二丈五六尺厚八九寸可以為船有篩竹一名太極竹可以為船占城國出觀音竹如藤長丈八尺許色黑如鐵會稽縣有公孫竹高不盈尺越州產越王竹狀若荻枝可代酒籌次有沙箸竹欲採者輕步從之聞人聲則縮入沙中羅浮山有龍公竹大徑七尺常有鳳凰棲宿增城縣倪山產娑羅竹圍三四尺性堅可為弓篷山有浮筠竹葉青梧竹可作屋柱奉化新嶺山生竹高僅五寸葉皆白色清江縣瑞筠山有竹色如爛銀齊民要術蕪竹黑皮竹汗有文莖紫子如大珠郭璞云桂竹出始興小桂縣上合防露下疏來風每日出羅紈金翠望若花開山經雲山有桂竹甚毒傷人必死一曰狀如甘竹而皮赤方竹見寧波志葛仙植於定海靈峰者益部方物志有方竹贊筍譜方竹出澧州西遊川鐵冶辰山之陽北戶錄澄州產方竹體如削成勁挺堪為杖隔州亦出大者數丈又黑竹出西山長二尺許如指大純墨色葉玄碧見文太史墨竹銘蘄水縣鳳棲山下有王羲之洗筆池崖邊小竹俱成墨色筍譜道州瀧中多丹竹每節一丈或八尺莖不大嫋嫋搖空粉節上似有丹色竹譜宜都縣飛魚口有紅竹大者不過寸許鮮明可愛黔陽縣亦竹岡岡壟糾盤叢生赤竹云窗雜誌凝波竹出區吳山紫枝綠葉花如石榴實如蓮子服之體輕趙飛燕舞於掌上服此實也暘谷漫錄張堂云同邑安福西鄉周俊叔家有十二時竹繞節凸生子醜寅卯十二辰字點畫可數清異錄荊南判官劉或棄官秦隴篋中收大竹十餘顆每有客則斫取少許煎飲共辛香如雞舌人堅叩其名謂之丁香竹非中國所產也睽車志紹興中四明有鉅商泛海阻風抵一山下因攀躡而登絕頂有梵宮焉窗外竹數個枝葉如丹商堅求一二竿截之為杖每以刀鍥削輒隨刃有光心異之至一國有老叟曰君親至補陀落伽山此觀音坐後旃檀林紫竹也商驚悔取削棄余札寶藏之有久病無藥可愈者煎湯飲之即愈又有似竹而異名者曰楝曰棕蓋別類也品類雖繁入藥宜用䈽竹次用淡苦二種又有一種薄殼者曰甘竹其葉最良先人博議云易生易長虛中有節性質疏暢映芘幽獨歲寒不凋春滎自若真隱君子真林下友又云秋深引根冬半孕筍然以偶生略分先後發也春分出十成竹枝必偶葉必三空中直上具木中有火之象故筍可發瘡瀝通經脈茹主嘔噦葉清煩熱皆透達木火之所不及者也又云去外皮一重取青白之交曰茹此竹氣通上徹下透表及里之所用之可通上下而使氣清達表裡而不致驟急者也又云直達中空抽水土之力迅捷瀝即竹中之水顧理文如腠而界節似經則通中之節固非往而不返者矣如病久渴即節而不通心煩為通而不節竹瀝之力通節交互故渴可解而煩可息但竹瀝行中有節直達之力居多須佐以薑汁便可橫遍且得盡木火之體用也叅曰竹者物之有筋節者也故筋節字皆從竹又竹從兩個枝必二葉必三即火二木三之象也性喜東南故九河鮮有以卦推之爾雅翼云巽為竹易系云震為篬筤竹𥫴筤幼竹也可見方以類聚矣莖有節節有枝枝必三枝復有節若三候成節也故主候失符節致令氣逆氣溢或若霜露不下則菀藁不榮致令筋急焦渴也實通神明輕身益氣者竹六十歲始華窮歷支幹變化故也客曰吾見竹葉一歲成二歲茂三歲密至四歲則細五歲疏六歲瘁矣未見有至六十歲而華者頤曰古人蓋指疏理得宜根歷一元而言不但舉一莖之榮枯已也客曰竹節生時已具安見其與四時合耶頤曰冬半而孕春半而生夏半而代葉秋半而引根四氣歷然非獨以出土之時為生也述異記云衛有淇園出竹在淇水之上埤雅傳云淇園箘簬下淇園之竹以為𣓉伐淇園之竹以為矢淇園殷紂竹箭園也蓋淇之產竹土地所宜故風人以此美衛武之德也謝莊云直而不介弱而不虧香裊人圃簫瑟云岩推名楚潭美質良池江逌云有嘉生之美竹挺純姿於自然含虛中而象道體圓質而儀天托宗爽㨟列族圃田劉寬夫云堅可以配松柏勁可以凌霜雪密可以泊晴煙疏可以漏梢月嬋娟可玩勁拔不回擅孌風生韻合宮徵白居易云竹似腎何哉竹本固固以樹德君子見其本則思善建不拔者竹性直直以立身君子見其性則思中立不倚者竹性空空以體道君子見其思則思應用虛受者竹節貞貞以立志君子見其節則思砥礪名行夷險一致者夫如是故君子多樹之為庭實焉竹植物也於人何有哉以其有似於賢而人猶愛惜之封植之竹其真賢者乎然則竹之於草木猶賢之於眾庶竹不能自異惟人異之賢不能自異惟用賢者異之故作記以聞於今日用賢者云陽明子云竹有君子之道四焉中虛而靜通而有間有君子之德外節而直貫四時而葉無所改有君子之操應蟄而出遇伏而隱雨雪晦明無所不宜有君子之時清風時至玉磬珊然中採齊而協肆夏揖遜俯仰若洙泗群賢之交集風止籟靜挺然獨立不撓不屈恍虞廷群后端冕正笏而列於堂陛之側有君子之容竹有是四者而以君子名不愧於其名桃核仁本經中品無味苦平無毒主治主瘀血血閉癥瘕邪氣殺小蟲花殺疰惡鬼令人好顏色桃梟氣微溫主殺百鬼精物桃毛主破血閉下血瘕寒熱積聚無子帶下諸疾蠹辟邪惡不祥核曰桃品甚多華豔稱最不培而蕃且早結實世遂以凡品目之然有黃者絳色垂絲者龍鱗者餅子者牡丹者亦凡中之異矣若漢上林苑之緗桃紫紋桃金城桃霜桃嘗山所獻巨核桃凌霜花灼後暑實蕡是又仙凡迥別不可得也惟山中毛桃即爾雅所謂褫桃者小而多毛其仁充滿多脂可入藥用修事去皮用白朮烏豆於坩鍋中煮二伏時漉出劈開中心黃如金色乃用埤雅云桃有花之盛者其性早花又花於仲春故周南以典女之年時恰當桃生三歲即花果故首雖已白其花子之利可待也周南取少桃以興所謂桃之夭夭是也首章曰灼灼其華者言其花之紅而麗也言女以盛時而嫁也二章曰有蕡其實蕡大貌蓋桃性更七八年便老老則子細此言少桃也言非但華色又嫁而有子夫婦之道成焉三章曰其葉蓁蓁蓁蓁盛也言能成其家又以芘其所類也且桃性華葉齊生至於有蕡其實然後其葉蓁蓁蓋其序如此張正見賦曰萬株成錦千林如翼苔畫波文花然樹色發秦源而逸氣飄漢綬而芳流譬蘭缸之夜炷似明鏡之朝妝皮日休賦曰厥花伊何其美實多臺隸眾芳緣飾陽和開破嫩萼壓低柔柯其色則不淡不深若素練輕茜玉顏半酏若夫美景妍時春含曉滋密如不幹繁若無枝妦妦婉婉夭夭怡怡或俯者若想或閒者如癡或曏者若步或倚者如疲或溫香而可薰或婑媠而莫持或幽柔而傍午或扯冶而倒披或翹矣如望或凝然若思或奕偞以作態或窈窕而騁姿日將明兮似喜天將慘兮若悲近榆錢兮妝翠靨映楊柳兮顰翠眉輕紅拖裳動則裊香宛若鄭袖初見吳王夜涼皎潔閧然秀髮又若嫦娥欲奔明月蝶散蜂寂當閨脈脈又若妲己未聞裂帛或開故楚豔豔春曙又若息媯含情不語或臨金塘或交綺井又若西子浣紗見影玉露猒浥妖紅墜濕又若驪姬將譖而泣或在水濱或臨江浦又若神女見鄭交甫或臨廣筵或當高會又若韓娥將歌斂態微動輕風娑娑暖紅又若飛燕舞於掌中半沾斜吹或動或止又若文姬將賦而思丰茸旖旎互立遞倚又若麗華侍宴初醉狂風猛雨一陣紅去又若褒姒初試戎虜滿地春色階前砌側又若戚姬死於鞠域花品之中此花最異其花可以暢君之心目其實可以充君之口腹匪乎茲花他則碌碌先人云術以勸之豆以培之火以變之色黃則氣淳矣叅曰桃為肺果五木之金也金氣清肅故伏邪氣去三蟲除不祥實幹木上曰梟主殺百鬼精物以懸實木上故曰梟也莖葉毛蠹皆可去邪生陽所以異於死陰也其華令好色榮於花優於色故也埤雅云桃生三歲便放花實故周南曰夭桃蕡實也仁主下瘀血血閉癥瘕邪氣者桃肺果精專尤在仁故司肺氣為營血之師帥則留者行行者留矣故千金方以桃仁燒灰酒調服方寸匕止崩中漏下然則血之不行不濡即氣之不決不運氣如橐龠血如波瀾故也桃毛功力似勝肺主皮毛入肺更相親爾世但知主留者行不知主行者留非留行安能好色有子非行留安能去瘀逐閉然則色之不好子之無有亦即瘀閉之為咎乎杏核仁本經中品自下而上曰豎窮從內而外曰橫遍氣味甘苦溫有小毒主治主咳逆上氣雷鳴喉痹下氣產乳金瘡寒心奔豚核曰諸杏葉皆圓而端有尖二三月開淡紅色花妖嬈豔麗比桃花伯仲間亦可愛也故騷人詠物與梅並言則曰梅杏蓋取其葉之似也與桃並言則曰桃杏蓋取其花之近也有葉多者黃花者千瓣者單瓣者結實實甘而沙曰沙杏黃而酢曰梅杏青而黃曰柰杏金杏大如梨黃如橘西京雜記載蓬萊杏花五色北方有肉杏赤大而扁曰金剛拳有曰杏熟時色青白入藥宜山杏收取仁用修治以沸湯浸去皮尖每斤用白火石一斤黑豆三合以東流水同煮從巳至午漉出劈開如金色曬乾乃用得火良惡黃芩黃耆葛根畏蘘草叅曰枝葉華實皆赤肉理絡脈如營氣味苦溫誠心之果具心之體與用者仁則包蘊全體竇發端倪樞機頗銳偏心之用與氣者咳逆上氣雷鳴喉痹寒心奔豚此一唯從升不能從出正回則不轉矣杏仁竇發橫遍之機使豎窮者隨玉衡以為旋轉正神轉不回乃得其機矣咳逆上氣息若雷鳴以及喉痹謂心之火用不及亦可謂客淫外束亦可謂客淫外束致心之火用不及亦可謂心之火用不及致客淫外束亦可寒心奔豚謂心之火體不及亦可謂心之火用不及亦可謂心之火用不及致心之火體不及亦可謂心之火體不及致心之火用不及亦可蓋火爰物以顯用即用以顯體故也奔豚者腎之積上逆奔心緣火位之下水氣承之火不及則承乃亢亢則害矣與妄汗致承者不同類妄汗則出有余此則升太過下氣者轉豎窮與橫遍下非降也降則涉金非火令矣產乳固屬甲拆而解孚全仗橫遍橫遍始甲拆耳金刃成瘡此肉理斷絕絡脈不營杏以脈勝仍續其絕絡其營心主脈心主包絡故爾欲盡物性先察物情如桃為肺果肺主毛桃有毛專精於毛矣杏與心果心主脈杏有脈專精於脈矣顧精之所專即情之所鍾情之所鍾即性之所生人苦不知性耳能盡一物之性即能達萬物之情欲盡一物之性者亦若物性之精有所專靡不見性矣發髲本經中品氣味苦溫無毒主治主五癃關格不通利小便水道療小兒驚大人痙仍自還神化核曰發髲剪髢下發也梳櫛而下者乃亂髮耳修事取男子年近二十歲以上無疾患及顏貌紅白者從頂心剪下苦參水浸一宿入瓶子內用火煅赤俟冷研用一法用水煮七日夜取汁熬膏者彌佳先人云發如血脈不潰不泄原從精生又複色黑具上生之體多潤下之力故可收起亟之陰妄奔定淫畏之神飛越也叅曰腎藏精其榮在發心主血發乃血之餘也叢生陽首而復倒垂則炎上之用即潤下之體所謂陽在外陰之使也陰在內陽之守也故主陽失內守而致陽關陰失外使而致陰格與玄府閉而致州都癃交通不表而致驚與痙也本自神化之餘榮仍自還余榮為神化耳犀角本經中品氣味苦酸鹹寒無毒主治主百毒蠱疰邪毒瘴氣殺鉤吻鴆羽蛇毒除邪不迷惑魘寐久服輕身核曰出永昌山谷及益州永昌滇南也今出武陵交州寧州諸遠山黔蜀者次之海南者為上狀似水牛豬首大腹卑腳似象有三蹄前腳直而無膝依木為息木倒則僕不易起也舌有刺喜啖竹木棘及毒物飲則濁水不欲自見其影也皮孔三毛如豕有一角二角三角者一在頂上一在額上一在鼻上鼻上者食角也一名奴角小而不墮頂額者每歲一退自埋山中土人潛易之二角者鼻角長而額角短一角者有鼻無額有額無鼻鼻角者胡帽犀額角者兕犀也兕即犀之牸牸牝也牝毛色青皮堅可以為鎧又有毛犀二角即旄牛所謂牯犀又有水犀出入水中最為難得皮中有珠甲山犀無之異物志云東海水中有犀焉樂聞絲竹彼人動樂則出而聽之然犀之優劣觀角紋之粗細通塞以為差等紋如魚子形者謂之粟紋紋中有眼者謂之粟眼黑中有黃花者謂之正透黃中有黑花者謂之倒透花中復有花者謂之重透又紋有倒插者一半以下通有正插者一半以上通有腰股插者中斷不通併名通犀有通天者自下徹上咸通也又有通天犀角上有一白縷直上至端夜露不濡入藥至神驗漢書駭雞犀置米飼雞皆驚駭不敢啄置屋上烏鳥不敢集犀中最大者墮羅犀一株重七八斤云是牯犀額角其花多作撒豆斑色夜視有光者日夜明犀通神開水禽獸見之皆驚乃絕品也又有理文盤結作百物形者亦上品又有花如椒豆斑者次之烏犀純黑無花者為下品兕角理文細膩斑白分明不可入藥牯角紋大牸角紋細也修治勿用奴犀牸犀病水犀攣子犀無潤犀唯取烏黑肌皺拆裂光潤者銼屑入臼杵細研萬匝乃用李珣云凡犀角鋸成當以薄紙裹置懷中蒸燥乘熱搗之應手如粉故歸田錄云翡翠銷金人氣粉犀此亦異也松脂為之使惡雷丸雚菌忌鹽娠婦勿服能消胎氣叅曰角生頂額鼻端為腦之餘髓之餘也亦似筋余之甲血餘之發甲固宛然紋亦儼若束髮如也山海經云南方獸之美者有梁山之犀焉似得火化之正令者也飲則汙濁清之也食則毒棘消之也故曰犀利開寶紀事云闢暑犀色如玉溽暑時清氣逼人白孔六帖云闢寒犀色如金嚴寒時暖氣襲人嶺表錄異云闢塵犀佩之塵不近身杜陽編云蠲忿犀蠲去忿怒夜明犀通天分水鳥見之高飛魚見之深入百獸見之決驟種種神異凡此皆根塵之妄見為有者悉能闢除之是能一切空諸所有故能治一切實諸所無也邪鬼迷惑魘寐此吾意眚之實諸所無也瘴氣鉤吻鴆羽蛇虺百毒此物雜毒之實諸所無也治之如何曰空火實欲空者宜空之火空則發也是謂虛其實火空欲實者宜忌之火實乃能作炎上用以顯暖熱體所以存其性也自藥有賦人安苟簡曰解乎心熱並不審病情之欲實欲空而概投之雖無實實之虞寧免虛虛之患犀角居上而尖峻確具火象然附於坤牛純土之體是子反生母子氣歸藏而不露故苦寒而翻成北方之水故能解心熱也本屬火而化水並已之所有者能空之故凡實所無者遇之自消耳羚羊角本經上品泯形則寂至靈即惺此言生氣之能通乎天氣也二十有四其節乎七十有二其候乎氣味鹹寒無毒主治主明目益氣起陰去惡血注下闢蠱毒惡鬼不祥嘗不魘寐核曰出石城及華陰山谷今出建平宜都諸蠻山中及西域形似羊毛青而粗夜宿獨棲掛角木上以遠害也兩角者多一角者最勝其角有節蹙蹙圓繞以角灣深銳緊小有掛痕者為真修治勿用山羊角山羊角僅一邊有節節亦疏羚羊角具二十四節內有天生木胎者此角有神凡使不可單用須要不拆元對以繩縛之用鐵銼銼細重重密裹避風旋旋取用搗篩極細更研萬匝入藥免刮人腸叅曰羚羊掛角而泯形獸之至靈者也性慈而不樂鬥雖有偽鬥亦往解之因以被獲蓋不惜身以濟物者故其角至神能闢不祥主不魘寐者寂而惺也節合二十有四氣而胎木者宛如從甲而乙起陰之氣以轉生陽所以益氣也如是則惡血自除注下自上上達肝竅目眚自明闢蠱毒惡鬼者即轉生陽以闢不祥耳蚱蟬本經中品氣味鹹甘寒無毒主治主小兒驚癇夜啼癲病寒熱核曰夏月始生自蠐螬腹蜟轉相變化乘昏夜出土中拆襲殼背而出亦有蜣螂轉丸化生者形大而黑方首廣額兩翼六足其鳴以脅吸風飲露溺而不糞三十日而死也古人多食之夜以火取謂之耀蟬古人用身今人用蛻大抵臟腑經絡宜用身皮膚瘡瘍宜用蛻物各從其類也繆仲淳先生云蚱蟬稟水土之精風露之氣化而成形其鳴清響能發音聲其體輕浮能出瘡疹其味甘寒能除風熱其性善蛻能脫翳障及女子生子不下也叅曰蚱蟬即夏至始鳴之蜩也論衡曰蠐螬背行化為蝮蜟蝮蜟者育於蝮蝮蜟背拆轉為玄蟬化為離應舍卑穢而趨高潔者也淮南子云無口而鳴其鳴以脅飲而不食以息飲也三十日乃化蓋自背而腹自行而拆此從督及任循任會督之象也三十日乃化者如衛氣日下一節二十一日而終督上行九日而終任則周月之化如周月之蒸蒸則變變則化矣無口不食者此亦轉督與任之道歟故主小兒不能從蒸及變內逆而為驚癇癲疾寒熱與不鳴於晝反啼於夜者皆厥藏番陰之證也亦有轉丸背拆化為玄蟬運轉任督以及蒸變義更明顯蛻主生子不下亦取解甲變化之易耳以一微物具此至理若以大小貴賤起見者是局於知聞之褊淺觀釋氏詮蛣蜣為六即佛以其性與三世諸佛同體無有分釐增減則形中之類任督與衛行督二十一度任九度彌月環周積數余而蒸變作克肖乎人便不怪異即此可推蒸變巳周女二七男二八精氣溢瀉月事以時下之所繇然矣故古人命名立言雖極微一物亦有至理存焉如蠐螬之背行先循乎督蝮蜟之育腹專依乎任蝮蜟背拆化為玄蟬復循任會督其如環無端之象轉展化育始全蒸變之全局耳水萍本經中品予獨不喜其勝酒恐長安少卻人瑞萍氏掌國水禁使之稽酒謹酒不許百姓沉溺並不許本官沉溺萍性勝酒稽謹乎沉溺乎別錄以之治風命名追風使氣味辛寒無毒主治主暴熱身癢下水氣勝酒長鬚發止消渴久服輕身核曰生池澤止水中季春始生楊花所化也一葉經宿即生九葉葉下微須即其根也面青背紫者入藥最良面背皆綠者不堪入藥也七月收採置竹篩內下以水映之日曬方干叅曰穀雨萍始生楊花入水乃化也樹根水上一夕九子嘗與水平故曰萍也周官萍氏掌國水禁以不沉溺取名使之稽酒謹酒也然亦水萍之性能勝酒爾蓋楊先百木青秉春升之敷和萍性善生衍秉夏出之蕃茂但以升出為用不以風火為氣者以基於水遂稟水寒之化且味專辛發藉金水之相滋誠逐風清熱解表汗出通調水道之良品也若長鬚發即水液之外榮止消渴即水氣之內周久服輕身形相類也先人評藥云輕飄浮浪風流灑人易生速計者也然得寒水之化行何患其不相繼乎牡丹本經中品氣味辛寒無毒主治主寒熱中風瘛瘲驚癇邪氣除症堅瘀血留舍腸胃安五臟美顏色療癰瘡核曰出漢中劍南及丹州延州青州越州滁州和州近以洛陽者為勝二月梗上生條葉似芍藥三月開花色狀善變其名或以姓或以州或以色或以地或旌其所異者而志之姚黃牛黃左華魏華以姓著青州丹州延州紅以州著細葉粗葉壽安潛溪緋以地著一撒紅鶴翎紅硃砂紅玉板白多葉紫甘草黃以色著獻來紅添色紅九蕊真珠鹿胎花倒暈檀心蓮花萼一百五葉底紫皆志其異者姚黃者千葉黃花出於民姚氏家姚氏居白司馬坡其地屬河陽然花不傳河陽傳洛陽洛陽亦不甚多一歲不過數朵牛黃亦千葉出於民牛氏家比姚黃差小宋真宗祀汾陰還過洛陽留宴淑景亭牛氏獻此花名遂著甘草黃單葉色如甘草洛人善別花見其樹知為某花云獨姚黃易識其葉嚼之不腥魏家花者千葉肉紅華出於魏相仁溥家始樵者於壽安山中見之斫以賣魏氏魏氏池館甚大傳者云此華初出時人有欲閱之者人稅十數錢乃得登舟渡他至花所魏氏日收十數緡其後破亡鬻其園宅今普明寺後林池乃其地僧耕之以植桑棗花傳民家甚多人有數其葉者云至七百葉錢思公有云人謂牡丹花王今姚黃真可為王而魏花乃後也鞓紅者單葉深紅花出青州亦曰青州紅故張僕射齊賢有第西京賢相坊自青州以馲駝馱其種遂傳洛中其色類腰帶鞓故謂之鞓紅獻來紅者花大多葉淺紅花張僕射罷相居洛陽人有獻此花者因曰獻來花添色紅者多葉花始開而白經日漸紅至其落乃類深紅此造化之尤巧者鶴翎紅者多葉花其末白而本肉紅如鴻鵠羽色細葉粗葉壽安者皆千葉肉紅花出壽安縣錦屏山中細葉者尤佳倒暈檀心者葉紅凡花近萼色深至其末漸淺此花自外深色近萼反淺白而深檀點其心此尤可愛一手肙犬紅者多葉淺紅花葉杪深紅一點如人以手指手肙犬之九蕊真珠紅者千葉紅花葉上有一白點如珠密其葉蹙其蕊為九叢一百五者多葉白花洛陽花以穀雨為開候而此花嘗至一百五日開最先也丹州延州花皆千葉紅花不知其至洛之因蓮花萼紅花青斧三重如蓮花萼左花者千葉紫花出齊民左氏家葉密而齊如截亦謂之平頭紫硃砂紅者多葉紅花不知其所出有民聞氏子者善接花以為生買地於崇真寺前治花圃有此花洛陽豪家尚未有故其名未甚著花葉甚鮮向日視之如猩血葉底紫千葉紫花色如墨亦謂之墨紫花在叢中旁心生一大枝引葉覆其上其開也比他花可延十日之久噫造物者亦惜之耶此花之出比他花最遠傳云唐中宗有宦官為觀軍容使者花出其家亦謂之軍容紫歲久失其姓氏矣玉板白者單葉長如拍板之狀色如玉深檀心洛陽人家亦少有潛溪緋者千葉緋花出於潛溪寺寺在龍門山後本唐相李藩別墅今寺中亦無此花而人家或有之本是紫花忽於叢中特出緋者不過一二朵明年移在他枝洛陽人謂之轉枝花故其接頭尤難得鹿胎花者多葉紫花有白點如鹿胎之紋故蘇相禹珪宅今有之多葉紫不知其所出初姚黃未出時牛黃為第一牛黃未出時魏花為第一魏花未出時左花為第一左花之前惟有蘇家紅賀家紅林家紅三類皆單葉花當時為第一自多葉花千瓣出後此花黜矣今人不復種也別有狀元紅胭脂樓醉西施御樓春壽陽紅瑞霞蟬灑金紅膩玉紅迎日紅七寶冠石家紅鳳頭嬌繡球紅赤玉盤海云紅火焰奴百葉仙人嬌容三變曰朱曰品之以紅著者紫則又有御衣紫朝天紫舞青猊紫繡球葛衣紫淡藕絲紫雲芳紫姑仙之類若雪夫人月宮花玉芙蓉萬卷書無瑕玉水晶球粉奴香合德裝又白中之翹楚而佛頭青則先綠後白者矣又黃之最豔者如黃絨鋪錦大素小素禁苑慶雲界金樓小黃嬌軟條黃縷金黃歐家碧種種名相難以盡述總屬希世之珍玄工之幻也牡丹之名初不載有文字唯以藥錄本草然於花中不為高第大都丹延以西及褒斜道中尤多與荊棘無異土人皆取以為薪自唐則天以後洛陽牡丹始盛然未聞以名著者如沈宋元白之流皆善詠花草當時有一華之盛者彼必形於篇詠而寂無傳焉惟劉夢得有詠魚朝恩宅牡丹詩但云一從千萬朵而已亦不云其美且異也謝靈運言永嘉竹間水際多牡丹今越花亦不及洛陽甚遠是洛陽自古未有若今之盛也而洛陽之俗大抵好花春時城中無貴賤皆插花雖負擔者亦然花開時士庶兢為遊遨往往於古寺廢宅有池臺處為市井張幄布㡩笙歌之聲相聞最盛者月坡堤張家園棠棣坊長壽寺東街與郭令宅花落乃罷蓋花之美在朝露夕霞清風明月華情恬適色神始豔或煙雨霧籠燈火掩映更增容冶若日午鬧喧糟場膻會此花罹困窮轉添憔悴及其盛時每多風妒亦造化之所忌也從來洛陽至東京六驛舊不進花自徐州李相迪為留守時始進御歲遣衙校乘驛馬一日一夜至京師所進不過姚黃魏黃三數朵以菜葉實竹籠子藉覆之使馬上不動搖用蠟封花蒂乃數日不落大抵洛人家家有花而少大樹者蓋其花不接則不佳爾春初時洛人於壽安山中斫小栽子賣城市間謂之山篦子人家治地為畦塍種之至秋乃接接花工尤著者謂之門園子豪家無不邀之姚黃一接頭直錢五千秋時立契買之至春見花始歸其直洛人甚惜此花不欲傳有權貴求其接頭者或以湯中蘸殺與之魏花初出時接頭亦直錢三千今尚直一千接時須用社後重陽前過此不堪矣花之木去地五七寸許截之乃接以泥封裹用軟土擁之以箬葉作庵子罩之不令見日雨惟南向留一小戶以達氣至春乃去其覆此接花之法也花種必擇善地盡去舊土以細泥用白斂末和之蓋牡丹根甜多引蟲食白斂能殺蟲此種花之法也澆花亦自有時或用日未出時或日出時九月旬日一澆十月十一月三日二日一澆正月間日一澆二月一日一澆此澆花之法也一本發數朵者擇其小者去之只留一二朵謂之打剝懼分其脈也花才落便剪其枝勿令結子懼其易老也春初既去箬庵便以棘數枝置花叢上棘氣暖可以闢霜雹不損花芽他大樹亦然此養花之法也花開漸小於舊者蓋有蠱蟲損之必尋其穴以硫黃簪之其旁又有小穴如鐵孔乃蟲所藏處花工謂之氣窗以大針點硫黃末針之蟲乃死蟲死花復盛此醫花之法也烏賊魚骨以針花樹入其膚花輒死此花之忌也入藥以山產紅花單葉之根皮為貴蓋專精於花者則力不足於根之皮矣修事用銅刀劈破去骨銼如大豆好酒拌蒸從巳至未日乾用畏貝母大黃菟絲子忌蒜胡荽伏砒叅曰牡門戶樞丹英華色也取象與色當入足少陽厥陰以少陽經主樞府主決斷厥陰肝主色主筋主藏魂主藏血主謀慮故也牡丹精勝者色辛發者味宣氣散生者性合鼓吾身風大以全木德者也故主中風寒熱瘛瘲驚癇癰腫瘡瘍謂外來風氣使然亦可謂吾身風大不及亦可症堅瘀血留舍腸胃固肝主藏血堅瘀留礙則非所應藏物矣所當決而斷之安五臟美顏色十一臟皆取決於膽安而後能慮樞機其神乎花名補闕天香白眉碧玉點翠焦白焚香拱璧閬苑仙姿玉蟾天香湛露冰輪乍湧玉藍天香玉液麗水金丹勝瓊玲瓏玉金蛾舞翠荊璞玉龍鱗月娥舞袖和璧黃金堆玉海月輝天淑素玉砌瓊卮玉燦銀光璩素飛瓊噴玉玉兔凌春金玉奇逢瑤池玉露玉輪星月雙輝玉露含香冰輪月輪苧蘿白藍田玉金纓白瑞鳳樓瓊瑤對燕連城玉建白淡云籠月松綾白素魁金玉交章鵝絨白冰山金玉交輝瑤臺露雪塔軟玉玉珍珠立金莖露彩玉秋水神慄玉香露華嫦娥墜金菊黃抒素和玉香瀟湘月金丸玉生香真如玉璽凝輝雪剪絨宛若玉寒潭月影玉勝妝玉盤珠韓家紅笑微微烏衣玄奇龍翔鳳舞金谷毓秀千嬌百媚名世紅輪紅輪射翠黃樓子綠蝴蜨枲耳實本經中品氣味甘溫有小毒主治主風頭寒痛風濕周痹四肢拘攣痛惡肉死肌膝痛久服益氣耳目聰明強志輕身核曰所在有之與麥互相為候麥黃種枲枲黃種麥也莖高四五尺有黑色斑點葉如葵四畔寬紐七八月開細白花結實如婦女珥璫外殼堅韌刺毛密布中列兩仁宛如人腎修治炒熟去外刺取仁酒拌蒸曬乾用叅曰枲耳麻類也爾雅名卷耳取實如鼠耳其色蒼蒼復名蒼耳雒下謂之胡荽江東呼為嘗枲以葉青白似胡荽白花細莖可作茹傖人皆食之滑而少味故幽冀謂之襢茹菜又謂之嘗思菜也離騷單名曰葹以譬小人服謂薋綠葹以盈室是矣博物名羊負來謂雒人入蜀有枲耳著羊毛蜀人種之曰羊負來故枲多叢刺亦好著人衣也圖經名道人頭綱目名豬耳又名喝起草記事珠名地葵又名進賢菜名號雖多總屬象形取義今遵本經枲耳為正蓋耳者聽之官腎之竅肺之司故枲形似耳實中兩仁似腎殼皮堅韌叢毛剛勁從革作金之肺象也固入肺腎以腎為主腎藏志志者腎之神也志強竅斯開竅開耳斯聽耳聽聲斯入若以肺為主設腎不司竅雖有其聲不與耳接非耳外聲聲無所爾益氣者竅開氣斯益設有氣無竅亦填塞不輸何繇宣布亦可入肝色蒼故也入肝則肝得其用肝以金為用耳肝固開竅於目而目之能視腎所司也即轉撥瞳仁需以利金又可入脾味甘故也設土實不靈遂致肌死以及肢攣敦土德用自然反活回鮮又可入心氣溫故也心用為水水司液心司血血液充滿乃得筋轉脈搖故不獨五臟鹹入即筋骨肌肉頭目腦髓靡不周到但致疾之因風濕使然風淫偏勝剛以濟之如痹於頭則風頭寒痛痹於百骸則周痹痹於四肢則四肢拘攣痛痹於肌肉則肌肉死惡痹於膝則膝痛痹於氣則氣損痹於耳則耳聾痹於目則目盲痹於志則志頹痹於身則身重身木罔覺有觸種種變證皆藉以濡潤宣達交互承製者也世但知治療瘡瘍殊失靈異備錄名相用廣見聞當歸本經中品氣味苦溫無毒主治主咳逆上氣溫瘧寒熱洗洗在皮膚中婦人漏下絕子諸惡瘡瘍金瘡核曰生隴西川穀今當州宕州翼州松州秦州汶州多種蒔矣仲春生苗布葉似牡丹葉嫩綠三瓣七八月開花似蒔蘿花嬌紅可目根黑黃色肉厚不枯者為勝秦州者頭圓尾多色紫氣香肥潤多脂名馬尾歸此種最佳他處者頭大尾粗色白枯燥名鑱頭歸不堪用也大都川產者力剛而善攻秦產者力柔而善補雷公云去蘆頭酒浸一宿止血破血頭尾效各不同破宜使頭止宜用尾並服無效單使為貴也元素云頭止血尾破血身和血全用則一破一止矣李杲云頭止血而上行身養血而中守尾破血而下流全活血而不走時珍云雷張兩說功效各異大凡根荄身半以上氣脈上行法乎天身半以下氣脈下行法乎地而人身法象天地則治上當用頭治中當用身治下當用尾通治當全用此一定之理當以張說為優以頤論之雷說為當經云藏真高於肺以行營衛陰陽也藏真下於腎腎藏骨髓之氣也唯居上者乃能行居下者乃能止所謂欲舉必先按欲按必先舉耳而行中有止止中有行此又上下相叅之妙收藏須曬乾乘熱裹紙封固甕中則不蛀叅曰古人相招以文無文無當歸也蓋以功用為名矣味苦氣溫臭香色紫當入心為心之使藥心之血分氣分藥也祗判入血便失當歸本來面目矣何也血無氣呴則不能運行經隧灌溉周身彼此依循互為關鍵經云藏真通於心心藏血脈之氣也如咳逆上氣此即氣不于歸皮膚之中營氣之所舍也溫瘧寒熱不在皮膚外肌肉內而洗洗在皮膚中此邪不于歸營無歸向若漏下即血不歸遠絕子即血無歸息金瘡即血不歸旋瘡瘍即氣不歸攝當歸助氣之用益血之體能使氣血邪氣各歸於所當歸之地煮汁飲之宣揚帥氣耳唐詩云胡麻好種無人種正是歸時又不歸良有以也芍藥本經中品氣味苦平無毒主治主邪氣腹痛除血痹破堅積寒熱疝瘕止痛利小便益氣核曰出中嶽川穀及丘陵今出白山蔣山茅山者最好處處亦有人家種蒔矣昔稱洛陽牡丹廣陵芍藥甲天下今藥中亦取廣陵者為勝十月生芽至春乃長赤莖叢生三枝五葉花葉子實都似牡丹第逗芽在牡丹之前作花在牡丹之後傳云驚蟄之節後二十五日芍藥榮是也花有單葉千葉千葉者俗呼小牡丹今群芳中牡丹昌第一芍藥第二故世謂牡丹為花王芍藥為花相又或以為花王之副也花之名曰余容綽約慶雲紅蓮香白醉夫容步步嬌玫瑰紫綠衣郎同心結西施睡起楊妃吐舌概言之曰花婢種種幻巧難以縷述根之名曰鋋曰犁食曰白木曰余容入藥只宜白花單瓣之根氣味全厚然根之赤白亦隨花之赤白也白者曰金芍藥赤者曰木芍藥概根莖花葉統名曰離草一名曰將離修治先別赤白白根固白赤根亦白每根切取一片各以法記火酒潤之覆蓋過宿白根轉白赤根轉赤矣各以竹刀刮去皮並頭銼細蜜水拌蒸從巳至未曬乾用今市肆一種赤芍藥不知為何物草根瘍癭兒醫多用之此習矣而不察其為害殊甚也須丸為之使惡石斛芒硝畏硝石鱉甲小薊反藜蘆叅曰爾雅翼云芍藥花之盛者當春暮祓除之時故鄭之士女取以相贈董仲舒以為將離贈以芍藥者芍藥一名可離猶相招贈以文無文無一名當歸也然則相謔之後俞使去爾其根可以和五臟制食毒故古之遺法馬肝食之至毒者文成以是死言食之毒莫甚於馬肝則制食之毒宜莫良於芍藥故獨得藥之名猶食醬掌和庶羞之類而醬又因以為名也子虛賦云芍藥之和共而後御之南都賦云歸雁鳴鵽香稻鮮魚以為芍藥氣恬臭酸百種千名是因致其滋味也故隱居一名犁食蓋祓除不祥制服食毒和御眾情則離中有合閤中有離一勺之多萬鈞之力矣顧其時值閉藏便行甲拆一派生陽絕不以黨錮為禁忌則凡藥之所難及力之所難到者靡不駢馳翼驅葉直以往故引導最先竇機極早雖牡菌二桂先聘通使亦必藉之以為前驅世稱氣味酸斂唯堪降入此不識臭味不顧名義者矣觀主邪氣入腹遂閉拒成痛芍從中開發逐邪從內以出至滌除血痹入破寒熱疝瘕巳成堅積唯堪消隕者芍力轉倍若小便不利為癃為約裨益肝氣偏行疏泄雖屬在下先開在上欲按則舉欲舉則按此必然之勢芍亦兩得之矣遍閱別錄方書比量推度盡人之性則能盡物之性不致為耳食所縛藥物之幸大矣款冬花本經中品氣味辛溫無毒主治主咳逆上氣善喘喉痹諸驚癇寒熱邪氣核曰出關中及雍州南山溪水華州山谷水澗間多叢生葉似葵葉而大不顧冰雪先春而花去土一二寸出萼如菊色青紫通直而肥開時花黃色花在根下也一種花紅者葉如荷而鬥直大可容升俗呼蜂鬥修事須取微見花者如以芬芳則無氣力揀去向里裹花蕊殼並向裡實如慄零殼及枝葉以甘草水浸一宿卻取款冬葉相拌蒸一夜曬乾去葉用杏仁為之使得紫菀良惡皂莢硝石玄參畏貝母辛夷麻黃黃耆黃芩連翹青葙叅曰以堅水為膏壤吸霜雪以自濡此水裡陽生宜當入腎腎之心藥也故出肺腎之邪先肝心之用與縕藉幽深者不相侔也驚癇邪氣伏匿於中對待治之發越盡淨若咳逆上氣善喘喉痹因腎苦燥及形寒飲冷秋傷於濕者始宜或火熱刑金或肺氣焦滿恐益消鑠毀傷矣芎藭本經中品氣味辛溫無毒主治主中風入腦頭痛寒痹筋攣緩急金瘡婦人血閉無子核曰芎藭蘼蕪根也川中者勝胡戎者曰胡芎關中者曰京芎蜀中者曰川芎天台者曰臺芎江南者曰撫芎皆以地得名也清明後宿根生苗即分其枝橫埋土中節節作根生苗也八月後根下始結芎藭葉似芹微窄有叉又似白芷而細亦似胡荽而壯一種葉似蛇床而稍粗莖葉俱香莖細節大纖柔青整繁蕪蘼弱也種蒔者根形塊大實而多脂山生者細瘦辛苦五月採苗十月採根非時則虛惡不堪入藥矣凡用其根取川中大塊色白不油嚼之辛苦形如雀腦者隹白芷為之使畏黃連伏雌黃得細辛療金瘡止痛得牡蠣療頭風吐逆叅曰芎藭諧聲穹高也極也窮究竟也言主治作用也故主風中頭腦或腦痛或頭腦俱痛者此風氣通於肝亦即春氣者病在頭也力能直達肝用從踵徹巔正鼓而邪自罷矣風與寒合斯成筋痹或攣或緩或急者此屬不直直之使通也並治金瘡者仍轉動搖以成執持血閉即血痹逐而通之使巳亥相合以結胞胎寅申交會而成種子皆究竟高遠之義風氣通於肝物各從其類春氣者病在頭魚涉負冰之候乎巳亥相合厥陰始結胞胎寅申交會少陽乃作乳字陽起石本經中品氣味咸微溫無毒主治主崩中漏下破子藏中血癥瘕結氣寒熱在腹中無子陽痿不起補不足核曰陽起石雲母根也出齊山及雲山泰山琅琊諸山谷今唯齊州採取他處不復識之矣僅一土山石出其中彼人謂之陽起山其山嘗有暖氣雖盛冬大雪獨無積白蓋石氣熏蒸使然也山惟一穴禁閉不開每歲初冬州官監採第歲月積久其穴益深鑱鑿他石得之甚難以白色明臺雲頭雨腳輕鬆若狼牙者為上黃色者亦佳其上猶帶雲母者稱絕品也揀擇供上剩餘者州人方貨之不爾無繇得也庚辛玉冊云陽起陽石也齊州揀金山出者為勝其尖似箭鏃者力強如狗牙者力微置雪中倏然沒跡者為真寫紙上飄然飛舉者乃佳也桑螵蛸為之使惡澤瀉菌桂雷丸石葵蛇蛻皮畏菟絲子忌羊血不入湯煎用叅曰起陽以為量因名陽起石耳蓋陰氣流行則為陽陽氣凝聚則為陰故主凝聚以為眚流行以為用也陽起雲母根高山陽起母雲母陽起互相叅勘則知內守外使之為用矣陽在外陰之使也陰在內陽之守也陰者藏精而起亟陽者衛外而為固陽起兩得之矣雄黃本經中品非將軍不能功勝五兵非將軍亦不能開闢土地不唯盡雄黃功績並顯大黃威武矣氣味苦平無毒主治主寒熱鼠瘻惡瘡疽痔死肌殺精物惡鬼邪氣百蟲毒勝五兵煉食之輕身神仙核曰出武都山谷敦煌山之陽武都氐羌也是為仇池宕昌亦有但小劣耳敦煌在涼州西北千里近用石門始興石黃之好者純而無雜色如雞冠光明燁燁者最勝階州接西戎界出一種水窟黃生山岩有水處其石曰青煙石曰白鮮石雄黃出其中有孔竅色深紅微紫體極輕虛而功用更勝水經注云黃水出零陵縣西北連巫山之溪出雄黃頗有神異嘗以冬月祭祀鑿石深數丈方採得但凡雄黃色純黃似雌黃色而無光明或青黑而堅者曰熏黃氣臭者曰臭黃並不堪服修治每雄黃三兩用甘草紫背天葵地膽碧稜花各五兩細銼以東流水入坩鍋中煮三伏時取出搗如粉水飛澄去黑者曬乾再研用其內有劫鐵石又號赴矢石能劫於鐵並不入藥用叅曰雄大也武也以將群也黃中色男女之始生也雄而黃純而健者也千金云婦覺有妊作絳囊盛佩易女為男此轉陽精旋於地產耳鼠瘻曰寒熱病惡瘡疽痔皆名死肌百骸焦府悉屬地大故也陰凝堅而黃中失安能通理雄力含弘而光大之可稱大黃大黃賦名將軍此足當之矣故功勝五兵殺精物惡鬼邪氣百蟲毒為害也煉食之輕身神仙地仙類耳雌黃本經中品氣味辛平有毒主治主惡瘡頭禿痂疥殺毒蟲蝨身癢邪氣諸毒充四肢通溪骨煉之久服輕身增年不老核曰出武都仇池者曰仇池黃色小赤出扶南林邑者曰崑崙黃色如金舶上來如噀血者為上湘南者次之似雲母甲錯層層可拆軟如爛金者尤佳雌雄二品同生山之陽生雄山之陰生雌雌者金精所熏一曰金之苗也雷公云修事勿令婦女與新犯淫人及不男女非形人或雞犬刑獄臭穢之地犯之色變如鐵損人壽不堪用矣每雌黃四兩用天碧枝和陽草粟遂子草各五兩入瓷鍋中煮三伏時其色如花一朵在鍋底中遂用東流水猛投於中如此淘三度去水拭乾搗研如塵用雌得芹花立便成庾芹花一名立起草形如芍藥煮雌能住火也又云造化黃金非此不成亦能柔五金干澒轉硫黃伏粉霜土宿真君云芎藭地黃獨帚益母草羊不食草地榆五加皮瓦松冬瓜汁皆可制伏雌見鉛及胡粉則色黑叅曰雌羽母地類也黃中通理暢發以為體用者也老子云知其雄守其雌為天下溪故達溪骨暢四肢發肌腠勝五兵與雄等也咸屬金精之所鍾唯雌雄之有別耳牛角腮本經中品氣味苦平無毒主治主下閉血瘀血疼痛女子帶下血燔之酒服髓氣味甘平主補中填骨髓久服增年膽氣味苦大寒可丸藥核曰古者牛唯服車易云服牛乘馬書云肇牽車牛其力在肩其用以角抱朴子云牛結陣以卻虎環其角外觸虎雖猛巧不能制也其類有三沈牛𤚩牛㹄牛也沈牛大𤚩牛小㹄牛尤其卑小者爾雅謂之犤音悲牛會編謂之紈牛廣南謂之果下牛者是也𤚩牛色黃黑赤白駁雜數種沈牛喜沒水中其狀如豕大腹銳角角若擔矛色青蒼亦有白色者俗謂之水牛鬱林人謂之洲留牛者是也牝曰牸曰沙羊牡曰特曰犅曰牯曰㹍曰𭷱子曰犢曰犝曰牜曹三歲曰㸬四歲曰牭五歲曰𤘦六歲曰䖚察其齒以知其歲其齒有下而無上也三歲者二齒四歲者四齒五歲者六齒六歲以後者歲接骨節一節也牛之形色白曰牜宀隹黑曰𤚎赤曰𤙡駁曰犁曰犖純色曰牷純黑曰犧白黑雜毛曰牻㹁黃白曰犥駁如星曰𤘾黃牛虎文曰𤙛黃牛黑唇曰犉黑眥曰牰黑耳曰犚黑腹曰牧黑腳曰犈體長曰牬脊長曰牜亶白脊曰攑曰將領如橐駝曰犦髀膝尾皆有長毛曰犣角一俯一仰曰觭角長二尺有五寸三色不失曰載重千斤出巴中曰犘重數千斤出岷山曰犩曰𤋲去勢曰犍曰犗無子曰𢦤絕有力曰欣犌項垂曰胡蹄肉曰𤜂百葉曰膍角胎曰腮鼻木曰牶嚼草復出曰齝腹草未化曰聖齏相牛者璧堂欲暗膺廷欲廣豪筋欲就雋骨欲垂插頸欲高排骨欲密尾不用至地頭不用多肉角欲得細身欲得圓眼欲得大口方易飼鼻廣易牽倚欲如絆馬行欲如麟趾蹄欲如八字形欲如卷懸亂睫好觸龍頸突目善跳毛拳角冷有疾毛少骨多有力岐胡有壽嘗鳴有黃目脈且赤而體瘦也牛之為物病則耳燥安則溫潤而澤故古之視牛者以耳詩云爾牛來思其耳濕濕濕濕言潤澤也牛耳無竅以角聽也易林雲牛龍耳聵龍亦聾者矣牛畜之有力而順者但有豎瞳而無橫瞳見一物輒長造天故童子得而制之聲曰牟音曰宮管子云凡聽宮如牛鳴𡧙中牛含宮聲故柳子以為黃鐘在脰也牛夜鳴則厂酋厂酋久屋朽木也古稱牛膏曰香故其臭朽則不可食矣造化權輿云乾為馬坤為牛乾陽物也馬故蹄圓坤陰物也牛故蹄坼陽病則陰勝故馬疾則臥陰病則陽勝故牛疾則立馬陽物也故起先前足臥先後足牛陰物也故起先後足臥先前足馬嘗立馬病則臥牛嘗臥牛病則立牛走風順馬走風逆牛馬風逸往往不相及也山海經云稷後曰叔均是始耕郭氏云用牛犁也許叔重以為牛者所植谷谷者民之命是以王法禁殺牛民犯禁殺之者誅周官牛人掌國之公牛以待政令祭祀供享牛求牛賓客供㹄牛膳牛饗食供膳羞牛軍士供犒牛喪事供奠牛軍旅供兵軍之牛祭禮云一元大武祭天地之牛角繭栗宗廟之牛角握賓客之牛角尺帝牛不吉以為㹄牛帝牛必在滌三月稷牛唯具也又云天子以犧牛諸侯以肥牛大夫以索牛周禮云牧人掌六牲凡陽祀用𫜚牲陰祀用𫜚牲望祀各以其方之色外祭毀事用牻可也周禮疏云牛宜稌稌土谷牛土畜故牛宜稌藏器云牛自死者血脈已絕骨髓已竭不可食病死者令人痃癖洞下白首者獨肝者有大毒啖蛇者殺人仲景云啖蛇牛毛髮白而後順者是也時珍云角腮角內堅骨也角為筋之精骨之餘腮為角之粹也故腮在角中一名角胎叅曰牛者稼穡之資五畜之土脾藏之畜也律書冬至曰牽牛言陽氣牽同萬物出之也故本經取用在角腮則又為角木之胚兆耳蓋土爰稼穡稼穡作甘所以俾全土化之體用者也經云脾統血閉瘀則具體失用帶血則顯用無體咸忘所統而體用分之燔之以火轉藉母氣功力始備髓填髓者為象形膽丸藥者為十一臟皆取決於膽也鱉甲本經中品氣味鹹平無毒主治主心腹癥瘕堅積寒熱去痞疾息肉陰蝕痔核惡肉核曰鱉介蟲也水居陸生穹脊連脅與龜同類四緣有肉如裙故曰龜甲裹肉鱉甲裹骨無耳以目為聽與蛇黿為匹夏月孕乳其抱以影陸佃云魚滿三千六百則蛟龍引之而飛納鱉守之則免故一名守神亦名河伯從事修治取綠色九肋重七兩者為上用六一泥固瓶子底待乾置甲於中欲治症塊及寒心用頭醋三升入瓶內大火煎盡去裙留骨炙乾用欲治勞熱以童便一斗二升煎盡去裙留骨焙乾石臼中搗成粉以雞肶皮裹之取東流水三斗以盆盛水閣於盆上一宿取用力有萬倍也惡礬石理石叅曰鱉無耳以眼聽故其目不可瞥識精於明復識精於聽也不唯精專肝竅膽亦異眾而味大辛穹脊連脅脅亦少陽膽府所屬此木金交互故得聲色疊用而肝為膽藏取決更相親耳以余叅之若以膽開聾瞽必色斯明聲斯聰彼施諸房術者風斯下矣味鹹走血軟堅為厥陰肝少陽膽血分之氣藥也蓋肝藏血設所藏非精所守非神致陰凝至堅為癥瘕痞積息肉惡肉陰蝕痔核者軟之決之亦藉膽斷使去者也白殭蠶本經中品氣味鹹辛平無毒主治主小兒驚癇夜啼去三蟲滅黑黯令人面好男子陰癢病核曰白殭蠶蠶病風死其色自白死且不朽也今市肆多用中溫死蠶以石灰淹拌令白服之為害最深若痘疹必燥裂黑陷若瘡毒必黑爛內攻不可不慎也修治用糯米泔浸一日俟桑涎吐出浮水上者即掠去之洗淨漉起微火焙乾淨布拭去黃肉毛並黑口甲搗篩如粉叅曰蠶昆蟲也見明則食食而不飲三十日乃化有引日多與少者此寒溫飢飽之為修短耳三眠三起起如衛氣之出行陽道眠如衛氣之入行陰道三十日大眠則衛道已周周則變而化吐絲為經矣不化者風白為僵故象形從治內逆而為驚癇夜啼伏匿而為三蟲鬼疰外顯黑黯而不明囊殼欲蛻而作癢者此皆不能從蒸及變順之使出以從化也淮南子云蟬飲不食蠶食不飲飲滋經氣食益經隧咸從任督四布經絡變化相同功能亦一也第五帙石膏本經中品氣味辛微寒無毒主治主中風寒熱心下逆氣驚喘口乾舌焦不能息腹中堅痛除邪鬼產乳金瘡核曰出齊盧山及魯蒙山剡州彭城錢唐亦有之生石中大塊作層細文短密宛若束針潔白如膏鬆軟易碎燒之白爛如粉也一種硬者生地中枚塊作稜直理堅白擊之段段橫解牆壁光亮燒之易散不作粉也別有一種細文長密宛若束絲者理石也一種作塊無稜橫理堅白擊之方解燒之奼散作粉者方解石也昔人所謂長石即石膏之硬者所謂寒水石即石膏之軟者而理石方解石氣味都辛寒但不若石膏之軟者能解肌發汗為異耳修治石臼中搗研成粉羅過生甘草水飛兩遍澄清去水曬乾再研雞子為之使惡莽草巴豆馬目毒公及鐵叅曰石以止為體膏以釋為用質之寧謐氣之微寒即體之止文之理腠味之辛解即用之釋體用互顯者也但止釋有時故體用各有先後爾或因似體之止則顯用以釋之或因似用之釋則顯體以止之此即從而逆逆而從反佐以取之之法也如風性動搖從之以用逆之以體寒性勁斂從之以體逆之以用此從逆寒風定動之本性非從逆寒風寒化之本氣也以性無遷變氣有反從反從者反乎本氣之寒從乎標象之陽則為病熱之熱也則凡結而欲解者宜矣結而欲下者非所宜也與麻黃桂枝葛根解發之用相同寒熱從逆之氣為別異耳主治諸證悉以體止用釋逆熱從寒反復分疏莫不迎刃而解並可推暑性之欲降火性之欲炎燥性之欲濡濕性之欲流與腑臟形骸血氣竅穴欲止欲釋者詳審合宜為效頗捷否則災害並至慎之慎之暑性之欲降轉炎敲為清肅火性之欲炎火空則發以張夏大之出令也磁石本經中品用磨鐵峰鐵便指南其既濟象為水火之徵兆也無情化有情理固然矣氣味辛寒無毒主治主周痹風濕肢節中痛不可持物洗洗酸消除大熱煩滿及耳聾核曰生太山山谷及磁山山陰有鐵處則生其陽今徐州及南海傍山中亦有磁州者歲貢最佳能吸鐵虛連數十鐵或一二斤刀器迴轉不落者尤良採無時石中有孔孔中有黃赤色其上有細毛功用更勝南川異物志云漲海崎頭水淺而多磁石徼外大舟用鐵葉固之者至此皆不得過以此言之海南所出尤多也凡使勿誤用玄中石並中麻石二石俱似磁石只是吸鐵不得而中麻石心更有赤皮且粗是鐵山石也誤食令人生惡瘡不可療真磁石一片四面吸鐵一斤者曰延年沙只吸八兩者曰續採石五兩者曰磁石磁磨針峰則指南其法取新纊中獨縷以半芥子許蠟綴於針腰無風處垂之針嘗指南以針橫貫燈心浮水上亦嘗指南物理相感如此土宿真君云鐵受太陽之氣始生之初滷石產焉百五十年而成磁石又二百年孕而成鐵修治一斤用五花皮地榆各一鎰取綿十五兩三件並銼於石上捶作二三十塊將石入瓷瓶中下草藥以東流水煮三日夜取出拭乾布裹再捶細乃碾如塵水飛過再碾用茈胡為之使殺鐵毒消金惡牡丹莽草畏黃石脂叅曰始生之初滷石產焉久之孕而成鐵磁母鐵子也磁之㶸鐵互為噓吸無情之情氣相感召故周痹風濕及濕流肢節致肢節中痛洗洗酸消也不能持物此手不㶸物不能聽聲此耳不聲並可治目不㶸色鼻不香舌不味與癰腫鼠瘻頸核喉痛之身不㶸觸皆以類推總屬假借大熱是因煩滿是證磁屬八石水而位於坎對待治之寒熱溫涼則逆也石葦本經中品氣味苦平無毒主治主勞熱邪氣五癃閉不通利小便水道核曰出華陰山谷今晉絳滁海福州江寧亦有之叢生石旁及陰崖險罅不聞水聲人聲處凌冬不凋葉長近尺闊寸許背有黃毛柔韌斑點如皮一種葉背有金星者曰金星草葉如杏葉者曰杏葉韋同生石上功用亦相同也修事去黃毛極淨否則射人肺令咳逆難療也滑石杏仁射干為之使得菖蒲良制丹砂礬石叅曰石者山骨韋為之皮秉坎剛之水用離麗之火體從堅凝閉密中暢達敷布故主勞熱邪氣致五癃閉假石性之剽悍宣通水道捷於影響有金星者曰金星草嘉祐用治發背癰瘡蓋良為背背發癰瘡止非止矣金星功能上下敵應時行則行時止則止也解丹石陽毒者以艮止之寧謐對待治之大生毛髮者腎主骨主髓發者腎之榮肺主皮主膚毛者肺之華耳藁本本經中品氣味辛溫無毒主治主婦人疝瘕陰中寒腫痛腹中急除風頭痛長肌膚悅顏色核曰出西川及河東兗州杭州諸處多生山中苗葉都似白芷又似川芎而稍細五月開白花七八月結子根色紫苗下根上似禾之藁也惡䕡茹畏青葙子叅曰藁本芳草也為藁悴之本故悅顏色長肌膚與白芷功用相符宣發藏陰精明形色潔齊生物者也如一陽之上氣濁及血濁而致風頭痛一陰之下血濁及氣濁而致疝瘕陰中寒腫痛腹中急者咸可齊之以潔也精明形色非藁悴之本乎蓋形色之藁悴繇陰不使陽以榮外陽亦失守於中藏耳茜草根本經中品氣味苦寒無毒主治主寒濕風痹黃疸補中核曰出喬山山谷今圃人作畦種蒔矣史記云千畝卮茜其人與千戶侯等言其利溥厚也季冬生苗蔓延數丈方莖中空外有細刺數寸作節每節五葉似棗葉頭尖下闊七月開花結實如小椒中有細子修事用銅刀於槐砧上銼細日乾勿犯鉛鐵器勿用赤柳草根形狀相似只是味酸澀誤服令人患內瘴速服甘草水其毒即散畏鼠黏汁制雄黃叅曰茜即蒨毛詩所謂茹蘆蜀本所謂染緋草也肝主色茜色勝當入肝心主赤茜色赤當入心具春升夏出之機故主補中俾通寒濕風痹及色變於色而致疸黃也周官庶氏掌除蠱毒以嘉草攻之蘘荷之與茜也而茜功最勝故別錄用治蠱毒耳一名地血一名茅搜能入陰分止內崩吐衄一名風車草一名過山龍先人云風龍肝屬血乃所藏西金青木為用是臧紫葳本經中品氣味酸微寒無毒主治主婦人產乳余疾崩中癥瘕血閉寒熱羸瘦養胎核曰紫葳即凌霄花也多生山中人家亦種初作蔓生依大木上漸延至巔年深者藤大如杯一枝數葉尖長有齒深青色自夏至秋一枝開花數十朵如萱花赭黃五瓣有細點深秋更赤八月結莢長三寸許子輕薄如榆莢仁叅曰紫葳一名武葳一名凌霄謂從底徹頂秉木德自下而上之體用合入少陽膽厥陰肝肝者將軍之官膽者中正之官原具武威之政令故也故主厥陰所司之胞胎少陽所司之乳字若寒熱羸瘦即樞病癥瘕崩閉即闔病與玄參功力似同而異玄正子半紫合寅申及巳亥之各半巳亥即厥陰水火之胞胎寅申即少陽金木之乳字叅勘越人十有九難則知太極判兩儀而作胞胎兩儀生四象而成乳字意矣將軍之官具威武中正之官具政令二官能勝其用能盡其職矣白芷本經中品毒家痘疹家多用此寧不寒心暖然齊春仁之潔鼎新革故之象乎氣味辛溫無毒主治主女人漏下亦白血閉陰腫寒熱風頭侵目淚出長肌膚潤澤顏色可作面脂核曰所在有之吳地尤多近錢唐筧橋亦種蒔矣春生苗葉葉對生花白微黃入伏後結子立秋後苗枯根長尺余粗細不等黃澤者為佳修事勿使四條一處生者名喪公藤又勿用馬蘭根採得刮去皮細銼以黃精片等分同蒸一伏時曬乾去黃精用近時用石灰蒸煮及拌石灰暴曬為不易蛀並欲色白不特失其本性而燥烈之毒最深用之無忽也當歸為之使惡旋覆花制雄黃硫黃叅曰楚辭以芳草比君子而言茝為多茝白芷也一物多名茝也芷也芳也藥也虈也苻蘺也澤芬也其取象於草木之芳澤者無所不備矣王逸云行清潔者佩芳白茝之屬是也具春生髮陳之氣潔齊生物者也合從青陽高明之上一陰隱僻之下對待汙濁者齊之以潔如女子漏下亦白血閉陰腫寒熱此一陰之下血濁及氣濁也如風頭侵目淚出此青陽之上氣濁及血濁也長肌膚即潔肌膚濁以氣潔則氣精於肌也澤顏色即潔顏色濁以血潔則血華於色也可作面脂此不獨餌可激濁即膚受亦可表潔矣防己本經中品輻不離車全輻湊合乃能致遠氣味辛平無毒主治主風寒溫瘧熱氣諸癇除邪利大小便核曰出黔中宜都建平不及漢中者良故方書多稱漢防己也其莖如葛蔓延莖梗甚嫩苗葉小類牽牛折其莖一頭吹之氣從中貫如木通根外白內黃中心有黃黑紋作車輻解若黑點木強者不堪入藥別有一種根作腥氣而皮皺上有丁足子者木防己性稍峻烈修事細銼用車前草根相對蒸半日曬乾取用殷孽為之使殺雄黃毒惡細辛畏萆薢女菀滷咸伏硝石先人云防防禦己己土此得水用不令土有少犯然性流離解散當善馭之則為通劑之巨擘叅曰防者障也己者我也我立則畛畦分矣故績平水土為獨著一曰解離一曰石解謂根文作車輻解當以離麗解散為己任七方之急方十劑之通劑也然其氣平故風寒濕熱四氣咸宜若溫瘧諸癇乃陰陽舛錯嚴御其防陰陽仍兩間矣狗脊本經中品氣味苦平無毒主治主腰背強關機緩急周痹寒濕膝痛頗利老人核曰出嘗山川穀及太行山淄溫眉州山野間莖細葉花兩兩相對似大葉蕨及貫眾葉邊有鋸齒面背皆光根形如狗脊骨凸凹巃嵸金毛密布者是也勿用透山根其形狀相似只入頂苦不可餌修治火燎去毛細銼酒浸一夜蒸之從巳至申取出曬乾先人云狗脊綿韌如筋如骨味苦性堅而葉對生猶脊分兩脅也能強關機者唯精與氣體用俱備故也叅曰此以功用立名亦因形相類也狗叩也聲有節若叩物也脊積也積續骨節筋脈上下也主肝腎體用權衡形臟之關機者也故治寒濕周痹致關機緩急為腰背強及膝痛頗利老人者利老人之筋骨關機也別錄甄權廣關機不利於目為目暗不利於膀胱失溺不節及淋露寒濕痹及風虛毒風腰強及腰痛膝痛及腳弱軟腳傷中及關節重筋骨絕若堅脊即所以強肝腎健筋骨以利俯仰少氣即關機失利之故也濟生方治衝任寒熱室女白帶此又廣關機不利衝任與帶並可廣陽維陰維陽蹺陰蹺以及督與十二經脈經絡之失利關機則凡關機為病為病及關機者咸可因勢而利導之吳綬方病後足腫狗脊煎湯漬洗此法金匱要略治百合病百合煎湯洗之百合病者百脈之宗主為病此筋骨脈絡之關機為病也以此推廣真不勝其用唯在專司佐使者何如耳通草本經中品氣味辛平無毒主治主除脾胃寒熱通利九竅血脈關節令人不忘去惡蟲核曰通草即木通澤潞漢中江淮湖南州郡皆有之繞樹蔓藤大者經三五寸每節二三枝枝頭五葉夏末開花紫色亦有白色者實如木瓜而小長三四寸瓤白核黑食之甘美枝即通草通理細孔兩頭皆通含取一頭吹之氣出彼頭色黃白者良黑褐色者此商賈因其質輕易得多置舡篷上為雨暘所侵以致形色腐黑用之無力也叅曰黃中通理故名通草類藤蔓仍名草枝頭五葉長夏作花味辛氣平脾之用藥通劑也故除脾胃寒熱塞而不通並九竅血脈關節悉為脾土所攝故也去惡蟲令不忘即通九竅血脈關節之徵經云通因塞用正此類也具此神通則八萬四千毛竅有所閉塞莫不令之開通舉九竅者九竅為竅穴之總持耳若關節血脈又屬身內之關津河道矣秦艽本經中品數犯此者此字指生氣言氣味苦平無毒主治主寒熱邪氣寒濕風痹肢節痛下水利小便核曰出飛鳥山谷及甘松龍洞涇州鄜州岐州諸處枝幹高五六寸葉婆娑如萵苣葉莖梗俱青六月開花紫色似葛花當月結子根黃色長尺許作羅紋交斜其文左列者佳右列者不堪入藥令人髮腳氣病也修治認取腳文左列者拭去黃白毛還元湯浸一宿日乾用菖蒲為之使惡牛乳先人云人身直者為經橫者為絡絡之下注者為孫肌腠之邪多從孫人次薄於絡復溜於經漸傳腑臟秦艽羅紋錯綜如織象形從治法也叅曰根有羅紋左旋者入藥蓋天道左旋而人生氣從之經云自古通天者生之本天地之間六合之內其氣九州九竅五臟十二節皆通乎天氣數犯此者則邪氣傷人內閉九竅外壅肌肉衛氣散解是以本經用治寒熱邪氣或風寒濕痹致骨節水道反從地道右旋者使順天運以轉玉璣別錄諸家用治轉胞口噤目暗耳鳴即九竅內閉用治癰疽黃疸傳屍骨蒸即肌肉外壅用治手足不遂通身攣急即衛氣散解設左右無別天道逆矣栝蔞根實本經中品氣味苦寒無毒主治主消渴身熱煩滿大熱補虛安中續絕傷核曰別名瑞雪根即天花粉出弘農陝州者最勝所在亦有之三月生苗引藤蔓葉如甜瓜葉而窄作叉背面俱有白毛六月開花似壺蘆花而淺黃色結實在花下大如拳生時青碧如瓜九月黃熟如柿形有正圓長銳功用並同內有扁子殼色褐仁色綠多脂作青氣根直下生年久者長數尺秋後採者結實有粉他時便多筋絡矣修治其實須分二種圓黃皮厚蒂小者宜陽人服形長皮赤蒂粗者宜陰人服並去殼皮革膜及脂根亦取大二三圍者去皮搗爛以水澄粉先人云本經主治不分根實別錄廣實主胸痹悅澤人面似有根實之分故圖經另出根名天花粉主煩滿及消渴煩滿胸痹皆胸部病釋名云消渴腎氣不周於胸也經云煩滿胸痛引背胸痹也病名雖異因證則同但所施略分輕重耳即能周腎氣於胸亦屬補虛安中續絕傷功力耳叅曰形如包括之囊實列重樓之象舉實該根猶枸杞也氣味苦寒逆治火熱體質濡潤逆治燥涸或液燥涸致熱結聚或熱結聚致液燥涸遂成消渴煩滿者悉宜用安中者熱卻則中安亦即所以補液之虛耳故筋脈燥涸則絕傷濡潤則連續矣根實功力稍有異同實主郁遏不能分解根主散漫失於容平靡不以熱為因以燥為證顧天花瑞雪之名則思過半矣百合本經中品用以氣言天道也體以形言地道也氣味甘平無毒主治主邪氣腹脹心痛利大小便補中益氣核曰近道雖有唯荊州山谷者良二月生苗一干特起百葉環列無旁枝至杪作花有二種一丹黃色間紫黑點初開內拱如掬次早外列如球而不結子彆著葉蒂間赤碧如貝根微苦頃亦轉甜一純白如卮連莖傾側花瓣六出夜分作香葉蒂間不著子根肥而甘此非異類宜別雌雄有子者雌無子者雄叅曰百合百瓣合成也雌雄二種雄主藏用雌主藏體俱入心主包絡心主百脈故也腹滿心痛便不利此夏氣病藏之邪百合力能益氣以補中虛則邪無所容從內以出即夏大張布於外者亦無內顧之虞矣金匱云百合病者百脈一宗悉致其病也即假藥象以著病形爾蓋心主為病則時間時甚故無嘗證可擬象形從治法也客曰別錄主入肺臟悅皮毛安臟腑定權衡此亦象形乎頤曰經云肺朝百脈輸精皮毛毛脈合精行氣於腑府精神明留於四臟氣歸權衡權衡以平氣口成寸一線穿成不煩造作此正象形也梔子本經中品氣味苦寒無毒主治主五內邪氣胃中熱氣面赤酒疱渣鼻白癩赤癩瘡瘍核曰南方西蜀皆有木有高下葉似李而硬厚五月生花芬香六出即西域之薝蔔也夏秋結實如訶子生青熟黃中仁紅色修治須如雀腦並長鬚九路赤色者為上去皮取仁同甘草水浸一宿漉出焙乾搗篩為末勿用大而長者謂之伏屍入藥無力先人云卮子有色故主色變凡苦寒之物能下能堅唯卮子反使堅結者解而上出火空則發之義也故並作湧泄之劑叅曰白英六出色香俱勝體性輕浮稜殼似介合入手太陰宣氣四達者也故主陽氣鬱結致色變於色而標見於皮及浸淫膚肉而瘡瘍癩㿗此皆火熱爍金非此不能轉熱惱為清涼耳五內邪氣胃中熱氣結而未實者易於分解已成燥堅者非所宜矣素馨瀰漫即麗澤之化工輕揚六出宛滕六之飛舞轉炎敲為清肅者也秦皮本經中品氣味苦微寒無毒主治主風寒濕痹洗洗寒氣除熱目中青翳白膜久服頭不白輕身核曰出陝西州郡及河陽其木似檀枝幹皆青綠葉細如匙許大不光並無花實皮上有白點取皮漬水色便青碧作字亦青碧可觀不易落也大戟為之使惡吳茱萸叅曰木小岑高木皮翠碧甲木少陽膽乙木厥陰肝藥也主俾通痹閉寒熱洗洗此少陽之樞象目中青翳白膜此厥陰之闔象緣肝開竅於目其華在發其榮在筋故久服輕身頭不白耳亦可作少陽之用藥厥陰之體藥也具體及用腑臟之全德耳蕪荑本經中品氣味辛平無毒主治主五內邪氣散皮膚骨節中淫淫溫行毒去三蟲化食核曰出晉山川穀及高麗太原河東河西延州同州近道亦有生山中似榆而小葉圓而厚其實早成亦似榆莢但氣臭如𤜢作醬則香美能殺蟲置物中亦闢蛀有大小兩種小蕪荑醞醬氣味尤辛入藥宜大蕪荑陳久者最良叅曰蕪荑臭膻山榆仁也春取榆柳之火謂先百木青用逗春生之端耳當入肝以宣肝用故主五內邪氣皮膚骨節中淫淫溫行毒此不從春生宣散故也蕪荑宣逗端倪自下而上使從外而內者復自內而外焉風入蟲生風宣蟲去矣設谷入不宣安能開發上焦宣五穀味熏膚充身澤毛若霧露之溉歟故不獨宣化穀味且宣布水液者矣枳實本經中品氣味苦寒無毒主治主大風在皮膚中如麻豆苦癢除寒熱結止痢長肌肉利五臟益氣輕身核曰橘逾淮而枳故江北有枳無橘江南雖有枳不及江北者氣全而力厚也樹如橘而小葉如橙而刺春作白花至秋成實九十月採者曰枳殼修事用小麥麩拌炒至麥麩黑色去麩乃用叅曰枳以氣勝為劑之宣劑而枳從只只起語辭亦語已辭宣揚且宣攝矣但枳實瓤核未判性勇而速枳殼瓤核已分性詳而疏咸從居中之胃署橫遍身半已內已外之形層者也故主大風在身半已外之皮膚如麻豆苦癢及寒熱結在身半已內之腹腸而滯下成利若主南北之畫界分經以殊方域也長肌肉輕身者即宣揚穀味以充形臟利五臟益氣者即宣攝穀精以安神藏顧谷之精與味莫不起於胃而已於胃旨哉只乎只具揚攝方界南北實性勇殼性疏中央分形層部署揚攝別穀味穀精經隧定起胃已胃此靈素法也牛黃本經中品氣味苦平有小毒主治主驚癇寒熱熱盛狂痙除邪逐鬼核曰出隴西及晉地今萊密淄青嶲戎諸州皆有凡牛生黃夜或有光眼如血色時復鳴吼恐懼人以盆水置牛前伺其吐出乃喝迫之即墮水中取得者陰乾百日無令見日月光一子如雞子黃大重疊可折若百千層輕虛氣香色光明者佳揩摩手黃透甲者真雷斆云黃有四種一喝迫而得者曰生神黃一殺死從牛角得者曰角中黃一牛病死後從心中剝得者曰心黃初在心中如黃醬汁取得便投水中沾水乃硬如碎蒺藜及豆瓣與帝珠子者是也一從肝膽中得者曰肝黃膽黃皆不及生黃為貴辶𦵺牛黃堅而不香又駱駝黃極易得亦能相亂不可不審也修治單搗細研如塵絹裹定更以黃牛嫩皮裹懸井中一宿去水三四尺明早取用人參為之使得牡丹菖蒲利耳目惡龍骨龍膽地黃嘗山蜚蠊黃嫩牛皮牛膝乾漆繆仲淳先生云牛為土畜得氣血之精明凝結為黃猶人身之有內丹也故牛生黃則其身夜視有光為世神物諸藥莫能及也先人云坤為牛黃為土則黃是牛之本命元辰矣其入肝膽似云之從龍風之從虎不期然而然者叅曰牛土畜在卦為坤其色正黃其理層疊所謂黃中通理厚德載物者也故能敦土德用資生草木蓋木必基土以土為命如驚癇寒熱狂痙邪鬼雖從脾土轉屬久則肝木體虛反欲傳克脾土矣蓋五行之理失制則亢亢則為害害所勝耳法當益土輔火黃可入脾苦可入心心為肝子子能助母實也與金匱要略之治肝虛傳脾先補肝木次及心脾之義相合先因於肝故先補肝此則唯從脾土轉屬故只益脾土次及心火非從肝始勿治肝耳金匱要略云上工治未病夫治未病者見肝之病知肝傳脾當先實脾四季脾王不受邪即勿補之中工不曉相傳見肝之病不解實脾唯治肝也夫肝之病補用酸助用焦苦益用甘味之藥調之酸入肝焦苦入心甘入脾脾能傷腎腎氣微弱則水不行水不行則心火氣盛則傷肺肺被傷則金氣不行金氣不行則肝氣盛則肝自愈此治肝補脾之要妙也肝虛則用此法實則不在用之詳錄以備叅考䗪蟲本經中品氣味鹹寒有毒主治主心腹寒熱洗洗血積癥瘕破堅下血閉核曰生川澤及沙中人家牆壁下土中濕處大者寸余無甲而有鱗修治十月採曝乾叅曰䗪蟲一名地鱉形類鱉也一名過街逢申過街立建以沖日破也蓋䗪者眾多掌除毒蠱亦以功用詮名耳是主寒熱洗洗致血積癥瘕者沖其街舍而破除之故能破堅下血閉羖羊角本經中品氣味鹹溫無毒主治主青盲明目殺疥蟲止寒泄辟惡鬼走虎狼止驚悸久服安心益氣輕身核曰羖本夏羊生河西色青黑頭小身大毛長而柔可以為羢一名綿羊其角為用最大詩云繇醉之言俾在童羖蓋羖之美在角也羖為角音又為古音詩以古與語叶韻是矣而音通於牯故本草羖羊條注稱為羊之牯猶兕音通於牸稱為犀之牸也羖羭也羭色黑為黑羝為黑𦎐羒色白為白羝為白𦎐各有牝牡但當以色為別蓋羊之有羒羭亦猶木之有枌榆也枌亦白榆不能白色白有辨之義故皆從分色黑有不辨之義故皆從俞又今榆者北方有之故古稱榆塞而江南有刺榆無大榆是南方於羊也則有羒而無羭於木也則無榆而有枌色相類義相同也羝抵也羝性好抵故從羝省字從抵省音從低者以羝先低其角然後能抵突故也羊總名羔羊子四月而乳一歲三生母既生子子復生孫孫又生子易繁速計莫捷於羊其別有四曰羜者五月生羔也曰𦎦者六月生羔也曰羍者七月生羔也曰䍮者羊未卒歲也釋畜但載未成羊者為羜郭氏云俗呼五月羔為羜蓋謂羔已生及五月者爾而說文稱五月生羔則似謂仲夏所生者矣按齊民要術稱正月生羔為上種十一月十二月生者次之母視含重膚軀充滿草雖枯亦不羸瘦母乳適盡即得春草是以極佳八月九月十月生者雖值秋肥然比至冬暮母乳已竭春草未生是故不佳三月四月生者草雖茂美而羔小未食嘗飲熱乳所以亦惡五月六月七月生者兩熱相仍惡中之甚然則五月生者乃是不美故古稱肥羜以速諸父當是生及五月者爾繁露云凡贄卿用羔羔有角而不用類仁者執之不鳴殺之不嗥類死義者飲乳必跪其母類知禮者故以為贄禮云飾羔雁者以饋以言其德足以衣被而又有文章也字說云羔從羊從火羊火畜也羔火在下若火始然可進而大也故羔大曰羊三歲曰䍯䍯小狠也䍯以乘而不隨為臧犅以乘而不逆為剛蓋牛之性順犅雖牡而猶有順性故為乘而不逆也羊之性狠䍯雖牝而猶有狠性故為乘而不隨也羊前逆牛前順故羊宜驅而牛宜牽羊善群每成群必以一群為主舉群聽之謂之壓群羊善鬥鬥羊表云臣聞勇士冠雞武夫戴鶡推群舉類獲此鬥羊遠主越嶲蓄情剛決敵不避強戰不顧死雖為微物志不可銼效奇靈囿角力天場卻鼓怒以作氣前躑躅以奮擊趺若奔云之交觸碎如轉石之相叩裂骨賭勝濺血爭雄敢毅見而衝冠鷙狠聞而擊節冀將少助明主市駿骨揖怒蛙之意也若使羊能言必將曰若鬥不解立有死者所賴至仁無殘量力取勸焉羊畏露牧之者宜晚出而早歸也羊惡濕喜燥食鉤吻而肥食仙茅而肪食仙靈脾而淫食羊躑躅而死羊宜黍黍火谷羊火畜故羊宜黍也其目無神其腸九縈其力在尾其角下蹄角之不齊者曰䍯音軌角有三觠音卷者曰羷音斂絕有健力者曰奮種類甚多入藥只以青色羖羊為勝次則烏羊其䍲羺羊及虜中無角羊止可啖食乳髓則肥好也羖羊亦有褐色黑色白色者毛長尺余亦謂之羖䍽羊北人驅引大羊則以此羊為首名曰羊頭河東亦有羖䍽羊性尤狠健毛長而厚入藥亦佳如羖䍽驅至南方則筋力自勞損安能補益於人今南方諸羊多食野草毒草故味薄而易發疾惟淮南州郡或有佳者可亞北羊北羊至南日久尚不中食水土使然耳生江南者為吳羊頭身相等毛短肉瘦供饌猶易發疾入藥更無效矣羖羊之角可以占灼契丹謂之羊卜其皮極薄南番以書字吳人以畫彩為燈毛可制筆角作琉璃蹄骨須涎咸成藥用獨美在角專精者牝羖之角也蓋兌為羊兌少女也以柔包剛物各從類功力始備耳兔絲為之使焚角走虎狼角灰能縮賀賀錫也叅曰羊性好抵羊力在尾此交任於閭會督於巔是以抵突用角精專之美在角也離為火為羊為目在天為熱在藏為心心臟血脈之氣也故羊為火畜功主青盲諸脈屬目目得血而能視也寒泄為對待驚悸為體虛痛癢瘡瘍咸歸心火耳辟惡鬼為生陽死死陰走虎狼為火行爍金獸久服者體用俱備絕有力奮矣白茅本經中品氣味甘寒無毒主治主勞傷虛羸補中益氣除瘀血血閉寒熱利小便核曰出楚地山谷及田野所在亦有春生苗布地如針俗呼茅針三四月開花作穗茸白如絮隨結細子至秋乃枯根名茹易曰拔茅連茹以其匯故其根牽連長冗經寸成節柔白如筋甘甜如蔗用以造飴清滑可口也根荄至秋夜分時有青光腐則化螢火茅可苫蓋及供祭祀苞苴之用名曰茅絲詩云晝爾於茅霄爾索綯言穀人日力不足取茅於晝而夜以繼之故以為絲事方息而麻事尋興野功既訖而宮功隨至藏蔬於其秋以助不給之冬索綯於其夜以補不足之晝列子云因以為波流因以為茅靡茅靡稊也稊茅之始生也詩云手如柔荑荑稊一也相經云筋不束體血不華色手無春荑之柔發有寒蓬之悴此蓋形之下矣故勁強短促者另成他類別有只生山谷入秋放花如荻實尖黑長分許黏衣刺人者菅也又有莖端開葉莖上有粉根頭有毛者黃菅也又有生湖南及江淮間葉脊三稜臭如蒲草可以包藉縮酒者菁也又有叢生如蘆葉大如蒲高六七尺者芒也根都勁促不堪藥用叅曰茅之為物薄而用可重也體柔而性直故先王用之以藉易曰藉用白毛無咎象曰柔在下也蓋兌金在上巽柔在下而柔麗乎中慎斯術也以往其無所失矣誠陽中之陰入手太陰肺中見陽明中治法以行營衛陰陽者也蓋太陰肺其始從中焦明麗於內慎斯於中布氣以往斯無所失是以補中氣乃益勞乃復傷乃續虛乃實羸乃充以及除瘀血閉寒熱便利咸成布往之功力休徵爾別錄廣利便及五淋瘀血及崩中勞傷虛羸及強筋堅骨肥肌致腠大明廣血閉及月水不勻血脈淋瀝肘後咀嚼茅根辟穀不死亦廣補中益氣爾龐安常主溫病伏熱在內令胸滿嘔噦屬大下協熱所致茅根建立中央葛根起亟陰氣更廣仲景先生葛根湯法從中布氣從肌解散爾肘後療虛後水腫為命門火衰腎虛水泛赤小豆主腎水之心谷藉茅根之明麗釜底燃薪吸呼肺氣營衛乃將水道乃行也若黃膽谷膽勞疸黃汗石水色變於色標見於皮者豬為水畜君以茅根亦廣肘後治水方法但前方偏於向右此更兼於從左若千金解中酒毒恐爛臟腑者飲茅根汁以滌中焦還須佐以葛花想更神異若卒中五屍致損生陽之屬為腹痛脹急不得息上衝心胸旁攻兩脅若磈礧然牽引湧動屍鬼為害者利以堅金燒以茅火追窮尋逐令生陽以死死陰壯百骸以轉中氣助中氣以起百骸餌食膚受罔不有功藉用白茅何咎之有慎之至也紫菀本經中品氣味苦溫無毒主治主咳逆上氣胸中寒熱結氣去蠱毒痿蹶安五臟核曰出漢中房陵山谷及真定邯鄲近道亦有三四月布地生苗其葉二四相連五六月開黃白紫花根極柔潤色紫作節宛若蕤纓之下垂也白色者即女菀一名白菀今人多以車前及旋覆根赤土染過偽充不可不慎修事去須頭及土東流水洗淨蜜浸一宿至明拴火上焙乾款冬花為之使惡天雄瞿麥藁本雷丸遠志畏茵陳先人云詩曰菀彼柔桑蓋言茂也故治鬱結當有五色取色紫味苦者以治胸中寒熱結氣胸中肺部也肺中有火外發而為痿蹶內鬱而為咳喘及肺熱葉焦致五臟不安者用其色以行肺用用其氣以散肺結用其味以順火性倘無結氣而用之過泄肺氣矣叅曰菀郁也解肺金鬱以成名也胸為肺部寒熱氣結在中致蠱毒臟不安上見咳逆下見痿蹶菀從結心解即分散表解便利為外徵經云金鬱則泄之解表利小水也觀息奔及小便卒不得出其義自見設中虛或肺金體衰者宜斟酌投之赤火刑金紫則水火合璧故轉行金用火金水三緣交會同一支派矣然太陰開結則闔非含火大種子者亦不轉闔仍開耳解從結心如表解為上為下之分散便利為下為內之分散息奔為上為外之分散小便卒不得出為下為內之結象也當虛其實毋虛其虛瞿麥本經中品氣味苦寒無毒主治主關格諸癃結小便不通出刺決癰腫明目去翳破胎墮子下閉血核曰瞿麥即洛陽花萼雲石竹及剪秋羅者謬矣所在有之莖細有節高一二尺葉似石竹又似地膚稍巔開花有紅紫粉藍斑爛數色結實如燕麥內子紫黑而扁只用萼殼不用莖葉一時同使令人氣噎及小便不禁也修事以苦竹瀝浸一伏時取出曬乾用蘘草牡丹為之使惡螵蛸伏丹砂叅曰瞿戟屬四矛為瞿又四達為瞿亦鷹隼之視為瞿也麥者實囊形相似爾主明目去翳者取鷹隼之能視去刺決癰腫破胎墮子者取戈矛之四出治關格諸癃結小便失利不閉血者取四達之通瞿通因塞用急方之通劑也但氣味苦寒設非火熱為本因反成簞瓢之臞耳貝母本經中品陰陽左右各十有二兩邊分解者各得其平丹龍精僅獨粒則左難右難矣氣味辛平無毒主治主傷寒煩熱淋瀝邪氣疝瘕喉痹乳難金瘡風痙核曰貝母一名勤母空草苦菜苦花出晉地潤州者最佳今河中江陵郢壽隨鄭蔡滁諸州亦有之二月生苗葉隨苗出如蕎麥狀莖葉並青七月開花碧綠色形如百合斜懸向下上有紅脈若似人肺八月採根根有瓣子黃白色如聚貝子一種葉如栝蔞而細小子在根下如芋子正白色連累相著而可分解一種葉如韭而花色白根子亦作兩瓣也修治先於柳木灰中炮黃擘去口中米許大心再拌糯米同炒俟米黃去米用勿用獨粒不作兩瓣者號丹龍精誤服令人筋脈永不收唯黃精小藍汁服之可立解厚朴白薇為之使惡桃花畏秦艽莽草礬石反烏頭先人云形如聚貝獨貴其母若用空解肺肝可施叅曰雖有多種但苗葉別異萼悉上昂花悉下垂此開機互闔闔機互開少陽膽之樞藥也根形如貝色白味辛以金為用肝之肺藥肺之肝藥也以太陰肺主開厥陰肝主闔靡不取決於少陽膽主樞者如傷寒煩熱喉痹風痙乃開機反闔不能轉開如淋瀝乃開機反折不能互闔如乳難乃不能為開如金瘡乃不能為闔如疝瘕乃不能為開為闔也貝母功力能使闔者開開者闔闔折不能互開者能使之互開開折不能互闔者能使之互闔不能闔者能順其闔不能開者能順其開不能為開為闔者能順其為開為闔也蓋開與闔莫不取決於樞以為開闔故爾萼主垂而昂花主昂而垂此陰陽顛倒象金木互交機也其使之互交令之顛倒者誰主之耶女菀本經中品氣味辛溫無毒主治主風寒洗洗霍亂泄痢腸鳴上下無常處驚癇寒熱百疾核曰女菀即白菀與紫菀同類紫白雖異生成則一也畏滷咸叅曰白菀與紫菀功用似同而異紫主寒熱氣結在中致病上中及下白主風寒寒熱氣結在樞亦病上中及下兼見內外開闔之象故上下無嘗內外不定菀從結樞解即分散則嘔逆自開泄痢自闔驚癇自平寒熱自除矣並偏於從樞解表從樞利小水也雖非金鬱設舍假泄金鬱之法亦難以從樞分解耳黃芩本經中品氣味苦平無毒主治主諸熱黃疸腸澼泄痢逐水下血閉惡瘡疽蝕火瘍核曰出川蜀及河東陝西近道亦有二月生苗莖幹粗如箸子中空外方葉色黃赤四四作叢而起花色紫實色黑根色黃一種獨莖者其葉細長而青兩兩相對花實根色則一也曰子芩根圓曰條芩即小根之內實者破者曰宿芩曰片芩即大根之內虛者其腹皆爛故有腐腸妒婦諸名謂妒婦心黯芩腹心黑也山茱萸龍骨為之使惡蔥實畏丹砂牡丹藜蘆得厚朴黃連止腹痛得五味子牡蠣令人有子得黃耆白蘞赤小豆療鼠瘻先人云病從內實為證諸熱為因者對待能空之芩則內無實內無實則無諸熱之因矣叅曰黃芩一曰腐腸一曰內虛有黃離之象柔得乎中體虛而用實也荄中腐乃腐化耳故主腹腸諸熱實滿於中為黃疸澼痢水停血閉失於腐化反現腐敗者對待治之惡瘡疽蝕火瘍實者虛之熱者平之若厚腸腹並厚肌肉矣萆薢本經中品氣味苦平無毒主治主腰脊痛強骨節風寒濕周痹惡瘡不瘳熱氣核曰萆薢一名赤節一名百枝出真定山谷及河陝汴東荊蜀諸郡作蔓生苗葉俱青葉有三叉似山薯葉又似綠豆葉花有紅黃白數種亦有無花結白子者根黃白多節三指許大大者如商陸莖有刺者根白實無刺者根虛軟軟者入藥最勝一種葉似蕎麥子作三稜根如山薯而體硬市肆皆以土茯苓為萆薢又以萆薢為狗脊者誤矣薏苡為之使畏葵根大黃茈胡前胡先人云根多枝節故一名赤節主關節之疾甚相當也顧萆薢之名更宜於身之下矣叅曰萆覆蔽也薢解脫也風寒濕相合成周痹覆蔽經脈骨節之外致腰脊骨節強痛及惡瘡不瘳熱氣力可使之解脫與狗脊功力似同而異狗脊主關機失利於內致筋脈勁強於外萆薢主經脈勁強於外致關機失利於內雖咸從脾生內外之情迥別耳天地解而雷雨作雷雨作而百果草木皆甲拆萌蘖自內解孚從外也雷公炮炙論序一名竹木亦以其有節也主治漩多漩多即白濁此風癉客脬下焦失於決瀆耳力能通而解之宜身之下於此可見豬苓本經中品氣味甘平無毒主治主痎瘧解毒蠱疰不祥利水道久服輕身耐老核曰所在有之楓樹苓也皮黑肉白堅實者佳修事銅刀刮去粗黑皮東流水浸一夜至明取出細切再以升麻葉對蒸一日去葉曬乾用先人云通利水道原當先開玄府斯上下通調水始有用叅曰木之有餘於氣與脂者唯松與楓焉鬆則兼氣與脂而咸有餘楓則餘氣為苓不復余脂為香矣余脂為香不復餘氣為苓矣顧苓與香各稟氣與脂之體與用也苓曰豬苓形相似耳豬為水畜苓即木令自上而下者使之自下而上自下而上者使之自上而下荄瘧則金鬱蠱疰則土鬱癃閉則水鬱水鬱則折之土鬱則奪之金鬱則泄之苓則兼而有之轉氣化之機衡故爾世知行水未知折水並奪土泄金茈胡本經中品氣味苦平無毒主治主心腹腸胃中結氣飲食積聚寒熱邪氣推陳致新久服輕身明目益精核曰出弘農川穀及冤句今關陝江湖近道皆有以銀州者為勝銀州今寧夏衛也十一月根竹白蒻香美可食二月苗長莖青紫微有細線頗堅硬葉似竹葉而稍緊小亦有似邪蒿者亦有似麥門冬葉而短者七月開黃花根淡赤色似前胡而強唯丹州者結青子與他處不同其根似蘆頭有赤毛如鼠尾獨窠而長者佳銀州者根長尺許微白而軟不易得也修治去須及頭銀刀削去赤色薄皮少許粗布拭淨勿令犯火力便無效先人云茈胡稟少陽之氣動於子而發於寅故得從堅凝閉密之地正中直達萬化為之一新叅曰凝極陽復之時而香孕柔茁體用之元始具矣根即茈胡一曰地熏雷公云銀州生處多有綠鶴白鶴於此飛翔謂香氣直上雲霄故曰地熏蓋生值一陽元始及氣用功力當入少陽宣甲膽氣用自下而上以奉春升之發陳發陳即所以致新也是以能升則具出能出則具平矣故味稟夏火之苦氣兼長夏之平雖曰一陽實含全體不獨自下而上且可自內而外如不能自下而上則不得從內而外者宜矣如已能自下而上不能從內而外者非所宜也如寒熱邪氣及飲食結積心腹腸胃中者此陳也若胡之囊物而非所以成醞釀宣布轉輸決瀆之府器也茈諧此此為彼對亦即對待法也會此樞機種種功力可類推矣胃府曰器三焦曰名寄臨於此受盛腐化決潰三者三焦所司之職乎地榆本經中品氣味辛苦微寒無毒主治主婦人乳產痓痛七傷帶下五漏止痛止汗除惡肉療金瘡核曰生平原川澤三月宿根布地作苗獨莖直上高三四尺對分出青色葉似榆葉稍狹細而長邊有鋸齒七月開花如椹根似柳外黑內紅根可釀酒道方以之燒灰煮石得發良惡麥門冬伏丹砂雄硫叅曰地坤道也至柔而動也剛煮石成糜足徵剛而動矣榆從俞俞者空中木若舟楫之利以濟不通故主脈道壅塞致營血不能分流經隧而為帶下五漏乳產汗出種種證形若乘木之有功也不但作舟楫亦可作車乘咸乘木之有功也合歡本經中品氣味甘平無毒主治主安五臟和心志令人歡樂無憂久服輕身明目得所欲核曰生豫州山谷及益州汴洛所在山谷亦有植之庭除令人不忿嵇康養生論云合歡蠲忿萱草忘憂古今注云欲蠲人忿贈以青裳青裳合歡也越人謂之烏賴樹金光明經謂之尸利灑樹俗謂之萌葛樹也干似梧桐枝甚柔弱葉如皂角細而繁密互相交結每一風來輒自相解了不相牽五月發花紅白上有絲茸秋實作莢子極纖薄收採皮葉不拘時月修治其皮削去粗皮緩火焙炒先人云陽動而開陰靜而合此至和此至安也動而能靜開而必合此方至和此方至安也若動不能開靜不能合與動不能靜開不能合斯不和斯不安矣合歡晝而陽舒夜而陰合靜時交結動不相牽開合動靜鹹得所欲是得陰陽之正既安且和人心如此何忿不蠲叅曰晝開夜合以晝夜為呼吸者也當安心肺之陽腎肝之陰並安中州滋培後天者歟和心志歡樂無憂者以臟安則神安神安則志溢志溢則無恐懼憂悲矣儼似衛氣之出入亦可安衛氣之晝出於陽夜入於陰更安營氣之周行經隧鎮定中州故也息同天地故久服輕身明目皆得所欲呼出心與肺吸入腎與肝呼吸之間脾受穀味其脈在中脾者中州也惟臟安心和故歡樂無憂惟歡樂無憂久之自身輕目明而欲得矣蓋氣鬱悶則重滯樂則飛揚而輕也肝屈抑則目昏樂則開爽而明也心愁慮則不能如意樂則從心所欲無弗得也秦椒本經中品含蓄者自然醞藉發露者自然淺薄氣味辛溫無毒主治主除風邪氣溫中去寒痹堅齒髮明目久服輕身好顏色耐老增年通神核曰秦椒花椒也始產於秦今處處有之極易繁衍其葉對生尖而有刺四月生細花五月結青實熟則紅赤大於蜀椒其目不及蜀椒之光且黑也惡栝蔞防葵畏雄黃叅曰椒分秦蜀者不惟方域異大小牝牡有別也秦地者開花結實實大於牡蜀地者無花作實實小於牝其色馨氣味精勝實膚與溫中通痹主司形氣則一也但無花者性深邃力從內骨橫遍膚表主益氣而歸肺有花者性舒徐力從中臟橫遍皮毛明目竅堅骨余主通神而歸心為別異耳蓋中臟通乎神故久服輕身好顏色耐老增年通神也柏木本經中品氣味苦寒無毒主治主五臟腸胃中積熱黃疸腸痔止泄痢女子漏下赤白陰傷蝕瘡核曰出漢中山谷及永昌邵陵山東諸處今唯蜀中者皮厚色深為佳樹高數丈葉似吳茱萸又似紫椿經冬不凋皮外黃白其里正黃其根結塊如松下茯苓故根名桓檀修治削去粗皮生蜜浸半日取出曬乾再以蜜塗文武火炙令蜜盡為度每柏皮五兩用蜜三兩惡乾漆伏硫黃先人云黃本土色可及五臟腸胃之科苦寒相結能解熱結致疾之本故本經主治熱結兩字為因疸痔諸疾為證五臟腸胃皆部署也叅曰樹高根結經冬不凋味大苦氣大寒稟太陽高廣之象得太陽寒水之化以待極陰中見之熱此秉土製為用所以防水也如是則氣專力備解五臟腸胃中緣熱為因致疸痔泄漏陰傷蝕瘡種種證形熱解則清而愈矣設散漫流注之火熱所當避忌如火實類結亦可假用火空則發之義耳柏木高柏根結而專精者皮則皮具全木之體與用矣厚朴本經中品氣味苦溫無毒主治主中風傷寒頭痛寒熱驚悸氣血痹死肌去三蟲核曰出交趾冤句及雒陽陝西江淮湖南川蜀山谷亦有之近以建平宜都及梓州龍州者為上木高三四丈徑一二尺葉似槲葉四季不凋五六月開花紅色結實如冬青子生青熟紅實中有核味頗甘美木皮鱗皺以肉厚色紫多液者入藥最良修治刮去粗皮每斤用生薑汁八兩炙盡為度若入丸散用乳酥四兩炙之乾薑為之使惡澤瀉硝石寒水石忌豆食之動氣先人云厚為坤土之德赤有離明之象名之曰樸猶未離乎木也又云苦是心火之味溫是心火之性紫是心火之色使之以姜通神明也叅曰樸皮也以皮表木者謂專精在皮若所愛在外敦厚以從樸也氣味苦溫色性赤烈備火木之體與用者蓋火自木襲從內而外以司夏出橫遍之令故主寒風勁斂向內而為頭痛寒熱若驚則風揚致令氣上悸則寒抑致令氣衝或寒風合痹氣血外現死肌內伏三蟲者俾之使通即從內而外以行夏出橫遍之令耳梅實本經中品氣味酸平無毒主治主下氣除熱煩滿安心止肢體痛偏枯不仁死肌去青黑痣惡肉核曰梅葉皆似杏葉端有尖先春而花凌霜傲雪清芬襲人其子青赤者其材堅其子青白者其材脆品類極繁江梅遺核野生不經栽接者名直腳梅凡山谷水濱及荒涼迥絕之處皆此本也花小而疏瘦有韻香烈實小而硬早梅冬至前開故得早名要非風土之正消梅其實圓小多液惟堪青啖古梅枝幹樛曲蒼蘚鱗封苔須綴枝幾長數寸綠絲風揚飄飄拂人重葉梅花瓣數層如小白蓮花房獨出結實多雙尤為瑰異又綠萼梅朱梅百葉緗梅鴛鴦梅檀香玉蝶諸品皆堪清玩若大庾嶺梅南枝已落北枝方開寒燠異土遲早頓殊入藥以野生及未經就接者為貴修事烏梅取青梅籃盛置於突上燻黑若以稻灰淋汁潤蒸則肥澤不蠹白梅取青梅鹽汁漬之日曬夜浸十日成矣久乃生霜叅曰梅昧也爽旦微明春生之象也先春而華吸冰雪以自濡色青味酸入厥陰肝肝色青肝味酸故也故主吮泄腎液以潤筋膜經云味過於酸肝氣已津譚說酢梅口中酸出吮泄之力可徵矣是以對待水液焦涸致熱煩滿悶及上氣令心不安與偏枯不仁致肢體痛及死肌惡肉青黑痣者咸可濡以潤之藉子母更相生耳吳茱萸本經中品氣味辛溫有小毒主治主溫中下氣止痛除濕血痹逐風邪開腠理咳逆寒熱殺三蟲核曰所在有之江浙蜀漢尤多閩中者最勝木高丈許皮色青綠枝柔而肥葉長而皺似椿葉闊厚色紫三月梢頭開紅紫色花七八月結實累累成簇而無核嫩時微黃熟則深赤一種粒大一種粒小小者入藥修事去葉梗每十兩用鹽二兩投四斗東流水中分作百度洗之自然無涎日乾之入丸散者每十兩用醋一鎰煮三十沸後入茱萸熬乾用蓼實為之使惡丹參硝石白堊畏紫石英叅曰茱者火胎於木萸者乙胎於甲吳其產也故主寒中其進甚銳除逐痹閉其退甚速開發上焦宣五穀味熏膚充身澤毛若霧露之溉陽生氣分之良劑也故氣下者自上咳逆者自平痹閉成蟲者自殺矣設中熱人所當避忌形寒飲冷者為效頗捷佐以黃連用治淡陰兩得之矣第六帙海螵蛸本經中品氣味咸微溫無毒主治主女子赤白漏下經汁血閉陰蝕腫痛寒熱癥瘕無子核曰近海州郡皆有九月寒烏入水所化越小滿則形小矣形若革囊口在腹下八足聚生口旁無鱗有須兩須如帶甚長設遇風波即以須下碇或黏作纜故名纜魚能吸波噀墨令水溷黑以自衛也南越志云性反嗜烏每自浮水上飛鳥見之以為死而啄之乃卷取入水而食之因名烏賊轉為烏之賊害也故腹中血及膽正黑如墨可以書字但逾年則跡滅惟存空紙爾世言烏鰂懷墨而知禮謂之海若白事小吏也外皮亦黑內肉則白背上只有一骨形如樗蒲子而稍長兩頭尖色潔白質輕脆重重有紋宛如通草紋順者為真紋橫者沙魚骨也修事以血滷作水浸之並煮一伏時取出掘一土坑燒通紅色入螵蛸在內經宿取出其效加倍也惡白芨白蘞附子能淡鹽伏硇縮銀叅曰背骨奇而無枝節名曰螵蛸形相似耳上表堅薄如介里理輕脆而通蓋維持者督闔闢者任也其口以腹則其息以胎矣吸波噀墨以自衛者此即藏精起亟陽以陰為用衛轉營為衛耳主女子赤白漏下經汁者闢者闔之也血閉陰蝕腫痛寒熱症瘕無子者闔者闢之也別錄諸家用治男子驚癇痎瘧吐衄熱中瘡膿痘疹內經用治血枯得之少年時有所大脫血或醉以入房致中氣竭肝血傷月事衰少不以時至者當病胸脅支滿妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名曰血枯佐以蘆茹和以雀卵飲以鮑魚汁所以利腸中及益肝血也悉屬營任之變眚故相宜耳月事衰少在女子即月事不以時下在男子即精氣不以時溢瀉矣海藻本經中品生淺水者葉細鍾水液之氣淺生深水者葉大鐘水液之氣深氣味苦鹹寒無毒主治主癭瘤結氣散頸下硬核痛癰腫癥瘕堅氣腹中上下雷鳴下十二水腫核曰出東海海島有大小二種小者名馬尾藻生淺水中宛如馬尾大者名大葉藻生深水中葉大如藻海人以繩繫腰投水取之五月後不可取恐大魚傷人也修事用生烏豆紫背天葵同煮一伏時曬乾用反甘草叅曰海藻生海中橫陳於水若藻濯然一名𧂇海中之水藻也一名羅水草之有文也一名綸生淺水而葉細一名組生深水而葉大爾雅云綸似綸組似組東海有之正謂二藻也蓋海晦也主承穢濁水黑如晦也藻善條暢不以晦濁礙衍漾故主經絡肉理有失次第淺深致氣結成癭瘤及頸下硬核或氣堅成癥瘕癰腫及腹中上下雷鳴亦咸以軟之堅結自釋矣十二經水皆止而盈海納百川止而不盈尾閭泄之是也淫羊藿本經中品讀此真可信夫人死為羊羊死為人否則衚衕業相感如此氣味辛寒無毒主治主陰痿絕陽莖中痛利小便益氣力強志核曰出上郡陽山山谷江東陝西泰山漢中湖湘間皆有一根數莖莖細頗堅高二三尺一莖三椏一椏三葉長二三寸如豆藿葉如杏葉面光背淡邊有細齒薄而有刺四月開花白色亦有紫色者碎小獨頭經冬不凋根似黃連色紫多須即仙靈脾也景曰西川北部有獸曰淫羊與山羊無異日群百遍蓋食此藿所致也羊食之而淫故曰淫羊若以為川北有淫羊似乎曲為之解矣又名仙靈脾當是取其益氣力強志而名之耳修治取生處不聞水聲者乃良以夾刀夾去葉之四畔花枝每斤用羊脂四兩拌炒待脂盡為度薯蕷紫芝為之使得酒良叅曰羊性善群淫羊功力相似藿則以形舉也莖高二三尺細緊勁直經冬不凋可想見其作用矣一莖三椏一椏三葉具巽木生成之數助長厥陰之用堅固淫業者也但不可久服以有餘於用不足於體令人無子故也青蒿本經中品兩手相摩中有暖出淫為因火為果理固然矣氣味苦寒無毒主治主疥瘙痂癢惡瘡殺蝨治留熱在骨節間明目核曰生華陰川澤所在有之得春最早望春便發莖如指肥葉極纖細色並青翠似茵陳蒿而背不白至夏漸高五六尺許秋深開細淡黃花花下結子如粟米莖柔韌根白硬苗葉花實並芬芳特勝功力亦相若也筆談云青蒿一類自有二種一黃色一青色青者入藥即本經所指青蒿亦有所別陝西銀綏間見青蒿叢中時有一兩窠迥然特青如松檜翠碧可觀至秋余蒿轉黃此蒿翠碧更倍古人取深青者為勝恐即此蒿獨得蒿力之專精者也不然諸蒿何嘗不青但青而色淡雷公云凡使惟中為妙到膝即仰到腰即俯使子勿使葉使根勿使莖四件若同使翻然成痼疾修事其葉或莖實用七歲兒七個溺浸七日七夜取出曬乾用叅曰蒿青而高纖柔整密望春便發少陽膽藥發陳致新之宣劑也其味苦巳出乎陽其氣寒未離乎陰陰中之陽陽中之樞象也蓋少陽膽主骨故對待骨節間留熱若皮膚分理間疥瘙痂癢惡瘡亦屬留熱所致皆陳也宣發發陳陳發則新至矣主明目者以肝膽開竅於目不唯發陳且拂塵矣君子蒿目其斯之謂歟乾薑本經中品母姜作種子姜頓長母姜便宜取出即子母更相生長之意白淨結實具金之色與形乃能存金之味盡金之用點火成金金復歸火循環之理非擬議所到盡金之性所以全火之用乃能備暖熱之火體以火緣物以顯用因用以見體故也遊溢水穀正疆界所司之事氣味辛溫無毒主治主胸滿咳逆上氣溫中止血出汗逐風濕痹腸澼下痢生者尤良久服主臭氣通神明核曰出漢溫池州江西浙江諸處宜原隰沙地四月種種五月生苗如嫩蘆而葉稍闊兩兩相對惡濕洳而畏日故秋熱則無姜設一莖稍黴則根病矣社前後新芽頓長如列指狀一種可生百指皆分歧而上即宜取出種姜否則子母俱敗秋分採芽柔嫩可口霜後則老而多筋干之即曰乾生薑乾薑者即所取姜種水淹三日去皮置流水中漂浸六日更刮去皮然後曬乾入瓷缸中覆釀三日乃成以白淨結實者為良故人呼為白姜入藥則宜炮用先人云辛溫夏長色相微紅具火大之力通心王之令若降下之陰不及醞藉之德稍遜者所當避忌又云血病有二陽乘陰而血溢者其治在陽以寒待之陰乘陽而血溢者其治在陰以溫待之叅曰姜疆也界也如營衛氣血陰陽表裡逾越疆界者能使之各各旋歸有如捍禦外侮之侵犯邊疆者味辛氣溫宣發生陽之氣充益火大之源以消陰翳冷氣寒酸木僵設火毒熾盛豈堪僭服故治胸滿咳逆之因肺氣浮越血衄妄行之因陰氣乘陽嘗自汗出之因營弱衛強風濕成痹之因氣不宣通腸澼下痢之因脾胃虛寒致水穀失於遊溢生者宣發乾者溫中去臭氣者生陽能闢濁陰也生陽宣發即通神明之驗耳金曰從革從革作辛姜以辛勝稟庚辛之味獨專新秋前後三庚曰三伏正所以緩火刑也秋熱則爍金殆甚金且難於從革從革更難作辛矣故秋熱則無姜姜之畏日亦此意也苦參本經中品氣味苦寒無毒主治主心腹結氣癥瘕積聚黃疸溺有餘瀝逐水除癰腫補中明目止淚核曰生汝南山谷及田野間近道處處有之苗高三四尺葉青色細碎極似槐葉春生冬凋花色黃白七月結角如萊菔莢內有細子二三粒如小豆而堅根三五料並生長五七寸兩指許大色黃褐味極苦生河北者無花無子苗莖根葉皆相若也五六十月採根曝乾修事用糯米濃泔汁浸一宿有腥穢氣浮在水面上者須重重淘過即蒸之從巳至申曬乾用玄參為之使惡貝母菟絲子漏蘆反藜蘆叅曰苦者言其味參者言其功力相參上下內外也炎上作苦故一名陵節一名岑莖苦性走下故一名地槐一名野槐苦能入骨故一名苦骨一名虎林復名水槐菟槐苦𧄹者稟水曰潤下之寒化爾合從至陰對待火熱為因積聚為證者也更觀根生三五並立亦苦三相參伍相伍故得自參以上明目止淚自參以下逐水餘瀝自參以外除癰腫黃疸自參以內破結氣癥瘕蓋心腹居中積聚火熱斯成眾眚對待火熱所以補中方能參乘上下以及內外參之功用大矣知母本經中品氣味苦寒無毒主治主消渴熱中除邪氣肢體浮腫下水補不足益氣核曰出瀕河懷衛彰德解州滁州彭城諸處二月宿根再發四月開花色青如韭八月結實根至難死掘出隨生修治槐砧上銼細木臼搗爛勿犯鐵器叅曰知母天一所生水德體用具備者也故主濡潤燥涸對待熱中除邪氣肢體浮腫潤下水道者也設舍肺金之母氣難以遊溢轉輸矣何也母氣之藏真高於肺以行營衛陰陽乃能遊溢通調轉輸決瀆耳蓋益氣者亦母益子氣補不足者亦母能令子實也原夫金為水母知母者如子知有母也別名蝭母蚳母者依母彰名也兒草兒踵昌支者繇母命名也水浚水參水須者離母立名也連母者正顯子連母義貨母者即子母遞遷以成變化也知此則立名之義或遠取物近取身可深長思矣白薇本經中品惟其卒暴故不覺其所從來氣味苦鹹平無毒主治主暴中風身熱支滿忽忽不知人狂惑邪氣寒熱痠疼溫瘧洗洗發作有時核曰出陝西及舒滁潤遼諸州近以山東沂濮莒萊諸州者稱勝莖葉俱青頗類柳葉六七月開紅色花遂結實根似牛膝而細長尺許色黃微白芳香襲人者白薇也色白微黃折之易斷者白前也修治用糯米泔浸一宿去髭槐砧上銼細蒸之從申至巳曬乾用惡黃耆大黃大戟乾薑大棗乾漆山茱萸叅曰白薇別名白幕白者金色堅剛之體也微者隱也隱身而行幕者軍行之幕以隱身也此指能治因所治證以詮名耳氣平味苦鹹平則不上不下敦土德化御所不勝也炎上作苦苦性走下苦能入骨潤下作咸咸性走血咸能耎堅從巔及踵淪膚徹髓靡不周到者也謂所勝因善行數變亦靡不周遍故也故主因於暴風隱身而為身熱肢滿忽忽不知人狂惑邪氣寒熱痠疼此風氣留其處故隱身而嘗在也或隱身而行而為溫瘧洒洒發作有時此風並衛居隨衛氣之晝行於陽夜行於陰沉以內薄故發有期而時作時休也此皆暴風數變之證金以制之制所勝也別錄主淋露遺尿即風隱膀胱也若水氣精損即風隱於腎致令腎虛精涸腎虛水泛也若忽如死人即風隱於血致令血厥也若溫病多眠即風隱於脈道致令衛氣不得晝行於陽也若痙則風隱於筋驚則風行致令氣上也咸以暴風為因寒則非所宜矣紫草本經中品氣味苦寒無毒主治主心腹邪氣五疸補中益氣利九竅核曰出碭山山谷及楚地今出襄陽多從南陽新野來二月逐壟下子苗似蘭香赤莖青節紫花白實其實秋月乃熟也春社前後採根頭有白毛如茸以石壓扁曝乾收時忌人溺及驢馬糞並煙氣能令根黃如未花時採取根色鮮明如已作花根色黯惡染色亦不堪用也修事每斤用蠟二兩熔水拌蒸水盡為度去頭並兩畔髭細銼用先人云紫草色勝蓋肝主色而肝之色又從風化凡病變於色者相宜然肝疏二便餌之大小便利為外徵也叅曰紫間色水乘火色也氣寒味苦臭芳性潔稟水氣澄湛之體捍格之用主心腹濁邪熱氣郁作五黃損氣閉竅者力能捍格而澄湛之別錄廣心腹邪氣及腫脹滿痛利九竅及通水道若兒瘡即熱濁於血面渣即熱濁於氣於色耳蘄陽廣兒瘡及斑疹豆毒活血涼血以利大腸經驗方云痘瘡三日隱隱將出色赤便閉者相宜曾世榮云脾實協熱者可用脾虛協寒者不可用慎之慎之兒醫用藥尚新無暇察色問證詳確病因致死生存亡莫之能測曾世榮及經驗方言簡意盡德庇後世蔥莖白本經中品臭腐中具大神奇故種種功力不可思議以能前通陽氣自然遍周四大則心肝脾胃爪生髮長筋轉脈搖誠合明瞭氣味辛平無毒主治作湯主傷寒寒熱中風面目浮腫能出汗核曰所在有之凡四種山谷者曰茖蔥陸地者曰胡蔥凍蔥漢蔥漢蔥一名木蔥莖薄味淡春時開花作子卒黑而三瓣凍蔥一名冬蔥又名慈蔥或名大官蔥莖柔而香不結子分莖栽蒔夏衰而冬盛胡蔥莖葉粗硬茖蔥似胡蔥而稍細茖蔥療病凍蔥入藥最美也叅曰白根層理綠莖空中上達橫遍陽氣前通之象也方之奇方急方劑之宣劑通劑也故主陽氣閉塞致寒風外侮作湯盪滌之前通陽氣揚液為汗也先人云蔥葉離白轉大去根氣味更勝故從根柢直徹巔頂仲景云少陰病面赤者四逆湯加蔥白主之先人云陰經面赤謂之戴陽蔥白不離於陰以通陰中之陽也蘄陽云蔥管吹鹽入玉莖內治小便不通及轉胞先人云雖是吹入實是透出雖是下通實是上達活人書云頭痛如破者連根蔥白半斤佐生薑二兩水煮溫服先人云病頭用根欲從甲乙直作丙丁邪始淨盡深師方云胎動下血痛極搶心蔥白煮濃汁飲之未死即安已死即出先人云蔥白雖通陰分之陽其機輕捷使邪遽出無容留礙故中氣無損妊娠為宜宗奭云蔥主發散多食昏神先人云發散心王之邪其機數數寧免自傷又云其氣開出當入太陰其性通明當入陽明倘陽明闔機不及者投之為害不淺又云卒中悶絕多屬陽氣閉塞蔥力內開骨節外達毫竅下及趺踵上徹巔頂可使生陽遍周四大若出入之神機廢弛無能為矣澤蘭本經中品氣味苦微溫無毒主治主乳婦內衄中風余疾大腹水氣四肢浮腫骨節中水金瘡癰腫瘡膿核曰所在有之多生水中二月生苗莖方節赤四葉相值葉似蘭草但不甚香枝葉間微有白毛為異七月作萼色純紫開時色紫白根色青紫與蘭草亦相類也修治細銼以絹囊盛之懸於屋之南畔角上陰乾取用叅曰澤蘭生水中乃水氣所聚澄潔水體宣通水用者也故主乳婦內衄大腹水腫四肢浮腫骨節中水及金瘡癰腫瘡膿悉屬體失澄潔用失宣通其闢不祥與中風余疾皆體用功力耳白蘚根皮本經中品欲以壽終當首戒鮮氣味苦寒無毒主治主頭風黃疸咳逆淋瀝女子陰中腫痛濕痹死肌不可屈伸起止行步核曰出河中江寧滁州潤州而蜀中者為勝苗莖都青葉色稍白如槐葉亦如茱萸葉四月開花淡紫色似小蜀葵花根似小蔓青皮黃白而中實氣臭正似羊膻也春採者堅白夏採者虛惡惡螵蛸桔梗茯苓萆薢先人云膻者肝之臭當入肝為肝之用藥從治風氣者也亦可入脾除濕脾以肝為用耳叅曰白曰金鮮曰腥金之色與臭也又不以壽終者曰鮮故唯春採者堅白夏採者虛惡以方生則力銳形腐則氣萎而力不專矣味苦氣寒對待以熱為病以風為本如風中頭而標頭風郁肌層而標黃疸入毫竅而標咳逆客膀胱而標淋瀝侵陰中而標腫痛更合濕曰痹如痹肌而標死肌痹筋而標不可屈伸及起止行步不正也設合寒本氣味不相投矣山茱萸本經中品木胎於火與龍從火里得別是一法此正五行相襲四時之序也氣味酸平無毒主治主心下邪氣寒熱溫中逐寒濕痹去三蟲久服輕身核曰生漢中山谷及琅琊冤句今海州兗州近道諸山中亦有木高一二丈葉如梅而有刺二月開花如杏四月結實如酸棗深赤色一種葉乾花實俱相似但核有八稜名雀兒蘇別是一種不堪入藥修治以酒潤去核緩火熬干勿誤食核令人滑精蓼實為之使惡桔梗防風防己先人云酸溫津潤合從水藏之精液亦非自力所能致必欲待人待時而興者叅曰茱諧朱謂木胎火含陽於內也萸諧臾謂冤曲從乙木之性也春半開花夏半結實色赤味酸入肝之體肝之心藥也心下為寒熱所搏則火失暖熱性茱萸溫中對待治之痹逐蟲去而身輕矣客曰肝主疏泄癃閉者當用茱萸別錄止小便利者何也頤曰此肝用太過茱萸補體使體用均平耳赤小豆本經中品氣味甘酸平無毒主治主下水腫排癰腫膿血核曰赤小豆廣雅稱答蘇恭單稱赤豆葉曰藿近世咸用赤黑相間之草實為赤小豆者謬甚矣此豆以緊小而赤黯色者入藥最良稍大而鮮紅及淡紅色者僅堪供食並不療疾俱於夏至後下種苗科高尺許枝葉似豇豆葉微圓峭而小至秋開花亦似豇豆花淡銀褐色而有腐氣莢長二三寸似綠豆莢而稍大皮色微白帶紅三青二黃時收之可食入藥用者必須老赤也叅曰豆為腎水之主谷赤小者又為腎之心物水之用藥矣故主水用不行致作水腫及癰膿爾別錄廣之治寒熱熱中消渴者以寒本之氣入通於腎而病熱標之亦腎氣不周於胸消渴引飲也泄利癃閉正水無用腹滿為樞機轉闔吐逆卒澼為開闔兩持仲景用赤小豆湯療傷寒瘀熱在裡身必發黃之義可默悟矣
