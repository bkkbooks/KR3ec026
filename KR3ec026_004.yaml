body:
  text: 大豆黃卷本經中品氣味甘平無毒主治主濕痹筋攣膝痛不可屈伸核曰造黃卷法壬癸曰以井華水浸黑大豆候芽長五寸干之即為黃卷用時熬過服食所需也叅曰大豆作黃卷比之區萌而達蘖者長十數倍矣從艮而震震而巽矣自癸而甲甲而乙矣始生之曰黃黃而卷曲直之木性備矣木為肝臟藏真通於肝肝臟筋膜之氣也大筋聚於膝膝屬溪谷之府也故主濕痹筋攣膝痛不可屈伸屈伸為曲直象形從治法也
  hash: sha256:d14c545ee5ebea9993e0623daafecbab6292a13ddcbddf99926806a6c05f45c7
